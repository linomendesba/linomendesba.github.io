<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gráfico Velas — BetStat</title>
<link rel="stylesheet" href="grafico-trading.css">
<style>
    html, body { margin:0; background:#0d0f14; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    #status { color:#94a3b8; padding:10px 14px; font-size:13px; }
    #status b { color:#fff; }
    #velasPointsSelector{
        height:32px;
        background:#171a21;color:#cbd5e1;border:1px solid rgba(31,204,89,.35);
        border-radius:10px;padding:0 10px;font-size:12px;font-weight:800;
    }
</style>
</head>
<body>

<div id="status">carregando lib e dados...</div>

<section id="graficoTradingPanel" class="grafico-trading-panel">

    <div class="grafico-trading-top">

        <div class="grafico-trading-left">
            <div class="grafico-trading-title">🕯️ Gráfico Velas</div>
            <div class="grafico-trading-sub" id="graficoSub">Acertou sobe • Errou desce</div>
        </div>

        <div id="graficoTradingLegendas" class="grafico-trading-legendas">
            <button type="button" data-gt-market="over25" class="gt-legend selected">Over 2.5</button>
            <button type="button" data-gt-market="under25" class="gt-legend">Under 2.5</button>
            <button type="button" data-gt-market="ambasS" class="gt-legend">Ambas S</button>
            <button type="button" data-gt-market="ambasN" class="gt-legend">Ambas N</button>
            <button type="button" data-gt-market="empateHT" class="gt-legend">Empate HT</button>
        </div>

        <div class="grafico-trading-actions">
            <select id="velasPointsSelector">
                <option value="20">20 jogos</option>
                <option value="40">40 jogos</option>
                <option value="60" selected>60 jogos</option>
                <option value="100">100 jogos</option>
                <option value="150">150 jogos</option>
                <option value="9999">Tudo</option>
            </select>
            <button id="btnGraficoDots" type="button">Bolinha</button>
            <button id="btnGraficoCandle" type="button" class="active">Candlestick</button>
            <button id="btnGraficoZoomIn" type="button">+</button>
            <button id="btnGraficoZoomOut" type="button">−</button>
        </div>

    </div>

    <div class="grafico-trading-body" style="position: relative;">

        <div id="graficoTradingTools" class="grafico-trading-tools">
            <button type="button" data-gt-tool="select" class="gt-tool active" title="Selecionar">↖</button>
            <button type="button" data-gt-tool="trend" class="gt-tool" title="Linha de tendência">╱</button>
            <button type="button" data-gt-tool="vertical" class="gt-tool" title="Linha vertical">│</button>
            <button type="button" data-gt-tool="zone" class="gt-tool" title="Zona">▭</button>
            <button type="button" data-gt-tool="text" class="gt-tool" title="Texto">T</button>
            <button type="button" data-gt-tool="line" class="gt-tool" title="Linha horizontal">─</button>
            <button type="button" id="btnGraficoCurrentLine" class="gt-tool" title="Linha atual">•</button>
            <button type="button" id="btnGraficoDelete" data-gt-tool="delete" class="gt-tool" title="Apagar">🗑</button>
        </div>

        <div id="graficoTradingContainer" class="grafico-trading-container"></div>

    </div>

</section>

<script src="lightweight-charts.standalone.production.js"></script>
<script>
(function(){
    "use strict";

    // ---------- CONFIG DA LIGA / FONTE DE DADOS ----------
    const LIGA = 'Taça Glória eterna';
    const URL_RESULTADOS = 'https://betstat.site/resultados/' + encodeURIComponent(LIGA);
    const STATE_KEY = 'betstat:velas:estado:v1';

    const statusEl = document.getElementById('status');
    const log = (msg) => { statusEl.innerHTML = msg; console.log('[velas]', msg); };
    const $ = (id) => document.getElementById(id);

    document.getElementById('graficoSub').textContent = 'Acertou sobe • Errou desce — ' + LIGA;

    function parseHtParts(htStr){
        if (!htStr || htStr === 'OUT') return null;
        if (htStr.includes(' x ')){
            const p = htStr.split(' x ').map(Number);
            if (p.length === 2 && !isNaN(p[0]) && !isNaN(p[1])) return p;
        }
        return null;
    }

    // ---------- ESTADO DOS MERCADOS (igual ao Caramelo) ----------
    const mercados = {
        over25:   { nome: 'Over 2.5',  cor: '#1fcc59', ativo: true  },
        under25:  { nome: 'Under 2.5', cor: '#ef4444', ativo: false },
        ambasS:   { nome: 'Ambas S',   cor: '#38bdf8', ativo: false },
        ambasN:   { nome: 'Ambas N',   cor: '#f59e0b', ativo: false },
        empateHT: { nome: 'Empate HT', cor: '#a855f7', ativo: false }
    };

    let chart = null;
    let visibleRange = null;
    let dotsMode = false;
    let candleMode = true; // gráfico de velas já ligado por padrão

    const series = {};
    const candleSeries = {};

    let velasNumPoints = 60;
    let pontosAtuais = {};
    let dataPorMercado = {};
    let candlePorMercado = {};
    let ultimoValorPorMercado = {};
    let rawDataCache = null;

    // ---------- PERSISTÊNCIA (localStorage, igual ao Caramelo) ----------
    function saveState(){
        try {
            const range = chart?.timeScale?.().getVisibleLogicalRange?.() || visibleRange;
            localStorage.setItem(STATE_KEY, JSON.stringify({
                range, dotsMode, candleMode, velasNumPoints,
                mercados: Object.fromEntries(Object.entries(mercados).map(([k, v]) => [k, !!v.ativo]))
            }));
        } catch {}
    }

    function loadState(){
        try {
            const raw = localStorage.getItem(STATE_KEY);
            return raw ? JSON.parse(raw) : null;
        } catch { return null; }
    }

    function applySavedState(){
        const st = loadState();
        if (!st) return;
        dotsMode = !!st.dotsMode;
        candleMode = st.candleMode !== false;
        if (st.velasNumPoints) velasNumPoints = st.velasNumPoints;
        if (st.mercados) Object.keys(mercados).forEach(k => { if (k in st.mercados) mercados[k].ativo = !!st.mercados[k]; });
        if (st.range && Number.isFinite(st.range.from) && Number.isFinite(st.range.to)) visibleRange = st.range;

        $('btnGraficoDots')?.classList.toggle('active', dotsMode);
        $('btnGraficoCandle')?.classList.toggle('active', candleMode);
        $('velasPointsSelector').value = String(velasNumPoints);
    }

    // ---------- REGRAS DE MERCADO ----------
    function bateMercado(m, key){
        let ft = [0, 0];
        if (m.ft && m.ft.includes(' x ')) ft = m.ft.split(' x ').map(Number);
        const htParts = parseHtParts(m.ht);

        switch (key){
            case 'over25':   return (ft[0] + ft[1]) > 2.5;
            case 'under25':  return (ft[0] + ft[1]) < 2.5;
            case 'ambasS':   return ft[0] > 0 && ft[1] > 0;
            case 'ambasN':   return !(ft[0] > 0 && ft[1] > 0);
            case 'empateHT': return !!(htParts && htParts[0] === htParts[1]);
            default: return false;
        }
    }

    // ---------- CONSTRÓI SÉRIES (tempo = índice sequencial, igual ao Caramelo) ----------
    function buildSeriesData(rawData){
        const sorted = [...rawData].sort((a, b) => {
            const dA = new Date(a.data), dB = new Date(b.data);
            if (dA.getTime() !== dB.getTime()) return dA - dB;
            if (a.hora !== b.hora) return a.hora - b.hora;
            return a.minuto - b.minuto;
        });
        const sliced = sorted.slice(-velasNumPoints);

        const acumulado = {}, data = {}, candles = {};
        Object.keys(mercados).forEach(k => {
            acumulado[k] = 0; data[k] = []; candles[k] = []; ultimoValorPorMercado[k] = 0;
        });

        const pontos = {};
        sliced.forEach((m, i) => {
            const time = i + 1; // índice sequencial, não timestamp real — é isso que dá o barSpacing/comportamento certo
            pontos[time] = {
                labelTempo: `${String(m.hora).padStart(2, '0')}:${String(m.minuto).padStart(2, '0')}`,
                jogo: `${m.time_a || ''} x ${m.time_b || ''}`,
                ft: m.ft || '-',
                ht: m.ht || '-'
            };

            Object.keys(mercados).forEach(key => {
                const hit   = bateMercado(m, key);
                const dir   = hit ? 1 : -1;
                const open  = acumulado[key];
                const close = open + dir;
                acumulado[key] = close;
                ultimoValorPorMercado[key] = close;

                data[key].push({ time, value: close });

                // pavio (sombra) — sem isso a vela vira um bloco quadrado sem sombra
                const corpo = close - open;
                const pavio = Math.max(0.35, Math.abs(corpo) * 0.35);

                candles[key].push({
                    time, open, close,
                    high: Math.max(open, close) + pavio,
                    low:  Math.min(open, close) - pavio
                });
            });
        });

        pontosAtuais = pontos;
        dataPorMercado = data;
        candlePorMercado = candles;
    }

    // ---------- CHART (mesma config do Caramelo) ----------
    function addLineSeries(key, cfg){
        const options = {
            color: cfg.cor,
            lineWidth: key === 'over25' ? 2 : 1.8,
            priceLineVisible: false,
            lastValueVisible: false,
            crosshairMarkerVisible: true,
            crosshairMarkerRadius: 4,
            pointMarkersVisible: true
        };
        if (chart.addSeries && window.LightweightCharts.LineSeries){
            return chart.addSeries(window.LightweightCharts.LineSeries, options);
        }
        return chart.addLineSeries(options);
    }

    function addCandleSeriesFn(key, cfg){
        const options = {
            upColor: cfg.cor, downColor: '#ef4444',
            borderUpColor: cfg.cor, borderDownColor: '#ef4444',
            wickUpColor: cfg.cor, wickDownColor: '#ef4444',
            priceLineVisible: false, lastValueVisible: false
        };
        if (chart.addSeries && window.LightweightCharts.CandlestickSeries){
            return chart.addSeries(window.LightweightCharts.CandlestickSeries, options);
        }
        return chart.addCandlestickSeries(options);
    }

    function createChart(){
        const el = $('graficoTradingContainer');
        if (!el || !window.LightweightCharts) return false;
        if (chart) return true;

        chart = window.LightweightCharts.createChart(el, {
            layout: { background: { color: '#111318' }, textColor: '#cbd5e1' },
            localization: { timeFormatter: t => pontosAtuais[t]?.labelTempo || String(t) },
            grid: {
                vertLines: { color: 'rgba(255,255,255,.045)' },
                horzLines: { color: 'rgba(255,255,255,.045)' }
            },
            rightPriceScale: { borderVisible: false },
            timeScale: {
                borderColor: 'rgba(31,204,89,.25)',
                timeVisible: false,
                secondsVisible: false,
                rightOffset: 1,
                barSpacing: 22,
                rightBarStaysOnScroll: true,
                tickMarkFormatter: t => pontosAtuais[t]?.labelTempo || ''
            },
            crosshair: { mode: window.LightweightCharts.CrosshairMode.Normal },
            handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true, vertTouchDrag: false },
            handleScale:  { axisPressedMouseMove: true, mouseWheel: true, pinch: true }
        });

        Object.entries(mercados).forEach(([key, cfg]) => {
            series[key] = addLineSeries(key, cfg);
            candleSeries[key] = addCandleSeriesFn(key, cfg);
        });

        chart.timeScale().subscribeVisibleLogicalRangeChange((range) => {
            if (range) { visibleRange = range; saveState(); }
            window.GraficoTradingTools?.redraw?.();
        });

        chart.subscribeCrosshairMove(renderTooltip);
        return true;
    }

    function renderSeries(){
        Object.keys(mercados).forEach(key => {
            const ativo = !!mercados[key].ativo;

            if (candleMode){
                series[key]?.setData([]);
                candleSeries[key]?.setData(ativo ? (candlePorMercado[key] || []) : []);
            } else {
                candleSeries[key]?.setData([]);
                series[key]?.setData(ativo ? (dataPorMercado[key] || []) : []);
            }

            series[key]?.applyOptions({
                color: dotsMode && !candleMode ? 'rgba(31,204,89,0.08)' : mercados[key].cor,
                lineWidth: dotsMode && !candleMode ? 1 : (key === 'over25' ? 2 : 1.8),
                crosshairMarkerVisible: true,
                crosshairMarkerRadius: dotsMode ? 5 : 4
            });
        });
    }

    function resizeChart(){
        const el = $('graficoTradingContainer');
        if (!chart || !el) return;
        const rect = el.getBoundingClientRect();
        if (rect.width < 10 || rect.height < 10) return;
        chart.applyOptions({ width: Math.floor(rect.width), height: Math.floor(rect.height) });
        window.GraficoTradingTools?.resize?.();
        window.GraficoTradingTools?.redraw?.();
    }

    function zoomGrafico(factor){
        if (!chart) return;
        const timeScale = chart.timeScale();
        const range = timeScale.getVisibleLogicalRange();
        if (!range) return;
        const center = (range.from + range.to) / 2;
        const width = (range.to - range.from) * factor;
        timeScale.setVisibleLogicalRange({ from: center - width / 2, to: center + width / 2 });
        window.GraficoTradingTools?.redraw?.();
    }

    // ---------- TOOLTIP ----------
    function getTooltipEl(){
        let el = document.getElementById('gtTooltip');
        if (!el){
            el = document.createElement('div');
            el.id = 'gtTooltip';
            el.className = 'gt-tooltip';
            $('graficoTradingContainer')?.appendChild(el);
        }
        return el;
    }

    function renderTooltip(param){
        const el = getTooltipEl();
        const container = $('graficoTradingContainer');
        if (!param || !param.point || !container || param.time == null){
            el.style.display = 'none';
            return;
        }
        const info = pontosAtuais[param.time];
        if (!info){ el.style.display = 'none'; return; }

        el.innerHTML = `
            <div class="gt-tooltip-title">${info.jogo}</div>
            <div class="gt-tooltip-sub">HT: ${info.ht}</div>
            <div class="gt-tooltip-odd">FT: ${info.ft}</div>
            <div class="gt-tooltip-time">${info.labelTempo}</div>
        `;

        const rect = container.getBoundingClientRect();
        const tooltipW = 230, tooltipH = 92;
        let left = param.point.x + 14, top = param.point.y + 14;
        if (left + tooltipW > rect.width) left = param.point.x - tooltipW - 14;
        if (top + tooltipH > rect.height) top = param.point.y - tooltipH - 14;
        el.style.left = `${Math.max(8, left)}px`;
        el.style.top  = `${Math.max(8, top)}px`;
        el.style.display = 'block';
    }

    // ---------- RENDER PRINCIPAL ----------
    function render(){
        if (!rawDataCache) return;
        if (!createChart()) return;

        const beforeRange = chart.timeScale().getVisibleLogicalRange();
        buildSeriesData(rawDataCache);
        renderSeries();

        if (beforeRange) chart.timeScale().setVisibleLogicalRange(beforeRange);
        else if (visibleRange) chart.timeScale().setVisibleLogicalRange(visibleRange);
        else chart.timeScale().scrollToRealTime();

        saveState();
        log(`<b>${rawDataCache.length}</b> jogos carregados de <b>${LIGA}</b> — mostrando <b>${Math.min(velasNumPoints, rawDataCache.length)}</b>`);

        requestAnimationFrame(() => {
            resizeChart();
            window.GraficoTradingTools?.reloadIfLigaChanged?.();
            window.GraficoTradingTools?.redraw?.();
        });
    }

    function syncLegendUI(){
        document.querySelectorAll('[data-gt-market]').forEach(btn => {
            const key = btn.dataset.gtMarket;
            btn.classList.toggle('selected', !!mercados[key]?.ativo);
        });
    }

    // ---------- EVENTOS ----------
    document.querySelectorAll('[data-gt-market]').forEach(btn => {
        btn.addEventListener('click', () => {
            const key = btn.dataset.gtMarket;
            if (!mercados[key]) return;
            mercados[key].ativo = !mercados[key].ativo;
            syncLegendUI();
            saveState();
            render();
        });
    });

    $('btnGraficoDots').addEventListener('click', () => {
        dotsMode = !dotsMode;
        if (dotsMode) candleMode = false;
        $('btnGraficoDots').classList.toggle('active', dotsMode);
        $('btnGraficoCandle').classList.toggle('active', candleMode);
        saveState();
        render();
    });

    $('btnGraficoCandle').addEventListener('click', () => {
        candleMode = !candleMode;
        if (candleMode) dotsMode = false;
        $('btnGraficoCandle').classList.toggle('active', candleMode);
        $('btnGraficoDots').classList.toggle('active', dotsMode);
        saveState();
        render();
    });

    $('btnGraficoZoomIn').addEventListener('click', () => zoomGrafico(0.78));
    $('btnGraficoZoomOut').addEventListener('click', () => zoomGrafico(1.28));

    $('velasPointsSelector').addEventListener('change', e => {
        velasNumPoints = parseInt(e.target.value, 10);
        saveState();
        render();
    });

    document.querySelectorAll('[data-gt-tool]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-gt-tool]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            window.GraficoTradingTools?.setTool?.(btn.dataset.gtTool || 'select');
        });
    });

    $('btnGraficoCurrentLine').addEventListener('click', () => {
        window.GraficoTradingTools?.addCurrentLine?.();
    });

    window.addEventListener('resize', resizeChart);

    window.addEventListener('gt:toolchange', (ev) => {
        document.querySelectorAll('[data-gt-tool]').forEach(b => b.classList.toggle('active', b.dataset.gtTool === (ev.detail?.tool || 'select')));
    });

    if (window.ResizeObserver){
        new ResizeObserver(() => resizeChart()).observe($('graficoTradingContainer'));
    }

    // ---------- API PÚBLICA PARA A ferramenta de desenho (grafico-trading-tools.js) ----------
    window.GraficoTradingCore = {
        getChart: () => chart,
        getSeries: () => series,
        getCandleSeries: () => candleSeries,
        getActiveMarket: () => Object.keys(mercados).find(k => mercados[k].ativo) || 'over25',
        getMarketColor: (key) => mercados[key]?.cor || '#60a5fa',
        getLastValue: (key) => ultimoValorPorMercado[key || (Object.keys(mercados).find(k => mercados[k].ativo) || 'over25')] ?? 0,
        redrawTools: () => window.GraficoTradingTools?.redraw?.()
    };

    // ---------- BOOT ----------
    applySavedState();
    syncLegendUI();

    log('buscando dados de ' + LIGA + '...');
    fetch(URL_RESULTADOS + '?timestamp=' + Date.now())
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(data => {
            rawDataCache = Array.isArray(data) ? data : (data.rows || data.resultados || []);
            if (!rawDataCache.length){
                log('⚠️ resposta chegou mas veio vazia. Veja o console (F12) pra ver o JSON bruto.');
                console.log('[velas] resposta bruta:', data);
                return;
            }
            render();
            requestAnimationFrame(() => window.GraficoTradingTools?.onOpen?.());
        })
        .catch(err => {
            log('❌ erro buscando dados: ' + err.message + ' — veja o console (F12)');
            console.error('[velas] erro fetch:', err);
        });

    setInterval(() => {
        fetch(URL_RESULTADOS + '?timestamp=' + Date.now())
            .then(r => r.json())
            .then(data => {
                rawDataCache = Array.isArray(data) ? data : (data.rows || data.resultados || []);
                render();
            })
            .catch(() => {});
    }, 5000);
})();
</script>
<script src="grafico-trading-tools.js"></script>
</body>
</html>
