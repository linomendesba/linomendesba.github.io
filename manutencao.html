<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gráfico Velas — Teste Standalone</title>
<style>
    html, body { margin:0; background:#0d0f14; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    #status { color:#94a3b8; padding:10px 14px; font-size:13px; }
    #status b { color:#fff; }
    .velas-panel{background:#1f2129;border-radius:12px;padding:14px;margin:14px;}
    .velas-top{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:10px;}
    .velas-title{color:#fff;font-weight:600;font-size:15px;margin-right:auto;}
    .velas-legend{display:flex;flex-wrap:wrap;gap:6px;}
    .velas-pill{
        --pill-cor:#1fcc59;
        background:#151821;color:#94a3b8;border:1px solid rgba(255,255,255,.08);
        padding:5px 12px;border-radius:999px;font-size:12px;cursor:pointer;transition:.15s;
    }
    .velas-pill:hover{border-color:var(--pill-cor);}
    .velas-pill.selected{background:var(--pill-cor);color:#0d1117;border-color:var(--pill-cor);font-weight:600;}
    #velasPointsSelector{
        background:#151821;color:#cbd5e1;border:1px solid rgba(255,255,255,.08);
        border-radius:8px;padding:5px 8px;font-size:12px;
    }
    .velas-chart-wrapper{position:relative;width:100%;height:500px;background:#151821;border-radius:10px;overflow:hidden;}
    #velasChartContainer{width:100%;height:100%;}
    .velas-tooltip{
        position:absolute;display:none;pointer-events:none;z-index:5;
        background:#0d1117;border:1px solid rgba(31,204,89,.35);border-radius:8px;
        padding:8px 10px;font-size:12px;color:#e2e8f0;min-width:120px;
    }
    .velas-tt-placar{font-weight:700;color:#1fcc59;}
    .velas-tt-sub{color:#94a3b8;margin-top:2px;}
    .velas-tt-hora{color:#64748b;font-size:11px;margin-top:2px;}
</style>
</head>
<body>

<div id="status">carregando lib e dados...</div>

<div class="velas-panel">
    <div class="velas-top">
        <div class="velas-title">🕯️ Gráfico Velas — Taça Glória Eterna (teste isolado)</div>
        <div class="velas-legend">
            <button class="velas-pill" data-velas-mercado="over25"  style="--pill-cor:#1fcc59">Over 2.5</button>
            <button class="velas-pill" data-velas-mercado="under25" style="--pill-cor:#ef4444">Under 2.5</button>
            <button class="velas-pill" data-velas-mercado="ambasS"  style="--pill-cor:#38bdf8">Ambas Sim</button>
            <button class="velas-pill" data-velas-mercado="ambasN"  style="--pill-cor:#f59e0b">Ambas Não</button>
            <button class="velas-pill" data-velas-mercado="empateHT" style="--pill-cor:#a855f7">Empate HT</button>
        </div>
        <select id="velasPointsSelector">
            <option value="20">20 jogos</option>
            <option value="40">40 jogos</option>
            <option value="60" selected>60 jogos</option>
            <option value="100">100 jogos</option>
            <option value="150">150 jogos</option>
            <option value="9999">Tudo</option>
        </select>
    </div>
    <div class="velas-chart-wrapper">
        <div id="velasChartContainer"></div>
        <div id="velasTooltip" class="velas-tooltip"></div>
    </div>
</div>

<script src="lightweight-charts.standalone.production.js"></script>
<script>
(function(){
    "use strict";

    const LIGA = 'Taça Glória eterna';
    const URL_RESULTADOS = 'https://betstat.site/resultados/' + encodeURIComponent(LIGA);

    const statusEl = document.getElementById('status');
    const log = (msg) => { statusEl.innerHTML = msg; console.log('[velas-teste]', msg); };

    function parseHtParts(htStr){
        if (!htStr || htStr === 'OUT') return null;
        if (htStr.includes(' x ')){
            const p = htStr.split(' x ').map(Number);
            if (p.length === 2 && !isNaN(p[0]) && !isNaN(p[1])) return p;
        }
        return null;
    }

    const VELAS_MERCADOS = {
        over25:   { nome: 'Over 2.5',  cor: '#1fcc59', ativo: true  },
        under25:  { nome: 'Under 2.5', cor: '#ef4444', ativo: false },
        ambasS:   { nome: 'Ambas Sim', cor: '#38bdf8', ativo: false },
        ambasN:   { nome: 'Ambas Não', cor: '#f59e0b', ativo: false },
        empateHT: { nome: 'Empate HT', cor: '#a855f7', ativo: false }
    };

    let velasChart    = null;
    const velasSeries = {};
    let velasNumPoints = 60;
    let velasPontos     = {};

    const $v = id => document.getElementById(id);

    function bateMercadoVelas(m, key){
        let ft = [0, 0];
        if (m.ft && m.ft.includes(' x ')) ft = m.ft.split(' x ').map(Number);
        const htParts = parseHtParts(m.ht);

        switch (key){
            case 'over25':   return (ft[0] + ft[1]) > 2.5;
            case 'under25':  return (ft[0] + ft[1]) < 2.5;
            case 'ambasS':   return ft[0] > 0 && ft[1] > 0;
            case 'ambasN':   return !(ft[0] > 0 && ft[1] > 0);
            case 'empateHT': return !!(htParts && htParts[0] === htParts[1]);
            default: return false;
        }
    }

    function buildVelasData(rawData){
        const sorted = [...rawData].sort((a, b) => {
            const dA = new Date(a.data), dB = new Date(b.data);
            if (dA.getTime() !== dB.getTime()) return dA - dB;
            if (a.hora !== b.hora) return a.hora - b.hora;
            return a.minuto - b.minuto;
        });
        const sliced = sorted.slice(-velasNumPoints);

        const acumulado = {}, candles = {};
        Object.keys(VELAS_MERCADOS).forEach(k => { acumulado[k] = 0; candles[k] = []; });

        const pontos = {};
        const agoraSeg = Math.floor(Date.now() / 1000);
        sliced.forEach((m, i) => {
            const time = agoraSeg - (sliced.length - 1 - i) * 86400;
            pontos[time] = {
                label: `${String(m.hora).padStart(2, '0')}:${String(m.minuto).padStart(2, '0')}`,
                ft: m.ft || '-',
                ht: m.ht || '-',
                jogo: `${m.time_a || ''} x ${m.time_b || ''}`
            };
            Object.keys(VELAS_MERCADOS).forEach(key => {
                const hit   = bateMercadoVelas(m, key);
                const open  = acumulado[key];
                const close = open + (hit ? 1 : -1);
                acumulado[key] = close;
                candles[key].push({
                    time, open, close,
                    high: Math.max(open, close),
                    low:  Math.min(open, close)
                });
            });
        });

        velasPontos = pontos;
        return candles;
    }

    function criarVelasChart(){
        const el = $v('velasChartContainer');
        if (!el || !window.LightweightCharts) return false;
        if (velasChart) return true;

        velasChart = window.LightweightCharts.createChart(el, {
            layout: { background: { color: '#151821' }, textColor: '#cbd5e1' },
            localization: { timeFormatter: t => (velasPontos[t]?.label) || String(t) },
            grid: {
                vertLines: { color: 'rgba(255,255,255,.045)' },
                horzLines: { color: 'rgba(255,255,255,.045)' }
            },
            rightPriceScale: { borderVisible: false },
            timeScale: {
                borderColor: 'rgba(31,204,89,.25)',
                rightOffset: 2,
                barSpacing: 10,
                rightBarStaysOnScroll: true,
                tickMarkFormatter: t => (velasPontos[t]?.label) || ''
            },
            crosshair: { mode: window.LightweightCharts.CrosshairMode.Normal },
            handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true, vertTouchDrag: false },
            handleScale:  { axisPressedMouseMove: true, mouseWheel: true, pinch: true }
        });

        Object.entries(VELAS_MERCADOS).forEach(([key, cfg]) => {
            const options = {
                upColor: cfg.cor, downColor: '#ef4444',
                borderUpColor: cfg.cor, borderDownColor: '#ef4444',
                wickUpColor: cfg.cor, wickDownColor: '#ef4444',
                priceLineVisible: false, lastValueVisible: false
            };
            velasSeries[key] = velasChart.addCandlestickSeries
                ? velasChart.addCandlestickSeries(options)
                : velasChart.addSeries(window.LightweightCharts.CandlestickSeries, options);
        });

        velasChart.subscribeCrosshairMove(renderVelasTooltip);
        return true;
    }

    function renderVelasTooltip(param){
        const el = $v('velasTooltip');
        const container = $v('velasChartContainer');
        if (!el || !param || !param.point || !container || param.time == null){
            if (el) el.style.display = 'none';
            return;
        }
        const info = velasPontos[param.time];
        if (!info){ el.style.display = 'none'; return; }

        el.innerHTML = `
            <div class="velas-tt-placar">${info.jogo}</div>
            <div class="velas-tt-sub">FT: ${info.ft} | HT: ${info.ht}</div>
            <div class="velas-tt-hora">${info.label}</div>
        `;
        const rect = container.getBoundingClientRect();
        let left = param.point.x + 14, top = param.point.y + 14;
        if (left + 200 > rect.width)  left = param.point.x - 214;
        if (top  + 80  > rect.height) top  = param.point.y - 94;
        el.style.left = `${Math.max(6, left)}px`;
        el.style.top  = `${Math.max(6, top)}px`;
        el.style.display = 'block';
    }

    function renderVelasSeries(candles){
        Object.keys(VELAS_MERCADOS).forEach(key => {
            velasSeries[key]?.setData(VELAS_MERCADOS[key].ativo ? (candles[key] || []) : []);
        });
        requestAnimationFrame(() => velasChart?.timeScale().fitContent());
    }

    function syncVelasLegend(){
        document.querySelectorAll('[data-velas-mercado]').forEach(btn => {
            const key = btn.dataset.velasMercado;
            btn.classList.toggle('selected', !!VELAS_MERCADOS[key]?.ativo);
        });
    }

    function resizeVelasChart(){
        const el = $v('velasChartContainer');
        if (!velasChart || !el) return;
        const rect = el.getBoundingClientRect();
        if (rect.width < 10 || rect.height < 10) return;
        velasChart.applyOptions({ width: Math.floor(rect.width), height: Math.floor(rect.height) });
    }

    let rawDataCache = null;

    function updateVelas(){
        if (!rawDataCache) return;
        if (!criarVelasChart()) return;
        const candles = buildVelasData(rawDataCache);
        renderVelasSeries(candles);
        log(`<b>${rawDataCache.length}</b> jogos carregados de <b>${LIGA}</b> — mostrando <b>${Math.min(velasNumPoints, rawDataCache.length)}</b>`);
    }

    document.querySelectorAll('[data-velas-mercado]').forEach(btn => {
        btn.addEventListener('click', () => {
            const key = btn.dataset.velasMercado;
            if (!VELAS_MERCADOS[key]) return;
            VELAS_MERCADOS[key].ativo = !VELAS_MERCADOS[key].ativo;
            syncVelasLegend();
            updateVelas();
        });
    });

    $v('velasPointsSelector').addEventListener('change', e => {
        velasNumPoints = parseInt(e.target.value, 10);
        updateVelas();
    });

    window.addEventListener('resize', resizeVelasChart);
    syncVelasLegend();

    if (window.ResizeObserver){
        new ResizeObserver(() => resizeVelasChart()).observe($v('velasChartContainer'));
    }

    log('buscando dados de ' + LIGA + '...');
    fetch(URL_RESULTADOS + '?timestamp=' + Date.now())
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(data => {
            rawDataCache = Array.isArray(data) ? data : (data.rows || data.resultados || []);
            if (!rawDataCache.length){
                log('⚠️ resposta chegou mas veio vazia. Veja o console (F12) pra ver o JSON bruto.');
                console.log('[velas-teste] resposta bruta:', data);
                return;
            }
            updateVelas();
        })
        .catch(err => {
            log('❌ erro buscando dados: ' + err.message + ' — veja o console (F12)');
            console.error('[velas-teste] erro fetch:', err);
        });

    setInterval(() => {
        fetch(URL_RESULTADOS + '?timestamp=' + Date.now())
            .then(r => r.json())
            .then(data => {
                rawDataCache = Array.isArray(data) ? data : (data.rows || data.resultados || []);
                updateVelas();
            })
            .catch(()=>{});
    }, 5000);
})();
</script>
</body>
</html>
