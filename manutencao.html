<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Teste isolado - Velas</title>
<style>
  html,body{margin:0;background:#111318;}
  #box{width:100%;height:500px;}
  #info{color:#fff;font-family:monospace;padding:10px;font-size:13px;}
</style>
</head>
<body>
<div id="info">carregando...</div>
<div id="box"></div>

<script src="lightweight-charts.standalone.production.js"></script>
<script>
  const info = document.getElementById('info');
  const el = document.getElementById('box');

  // amostra real de candle que veio do seu próprio console (over25)
  const candles = [
    { time: 1, open: 0,  close: -1, high: 0,  low: -1 },
    { time: 2, open: -1, close: -2, high: -1, low: -2 },
    { time: 3, open: -2, close: -1, high: -1, low: -2 },
    { time: 4, open: -1, close: -2, high: -1, low: -2 },
    { time: 5, open: -2, close: -3, high: -2, low: -3 },
    { time: 6, open: -3, close: -2, high: -2, low: -3 },
    { time: 7, open: -2, close: -1, high: -1, low: -2 },
    { time: 8, open: -1, close: 0,  high: 0,  low: -1 },
    { time: 9, open: 0,  close: 1,  high: 1,  low: 0  },
    { time: 10, open: 1, close: 2,  high: 2,  low: 1  }
  ];

  info.textContent = 'LightweightCharts version: ' + (window.LightweightCharts?.version?.() || 'INDEFINIDO/NAO CARREGOU');

  const chart = LightweightCharts.createChart(el, {
      width: el.clientWidth,
      height: 500,
      layout: { background: { color: '#111318' }, textColor: '#cbd5e1' }
  });

  const serie = chart.addCandlestickSeries
      ? chart.addCandlestickSeries({ upColor: '#1fcc59', downColor: '#ef4444', borderUpColor:'#1fcc59', borderDownColor:'#ef4444', wickUpColor:'#1fcc59', wickDownColor:'#ef4444' })
      : chart.addSeries(LightweightCharts.CandlestickSeries, { upColor: '#1fcc59', downColor: '#ef4444' });

  serie.setData(candles);
  chart.timeScale().fitContent();

  info.textContent += ' | addCandlestickSeries existe? ' + (!!chart.addCandlestickSeries) + ' | 10 candles enviados';
</script>
</body>
</html>
