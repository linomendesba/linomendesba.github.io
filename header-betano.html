<!-- header-betano.html -->
<link rel="stylesheet" href="stylehe.css">
<header>
  <div class="header-container">
    <!-- Botão de voltar para home -->
    <button onclick="voltarHome()" style="background: linear-gradient(135deg, #1fac89 0%, #159f7a 100%); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; margin-right: 15px; transition: all 0.3s ease;">
      ⬅ Voltar
    </button>
    
    <img src="img/logo.png" alt="Logo" class="logo" />
    
    <div class="selectors-container">
      <!-- BETANO - Ligas -->
      <div class="nav-seletor">
        <label for="ligasBetano"></label>
        <select id="ligasBetano" onchange="redirecionar(this)">
          <option value="">📋 Ligas Betano</option>
          <option disabled>───────────</option>
          <option value="index.html">Clássicos da América</option>
          <option value="euro.html">Euro Betano</option>
          <option value="copa_america.html">Copa América</option>
          <option value="copa_das_estrelas.html">Copa das Estrelas</option>
          <option value="brasileirao.html">Brasileirão Betano</option>
          <option value="campeonato_italiano.html">Campeonato Italiano</option>
        </select>
      </div>

      <div class="newheader-divider"></div>

      <!-- BETANO - Ferramentas -->
      <div class="nav-seletor">
        <label for="ferramentasBetano"></label>
        <select id="ferramentasBetano" onchange="redirecionar(this)">
          <option value="">⚙️ Ferramentas</option>
          <option disabled>───────────</option>
          <option value="https://www.betstat.site/betanopre.html">Pré Live</option>
          <option value="https://www.betstat.site/tv/">Ao vivo</option>
          <option value="https://www.betstat.site/fluxo.html">Fluxo</option>
          <option value="https://www.betstat.site/maximabetano.html">Máximas</option>
          <option value="https://www.betstat.site/ranking.html">Ranking</option>
          <option value="https://www.betstat.site/equipes.html">Equipes</option>
          <option value="https://www.betstat.site/Palpites.html">Palpites</option>
          <option value="https://www.betstat.site/gols.html">GolsPró</option>
          <option value="https://www.betstat.site/betanobar.html">GolsBar</option>
          <option value="https://www.betstat.site/betanofixo.html">Hora Fixa</option>
          <option value="https://www.betstat.site/LigaStat.html">LigaStat</option>
          <option value="https://www.betstat.site/multbetano.html">MultiLiga</option>
          <option value="https://www.betstat.site/localizAI.html">LocalizAI</option>
          <option value="https://www.betstat.site/timeminuto.html">Time Minuto</option>
          <option value="https://www.betstat.site/betanotips.html">Projeções</option>
          <option value="https://www.betstat.site/simulador.html">Simulador</option>
          <option value="https://www.betstat.site/porcentagembetano.html">Porcentagem</option>
          <option value="https://www.betstat.site/classificacao.html">Classificação</option>
          <option value="https://www.betstat.site/sequencia.html">Sequência</option>
        </select>
      </div>

      <div class="newheader-divider"></div>

      <!-- BETANO - Gráficos -->
      <div class="nav-seletor">
        <label for="graficosBetano"></label>
        <select id="graficosBetano" onchange="redirecionar(this)">
          <option value="">📊 Gráficos</option>
          <option disabled>───────────</option>
          <option value="https://www.betstat.site/betanofiboexato.html">Gráfico FT</option>
          <option value="https://www.betstat.site/betanofiboht.html">Gráfico HT</option>
          <option value="https://www.betstat.site/graficosgols.html">Gráfico GF</option>
          <option value="https://www.betstat.site/graficoodd.html">Gráfico OD</option>
          <option value="https://www.betstat.site/graficotime.html">Gráfico Time</option>
          <option value="https://www.betstat.site/macrobetano.html">Gráfico Macro</option>
          <option value="https://www.betstat.site/quadrantesgols.html">Quadrantes</option>
          <option value="https://www.betstat.site/betanoradar.html">Radar Gráfico</option>
        </select>
      </div>

      <div class="newheader-divider"></div>

      <!-- BETANO - Buscadores -->
      <div class="nav-seletor">
        <label for="buscadoresBetano"></label>
        <select id="buscadoresBetano" onchange="redirecionar(this)">
          <option value="">🔍 Buscadores</option>
          <option disabled>───────────</option>
          <option value="https://www.betstat.site/buscadorodd.html">Buscador Odds</option>
          <option value="https://www.betstat.site/buscadortime.html">Buscador Time</option>
          <option value="https://www.betstat.site/betanobuscador.html">Buscador Placar</option>
          <option value="https://www.betstat.site/buscaconfronto.html">Buscador Duelo</option>
        </select>
      </div>

      <div class="newheader-divider"></div>

      <!-- Link para Casa -->
      <div class="nav-seletor">
        <label for="linkCasa"></label>
        <select id="linkCasa" onchange="redirecionar(this)">
          <option value="">🏠 Casa</option>
          <option disabled>───────────</option>
          <option value="https://www.betano.bet.br/virtuals/futebol/">Abrir Betano</option>
        </select>
      </div>

      <div class="newheader-divider"></div>

      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>
  </div>
</header>

<script>
  function redirecionar(select) {
    const url = select.value;
    if (url) {
      window.location.href = url;
    }
  }

  function voltarHome() {
    window.location.href = 'home.html';
  }

  function logout() {
    localStorage.clear();
    sessionStorage.clear();
    window.location.href = 'login.html';
  }
</script>
