        <select id="graficosBetano" onchange="redirecionar(this)">

      <button class="logout-btn" onclick="logout()">Sair</button>

                <!-- Botão de voltar para home -->
<button onclick="voltarHome()" style="
  background: transparent;
  color: #159f7a;
  border: none;
  padding: 4px 8px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  opacity: 0.8;
  transition: all 0.2s ease;
">
  ⬅ Home
</button>
    </div>
  </div>
</header>

<script>
  function redirecionar(select) {
    const url = select.value;
    if (url) {
      window.location.href = url;
    }
  }

function voltarHome() {
  window.location.href = 'https://www.betstat.site/home';
}

  function logout() {
    localStorage.clear();
    sessionStorage.clear();
    window.location.href = 'login.html';
  }
</script>
