<!-- header-betano.html -->
<link rel="stylesheet" href="stylehe.css">

<style>
  .home-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.08), rgba(34, 197, 94, 0.03));
    color: #e2e8f0;
    border: 1px solid rgba(34, 197, 94, 0.25);
    padding: 6px 14px 6px 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }
  .home-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.18), rgba(34, 197, 94, 0.06));
    opacity: 0;
    transition: opacity 0.25s ease;
    border-radius: inherit;
  }
  .home-btn:hover {
    color: #4ade80;
    border-color: rgba(34, 197, 94, 0.55);
    box-shadow: 0 0 12px rgba(34, 197, 94, 0.18), 0 2px 8px rgba(0,0,0,0.25);
    transform: translateY(-1px);
  }
  .home-btn:hover::before { opacity: 1; }
  .home-btn:active { transform: translateY(0px); box-shadow: 0 0 6px rgba(34, 197, 94, 0.15); }
  .home-btn svg { transition: transform 0.25s ease, color 0.25s ease; flex-shrink: 0; }
  .home-btn:hover svg { transform: scale(1.12); }
  .home-btn span { position: relative; z-index: 1; }

  #betstat-user-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    white-space: nowrap;
  }
  #betstat-user-info .ui-nome {
    font-weight: 600;
    color: #e2e8f0;
  }
  #betstat-user-info .ui-badge {
    border-radius: 6px;
    padding: 2px 9px;
    font-size: 11.5px;
    font-weight: 500;
    border: 1px solid;
  }
  #betstat-user-info .ui-badge.verde    { background: rgba(34,197,94,0.12);  color: #4ade80; border-color: rgba(34,197,94,0.35); }
  #betstat-user-info .ui-badge.laranja  { background: rgba(249,115,22,0.12); color: #fb923c; border-color: rgba(249,115,22,0.35); }
  #betstat-user-info .ui-badge.vermelho { background: rgba(239,68,68,0.12);  color: #f87171; border-color: rgba(239,68,68,0.35); }
</style>

<!-- Busca dados do cliente no Supabase após o header carregar -->
<script type="module">
  import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

  const cfg = {
    apiKey: "AIzaSyDmLGMBnUa2YOdP0b-zlZepXjm-zlV477A",
    authDomain: "linoautenticador.firebaseapp.com",
    projectId: "linoautenticador",
    storageBucket: "linoautenticador.firebasestorage.app",
    messagingSenderId: "946057648829",
    appId: "1:946057648829:web:ac5c2b1ba66e651f9d75d4",
  };

  const app = getApps().length ? getApp() : initializeApp(cfg);
  const auth = getAuth(app);

  const SB_URL = "https://pxhmwhswhqvaaohhuqmj.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4aG13aHN3aHF2YWFvaGh1cW1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTMwNDE1MTgsImV4cCI6MjA2ODYxNzUxOH0.9zaDX79OClGfsjBxsNRi1plZLXXryMkRn6efFZvqDvw";

  onAuthStateChanged(auth, async (user) => {
    if (!user) return;

    const res = await fetch(
      `${SB_URL}/rest/v1/clients?email=eq.${encodeURIComponent(user.email)}&select=name,days_remaining,start_date&limit=1`,
      { headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } }
    );
    const data = await res.json();
    const c = data?.[0];
    if (!c) return;

    const venc = new Date(c.start_date);
    venc.setDate(venc.getDate() + c.days_remaining);
    const dias = Math.ceil((venc - new Date()) / 86400000);
    const cls = dias <= 0 ? "vermelho" : dias <= 5 ? "laranja" : "verde";
    const txt = dias <= 0 ? "⛔ Expirado" : dias <= 5 ? `⚠️ Vence em ${dias}d` : `✅ ${dias} dias`;

    document.getElementById("betstat-user-info").innerHTML = `
      <span class="ui-nome">👤 ${c.name}</span>
      <span class="ui-badge ${cls}" title="Vence: ${venc.toLocaleDateString("pt-BR")}">${txt}</span>
    `;
  });
</script>
