<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Painel de Configuração do Bot</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--primary:#1fac89;--primary-hover:#189e7a;--primary-glow:rgba(31, 172, 137, 0.2);--bg-body:#0f1115;--bg-card:#161b22;--bg-input:#0d1117;--border-color:#30363d;--text-main:#e6edf3;--text-muted:#8b949e;--danger:#f85149}*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:thin;scrollbar-color:var(--border-color) var(--bg-body)}body{background-color:var(--bg-body);color:var(--text-main);font-family:Inter,sans-serif;padding:40px 20px;line-height:1.6}.container{max-width:1440px;margin:0 auto}.config-section{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px}.field-group,.rule-item,.table-container{background-color:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;padding:20px;box-shadow:0 4px 6px rgba(0,0,0,.1)}.field-group label,.table-title{display:block;margin-bottom:10px;font-size:12px;font-weight:600;color:var(--primary);text-transform:uppercase;letter-spacing:.8px}input[type=number],input[type=text],input[type=time],select{width:100%;padding:12px;background-color:var(--bg-input);border:1px solid var(--border-color);border-radius:6px;font-size:14px;color:var(--text-main);outline:0;font-family:Inter,sans-serif;transition:all .2s}input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}.league-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.league-header button{padding:6px 14px;background-color:var(--primary);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;transition:background-color .2s}.league-header button:hover{background-color:var(--primary-hover)}.league-checkboxes{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.checkbox-item{display:flex;align-items:center;gap:10px;padding:10px;background-color:var(--bg-input);border:1px solid var(--border-color);border-radius:6px;cursor:pointer;transition:background-color .2s}.checkbox-item:hover{background-color:#1c2128;border-color:var(--primary)}.checkbox-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}.checkbox-item label{margin:0;color:var(--text-main);font-size:13px;cursor:pointer}.telegram-container{display:flex;flex-direction:column;gap:10px}.telegram-input-group{display:flex;gap:10px}.btn-add-telegram{padding:0 20px;background-color:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px}.btn-add-telegram:hover{background-color:var(--primary-hover)}.telegram-list{background:var(--bg-input);border:1px solid var(--border-color);border-radius:6px;padding:5px;max-height:100px;overflow-y:auto}.telegram-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background-color:var(--bg-card);border-bottom:1px solid var(--border-color);font-size:13px;margin-bottom:4px;border-radius:4px}.btn-remove{background-color:transparent;color:var(--danger);border:1px solid var(--danger);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}.btn-remove:hover{background-color:var(--danger);color:#fff}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px;grid-column:span 4}.btn{padding:16px 40px;font-size:15px;font-weight:600;border:none;border-radius:8px;cursor:pointer;text-transform:uppercase;letter-spacing:1.2px;transition:all .3s ease;display:flex;align-items:center;justify-content:center;gap:10px}.btn:active{transform:scale(.97)}.btn-clear{background-color:var(--bg-card);border:2px solid var(--danger);color:var(--danger)}.btn-clear:hover{background-color:var(--danger);color:#fff;border-color:var(--danger);box-shadow:0 4px 20px rgba(248,81,73,.4)}.btn-save{background:linear-gradient(135deg,var(--primary) 0,#158f6e 100%);color:#fff;box-shadow:0 4px 15px rgba(31,172,137,.3);border:2px solid transparent}.btn-save:hover{box-shadow:0 6px 25px rgba(31,172,137,.5);transform:translateY(-2px);filter:brightness(1.1)}.table-container{border-top:4px solid var(--primary);padding:25px}.table-title{font-size:16px;text-align:left;margin-bottom:20px;color:var(--text-main);border-bottom:1px solid var(--border-color);padding-bottom:10px}.number-grid{display:grid;grid-template-columns:repeat(20,1fr);gap:4px;margin-bottom:20px}.number-cell{aspect-ratio:1;background-color:var(--bg-input);border:1px solid var(--border-color);display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500;color:var(--text-muted);position:relative;transition:all .1s}.number-cell:hover{border-color:var(--primary);color:var(--text-main);transform:translateY(-2px)}.number-cell.filter-selected{background-color:#1e40af;border-color:#3b82f6;color:#fff}.number-cell.entry-confirmed{background-color:rgba(31,172,137,.2);border-color:var(--primary);color:var(--primary);font-weight:700}.number-cell .filter-label{position:absolute;bottom:1px;right:1px;font-size:7px;font-weight:700;opacity:.9}.tooltip{position:absolute;background-color:var(--bg-card);color:var(--text-main);padding:8px 12px;border-radius:6px;font-size:12px;font-weight:600;white-space:nowrap;z-index:1000;pointer-events:none;border:1px solid var(--primary);box-shadow:0 4px 12px rgba(0,0,0,.3);opacity:0;transition:opacity .2s}.tooltip.show{opacity:1}.tooltip::before{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid var(--primary)}.progress-bar{width:100%;height:6px;background-color:var(--bg-input);border-radius:3px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#3b82f6);width:0%;transition:width .5s cubic-bezier(.4, 0, .2, 1)}.assertivity-container{background-color:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;padding:25px;margin-bottom:30px;box-shadow:0 4px 6px rgba(0,0,0,.1)}.assertivity-title{font-size:16px;font-weight:600;color:var(--text-main);margin-bottom:20px;border-bottom:1px solid var(--border-color);padding-bottom:10px;display:flex;align-items:center;gap:10px}.assertivity-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px}.assertivity-card{background-color:var(--bg-input);border:1px solid var(--border-color);border-radius:6px;padding:15px;text-align:center;transition:transform .2s,border-color .2s}.assertivity-card:hover{transform:translateY(-2px);border-color:var(--primary)}.assertivity-period{font-size:11px;color:var(--text-muted);text-transform:uppercase;font-weight:600;margin-bottom:8px;letter-spacing:.5px}.assertivity-value{font-size:24px;font-weight:700;margin-bottom:5px}.assertivity-value.positive{color:var(--primary)}.assertivity-value.negative{color:var(--danger)}.assertivity-stats{display:flex;justify-content:space-around;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-color);font-size:11px}.stat-item{display:flex;flex-direction:column;align-items:center}.stat-label{color:var(--text-muted);margin-bottom:3px}.stat-value{font-weight:600}.stat-value.green{color:var(--primary)}.stat-value.red{color:var(--danger)}.bots-floating-btn{position:fixed;bottom:30px;right:30px;width:60px;height:60px;background:linear-gradient(135deg,var(--primary),#158f6e);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(31,172,137,.4);z-index:1000;transition:transform .3s,box-shadow .3s;border:3px solid var(--bg-body)}.bots-floating-btn:hover{transform:scale(1.1) rotate(5deg);box-shadow:0 6px 30px rgba(31,172,137,.6)}.bots-floating-btn .icon{font-size:28px;color:#fff}.bots-counter{position:absolute;top:-5px;right:-5px;background-color:var(--danger);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--bg-body)}.bots-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,.8);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(5px)}.bots-modal.active{display:flex}.bots-modal-content{background-color:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;width:90%;max-width:900px;max-height:90vh;overflow-y:auto;box-shadow:0 10px 50px rgba(0,0,0,.5);animation:slideIn .3s ease-out}@keyframes slideIn{from{transform:translateY(-50px);opacity:0}to{transform:translateY(0);opacity:1}}.bots-modal-header{padding:25px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;background-color:rgba(31,172,137,.05)}.bots-modal-title{font-size:20px;font-weight:700;color:var(--text-main);display:flex;align-items:center;gap:12px}.bots-limit{font-size:13px;color:var(--text-muted);background-color:var(--bg-input);padding:6px 12px;border-radius:20px;font-weight:600}.close-modal{background:0 0;border:none;color:var(--text-muted);font-size:28px;cursor:pointer;transition:color .2s,transform .2s;width:35px;height:35px;display:flex;align-items:center;justify-content:center;border-radius:6px}.close-modal:hover{color:var(--danger);background-color:rgba(248,81,73,.1);transform:rotate(90deg)}.bots-modal-body{padding:25px}.bot-item{background-color:var(--bg-input);border:1px solid var(--border-color);border-radius:8px;padding:20px;margin-bottom:15px;transition:border-color .2s,transform .2s}.bot-item:hover{border-color:var(--primary);transform:translateX(5px)}.bot-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.bot-name{font-size:16px;font-weight:600;color:var(--text-main);display:flex;align-items:center;gap:10px}.bot-status{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase}.bot-status.active{background-color:rgba(31,172,137,.2);color:var(--primary)}.bot-status.paused{background-color:rgba(255,193,7,.2);color:#ffc107}.bot-info{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px;padding:12px;background-color:var(--bg-body);border-radius:6px}.bot-info-item{text-align:center}.bot-info-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-bottom:5px;font-weight:600}.bot-info-value{font-size:13px;font-weight:600;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bot-stats-container{margin-bottom:15px;background-color:var(--bg-body);border-radius:6px;padding:10px;border:1px solid var(--border-color)}.bot-stats-title{font-size:11px;color:var(--text-muted);text-transform:uppercase;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between}.bot-stats-title span:last-child{color:var(--primary);font-size:10px;animation:pulse 2s infinite}@keyframes pulse{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}.bot-stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.mini-stat-box{text-align:center;background-color:var(--bg-input);padding:6px 2px;border-radius:4px;border:1px solid var(--border-color)}.mini-stat-period{font-size:9px;color:var(--text-muted);margin-bottom:2px;font-weight:600}.mini-stat-value{font-size:12px;font-weight:700}.mini-stat-value.high{color:var(--primary)}.mini-stat-value.med{color:#ffc107}.mini-stat-value.low{color:var(--danger)}.bot-actions{display:flex;gap:10px}.bot-action-btn{flex:1;padding:10px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}.btn-edit{background-color:rgba(59,130,246,.1);color:#3b82f6;border:1px solid #3b82f6}.btn-edit:hover{background-color:#3b82f6;color:#fff}.btn-pause{background-color:rgba(255,193,7,.1);color:#ffc107;border:1px solid #ffc107}.btn-pause:hover{background-color:#ffc107;color:var(--bg-body)}.btn-delete{background-color:rgba(248,81,73,.1);color:var(--danger);border:1px solid var(--danger)}.btn-delete:hover{background-color:var(--danger);color:#fff}.empty-bots{text-align:center;padding:60px 20px;color:var(--text-muted)}.empty-bots-icon{font-size:60px;margin-bottom:20px;opacity:.5}.empty-bots-text{font-size:16px;margin-bottom:10px}.rules-container{margin-top:40px;display:flex;flex-direction:column;gap:15px}.rule-item{padding:0;border:1px solid var(--border-color);overflow:hidden;background-color:var(--bg-card)}.rule-header{padding:18px 25px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:600;color:var(--text-main);background-color:rgba(255,255,255,.02);border-left:4px solid transparent;transition:all .3s}.rule-header:hover{background-color:rgba(255,255,255,.05)}.rule-header.active{border-left-color:var(--primary);background-color:rgba(31,172,137,.05)}.rule-header .arrow{transition:transform .3s ease;color:var(--text-muted);font-size:12px}.rule-header.active .arrow{transform:rotate(180deg);color:var(--primary)}.rule-content{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(0, 1, 0, 1);background-color:var(--bg-body);border-top:1px solid var(--border-color)}.rule-content.active{max-height:2000px;padding:25px}.rule-content label{display:block;margin-bottom:10px;font-size:13px;color:var(--text-muted);margin-top:15px}.rule-content label:first-child{margin-top:0}.checkbox-label{display:flex;align-items:center;gap:12px;padding:12px;background-color:var(--bg-input);border:1px solid var(--border-color);border-radius:6px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}.checkbox-label:hover{border-color:var(--primary)}.checkbox-label input[type=checkbox]{accent-color:var(--primary);width:18px;height:18px}.link-group{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px}.time-range{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:5px}.time-range small{display:block;margin-bottom:6px;color:var(--primary);font-weight:600;font-size:11px;text-transform:uppercase}@media (max-width:1200px){.config-section{grid-template-columns:repeat(2,1fr)}}@media (max-width:768px){.config-section{grid-template-columns:1fr}.buttons{grid-template-columns:1fr;gap:15px}.link-group{grid-template-columns:1fr}.number-grid{overflow-x:auto}.bot-info{grid-template-columns:repeat(2,1fr)}.bot-stats-grid{grid-template-columns:repeat(3,1fr);gap:8px}}</style></head><body><div class="container"><div class="config-section"><div class="field-group"><label>Nome do Bot</label> <input type="text" id="botName" placeholder="Ex: Bot Premium V1"></div><div class="field-group"><label>Plataforma</label> <select id="bookmaker" onchange="changeBookmaker()"><option value="bet365">Bet365</option><option value="betano">Betano</option><option value="kiron">Kiron</option><option value="estrelabet">EstrelaBet</option></select></div><div class="field-group"><label>Modo de Marcação</label> <select id="markMode"><option value="padrao">Padrão</option><option value="entrada">Entrada</option></select></div><div class="field-group"><label>Estratégia / Filtro</label> <select id="filter" onchange="updateAssertivity()"><option value="">Selecione um filtro</option><option value="ambas-sim">Ambas Sim</option><option value="ambas-nao">Ambas Não</option><option value="casa-vence">Casa Vence</option><option value="fora-vence">Fora Vence</option><option value="empate">Empate</option><option value="over-1.5">Over 1.5</option><option value="over-2.5">Over 2.5</option><option value="under-1.5">Under 1.5</option><option value="under-2.5">Under 2.5</option><option value="over-3.5">Over 3.5</option><option value="under-3.5">Under 3.5</option><option value="over-5">Over 5+</option><option value="exato-0">0 Gol Exato</option><option value="exato-1">1 Gol Exato</option><option value="exato-2">2 Gols Exatos</option><option value="exato-3">3 Gols Exatos</option><option value="exato-4">4 Gols Exatos</option></select></div><div class="field-group" style="grid-column:span 2"><label>Ligas de Atuação</label><div class="league-header"><span style="font-size:11px;color:var(--text-muted)" id="leagueCount">0 selecionadas</span> <button onclick="toggleAllLeagues()">Selecionar Todas</button></div><div class="league-checkboxes" id="leagueContainer"></div></div><div class="field-group" style="grid-column:span 2"><label>Chat ID Telegram</label><div class="telegram-container"><div class="telegram-input-group"><input type="text" id="newTelegramId" placeholder="Digite o Chat ID"> <button class="btn-add-telegram" onclick="addTelegramId()">+</button></div><select id="activeTelegramId"><option value="">Selecione ID ativo</option></select><div class="telegram-list" id="telegramList"></div></div></div><div class="buttons"><button class="btn btn-clear" onclick="clearAll()"><span>🗑️</span> <span>Limpar Tudo</span></button> <button class="btn btn-save" onclick="saveConfig()"><span>💾</span> <span>Salvar Configuração</span></button></div></div><div class="assertivity-container"><div class="assertivity-title"><span>📊</span> <span>Análise de Assertividade do Padrão</span></div><div class="assertivity-grid" id="assertivityGrid"></div></div><div class="table-container"><div class="table-title">Mapa de Análise</div><div class="number-grid" id="numberGrid"></div><div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div></div><div class="rules-container"><div class="rule-item"><div class="rule-header" onclick='toggleRule("rule1")'><span>Configuração de Exibição</span> <span class="arrow">▼</span></div><div class="rule-content" id="rule1"><label class="checkbox-label"><input type="checkbox" checked="checked"> <span>Exibir Greens Seguidos</span></la
