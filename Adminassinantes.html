<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetStat · Admin Assinantes</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f0d;
      --surface: #111915;
      --card: #141c18;
      --border: #1e2b23;
      --green: #1fac89;
      --green-dim: #1fac8933;
      --green-glow: #1fac8966;
      --red: #e05252;
      --red-dim: #e0525233;
      --yellow: #e0b84e;
      --yellow-dim: #e0b84e33;
      --text: #e8f0ec;
      --muted: #7a9488;
      --font: 'Syne', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: var(--green); }
    .header-stats { display: flex; gap: 24px; }
    .hstat { text-align: center; }
    .hstat-val { font-size: 22px; font-weight: 700; color: var(--green); font-family: var(--mono); }
    .hstat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .hstat-val.warn { color: var(--yellow); }
    .hstat-val.danger { color: var(--red); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      gap: 12px;
      padding: 20px 32px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .search-box:focus { border-color: var(--green); }
    .filter-btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }
    .btn-novo {
      padding: 10px 22px;
      border-radius: 8px;
      border: none;
      background: var(--green);
      color: #0a0f0d;
      font-family: var(--font);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: opacity .2s;
      margin-left: auto;
    }
    .btn-novo:hover { opacity: .85; }

    /* ── TABLE ── */
    .table-wrap { padding: 0 32px 40px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: var(--card); }
    tbody td {
      padding: 14px 16px;
      font-size: 14px;
      vertical-align: middle;
    }
    .nome-cel { font-weight: 600; }
    .email-cel { color: var(--muted); font-family: var(--mono); font-size: 12px; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--mono);
    }
    .badge-ativo { background: var(--green-dim); color: var(--green); }
    .badge-vencendo { background: var(--yellow-dim); color: var(--yellow); }
    .badge-vencido { background: var(--red-dim); color: var(--red); }
    .dias-cel { font-family: var(--mono); font-weight: 700; font-size: 15px; }
    .dias-ok { color: var(--green); }
    .dias-warn { color: var(--yellow); }
    .dias-danger { color: var(--red); }
    .acoes { display: flex; gap: 8px; }
    .btn-acao {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-acao:hover { border-color: var(--green); color: var(--green); }
    .btn-acao.danger:hover { border-color: var(--red); color: var(--red); }
    .btn-acao.renovar:hover { border-color: var(--yellow); color: var(--yellow); }

    /* ── MODAL ── */
    .overlay {
      position: fixed; inset: 0;
      background: #000000cc;
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 480px;
      max-width: 95vw;
      animation: pop .2s ease;
    }
    @keyframes pop { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 24px; }
    .modal-title span { color: var(--green); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--green); }
    .form-group select option { background: var(--card); }
    .modal-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
    .btn-cancel {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 14px;
      cursor: pointer;
    }
    .btn-save {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: var(--green);
      color: #0a0f0d;
      font-family: var(--font);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-save:hover { opacity: .85; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 32px; right: 32px;
      background: var(--green);
      color: #0a0f0d;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      opacity: 0;
      transform: translateY(20px);
      transition: all .3s;
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.err { background: var(--red); color: #fff; }

    /* ── EMPTY ── */
    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }
    .empty-state .big { font-size: 48px; margin-bottom: 12px; }

    .import-note {

      padding: 14px 18px;
      background: var(--yellow-dim);
      border: 1px solid var(--yellow);
      border-radius: 10px;
      font-size: 13px;
      color: var(--yellow);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .import-note.hidden { display: none; }
  </style>
</head>

</div>

// ── UTILITÁRIOS ──────────────────────────────────────────────────────────

function diasRestantes(inicio, duracao) {
  const venc = new Date(inicio);
  venc.setDate(venc.getDate() + parseInt(duracao));
  const hoje = new Date();
  hoje.setHours(0, 0, 0, 0);
  venc.setHours(0, 0, 0, 0);
  return Math.floor((venc - hoje) / 86400000);
}

function dataVencimento(inicio, duracao) {
  const d = new Date(inicio);
  d.setDate(d.getDate() + parseInt(duracao));
  return d.toLocaleDateString('pt-BR');
}

function statusCliente(dias) {
  if (dias < 0)  return 'vencido';
  if (dias <= 5) return 'vencendo';
  return 'ativo';
}

function badgeHTML(status) {
  const map = {
    ativo:    ['badge-ativo',    'Ativo'],
    vencendo: ['badge-vencendo', 'Vencendo'],
    vencido:  ['badge-vencido',  'Vencido'],
  };
  const [cls, txt] = map[status];
  return `<span class="badge ${cls}">${txt}</span>`;
}

function diasHTML(dias) {
  if (dias < 0)  return `<span class="dias-cel dias-danger">${dias}d</span>`;
  if (dias <= 5) return `<span class="dias-cel dias-warn">${dias}d</span>`;
  return `<span class="dias-cel dias-ok">${dias}d</span>`;
}

function toast(msg, erro = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (erro ? ' err' : '');
  setTimeout(() => t.className = '', 3000);
}

// ── CARREGAR DA API ───────────────────────────────────────────────────────

async function carregarClientes() {
  try {
    const r = await fetch(API_BASE, { credentials: 'include' });
    if (!r.ok) throw new Error('API offline');
    clientes = await r.json();
    document.getElementById('importNote').classList.add('hidden');
  } catch (e) {
    // API offline — usa dados locais (localStorage) como fallback
    const local = localStorage.getItem('betstat_clientes');
    if (local) {
      clientes = JSON.parse(local);
      document.getElementById('importNote').classList.add('hidden');
    } else {
      clientes = [];
    }
    console.warn('API não encontrada, usando armazenamento local.');
  }
  atualizarHeader();
  renderTabela();
}

function salvarLocal() {
  localStorage.setItem('betstat_clientes', JSON.stringify(clientes));
}

// ── IMPORTAR CLIENTES INICIAIS ───────────────────────────────────────────

async function importarClientes() {
  let ok = 0, fail = 0;
  for (const c of CLIENTES_INICIAIS) {
    try {
      const r = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(c),
      });
      if (r.ok) ok++; else fail++;
    } catch {
      // fallback local
      clientes.push({ id: Date.now() + Math.random(), ...c });
      ok++;
    }
  }
  salvarLocal();
  toast(`${ok} clientes importados! ${fail > 0 ? fail + ' falhas.' : ''}`);
  document.getElementById('importNote').classList.add('hidden');
  await carregarClientes();
}

// ── FILTROS ───────────────────────────────────────────────────────────────

function setFiltro(f, btn) {
  filtroAtual = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTabela();
}

// ── RENDER TABELA ─────────────────────────────────────────────────────────

function renderTabela() {
  const busca = document.getElementById('busca').value.toLowerCase();
  const tbody = document.getElementById('tabela-body');
  const empty = document.getElementById('empty');

  let lista = clientes.filter(c => {
    const dias = diasRestantes(c.inicio, c.duracao);
    const status = statusCliente(dias);
    const matchFiltro = filtroAtual === 'todos' || status === filtroAtual;
    const matchBusca = !busca ||
      c.nome.toLowerCase().includes(busca) ||
      c.email.toLowerCase().includes(busca);
    return matchFiltro && matchBusca;
  });

  // ordena por dias restantes (menos primeiro)
  lista.sort((a, b) => diasRestantes(a.inicio, a.duracao) - diasRestantes(b.inicio, b.duracao));

  if (lista.length === 0) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  tbody.innerHTML = lista.map(c => {
    const dias = diasRestantes(c.inicio, c.duracao);
    const status = statusCliente(dias);
    const venc = dataVencimento(c.inicio, c.duracao);
    const inicioFmt = new Date(c.inicio + 'T12:00:00').toLocaleDateString('pt-BR');
    return `
      <tr>
        <td class="nome-cel">${c.nome}</td>
        <td class="email-cel">${c.email}</td>
        <td>${inicioFmt}</td>
        <td>${venc}</td>
        <td>${diasHTML(dias)}</td>
        <td>${badgeHTML(status)}</td>
        <td>
          <div class="acoes">
            <button class="btn-acao" onclick="editarCliente(${c.id})">Editar</button>
            <button class="btn-acao renovar" onclick="renovarCliente(${c.id})">Renovar</button>
            <button class="btn-acao danger" onclick="removerCliente(${c.id})">Remover</button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

// ── HEADER STATS ─────────────────────────────────────────────────────────

function atualizarHeader() {
  let ativos = 0, vencendo = 0, vencidos = 0;
  clientes.forEach(c => {
    const d = diasRestantes(c.inicio, c.duracao);
    const s = statusCliente(d);
    if (s === 'ativo')    ativos++;
    if (s === 'vencendo') vencendo++;
    if (s === 'vencido')  vencidos++;
  });
  document.getElementById('h-total').textContent    = clientes.length;
  document.getElementById('h-ativos').textContent   = ativos;
  document.getElementById('h-vencendo').textContent = vencendo;
  document.getElementById('h-vencidos').textContent = vencidos;
}

// ── MODAL ─────────────────────────────────────────────────────────────────

function abrirModal(id = null) {
  editandoId = id;
  document.getElementById('overlay').classList.add('open');
  if (id) {
    const c = clientes.find(x => x.id == id);
    document.getElementById('modal-title').innerHTML = 'Editar <span>Cliente</span>';
    document.getElementById('f-nome').value    = c.nome;
    document.getElementById('f-email').value   = c.email;
    document.getElementById('f-inicio').value  = c.inicio;
    document.getElementById('f-duracao').value = c.duracao;
  } else {
    document.getElementById('modal-title').innerHTML = 'Novo <span>Cliente</span>';
    document.getElementById('f-nome').value    = '';
    document.getElementById('f-email').value   = '';
    document.getElementById('f-inicio').value  = new Date().toISOString().split('T')[0];
    document.getElementById('f-duracao').value = '30';
  }
}

function fecharModal() {
  document.getElementById('overlay').classList.remove('open');
  editandoId = null;
}

function editarCliente(id) { abrirModal(id); }

async function salvarCliente() {
  const dados = {
    nome:    document.getElementById('f-nome').value.trim(),
    email:   document.getElementById('f-email').value.trim(),
    inicio:  document.getElementById('f-inicio').value,
    duracao: parseInt(document.getElementById('f-duracao').value),
  };
  if (!dados.nome || !dados.email || !dados.inicio) {
    toast('Preencha todos os campos.', true); return;
  }

  try {
    if (editandoId) {
      // PUT (editar)
      const r = await fetch(`${API_BASE}/${editandoId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(dados),
      });
      if (!r.ok) throw new Error();
      const idx = clientes.findIndex(x => x.id == editandoId);
      clientes[idx] = { id: editandoId, ...dados };
    } else {
      // POST (novo)
      let novoId;
      try {
        const r = await fetch(API_BASE, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(dados),
        });
        if (!r.ok) throw new Error();
        const res = await r.json();
        novoId = res.id;
      } catch {
        novoId = Date.now();
      }
      clientes.push({ id: novoId, ...dados });
    }
  } catch {
    // fallback local
    if (editandoId) {
      const idx = clientes.findIndex(x => x.id == editandoId);
      clientes[idx] = { id: editandoId, ...dados };
    } else {
      clientes.push({ id: Date.now(), ...dados });
    }
  }

  salvarLocal();
  fecharModal();
  atualizarHeader();
  renderTabela();
  toast(editandoId ? 'Cliente atualizado!' : 'Cliente adicionado!');
}

async function renovarCliente(id) {
  const c = clientes.find(x => x.id == id);
  const novaData = new Date().toISOString().split('T')[0];
  const dados = { ...c, inicio: novaData };

  try {
    await fetch(`${API_BASE}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(dados),
    });
  } catch { /* fallback local */ }

  const idx = clientes.findIndex(x => x.id == id);
  clientes[idx] = dados;
  salvarLocal();
  atualizarHeader();
  renderTabela();
  toast(`${c.nome} renovado por mais ${c.duracao} dias! 🎉`);
}

async function removerCliente(id) {
  const c = clientes.find(x => x.id == id);
  if (!confirm(`Remover ${c.nome}?`)) return;

  try {
    await fetch(`${API_BASE}/${id}`, {
      method: 'DELETE',
      credentials: 'include',
    });
  } catch { /* fallback local */ }

  clientes = clientes.filter(x => x.id != id);
  salvarLocal();
  atualizarHeader();
  renderTabela();
  toast(`${c.nome} removido.`, true);
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) fecharModal();
});

carregarClientes();
</script>
</body>
