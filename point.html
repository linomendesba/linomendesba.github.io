<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto & Figura</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #1c1f26;
            --text: #e8eaed;
            --text-sec: #9ca3af;
            --over: #10b981;
            --under: #ef4444;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        .header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-end;
        }

        .control {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 11px;
            color: var(--text-sec);
            text-transform: uppercase;
        }

        select {
            background: #252a33;
            border: 1px solid #3a3f4a;
            color: var(--text);
            padding: 8px;
            border-radius: 3px;
            font-size: 12px;
            min-width: 140px;
        }

        .layout {
            display: flex;
            gap: 20px;
        }

        .chart {
            flex: 1;
            background: #252a33;
            border: 1px solid #3a3f4a;
            border-radius: 4px;
            padding: 15px;
            overflow-x: auto;
            min-height: 400px;
        }

        .lines {
            display: flex;
            gap: 1px;
            align-items: flex-end;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .column {
            display: flex;
            flex-direction: column-reverse;
            gap: 0;
            text-align: center;
        }

        .cell {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .x {
            color: var(--over);
        }

        .o {
            color: var(--under);
        }

        .stats {
            width: 200px;
            background: #252a33;
            border: 1px solid #3a3f4a;
            border-radius: 4px;
            padding: 15px;
        }

        .stat {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #3a3f4a;
        }

        .stat:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-sec);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
        }

        .stat-value.over {
            color: var(--over);
        }

        .stat-value.under {
            color: var(--under);
        }

        .loading {
            text-align: center;
            color: var(--text-sec);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="control">
            <label>Liga</label>
            <select id="league">
                <option value="Copa%20do%20Mundo">Copa do Mundo</option>
                <option value="Ligas%20dos%20Campe%C3%B5es">Ligas dos Campeões</option>
                <option value="Am%C3%A9rica%20Latina">América Latina</option>
            </select>
        </div>

        <div class="control">
            <label>Jogos</label>
            <select id="games">
                <option value="20">20</option>
                <option value="40">40</option>
                <option value="80">80</option>
                <option value="160">160</option>
                <option value="320">320</option>
                <option value="640" selected>640</option>
            </select>
        </div>
    </div>

    <div class="layout">
        <div class="chart" id="chart">
            <div class="loading">Selecione uma liga</div>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Max Over</div>
                <div class="stat-value over" id="maxOver">-</div>
            </div>
            <div class="stat">
                <div class="stat-label">Max Under</div>
                <div class="stat-value under" id="maxUnder">-</div>
            </div>
            <div class="stat">
                <div class="stat-label">Reversões</div>
                <div class="stat-value" id="reversions">-</div>
            </div>
            <div class="stat">
                <div class="stat-label">Tendência</div>
                <div class="stat-value" id="trend">-</div>
            </div>
        </div>
    </div>

    <script>
        const leagueEl = document.getElementById('league');
        const gamesEl = document.getElementById('games');
        const chartEl = document.getElementById('chart');

        let updateTimer = null;

        leagueEl.addEventListener('change', loadData);
        gamesEl.addEventListener('change', loadData);

        async function loadData() {
            const league = leagueEl.value;
            const limit = parseInt(gamesEl.value);
            
            chartEl.innerHTML = '<div class="loading">Carregando...</div>';

            if (updateTimer) clearInterval(updateTimer);

            try {
                const results = await fetchResults(league, limit);
                renderChart(results);
                updateStats(results);

                // Atualizar a cada 1 minuto
                updateTimer = setInterval(() => refreshData(league, limit), 60000);
            } catch (error) {
                chartEl.innerHTML = '<div class="loading">Erro ao carregar</div>';
                console.error(error);
            }
        }

        async function refreshData(league, limit) {
            try {
                const results = await fetchResults(league, limit);
                renderChart(results);
                updateStats(results);
            } catch (e) {
                console.error('Erro na atualização:', e);
            }
        }

        async function fetchResults(league, limit) {
            const url = `https://betstat.site/resultados/estrela/${league}`;
            const response = await fetch(url);
            const html = await response.text();
            const jsonMatch = html.match(/window\.__INITIAL_STATE__\s*=\s*({.*?});/s);
            
            if (jsonMatch) {
                const data = JSON.parse(jsonMatch[1]);
                const matches = (data.matches || []).slice(0, limit);
                
                // Ordenar por data (mais recente primeiro)
                return matches.sort((a, b) => {
                    const dateA = new Date(a.data || 0);
                    const dateB = new Date(b.data || 0);
                    return dateB - dateA;
                });
            }
            
            return generateDemo(limit);
        }

        function generateDemo(limit) {
            const now = new Date();
            return Array.from({ length: limit }, (_, i) => {
                const date = new Date(now.getTime() - i * 3600000);
                return {
                    ft: Math.random() > 0.45 ? '3x1' : '1x0',
                    hora: date.getHours(),
                    minuto: date.getMinutes()
                };
            });
        }

        function renderChart(results) {
            const symbols = [];
            let currentType = null;
            let reversalCount = 0;

            // Calcular símbolos P&F
            results.forEach(r => {
                const goals = (parseInt(r.ft?.split('x')[0]) || 0) + (parseInt(r.ft?.split('x')[1]) || 0);
                const isOver = goals > 2.5;
                const type = isOver ? 'X' : 'O';

                if (currentType === null) {
                    currentType = type;
                    symbols.push(type);
                } else if (currentType === type) {
                    reversalCount = 0;
                    symbols.push(type);
                } else {
                    reversalCount++;
                    if (reversalCount === 3) {
                        currentType = type;
                        reversalCount = 0;
                        symbols.push(type);
                    }
                }
            });

            // Agrupar em colunas
            const columns = [];
            let col = [];
            let lastType = null;

            symbols.forEach(sym => {
                if (lastType === null || lastType === sym) {
                    col.push(sym);
                    lastType = sym;
                } else {
                    columns.push({ type: lastType, items: col });
                    col = [sym];
                    lastType = sym;
                }
            });

            if (col.length > 0) {
                columns.push({ type: lastType, items: col });
            }

            // Renderizar
            const html = columns.map(c => {
                const cells = c.items.map(item => 
                    `<div class="cell ${item === 'X' ? 'x' : 'o'}">${item}</div>`
                ).join('');
                return `<div class="column">${cells}</div>`;
            }).join('');

            chartEl.innerHTML = `<div class="lines">${html}</div>`;
        }

        function updateStats(results) {
            let maxOver = 0, maxUnder = 0, currOver = 0, currUnder = 0;
            let lastType = null;
            let reversions = 0;

            results.forEach(r => {
                const goals = (parseInt(r.ft?.split('x')[0]) || 0) + (parseInt(r.ft?.split('x')[1]) || 0);
                const isOver = goals > 2.5;
                const type = isOver ? 'X' : 'O';

                if (isOver) {
                    currOver++;
                    currUnder = 0;
                    maxOver = Math.max(maxOver, currOver);
                } else {
                    currUnder++;
                    currOver = 0;
                    maxUnder = Math.max(maxUnder, currUnder);
                }

                if (lastType !== null && lastType !== type) {
                    reversions++;
                }
                lastType = type;
            });

            document.getElementById('maxOver').textContent = maxOver;
            document.getElementById('maxUnder').textContent = maxUnder;
            document.getElementById('reversions').textContent = reversions;
            
            const trend = lastType === 'X' ? '↑ OVER' : '↓ UNDER';
            document.getElementById('trend').textContent = trend;
        }
    </script>
</body>
</html>
