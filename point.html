<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto & Figura — Gols</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg:#1c1f26; --bg2:#252a33; --border:#3a3f4a; --text:#e8eaed; --muted:#9ca3af; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Roboto', sans-serif;
            padding: 14px; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        .header { display:flex; gap:16px; margin-bottom:12px; align-items:flex-end; flex-shrink:0; flex-wrap:wrap; }
        .ctrl { display:flex; flex-direction:column; gap:4px; }
        label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
        select {
            background:var(--bg2); border:1px solid var(--border); color:var(--text);
            padding:6px 10px; border-radius:3px; font-size:12px; font-family:'Roboto',sans-serif; min-width:150px; cursor:pointer; outline:none;
        }
        .trend-badge {
            padding: 4px 10px; border-radius: 3px; font-size: 11px; font-weight: bold;
            margin-left: auto; align-self: center; font-family: 'Roboto', sans-serif;
            transition: all 0.3s ease;
        }
        .trend-up    { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .trend-down  { background: rgba(239,68,68,0.15);  color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .trend-neutral{ background: rgba(156,163,175,0.15);color:#9ca3af;  border: 1px solid rgba(156,163,175,0.3); }
        .chart-wrap {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:4px; overflow:hidden; position:relative;
            height: 420px; flex-shrink: 0;
        }
        canvas { display:block; }
        #loadMsg {
            position:absolute; inset:0; display:flex;
            align-items:center; justify-content:center; color:var(--muted); font-size:13px;
        }
        #tooltip {
            position:fixed; background:rgba(8,10,14,.97); color:#e8eaed;
            padding:6px 10px; border-radius:3px; font-size:11px;
            font-family:'Roboto',sans-serif; border:1px solid #3a3f4a;
            pointer-events:none; z-index:9999; white-space:nowrap; display:none; line-height:1.7;
        }
    </style>
<base target="_blank">
</head>
<body>

<div class="header">
    <div class="ctrl">
        <label>Liga</label>
        <select id="selLeague">
            <option value="Copa%20do%20Mundo">Copa do Mundo</option>
            <option value="Ligas%20dos%20Campe%C3%B5es">Ligas dos Campeões</option>
            <option value="Am%C3%A9rica%20Latina">América Latina</option>
        </select>
    </div>
    <div class="ctrl">
        <label>Jogos</label>
        <select id="selGames">
            <option value="20">20</option>
            <option value="40">40</option>
            <option value="80">80</option>
            <option value="160">160</option>
            <option value="320">320</option>
            <option value="640">640</option>
        </select>
    </div>
    <div class="ctrl">
        <label>Inversão</label>
        <select id="selRev">
            <option value="1">1 (sensível)</option>
            <option value="2" selected>2 (equilibrado)</option>
            <option value="3">3 (conservador)</option>
            <option value="4">4 (muito conservador)</option>
        </select>
    </div>
    <div class="trend-badge trend-neutral" id="trendBadge">TENDÊNCIA: NEUTRO</div>
</div>

<div class="chart-wrap" id="chartWrap">
    <div id="loadMsg">Selecione uma liga</div>
    <canvas id="pf"></canvas>
</div>
<div id="tooltip"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   PONTO & FIGURA — Gols (0–8)

   Eixo Y fixo: 0 a 8 gols totais do jogo.
   Cada jogo move o "cursor" para o valor real de gols.
   X = gols subiram em relação ao último valor registrado
   O = gols caíram em relação ao último valor registrado
   Empate (mesmo nº de gols) = continua na mesma coluna, mesmo símbolo
   Fator de Reversão: quantos gols de diferença para inverter coluna
═══════════════════════════════════════════════════════════════════ */

// Eixo Y fixo de 0 a 8 gols
const Y_MIN    = 0;
const Y_MAX    = 8;
const Y_LEVELS = Y_MAX - Y_MIN + 1;  // 9 níveis: 0,1,2,3,4,5,6,7,8

const AXIS_W = 46;
const PAD_T  = 10;
const PAD_B  = 10;
const PAD_R  = 10;

const C = {
    bg:'#252a33', axBg:'#1c1f26',
    grid:'#2e3442',
    axBorder:'#464f62', label:'#7a8699', tick:'#4a5268',
    X:'#10b981', O:'#ef4444',
    mid: '#5a6478',  // linha de 4 gols (meio)
};

let columns = [];
let hitMap  = [];
let timer   = null;

const selLeague  = document.getElementById('selLeague');
const selGames   = document.getElementById('selGames');
const selRev     = document.getElementById('selRev');
const wrap       = document.getElementById('chartWrap');
const canvas     = document.getElementById('pf');
const ctx        = canvas.getContext('2d');
const loadMsg    = document.getElementById('loadMsg');
const tip        = document.getElementById('tooltip');
const trendBadge = document.getElementById('trendBadge');

// ── LocalStorage ─────────────────────────────────────
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

selLeague.value = lsGet('pfg_league', selLeague.value);
selGames.value  = lsGet('pfg_games',  selGames.value);
selRev.value    = lsGet('pfg_rev',    selRev.value);
selLeague.addEventListener('change', ()=>{ lsSet('pfg_league', selLeague.value); load(); });
selGames.addEventListener('change',  ()=>{ lsSet('pfg_games',  selGames.value);  load(); });
selRev.addEventListener('change',    ()=>{ lsSet('pfg_rev',    selRev.value);    load(); });

// ── Fetch ─────────────────────────────────────────────
async function load() {
    loadMsg.style.display   = 'flex';
    canvas.style.visibility = 'hidden';
    if (timer) clearInterval(timer);

    const league = selLeague.value;
    const limit  = parseInt(selGames.value);
    const revAmt = parseInt(selRev.value);

    try {
        const data = await fetchData(league, limit);
        build(data, revAmt);
        updateTrendBadge();
        draw();
        timer = setInterval(async () => {
            try {
                const d = await fetchData(league, limit);
                build(d, revAmt);
                updateTrendBadge();
                draw();
            } catch {}
        }, 60000);
    } catch(e) {
        loadMsg.textContent = 'Erro ao carregar';
        console.error(e);
    }
}

async function fetchData(league, limit) {
    const resp = await fetch(`https://betstat.site/resultados/estrela/${league}`);
    if (!resp.ok) throw new Error(resp.status);
    const ct = resp.headers.get('content-type') || '';
    let arr;
    if (ct.includes('application/json')) {
        const json = await resp.json();
        arr = Array.isArray(json) ? json : (json.matches || json.data || []);
    } else {
        const html = await resp.text();
        const m = html.match(/window\.__INITIAL_STATE__\s*=\s*({.*?});/s);
        if (!m) throw new Error('formato inesperado');
        arr = JSON.parse(m[1]).matches || [];
    }
    return arr.slice(0, limit).reverse().map(m => ({
        ft:     (m.ft || '0x0').trim(),
        hora:   parseInt(m.hora)   || 0,
        minuto: parseInt(m.minuto) || 0,
    }));
}

// ── Build P&F — baseado em gols reais (0–8) ───────────
/*
   Regras:
   - cursor = gols totais do jogo atual (clamped a Y_MIN..Y_MAX)
   - X se gols >= último_cursor + 1  (subiu)
   - O se gols <= último_cursor - 1  (caiu)
   - empate: continua coluna atual com mesmo símbolo e mesmo pos
   - Fator de reversão: para trocar de coluna X→O, precisa cair revAmt gols;
     para trocar O→X, precisa subir revAmt gols
*/
function build(results, revAmt) {
    columns = [];
    hitMap  = [];

    if (!results.length) return;

    // Pega gols do primeiro jogo como ponto de partida
    const goalsOf = r => Math.min(Y_MAX, Math.max(Y_MIN,
        (parseInt(r.ft?.split('x')[0]) || 0) + (parseInt(r.ft?.split('x')[1]) || 0)
    ));

    let prevGols = goalsOf(results[0]);
    let col = null;

    results.forEach((r, idx) => {
        const gols = goalsOf(r);

        if (idx === 0) {
            // Primeiro jogo: abre coluna com base em gols > 0? X : O
            // Convencional: começa sem direção definida até o 2º jogo
            col = { type: gols >= prevGols ? 'X' : 'O', items: [] };
            columns.push(col);
            col.items.push({ pos: gols, result: r, gols });
            prevGols = gols;
            return;
        }

        const diff = gols - prevGols;

        if (diff === 0) {
            // Empate de gols: repete símbolo atual na mesma pos
            col.items.push({ pos: gols, result: r, gols });
            return;
        }

        if (col.type === 'X') {
            if (diff > 0) {
                // Continua subindo
                col.items.push({ pos: gols, result: r, gols });
            } else {
                // Caiu — verifica fator de reversão
                if (Math.abs(diff) >= revAmt) {
                    col = { type: 'O', items: [] };
                    columns.push(col);
                    col.items.push({ pos: gols, result: r, gols });
                } else {
                    // Queda pequena demais para reverter, mantém coluna X mas adiciona o ponto
                    col.items.push({ pos: gols, result: r, gols });
                }
            }
        } else {
            if (diff < 0) {
                // Continua caindo
                col.items.push({ pos: gols, result: r, gols });
            } else {
                // Subiu — verifica fator de reversão
                if (Math.abs(diff) >= revAmt) {
                    col = { type: 'X', items: [] };
                    columns.push(col);
                    col.items.push({ pos: gols, result: r, gols });
                } else {
                    col.items.push({ pos: gols, result: r, gols });
                }
            }
        }

        prevGols = gols;
    });
}

// ── Tendência ──────────────────────────────────────────
function updateTrendBadge() {
    if (!columns.length) {
        trendBadge.className = 'trend-badge trend-neutral';
        trendBadge.textContent = 'TENDÊNCIA: NEUTRO';
        return;
    }
    const lastCol = columns[columns.length - 1];
    const prevCol = columns.length > 1 ? columns[columns.length - 2] : null;
    let trend = 'NEUTRO', cls = 'trend-neutral';

    if (lastCol.type === 'X') {
        const lastHigh = Math.max(...lastCol.items.map(i => i.pos));
        const prevHigh = prevCol ? Math.max(...prevCol.items.map(i => i.pos)) : lastHigh;
        if (prevCol && lastHigh > prevHigh) { trend = 'ALTA FORTE ▲▲'; cls = 'trend-up'; }
        else { trend = 'ALTA ▲'; cls = 'trend-up'; }
    } else {
        const lastLow = Math.min(...lastCol.items.map(i => i.pos));
        const prevLow = prevCol ? Math.min(...prevCol.items.map(i => i.pos)) : lastLow;
        if (prevCol && lastLow < prevLow) { trend = 'BAIXA FORTE ▼▼'; cls = 'trend-down'; }
        else { trend = 'BAIXA ▼'; cls = 'trend-down'; }
    }
    trendBadge.className = `trend-badge ${cls}`;
    trendBadge.textContent = `TENDÊNCIA: ${trend}`;
}

// ── Draw ──────────────────────────────────────────────
function draw() {
    if (!columns.length) return;

    const W = wrap.clientWidth;
    const H = wrap.clientHeight;
    canvas.width  = W;
    canvas.height = H;

    // cellH: divide a área disponível pelos 9 níveis (0..8)
    const cellH = (H - PAD_T - PAD_B) / Y_LEVELS;
    const numCols = columns.length;
    const cellW = (W - AXIS_W - PAD_R) / numCols;
    const cell  = Math.max(2, Math.min(cellH, cellW));

    // O gráfico fica ancorado no topo (Y_MAX=8 no topo, Y_MIN=0 embaixo)
    const blockH = Y_LEVELS * cell;
    const oY = PAD_T + Math.max(0, (H - PAD_T - PAD_B - blockH) / 2);
    const oX = AXIS_W;

    // pos = gols (0..8) → coordenada Y no canvas
    // 8 gols → topo, 0 gols → baixo
    const posToY = pos => oY + (Y_MAX - pos) * cell;

    // Fundo
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    // Grade horizontal para cada nível de gol
    for (let g = Y_MIN; g <= Y_MAX; g++) {
        const y = posToY(g) + cell / 2;
        ctx.beginPath();
        ctx.moveTo(AXIS_W, y);
        ctx.lineTo(W, y);
        // Linha especial em 2.5 (entre 2 e 3) — over/under
        ctx.strokeStyle = (g === 2 || g === 3) ? '#3a4255' : C.grid;
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }

    // Linha de referência over/under 2.5 (entre linha 2 e linha 3)
    {
        const yOver = posToY(2) + cell; // borda inferior do nível 2 = borda superior do nível 3... mas:
        // Melhor: posição entre 2 e 3
        const yRef = posToY(3) + cell / 2 + (posToY(2) - posToY(3)) / 2;
        // posToY(2) > posToY(3) porque Y cresce para baixo no canvas
        const yLine = (posToY(2) + cell / 2 + posToY(3) + cell / 2) / 2;
        ctx.beginPath();
        ctx.moveTo(AXIS_W, yLine);
        ctx.lineTo(W, yLine);
        ctx.strokeStyle = 'rgba(156,163,175,0.18)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Eixo Y
    ctx.fillStyle = C.axBg;
    ctx.fillRect(0, 0, AXIS_W, H);
    ctx.strokeStyle = C.axBorder;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(AXIS_W, 0);
    ctx.lineTo(AXIS_W, H);
    ctx.stroke();

    const fs = Math.max(8, Math.min(12, cell - 1));
    ctx.font = `${fs}px 'Roboto Mono'`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';

    for (let g = Y_MIN; g <= Y_MAX; g++) {
        const y = posToY(g) + cell / 2;
        // Tick
        ctx.fillStyle = C.tick;
        ctx.fillRect(AXIS_W - 5, y - 0.5, 5, 1);
        // Cor por nível de gols
        if      (g >= 5) ctx.fillStyle = '#4caf7d';
        else if (g >= 3) ctx.fillStyle = '#7abf9a';
        else if (g === 2) ctx.fillStyle = '#bf7a7a';
        else              ctx.fillStyle = '#c04a4a';
        ctx.fillText(String(g), AXIS_W - 8, y);
    }

    // Símbolos
    hitMap = [];
    const symSz = Math.max(5, Math.min(cell * 0.82, 16));
    ctx.font = `bold ${symSz}px 'Roboto Mono'`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    columns.forEach((col, ci) => {
        const cx = oX + ci * cell + cell / 2;
        ctx.fillStyle = col.type === 'X' ? C.X : C.O;
        col.items.forEach(item => {
            const cy = posToY(item.pos) + cell / 2;
            ctx.fillText(col.type, cx, cy);
            hitMap.push({ cx, cy, hr: cell / 2, colIdx: ci + 1, item });
        });
    });

    canvas.style.visibility = 'visible';
    loadMsg.style.display = 'none';
}

// ── Resize ─────────────────────────────────────────────
let rsz = null;
window.addEventListener('resize', () => {
    clearTimeout(rsz);
    rsz = setTimeout(() => { if (columns.length) draw(); }, 100);
});

// ── Tooltip ────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;
    let found = null;
    for (const h of hitMap) {
        if (Math.abs(mx - h.cx) <= h.hr && Math.abs(my - h.cy) <= h.hr) { found = h; break; }
    }
    if (found) {
        const res = found.item.result;
        const hh = String(res.hora).padStart(2,'0');
        const mm = String(res.minuto).padStart(2,'0');
        const gols = found.item.gols;
        const tipo = gols > 2.5
            ? `<span style="color:#10b981">▲ Over 2.5</span>`
            : `<span style="color:#ef4444">▼ Under 2.5</span>`;
        tip.innerHTML = `${hh}:${mm} &nbsp;|&nbsp; ${res.ft || 'N/A'} &nbsp;→&nbsp; <b>${gols} gol${gols!==1?'s':''}</b> ${tipo}<br>Coluna ${found.colIdx}`;
        tip.style.display = 'block';
        const TW = tip.offsetWidth, TH = tip.offsetHeight;
        let tx = e.clientX + 14, ty = e.clientY - TH - 8;
        if (tx + TW > window.innerWidth - 6) tx = e.clientX - TW - 14;
        if (ty < 4) ty = e.clientY + 12;
        tip.style.left = tx + 'px';
        tip.style.top = ty + 'px';
    } else {
        tip.style.display = 'none';
    }
});
canvas.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

// ── Init ───────────────────────────────────────────────
load();
</script>
</body>
</html>
