<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ponto & Figura — Futebol Virtual</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#111318;
  --bg2:#181c23;
  --bg3:#1e2330;
  --border:#2a3040;
  --border2:#38445a;
  --text:#dce3ef;
  --muted:#6b7894;
  --muted2:#4a5468;
  --X:#00e5a0;
  --O:#ff4a6e;
  --Xd:rgba(0,229,160,.12);
  --Od:rgba(255,74,110,.12);
  --accent:#3b82f6;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'Courier New',monospace;
  display:flex;flex-direction:column;
  padding:10px 12px 8px;
  gap:8px;
}

/* ── HEADER ── */
.header{
  display:flex;gap:10px;align-items:flex-end;flex-shrink:0;flex-wrap:wrap;
}
.ctrl{display:flex;flex-direction:column;gap:3px}
.ctrl label{
  font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;
  font-family:'Courier New',monospace;
}
select{
  background:var(--bg2);border:1px solid var(--border);color:var(--text);
  padding:5px 8px;border-radius:3px;font-size:11px;cursor:pointer;
  outline:none;font-family:'Courier New',monospace;
  transition:border-color .2s;min-width:0;
}
select:hover,select:focus{border-color:var(--border2)}

/* ── BADGE ── */
.badge{
  padding:5px 12px;border-radius:3px;font-size:10px;font-weight:bold;
  margin-left:auto;align-self:center;letter-spacing:.5px;
  font-family:'Courier New',monospace;transition:all .3s;white-space:nowrap;
}
.b-up  {background:rgba(0,229,160,.12);color:var(--X);border:1px solid rgba(0,229,160,.25)}
.b-dn  {background:rgba(255,74,110,.12);color:var(--O);border:1px solid rgba(255,74,110,.25)}
.b-neu {background:var(--bg2);color:var(--muted);border:1px solid var(--border)}

/* ── STATS ROW ── */
.stats{
  display:flex;gap:0;flex-shrink:0;border:1px solid var(--border);
  border-radius:3px;overflow:hidden;
}
.stat{
  flex:1;padding:5px 10px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:1px;
}
.stat:last-child{border-right:none}
.stat-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.stat-val{font-size:13px;font-weight:bold;color:var(--text)}
.stat-val.up{color:var(--X)}
.stat-val.dn{color:var(--O)}
.stat-val.acc{color:var(--accent)}

/* ── CHART ── */
.chart-wrap{
  flex:1;min-height:0;position:relative;
  background:var(--bg2);border:1px solid var(--border);border-radius:3px;
  overflow-x:auto;overflow-y:hidden;
}
.chart-wrap::-webkit-scrollbar{height:4px}
.chart-wrap::-webkit-scrollbar-track{background:var(--bg)}
.chart-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
canvas{display:block;height:100%}
#loadMsg{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  color:var(--muted);font-size:12px;
}
.spinner{
  width:20px;height:20px;border:2px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LEGENDA ── */
.legend{
  display:flex;gap:16px;flex-shrink:0;align-items:center;
  font-size:10px;color:var(--muted);
}
.leg{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:2px}
.dot-x{background:var(--X)}
.dot-o{background:var(--O)}
.leg-note{margin-left:auto;font-size:9px;color:var(--muted2)}

/* ── TOOLTIP ── */
#ttip{
  position:fixed;background:rgba(10,12,18,.97);color:var(--text);
  padding:7px 11px;border-radius:3px;font-size:11px;
  font-family:'Courier New',monospace;border:1px solid var(--border2);
  pointer-events:none;z-index:9999;white-space:nowrap;display:none;
  line-height:1.9;box-shadow:0 4px 20px rgba(0,0,0,.5);
}
</style>
</head>
<body>

<div class="header">
  <div class="ctrl">
    <label>Liga</label>
    <select id="selLeague">
      <option value="Copa%20do%20Mundo">Copa do Mundo</option>
      <option value="Ligas%20dos%20Campe%C3%B5es">Liga dos Campeões</option>
      <option value="Am%C3%A9rica%20Latina">América Latina</option>
    </select>
  </div>
  <div class="ctrl">
    <label>Jogos</label>
    <select id="selGames">
      <option value="40">40</option>
      <option value="80" selected>80</option>
      <option value="160">160</option>
      <option value="320">320</option>
      <option value="640">640</option>
    </select>
  </div>
  <div class="ctrl">
    <label>Tamanho da Caixa</label>
    <select id="selBox">
      <option value="1" selected>1 gol / caixa</option>
      <option value="2">2 gols / caixa</option>
    </select>
  </div>
  <div class="ctrl">
    <label>Reversão (caixas)</label>
    <select id="selRev">
      <option value="1">1 caixa</option>
      <option value="2">2 caixas</option>
      <option value="3" selected>3 caixas</option>
      <option value="4">4 caixas</option>
    </select>
  </div>
  <div class="badge b-neu" id="badge">TENDÊNCIA: NEUTRO</div>
</div>

<div class="stats">
  <div class="stat"><span class="stat-lbl">Jogos</span><span class="stat-val acc" id="sJogos">—</span></div>
  <div class="stat"><span class="stat-lbl">Over 2.5</span><span class="stat-val up" id="sOver">—</span></div>
  <div class="stat"><span class="stat-lbl">Under 2.5</span><span class="stat-val dn" id="sUnder">—</span></div>
  <div class="stat"><span class="stat-lbl">Média Gols</span><span class="stat-val" id="sMedia">—</span></div>
  <div class="stat"><span class="stat-lbl">Colunas</span><span class="stat-val acc" id="sCols">—</span></div>
  <div class="stat"><span class="stat-lbl">Última Col.</span><span class="stat-val" id="sUltCol">—</span></div>
</div>

<div class="chart-wrap" id="chartWrap">
  <div id="loadMsg"><div class="spinner"></div><span>Carregando dados...</span></div>
  <canvas id="pf"></canvas>
</div>

<div class="legend">
  <div class="leg"><div class="dot dot-x"></div><span>X = gols sobem (pressão compradora)</span></div>
  <div class="leg"><div class="dot dot-o"></div><span>O = gols caem (pressão vendedora)</span></div>
  <div class="leg-note" id="sBreak"></div>
</div>

<div id="ttip"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   PONTO & FIGURA — Futebol Virtual
   Versão corrigida com lógica P&F clássica genuína

   CONCEITO:
   • "Preço" = total de gols do jogo (inteiro real, não cursor artificial)
   • Tamanho da Caixa (BOX): quantos gols equivalem a 1 célula no eixo Y
   • Fator de Reversão (REV): quantas CAIXAS o preço precisa mover na
     direção oposta para iniciar uma nova coluna
   • Coluna X sobe quando: gols >= topo_atual + BOX
   • Coluna O desce quando: gols <= fundo_atual - BOX
   • Reversão X→O: gols <= topo_coluna - REV*BOX  (nova coluna O)
   • Reversão O→X: gols >= fundo_coluna + REV*BOX (nova coluna X)
   • Se o preço pular várias caixas, todos os níveis intermediários
     são preenchidos (comportamento clássico do P&F)
   • Dados mais recentes à DIREITA
═══════════════════════════════════════════════════════════════════════ */

let columns=[], hitMap=[], timer=null;

const LS={
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

const $=id=>document.getElementById(id);
const wrap=$('chartWrap'), canvas=$('pf'), ctx=canvas.getContext('2d');
const loadMsg=$('loadMsg'), ttip=$('ttip'), badge=$('badge');
const selLeague=$('selLeague'), selGames=$('selGames'), selBox=$('selBox'), selRev=$('selRev');

['selLeague','selGames','selBox','selRev'].forEach(id=>{
  $(id).value=LS.get('pf_'+id, $(id).value);
  $(id).addEventListener('change',()=>{LS.set('pf_'+id,$(id).value);load();});
});

/* ── Fetch ────────────────────────────────────────────────────────── */
async function fetchData(league, limit){
  const resp=await fetch(`https://betstat.site/resultados/estrela/${league}`);
  if(!resp.ok) throw new Error(resp.status);
  const ct=resp.headers.get('content-type')||'';
  let arr;
  if(ct.includes('application/json')){
    const json=await resp.json();
    arr=Array.isArray(json)?json:(json.matches||json.data||[]);
  } else {
    const html=await resp.text();
    const m=html.match(/window\.__INITIAL_STATE__\s*=\s*({.*?});/s);
    if(!m) throw new Error('formato inesperado');
    arr=JSON.parse(m[1]).matches||[];
  }
  return arr.slice(0,limit).reverse().map((m,i)=>({
    ft:(m.ft||'0x0').trim(),
    hora:+m.hora||0,
    minuto:+m.minuto||0,
    jogo:i+1
  }));
}

/* ── Total de Gols ────────────────────────────────────────────────── */
function totalGoals(r){
  const p=(r.ft||'0x0').split('x');
  return (+p[0]||0)+(+p[1]||0);
}

/* ── Build P&F (lógica clássica genuína) ─────────────────────────── */
function build(results, BOX, REV){
  columns=[]; hitMap=[];
  if(!results.length) return;

  const g0=totalGoals(results[0]);
  /* Normaliza o primeiro preço para múltiplo de BOX */
  let price=Math.floor(g0/BOX)*BOX;
  let colType=null, col=null;

  function newCol(type, startPrice){
    col={type, items:[], topPrice:startPrice, botPrice:startPrice};
    columns.push(col);
    colType=type;
  }
  function addSymbol(p, result){
    col.items.push({price:p, result});
    if(p>col.topPrice) col.topPrice=p;
    if(p<col.botPrice) col.botPrice=p;
  }

  /* Primeiro jogo: inicia coluna X ou O dependendo se gols > 0 */
  newCol(g0>0?'X':'O', price);
  addSymbol(price, results[0]);

  for(let i=1;i<results.length;i++){
    const r=results[i];
    const g=totalGoals(r);
    const gPrice=Math.floor(g/BOX)*BOX;

    if(colType==='X'){
      /* --- continua subindo --- */
      if(gPrice >= price+BOX){
        for(let p=price+BOX; p<=gPrice; p+=BOX) addSymbol(p,r);
        price=gPrice;
      }
      /* --- reversão: X → O --- */
      else if(gPrice <= price-REV*BOX){
        newCol('O', price-BOX);
        for(let p=price-BOX; p>=gPrice; p-=BOX) addSymbol(p,r);
        price=gPrice;
      }
      /* se ficou dentro da caixa atual: sem marcação (jogo neutro P&F) */
    } else { /* colType === 'O' */
      /* --- continua descendo --- */
      if(gPrice <= price-BOX){
        for(let p=price-BOX; p>=gPrice; p-=BOX) addSymbol(p,r);
        price=gPrice;
      }
      /* --- reversão: O → X --- */
      else if(gPrice >= price+REV*BOX){
        newCol('X', price+BOX);
        for(let p=price+BOX; p<=gPrice; p+=BOX) addSymbol(p,r);
        price=gPrice;
      }
    }
  }
}

/* ── Tendência ────────────────────────────────────────────────────── */
function updateBadge(){
  if(!columns.length){
    badge.className='badge b-neu';badge.textContent='TENDÊNCIA: NEUTRO';return;
  }
  const last=columns[columns.length-1];
  const prev=columns.length>1?columns[columns.length-2]:null;
  let txt='NEUTRO',cls='b-neu';
  if(last.type==='X'){
    if(prev&&prev.type==='X'&&last.topPrice>prev.topPrice){txt='ALTA FORTE ▲▲';cls='b-up';}
    else{txt='ALTA ▲';cls='b-up';}
  } else {
    if(prev&&prev.type==='O'&&last.botPrice<prev.botPrice){txt='BAIXA FORTE ▼▼';cls='b-dn';}
    else{txt='BAIXA ▼';cls='b-dn';}
  }
  badge.className=`badge ${cls}`;badge.textContent=`TENDÊNCIA: ${txt}`;
}

/* ── Estatísticas ─────────────────────────────────────────────────── */
function updateStats(data){
  const total=data.length;
  const over=data.filter(r=>totalGoals(r)>2.5).length;
  const under=total-over;
  const avg=total?(data.reduce((s,r)=>s+totalGoals(r),0)/total).toFixed(2):0;
  const last=columns.length?columns[columns.length-1]:null;
  const lastInfo=last?`${last.type} (${last.items.length})`:'—';
  const pctO=total?Math.round(over/total*100):0;
  const pctU=total?Math.round(under/total*100):0;

  $('sJogos').textContent=total;
  $('sOver').textContent=`${over} (${pctO}%)`;
  $('sUnder').textContent=`${under} (${pctU}%)`;
  $('sMedia').textContent=avg;
  $('sCols').textContent=columns.length;
  $('sUltCol').textContent=lastInfo;

  /* detecta breakouts/breakdowns */
  const breaks=[];
  for(let i=1;i<columns.length;i++){
    const c=columns[i], p=columns[i-1];
    if(c.type==='X'&&c.topPrice>p.topPrice) breaks.push('▲ breakout col.'+(i+1));
    if(c.type==='O'&&c.botPrice<p.botPrice) breaks.push('▼ breakdown col.'+(i+1));
  }
  $('sBreak').textContent=breaks.length?breaks[breaks.length-1]:'';
}

/* ── Draw ─────────────────────────────────────────────────────────── */
const C={
  bg:'#181c23',axBg:'#111318',grid:'#1e2330',grid2:'#252b3b',
  axBorder:'#2a3040',label:'#4a5468',tick:'#2a3040',
  X:'#00e5a0',O:'#ff4a6e',zero:'#2a3a5e',neutral:'#3b82f640'
};

/* cellW e cellH são independentes:
   - cellH preenche quase toda a altura disponível
   - cellW é calculado para caber as colunas, mas com mínimo de 8px
   - se as colunas não cabem, o canvas é mais largo que o wrap (scroll) */
function draw(){
  if(!columns.length) return;
  const BOX=+selBox.value;
  const H=wrap.clientHeight;
  const AXIS_W=52, PAD_T=10, PAD_B=18, PAD_R=8;

  const allPrices=columns.flatMap(c=>c.items.map(i=>i.price));
  if(!allPrices.length) return;
  let yMin=Math.max(0,Math.min(...allPrices)-BOX);
  let yMax=Math.max(...allPrices)+BOX;
  yMin=Math.floor(yMin/BOX)*BOX;
  yMax=Math.ceil(yMax/BOX)*BOX;
  const levels=(yMax-yMin)/BOX+1;

  const availH=H-PAD_T-PAD_B;
  /* cellH: ocupa 90% da altura disponível dividido pelos níveis */
  const cellH=Math.max(8, Math.min(32, (availH*0.92)/levels));

  /* cellW: mínimo 10px, máximo 22px; se não cabe, canvas cresce */
  const wrapW=wrap.clientWidth;
  const naturalCellW=(wrapW-AXIS_W-PAD_R)/columns.length;
  const cellW=Math.max(10, Math.min(22, naturalCellW));

  const W=Math.max(wrapW, AXIS_W+PAD_R+columns.length*cellW);
  canvas.width=W; canvas.height=H;
  wrap.style.overflowX= W>wrapW ? 'auto' : 'hidden';

  /* centraliza verticalmente usando cellH real */
  const blockH=levels*cellH;
  const oY=PAD_T+Math.max(0,(availH-blockH)/2);
  const oX=AXIS_W;

  const posToY=p=>oY+((yMax-p)/BOX)*cellH;
  /* alias: cell agora é cellH para os símbolos, cellW para posição horizontal */
  const cell=cellH;

  /* Fundo */
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H);

  /* Grade horizontal — usa cellH (cell) para posição vertical */
  for(let v=yMin;v<=yMax;v+=BOX){
    const y=posToY(v)+cell/2;
    ctx.beginPath(); ctx.moveTo(AXIS_W,y); ctx.lineTo(W,y);
    if(v===0){
      ctx.strokeStyle=C.zero; ctx.lineWidth=1.5;
    } else if(v%3===0){
      ctx.strokeStyle=C.grid2; ctx.lineWidth=0.5;
    } else {
      ctx.strokeStyle=C.grid; ctx.lineWidth=0.3;
    }
    ctx.stroke();
  }

  /* Faixa Over/Under 2.5 */
  if(yMin<=2 && yMax>=3){
    const y1=posToY(3)+cell/2;
    ctx.fillStyle='rgba(0,229,160,0.035)';
    ctx.fillRect(AXIS_W,0,W-AXIS_W,y1);
    ctx.fillStyle='rgba(255,74,110,0.035)';
    ctx.fillRect(AXIS_W,y1,W-AXIS_W,H-y1);
    ctx.beginPath(); ctx.moveTo(AXIS_W,y1); ctx.lineTo(W,y1);
    ctx.strokeStyle='rgba(100,120,180,0.4)'; ctx.lineWidth=1;
    ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
  }

  /* Grade vertical a cada 5 colunas — usa cellW para posição horizontal */
  for(let ci=0;ci<columns.length;ci+=5){
    const x=oX+ci*cellW;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H);
    ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=0.5; ctx.stroke();
  }

  /* Eixo Y — fundo fixo (não scrolla) — redesenhado por último */
  ctx.fillStyle=C.axBg; ctx.fillRect(0,0,AXIS_W,H);
  ctx.strokeStyle=C.axBorder; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(AXIS_W,0); ctx.lineTo(AXIS_W,H); ctx.stroke();
  const fs=Math.max(8,Math.min(11,cell));
  ctx.font=`${fs}px 'Courier New',monospace`;
  ctx.textAlign='right'; ctx.textBaseline='middle';

  for(let v=yMin;v<=yMax;v+=BOX){
    const y=posToY(v)+cell/2;
    ctx.fillStyle=C.tick; ctx.fillRect(AXIS_W-5,y-0.5,5,1);
    ctx.fillStyle = v>=3?'#00c48a':v>=2?'#8b9eb5':'#e55a78';
    ctx.fillText(v+' g', AXIS_W-8, y);
  }

  /* Símbolos P&F — posição horizontal usa cellW, vertical usa cellH (cell) */
  hitMap=[];
  const symSz=Math.max(5,Math.min(cell*0.78,16));
  ctx.font=`bold ${symSz}px 'Courier New',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';

  columns.forEach((col,ci)=>{
    const cx=oX+ci*cellW+cellW/2;

    /* Highlight coluna atual */
    if(ci===columns.length-1){
      ctx.fillStyle=col.type==='X'?'rgba(0,229,160,0.07)':'rgba(255,74,110,0.07)';
      ctx.fillRect(oX+ci*cellW, oY, cellW, levels*cell);
    }

    ctx.fillStyle=col.type==='X'?C.X:C.O;
    col.items.forEach(item=>{
      const cy=posToY(item.price)+cell/2;
      ctx.fillText(col.type, cx, cy);
      hitMap.push({cx,cy,hrX:cellW/2+1,hrY:cell/2+1,colIdx:ci+1,item,colType:col.type});
    });

    /* Marcadores de breakout / breakdown */
    if(ci>0&&cell>=9){
      const prev=columns[ci-1];
      if(col.type==='X'&&col.topPrice>prev.topPrice){
        const by=posToY(col.topPrice)+cell/2;
        ctx.save(); ctx.fillStyle='#00e5a0';
        ctx.font=`${Math.max(7,cell*0.55)}px sans-serif`;
        ctx.fillText('▲',cx,by-cell*0.95); ctx.restore();
      }
      if(col.type==='O'&&col.botPrice<prev.botPrice){
        const by=posToY(col.botPrice)+cell/2;
        ctx.save(); ctx.fillStyle='#ff4a6e';
        ctx.font=`${Math.max(7,cell*0.55)}px sans-serif`;
        ctx.fillText('▼',cx,by+cell*0.95); ctx.restore();
      }
    }
  });

  /* Número da coluna no rodapé (a cada 5) — usa cellW */
  if(cellW>=9){
    ctx.font=`7px 'Courier New',monospace`; ctx.textAlign='center';
    ctx.fillStyle=C.label;
    for(let ci=0;ci<columns.length;ci+=5){
      const cx=oX+ci*cellW+cellW/2;
      ctx.fillText(ci+1, cx, oY+levels*cell+9);
    }
  }
}

/* ── Load ─────────────────────────────────────────────────────────── */
async function load(){
  loadMsg.style.display='flex'; canvas.style.visibility='hidden';
  loadMsg.innerHTML='<div class="spinner"></div><span>Carregando...</span>';
  if(timer) clearInterval(timer);
  const league=selLeague.value, limit=+selGames.value, BOX=+selBox.value, REV=+selRev.value;
  try{
    const data=await fetchData(league,limit);
    build(data,BOX,REV); draw(); updateBadge(); updateStats(data);
    loadMsg.style.display='none'; canvas.style.visibility='visible';
    timer=setInterval(async()=>{
      try{
        const d=await fetchData(league,limit);
        build(d,BOX,REV); draw(); updateBadge(); updateStats(d);
      }catch{}
    },60000);
  } catch(e){
    loadMsg.innerHTML='<span style="color:#6b7894;font-size:11px">Erro ao conectar com a API</span>';
    console.error(e);
  }
}

/* ── Resize ───────────────────────────────────────────────────────── */
let rsz=null;
window.addEventListener('resize',()=>{
  clearTimeout(rsz); rsz=setTimeout(()=>{if(columns.length) draw();},80);
});

/* ── Tooltip ──────────────────────────────────────────────────────── */
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  let found=null;
  for(const h of hitMap){
    if(Math.abs(mx-h.cx)<=h.hrX&&Math.abs(my-h.cy)<=h.hrY){found=h;break;}
  }
  if(found){
    const res=found.item.result, g=totalGoals(res);
    const hh=String(res.hora).padStart(2,'0'), mm=String(res.minuto).padStart(2,'0');
    const tipo=g>2.5
      ?`<span style="color:#00e5a0">▲ Over 2.5</span>`
      :`<span style="color:#ff4a6e">▼ Under 2.5</span>`;
    const placar=`<b style="color:#dce3ef">${res.ft||'?'}</b>`;
    ttip.innerHTML=
      `${hh}:${mm} &nbsp;|&nbsp; ${placar} &nbsp;→&nbsp; ${tipo}<br>`+
      `Gols: <b>${g}</b> &nbsp;|&nbsp; Caixa: <b>${found.item.price} g</b> &nbsp;|&nbsp; Coluna <b>${found.colIdx}</b> (${found.colType})`;
    ttip.style.display='block';
    const TW=ttip.offsetWidth, TH=ttip.offsetHeight;
    let tx=e.clientX+14, ty=e.clientY-TH-8;
    if(tx+TW>window.innerWidth-6) tx=e.clientX-TW-14;
    if(ty<4) ty=e.clientY+12;
    ttip.style.left=tx+'px'; ttip.style.top=ty+'px';
  } else {
    ttip.style.display='none';
  }
});
canvas.addEventListener('mouseleave',()=>{ttip.style.display='none';});

load();
</script>
</body>
</html>
