<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto & Figura</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg:     #1c1f26;
            --bg2:    #252a33;
            --border: #3a3f4a;
            --text:   #e8eaed;
            --muted:  #9ca3af;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            padding: 14px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .ctrl { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
        select {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 12px;
            min-width: 150px;
            cursor: pointer;
            outline: none;
        }
        .chart-wrap {
            flex: 1;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        canvas { display: block; }
        #loadMsg {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: var(--muted); font-size: 13px;
        }
        #tooltip {
            position: fixed;
            background: rgba(8,10,14,.97);
            color: #e8eaed;
            padding: 5px 9px;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'Segoe UI', sans-serif;
            border: 1px solid #3a3f4a;
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
            display: none;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="ctrl">
        <label>Liga</label>
        <select id="selLeague">
            <option value="Copa%20do%20Mundo">Copa do Mundo</option>
            <option value="Ligas%20dos%20Campe%C3%B5es">Ligas dos Campeões</option>
            <option value="Am%C3%A9rica%20Latina">América Latina</option>
        </select>
    </div>
    <div class="ctrl">
        <label>Jogos</label>
        <select id="selGames">
            <option value="20">20</option>
            <option value="40">40</option>
            <option value="80">80</option>
            <option value="160">160</option>
            <option value="320">320</option>
            <option value="640">640</option>
        </select>
    </div>
</div>

<div class="chart-wrap" id="chartWrap">
    <div id="loadMsg">Selecione uma liga</div>
    <canvas id="pf"></canvas>
</div>
<div id="tooltip"></div>

<script>
/* ═══════════════════════════════════════════════════════
   PONTO & FIGURA — Over/Under 2.5
   
   REGRAS FIXAS:
   • Cada jogo ocupa exatamente 1 linha no eixo Y
   • Eixo Y = índice do jogo (1 = mais antigo, N = mais recente)
   • 1 jogo = 1 símbolo, sem filtro de reversão
   • Nova coluna abre quando o tipo muda (X→O ou O→X)
   • X (verde) = Over 2.5  |  O (vermelho) = Under 2.5
   • O gráfico é 100% determinístico: mesmos dados = mesmo visual
═══════════════════════════════════════════════════════ */

// ── Paleta ────────────────────────────────────────────
const C = {
    bg:       '#252a33',
    axBg:     '#1c1f26',
    grid5:    '#383e4e',   // linha a cada 5 jogos
    grid1:    '#272c37',   // linha a cada 1
    tick5:    '#4a5268',   // tick mark a cada 5
    border:   '#3a3f4a',
    axBorder: '#464f62',
    label:    '#7a8699',
    X:        '#10b981',
    O:        '#ef4444',
};

// ── Dimensões fixas ───────────────────────────────────
const AXIS_W = 44;   // largura eixo Y
const PAD_T  = 10;
const PAD_B  = 10;
const PAD_R  = 10;

// ── Estado ────────────────────────────────────────────
let columns    = [];
let totalGames = 0;
let hitMap     = [];
let timer      = null;

// ── Elementos ─────────────────────────────────────────
const selLeague = document.getElementById('selLeague');
const selGames  = document.getElementById('selGames');
const wrap      = document.getElementById('chartWrap');
const canvas    = document.getElementById('pf');
const ctx       = canvas.getContext('2d');
const loadMsg   = document.getElementById('loadMsg');
const tip       = document.getElementById('tooltip');

// ── LocalStorage ──────────────────────────────────────
function lsGet(k, fb) { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : fb; } catch { return fb; } }
function lsSet(k, v)  { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

const LS_L = 'pf2_league';
const LS_G = 'pf2_games';

selLeague.value = lsGet(LS_L, selLeague.value);
selGames.value  = lsGet(LS_G, selGames.value);

selLeague.addEventListener('change', () => { lsSet(LS_L, selLeague.value); load(); });
selGames.addEventListener('change',  () => { lsSet(LS_G, selGames.value);  load(); });

// ── Fetch ─────────────────────────────────────────────
async function load() {
    loadMsg.style.display   = 'flex';
    canvas.style.visibility = 'hidden';
    if (timer) clearInterval(timer);

    const league = selLeague.value;
    const limit  = parseInt(selGames.value);

    try {
        const data = await fetchData(league, limit);
        build(data);
        draw();
        timer = setInterval(async () => {
            try { const d = await fetchData(league, limit); build(d); draw(); } catch {}
        }, 60000);
    } catch(e) {
        loadMsg.textContent = 'Erro ao carregar';
        console.error(e);
    }
}

async function fetchData(league, limit) {
    const resp = await fetch(`https://betstat.site/resultados/estrela/${league}`);
    if (!resp.ok) throw new Error(resp.status);
    const json = await resp.json();                          // API retorna JSON direto
    const arr  = Array.isArray(json) ? json : (json.matches || json.data || []);
    return arr.slice(0, limit).map(m => ({
        ft:     (m.ft || '0x0').trim(),
        hora:   parseInt(m.hora)   || 0,
        minuto: parseInt(m.minuto) || 0,
    }));
}

// ── Build P&F ─────────────────────────────────────────
/*
  Eixo Y = índice do jogo na lista recebida (1-based).
  Jogo 1 = primeiro da lista = mais antigo = TOPO do gráfico.
  Jogo N = último da lista  = mais recente = BASE do gráfico.

  Coluna: sequência consecutiva do mesmo tipo.
  Quando o tipo muda → nova coluna.
  Cada item ocupa row = seu índice (fixo, não muda com os dados).
*/
function build(results) {
    columns    = [];
    totalGames = results.length;
    hitMap     = [];

    let col = null;
    results.forEach((r, i) => {
        const idx   = i + 1;   // 1-based, determinístico
        const goals = (parseInt(r.ft?.split('x')[0]) || 0)
                    + (parseInt(r.ft?.split('x')[1]) || 0);
        const type  = goals > 2.5 ? 'X' : 'O';

        if (!col || col.type !== type) {
            col = { type, items: [] };
            columns.push(col);
        }
        col.items.push({ idx, result: r });
    });
}

// ── Draw ──────────────────────────────────────────────
function draw() {
    if (!columns.length) return;

    const W = wrap.clientWidth;
    const H = wrap.clientHeight;

    canvas.width  = W;
    canvas.height = H;

    const numRows = totalGames;           // linhas = total de jogos
    const numCols = columns.length;       // colunas = grupos consecutivos

    // Célula quadrada que cabe exatamente no espaço
    const cellH = (H - PAD_T - PAD_B) / numRows;
    const cellW = (W - AXIS_W - PAD_R)  / numCols;
    const cell  = Math.max(2, Math.min(cellH, cellW));

    // Centrar bloco verticalmente se sobrar espaço
    const blockH = numRows * cell;
    const blockW = numCols * cell;
    const oY     = PAD_T + Math.max(0, (H - PAD_T - PAD_B - blockH) / 2);
    const oX     = AXIS_W;

    // helpers
    const rowY = idx => oY + (idx - 1) * cell;   // topo da linha do jogo idx
    const colX = ci  => oX + ci * cell;           // esquerda da coluna ci

    // ── Fundo ────────────────────────────────────────
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    // ── Grade horizontal ─────────────────────────────
    for (let idx = 1; idx <= numRows; idx++) {
        const y    = rowY(idx) + cell / 2;
        const is5  = idx % 5 === 0;
        const isEdge = idx === 1 || idx === numRows;

        ctx.beginPath();
        ctx.moveTo(AXIS_W, y);
        ctx.lineTo(W, y);

        if (is5 || isEdge) {
            ctx.strokeStyle = C.grid5;
            ctx.lineWidth   = 0.8;
            ctx.setLineDash([]);
        } else {
            ctx.strokeStyle = C.grid1;
            ctx.lineWidth   = 0.4;
            ctx.setLineDash([1, 6]);
        }
        ctx.stroke();
    }
    ctx.setLineDash([]);

    // ── Separadores verticais de coluna ──────────────
    // Linha fina entre colunas para facilitar leitura
    ctx.strokeStyle = '#2e3442';
    ctx.lineWidth   = 0.3;
    for (let ci = 1; ci < numCols; ci++) {
        const x = colX(ci);
        ctx.beginPath();
        ctx.moveTo(x, oY);
        ctx.lineTo(x, oY + blockH);
        ctx.stroke();
    }

    // ── Eixo Y ───────────────────────────────────────
    ctx.fillStyle = C.axBg;
    ctx.fillRect(0, 0, AXIS_W, H);

    ctx.strokeStyle = C.axBorder;
    ctx.lineWidth   = 1;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(AXIS_W, 0);
    ctx.lineTo(AXIS_W, H);
    ctx.stroke();

    // Labels e ticks a cada 5
    const fs = Math.max(8, Math.min(11, cell - 1));
    ctx.font         = `${fs}px Courier New`;
    ctx.textAlign    = 'right';
    ctx.textBaseline = 'middle';

    // jogo 1 sempre
    {
        const y = rowY(1) + cell / 2;
        ctx.fillStyle = C.tick5;
        ctx.fillRect(AXIS_W - 5, y - 0.5, 5, 1);
        ctx.fillStyle = C.label;
        ctx.fillText('1', AXIS_W - 8, y);
    }
    // a cada 5
    for (let idx = 5; idx <= numRows; idx += 5) {
        const y = rowY(idx) + cell / 2;
        ctx.fillStyle = C.tick5;
        ctx.fillRect(AXIS_W - 5, y - 0.5, 5, 1);
        ctx.fillStyle = C.label;
        ctx.fillText(String(idx), AXIS_W - 8, y);
    }

    // ── Símbolos ─────────────────────────────────────
    hitMap = [];
    const symSz = Math.max(6, Math.min(cell * 0.85, 16));
    ctx.font         = `bold ${symSz}px Courier New`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    columns.forEach((col, ci) => {
        const cx = colX(ci) + cell / 2;
        ctx.fillStyle = col.type === 'X' ? C.X : C.O;

        col.items.forEach(item => {
            const cy = rowY(item.idx) + cell / 2;
            ctx.fillText(col.type, cx, cy);
            hitMap.push({ cx, cy, hr: cell / 2, item });
        });
    });

    canvas.style.visibility = 'visible';
    loadMsg.style.display   = 'none';
}

// ── Resize ────────────────────────────────────────────
let rsz = null;
window.addEventListener('resize', () => {
    clearTimeout(rsz);
    rsz = setTimeout(() => { if (columns.length) draw(); }, 100);
});

// ── Tooltip ───────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
    const r  = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;

    let found = null;
    for (const h of hitMap) {
        if (Math.abs(mx - h.cx) <= h.hr && Math.abs(my - h.cy) <= h.hr) { found = h; break; }
    }

    if (found) {
        const res = found.item.result;
        const hh  = String(res.hora).padStart(2, '0');
        const mm  = String(res.minuto).padStart(2, '0');
        const goals = (parseInt(res.ft?.split('x')[0]) || 0)
                    + (parseInt(res.ft?.split('x')[1]) || 0);
        const tipo = goals > 2.5 ? 'Over 2.5' : 'Under 2.5';
        tip.innerHTML = `Jogo #${found.item.idx} &nbsp;|&nbsp; ${hh}:${mm}<br>${res.ft || 'N/A'} &nbsp;→&nbsp; <b>${tipo}</b>`;
        tip.style.display = 'block';

        const TW = tip.offsetWidth, TH = tip.offsetHeight;
        let tx = e.clientX + 14, ty = e.clientY - TH - 8;
        if (tx + TW > window.innerWidth - 6) tx = e.clientX - TW - 14;
        if (ty < 4) ty = e.clientY + 12;
        tip.style.left = tx + 'px';
        tip.style.top  = ty + 'px';
    } else {
        tip.style.display = 'none';
    }
});
canvas.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

// ── Init ──────────────────────────────────────────────
load();
</script>
</body>
</html>
