<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto & Figura</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #1c1f26;
            --bg2: #252a33;
            --border: #3a3f4a;
            --text: #e8eaed;
            --text-sec: #9ca3af;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            padding: 16px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .control { display: flex; flex-direction: column; gap: 5px; }

        label {
            font-size: 10px;
            color: var(--text-sec);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 12px;
            border-radius: 3px;
            font-size: 12px;
            min-width: 140px;
            cursor: pointer;
            outline: none;
        }

        .chart-wrap {
            flex: 1;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        #pfCanvas {
            display: block;
        }

        #loadMsg {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sec);
            font-size: 13px;
        }

        #tooltip {
            position: fixed;
            background: rgba(10,12,16,0.97);
            color: #e8eaed;
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'Segoe UI', sans-serif;
            border: 1px solid #3a3f4a;
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
            display: none;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="control">
        <label>Liga</label>
        <select id="league">
            <option value="Copa%20do%20Mundo">Copa do Mundo</option>
            <option value="Ligas%20dos%20Campe%C3%B5es">Ligas dos Campeões</option>
            <option value="Am%C3%A9rica%20Latina">América Latina</option>
        </select>
    </div>
    <div class="control">
        <label>Jogos</label>
        <select id="games">
            <option value="20">20</option>
            <option value="40">40</option>
            <option value="80">80</option>
            <option value="160">160</option>
            <option value="320">320</option>
            <option value="640">640</option>
        </select>
    </div>
</div>

<div class="chart-wrap" id="chartWrap">
    <div id="loadMsg">Selecione uma liga</div>
    <canvas id="pfCanvas"></canvas>
</div>

<div id="tooltip"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const AXIS_W   = 34;
const PAD_V    = 8;
const PAD_R    = 8;

const C_BG     = '#252a33';
const C_AXIS   = '#1e2229';
const C_GRID   = '#2c3039';
const C_BORDER = '#3a3f4a';
const C_LABEL  = '#6b7280';
const C_X      = '#10b981';
const C_O      = '#ef4444';

// ── STATE ───────────────────────────────────────────────────────────────────
let columns = [];
let minRow  = 0;
let maxRow  = 0;
let hitMap  = [];
let updateTimer = null;

// ── ELEMENTS ────────────────────────────────────────────────────────────────
const leagueEl  = document.getElementById('league');
const gamesEl   = document.getElementById('games');
const chartWrap = document.getElementById('chartWrap');
const canvas    = document.getElementById('pfCanvas');
const ctx       = canvas.getContext('2d');
const loadMsg   = document.getElementById('loadMsg');
const tooltipEl = document.getElementById('tooltip');

// ── LOCALSTORAGE ─────────────────────────────────────────────────────────────
const sl = localStorage.getItem('pf_league');
const sg = localStorage.getItem('pf_games');
if (sl) leagueEl.value = sl;
if (sg) gamesEl.value  = sg;

leagueEl.addEventListener('change', () => { localStorage.setItem('pf_league', leagueEl.value); loadData(); });
gamesEl.addEventListener('change',  () => { localStorage.setItem('pf_games',  gamesEl.value);  loadData(); });

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function loadData() {
    loadMsg.style.display = 'flex';
    canvas.style.visibility = 'hidden';
    if (updateTimer) clearInterval(updateTimer);

    const league = leagueEl.value;
    const limit  = parseInt(gamesEl.value);

    try {
        const results = await fetchResults(league, limit);
        build(results);
        render();
        updateTimer = setInterval(async () => {
            const r = await fetchResults(league, limit).catch(() => null);
            if (r) { build(r); render(); }
        }, 60000);
    } catch(e) {
        loadMsg.textContent = 'Erro ao carregar';
        console.error(e);
    }
}

async function fetchResults(league, limit) {
    const resp = await fetch(`https://betstat.site/resultados/estrela/${league}`);
    const html = await resp.text();
    const m = html.match(/window\.__INITIAL_STATE__\s*=\s*({.*?});/s);
    if (m) {
        const data = JSON.parse(m[1]);
        return (data.matches || []).slice(0, limit).map(x => ({
            ft:     (x.ft || '0x0').trim(),
            hora:   parseInt(x.hora)   || 0,
            minuto: parseInt(x.minuto) || 0
        }));
    }
    return generateDemo(limit);
}

function generateDemo(limit) {
    const now = new Date();
    return Array.from({length: limit}, (_, i) => {
        const d = new Date(now - (limit - 1 - i) * 3 * 60000);
        return { ft: Math.random() > 0.45 ? '3x1' : '1x0', hora: d.getHours(), minuto: d.getMinutes() };
    });
}

// ── BUILD P&F ─────────────────────────────────────────────────────────────────
function build(results) {
    columns = [];
    let cursor = 0;
    let col    = null;

    results.forEach(r => {
        const goals = (parseInt(r.ft?.split('x')[0]) || 0)
                    + (parseInt(r.ft?.split('x')[1]) || 0);
        const type  = goals > 2.5 ? 'X' : 'O';

        if (type === 'X') cursor--;
        else              cursor++;

        if (!col || col.type !== type) {
            col = { type, items: [] };
            columns.push(col);
        }
        col.items.push({ type, row: cursor, result: r });
    });

    minRow = Infinity; maxRow = -Infinity;
    columns.forEach(c => c.items.forEach(it => {
        if (it.row < minRow) minRow = it.row;
        if (it.row > maxRow) maxRow = it.row;
    }));
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
    if (!columns.length) return;

    const wrapW = chartWrap.clientWidth;
    const wrapH = chartWrap.clientHeight;

    // Calcular tamanho de célula para caber tudo
    const totalRows = maxRow - minRow + 1;
    const totalCols = columns.length;

    const cellH = Math.max(6, Math.floor((wrapH - PAD_V * 2) / totalRows));
    const cellW = Math.max(6, Math.floor((wrapW - AXIS_W - PAD_R) / totalCols));
    const cell  = Math.min(cellH, cellW); // célula quadrada

    const chartH = PAD_V * 2 + totalRows * cell;
    const chartW = AXIS_W + totalCols * cell + PAD_R;

    canvas.width  = Math.max(chartW, wrapW);
    canvas.height = Math.max(chartH, wrapH);
    canvas.style.visibility = 'visible';
    loadMsg.style.display   = 'none';

    const W = canvas.width;
    const H = canvas.height;

    // Fundo
    ctx.fillStyle = C_BG;
    ctx.fillRect(0, 0, W, H);

    // Grade
    ctx.strokeStyle = C_GRID;
    ctx.lineWidth   = 0.5;
    for (let r = minRow; r <= maxRow; r++) {
        const y = rowY(r, cell) + cell / 2;
        ctx.beginPath();
        ctx.moveTo(AXIS_W, y);
        ctx.lineTo(W, y);
        ctx.stroke();
    }

    // Eixo Y
    ctx.fillStyle = C_AXIS;
    ctx.fillRect(0, 0, AXIS_W, H);
    ctx.strokeStyle = C_BORDER;
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(AXIS_W, 0);
    ctx.lineTo(AXIS_W, H);
    ctx.stroke();

    // Labels eixo Y
    const fontSize = Math.max(8, Math.min(11, cell - 2));
    ctx.fillStyle    = C_LABEL;
    ctx.font         = `${fontSize}px Courier New`;
    ctx.textAlign    = 'right';
    ctx.textBaseline = 'middle';

    const step = totalRows > 40 ? Math.ceil(totalRows / 20) : (totalRows > 20 ? 2 : 1);
    for (let r = minRow; r <= maxRow; r++) {
        if ((r - minRow) % step === 0 || r === minRow || r === maxRow) {
            const y = rowY(r, cell) + cell / 2;
            ctx.fillText(String(-r), AXIS_W - 3, y); // inverter sinal: X sobe = positivo
        }
    }

    // Símbolos
    hitMap = [];
    const symFont = `bold ${Math.max(8, cell - 3)}px Courier New`;
    ctx.font      = symFont;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    columns.forEach((col, ci) => {
        const x = AXIS_W + ci * cell + cell / 2;
        ctx.fillStyle = col.type === 'X' ? C_X : C_O;

        col.items.forEach(item => {
            const y = rowY(item.row, cell) + cell / 2;
            ctx.fillText(item.type, x, y);
            hitMap.push({ cx: x, cy: y, r: cell / 2, item });
        });
    });

    // Scroll para o fim (mais recente)
    chartWrap.scrollLeft = chartWrap.scrollWidth;
}

function rowY(r, cell) {
    return PAD_V + (r - minRow) * cell;
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
let resizeTimer = null;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { if (columns.length) render(); }, 120);
});

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx   = e.clientX - rect.left;
    const my   = e.clientY - rect.top;

    let found = null;
    for (const h of hitMap) {
        if (Math.abs(mx - h.cx) <= h.r && Math.abs(my - h.cy) <= h.r) { found = h; break; }
    }

    if (found) {
        const r  = found.item.result;
        const hh = String(r.hora).padStart(2,'0');
        const mm = String(r.minuto).padStart(2,'0');
        tooltipEl.innerHTML = `${hh}:${mm}<br>${r.ft || 'N/A'}`;
        tooltipEl.style.display = 'block';

        const TW = tooltipEl.offsetWidth, TH = tooltipEl.offsetHeight;
        let tx = e.clientX + 14, ty = e.clientY - TH - 8;
        if (tx + TW > window.innerWidth - 6) tx = e.clientX - TW - 14;
        if (ty < 4) ty = e.clientY + 12;
        tooltipEl.style.left = tx + 'px';
        tooltipEl.style.top  = ty + 'px';
    } else {
        tooltipEl.style.display = 'none';
    }
});

canvas.addEventListener('mouseleave', () => { tooltipEl.style.display = 'none'; });

// ── INIT ──────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
