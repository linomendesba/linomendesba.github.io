<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto & Figura</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #1c1f26;
            --card: #252a33;
            --border: #3a3f4a;
            --text: #e8eaed;
            --text-sec: #9ca3af;
            --over: #10b981;
            --under: #ef4444;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            max-width: 100%;
            padding: 20px;
            margin: 0 auto;
        }

        /* CONTROLES */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-sec);
        }

        select {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            min-width: 150px;
        }

        select:hover {
            border-color: var(--over);
        }

        /* LAYOUT PRINCIPAL */
        .layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* GRÁFICO */
        .chart-container {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            height: 500px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
        }

        .chart-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .column {
            display: flex;
            flex-direction: column-reverse;
            gap: 2px;
            align-items: center;
            padding: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .box {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            transition: all 0.1s;
        }

        .box.over {
            background: linear-gradient(135deg, var(--over), rgba(16,185,129,0.3));
            color: #fff;
            border: 1px solid var(--over);
        }

        .box.under {
            background: linear-gradient(135deg, var(--under), rgba(239,68,68,0.3));
            color: #fff;
            border: 1px solid var(--under);
        }

        .box:hover {
            transform: scale(1.15);
            z-index: 10;
        }

        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.95);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 10px;
            white-space: nowrap;
            bottom: calc(100% + 5px);
            left: 50%;
            transform: translateX(-50%);
            border: 1px solid var(--border);
            display: none;
            pointer-events: none;
            z-index: 1000;
        }

        .box:hover .tooltip {
            display: block;
        }

        /* PAINEL DE DADOS À DIREITA */
        .data-panel {
            width: 280px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg);
            border-radius: 4px;
            border-left: 3px solid var(--over);
        }

        .stat.under {
            border-left-color: var(--under);
        }

        .stat.neutral {
            border-left-color: var(--border);
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-sec);
            flex: 1;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-sec);
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 2px solid var(--border);
            border-top-color: var(--over);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-sec);
        }

        @media (max-width: 1024px) {
            .layout {
                flex-direction: column;
            }

            .data-panel {
                width: 100%;
            }

            .chart-container {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- CONTROLES -->
        <div class="controls">
            <div class="control-group">
                <label>Liga</label>
                <select id="league-select">
                    <option value="Copa%20do%20Mundo">Copa do Mundo</option>
                    <option value="Ligas%20dos%20Campe%C3%B5es">Ligas dos Campeões</option>
                    <option value="Am%C3%A9rica%20Latina">América Latina</option>
                </select>
            </div>

            <div class="control-group">
                <label>Últimos Jogos</label>
                <select id="games-select">
                    <option value="20">20</option>
                    <option value="40">40</option>
                    <option value="80">80</option>
                    <option value="160">160</option>
                    <option value="320">320</option>
                    <option value="640" selected>640</option>
                </select>
            </div>
        </div>

        <!-- LAYOUT: GRÁFICO + DADOS -->
        <div class="layout">
            <!-- GRÁFICO -->
            <div class="chart-container">
                <div class="empty-state" id="initial-state">
                    Selecione uma liga
                </div>
                <div class="chart-wrapper" id="chart-wrapper" style="display: none;"></div>
                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- PAINEL DE DADOS -->
            <div class="data-panel">
                <div class="stat over">
                    <div class="stat-label">Max Over</div>
                    <div class="stat-value" id="max-over">-</div>
                </div>

                <div class="stat under">
                    <div class="stat-label">Max Under</div>
                    <div class="stat-value" id="max-under">-</div>
                </div>

                <div class="stat neutral">
                    <div class="stat-label">Reversões</div>
                    <div class="stat-value" id="reversions">-</div>
                </div>

                <div class="stat neutral">
                    <div class="stat-label">Tendência</div>
                    <div class="stat-value" id="trend">-</div>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border); margin: 10px 0;">

                <div style="font-size: 11px; color: var(--text-sec);">
                    <div style="margin-bottom: 8px;"><strong>Último Jogo:</strong></div>
                    <div id="last-game" style="color: var(--text); line-height: 1.6;">-</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const leagueSelect = document.getElementById('league-select');
        const gamesSelect = document.getElementById('games-select');
        const chartWrapper = document.getElementById('chart-wrapper');
        const chartContainer = document.querySelector('.chart-container');
        const initialState = document.getElementById('initial-state');
        const loadingEl = document.getElementById('loading');

        let currentData = { results: [], pnfBoxes: [] };
        let updateInterval = null;

        leagueSelect.addEventListener('change', loadChart);
        gamesSelect.addEventListener('change', loadChart);

        async function loadChart() {
            const league = leagueSelect.value;
            const limit = parseInt(gamesSelect.value);

            initialState.style.display = 'none';
            chartWrapper.style.display = 'none';
            loadingEl.style.display = 'block';

            if (updateInterval) clearInterval(updateInterval);

            try {
                const results = await fetchResults(league, limit);
                currentData.results = results;
                
                const pnfBoxes = calculatePointFigure(results);
                currentData.pnfBoxes = pnfBoxes;
                
                renderChart(pnfBoxes);
                updateStats(results);
                
                loadingEl.style.display = 'none';

                updateInterval = setInterval(() => refreshData(league, limit), 60000);
            } catch (error) {
                loadingEl.style.display = 'none';
                initialState.textContent = 'Erro ao carregar dados';
                initialState.style.display = 'block';
            }
        }

        async function refreshData(league, limit) {
            try {
                const newResults = await fetchResults(league, limit);
                if (JSON.stringify(newResults) !== JSON.stringify(currentData.results)) {
                    currentData.results = newResults;
                    const pnfBoxes = calculatePointFigure(newResults);
                    currentData.pnfBoxes = pnfBoxes;
                    updateChartInPlace(pnfBoxes);
                    updateStats(newResults);
                }
            } catch (e) {
                console.error('Erro na atualização:', e);
            }
        }

        async function fetchResults(league, limit) {
            try {
                const url = `https://betstat.site/resultados/estrela/${league}`;
                const response = await fetch(url);
                const html = await response.text();
                const jsonMatch = html.match(/window\.__INITIAL_STATE__\s*=\s*({.*?});/s);
                
                if (jsonMatch) {
                    const data = JSON.parse(jsonMatch[1]);
                    return (data.matches || [])
                        .slice(0, limit)
                        .reverse()
                        .map(m => ({
                            id: m.id,
                            time_a: m.time_a,
                            time_b: m.time_b,
                            ft: m.ft,
                            hora: m.hora || 0,
                            minuto: m.minuto || 0
                        }));
                }
                return generateDemoData(limit);
            } catch (e) {
                return generateDemoData(limit);
            }
        }

        function generateDemoData(limit) {
            const results = [];
            const now = new Date();
            for (let i = limit - 1; i >= 0; i--) {
                const isOver = Math.random() > 0.45;
                const gameTime = new Date(now.getTime() - i * 3600000);
                results.push({
                    id: i,
                    time_a: 'Time A',
                    time_b: 'Time B',
                    ft: isOver ? '3x1' : '1x0',
                    hora: gameTime.getHours(),
                    minuto: gameTime.getMinutes()
                });
            }
            return results;
        }

        function calculatePointFigure(results) {
            const boxes = [];
            let currentType = null;
            let reversalCounter = 0;

            results.forEach((result, idx) => {
                const isOver = countGoals(result.ft) > 2.5;
                const type = isOver ? 'over' : 'under';

                if (currentType === null) {
                    currentType = type;
                    boxes.push({ type, idx, result });
                } else if (currentType === type) {
                    reversalCounter = 0;
                    boxes.push({ type, idx, result });
                } else {
                    reversalCounter++;
                    if (reversalCounter === 3) {
                        currentType = type;
                        reversalCounter = 0;
                        boxes.push({ type, idx, result });
                    }
                }
            });

            return boxes;
        }

        function countGoals(ftString) {
            if (!ftString) return 0;
            const parts = ftString.split('x').map(p => parseInt(p) || 0);
            return parts[0] + parts[1];
        }

        function renderChart(pnfBoxes) {
            chartWrapper.innerHTML = '';

            if (pnfBoxes.length === 0) {
                initialState.style.display = 'block';
                return;
            }

            const columns = [];
            let currentColumn = [];
            let lastType = null;

            pnfBoxes.forEach(box => {
                if (lastType === null || lastType === box.type) {
                    currentColumn.push(box);
                    lastType = box.type;
                } else {
                    columns.push({ type: lastType, boxes: currentColumn });
                    currentColumn = [box];
                    lastType = box.type;
                }
            });

            if (currentColumn.length > 0) {
                columns.push({ type: lastType, boxes: currentColumn });
            }

            columns.forEach(col => {
                const colDiv = document.createElement('div');
                colDiv.className = 'column';

                col.boxes.forEach(box => {
                    const boxEl = document.createElement('div');
                    boxEl.className = `box ${box.type}`;
                    boxEl.textContent = box.type === 'over' ? 'X' : 'O';
                    
                    const time = `${String(box.result.hora).padStart(2, '0')}:${String(box.result.minuto).padStart(2, '0')}`;
                    const tooltip = document.createElement('div');
                    tooltip.className = 'tooltip';
                    tooltip.innerHTML = `${time}<br>${box.result.time_a} x ${box.result.time_b}<br>${box.result.ft}`;
                    
                    boxEl.appendChild(tooltip);
                    colDiv.appendChild(boxEl);
                });

                chartWrapper.appendChild(colDiv);
            });

            initialState.style.display = 'none';
            chartWrapper.style.display = 'flex';
        }

        function updateChartInPlace(pnfBoxes) {
            const columns = [];
            let currentColumn = [];
            let lastType = null;

            pnfBoxes.forEach(box => {
                if (lastType === null || lastType === box.type) {
                    currentColumn.push(box);
                    lastType = box.type;
                } else {
                    columns.push({ type: lastType, boxes: currentColumn });
                    currentColumn = [box];
                    lastType = box.type;
                }
            });

            if (currentColumn.length > 0) {
                columns.push({ type: lastType, boxes: currentColumn });
            }

            const colElements = chartWrapper.querySelectorAll('.column');
            
            columns.forEach((col, idx) => {
                let colEl = colElements[idx];
                if (!colEl) {
                    colEl = document.createElement('div');
                    colEl.className = 'column';
                    chartWrapper.appendChild(colEl);
                }
                
                colEl.innerHTML = '';
                col.boxes.forEach(box => {
                    const boxEl = document.createElement('div');
                    boxEl.className = `box ${box.type}`;
                    boxEl.textContent = box.type === 'over' ? 'X' : 'O';
                    
                    const time = `${String(box.result.hora).padStart(2, '0')}:${String(box.result.minuto).padStart(2, '0')}`;
                    const tooltip = document.createElement('div');
                    tooltip.className = 'tooltip';
                    tooltip.innerHTML = `${time}<br>${box.result.time_a} x ${box.result.time_b}<br>${box.result.ft}`;
                    
                    boxEl.appendChild(tooltip);
                    colEl.appendChild(boxEl);
                });
            });

            for (let i = columns.length; i < colElements.length; i++) {
                colElements[i].remove();
            }
        }

        function updateStats(results) {
            let maxOver = 0, maxUnder = 0, currentOver = 0, currentUnder = 0;
            let reversions = 0;
            let lastType = null;

            results.forEach(r => {
                const isOver = countGoals(r.ft) > 2.5;
                
                if (isOver) {
                    currentOver++;
                    currentUnder = 0;
                    maxOver = Math.max(maxOver, currentOver);
                } else {
                    currentUnder++;
                    currentOver = 0;
                    maxUnder = Math.max(maxUnder, currentUnder);
                }

                if (lastType !== null && lastType !== (isOver ? 'over' : 'under')) {
                    reversions++;
                }
                lastType = isOver ? 'over' : 'under';
            });

            document.getElementById('max-over').textContent = maxOver;
            document.getElementById('max-under').textContent = maxUnder;
            document.getElementById('reversions').textContent = reversions;
            
            const trend = lastType === 'over' ? '↑ OVER' : lastType === 'under' ? '↓ UNDER' : '-';
            document.getElementById('trend').textContent = trend;

            // Último jogo
            if (results.length > 0) {
                const last = results[0];
                const time = `${String(last.hora).padStart(2, '0')}:${String(last.minuto).padStart(2, '0')}`;
                const result = countGoals(last.ft) > 2.5 ? '✓ OVER' : '✓ UNDER';
                document.getElementById('last-game').innerHTML = `
                    <div>${time}</div>
                    <div>${last.time_a} x ${last.time_b}</div>
                    <div style="color: ${countGoals(last.ft) > 2.5 ? 'var(--over)' : 'var(--under)'}; font-weight: bold;">${result}</div>
                    <div>${last.ft}</div>
                `;
            }
        }
    </script>
</body>
</html>
