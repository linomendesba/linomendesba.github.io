<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto & Figura</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #1c1f26;
            --bg2: #252a33;
            --border: #3a3f4a;
            --text: #e8eaed;
            --text-sec: #9ca3af;
            --over: #10b981;
            --under: #ef4444;
            --cell: 20px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-end;
        }

        .control {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 11px;
            color: var(--text-sec);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 3px;
            font-size: 12px;
            min-width: 140px;
            cursor: pointer;
            outline: none;
        }

        .layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* ── Chart container ── */
        .chart-wrap {
            flex: 1;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: auto;
            position: relative;
            max-height: 600px;
        }

        /* Canvas ocupa tudo */
        #pfCanvas {
            display: block;
            cursor: crosshair;
        }

        /* ── Stats ── */
        .stats {
            width: 200px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            flex-shrink: 0;
        }

        .stat {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .stat:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .stat-label {
            font-size: 10px;
            color: var(--text-sec);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-value { font-size: 18px; font-weight: bold; }
        .stat-value.over  { color: var(--over); }
        .stat-value.under { color: var(--under); }

        /* ── Tooltip ── */
        #tooltip {
            position: fixed;
            background: rgba(10,12,16,0.97);
            color: #e8eaed;
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'Segoe UI', sans-serif;
            border: 1px solid #3a3f4a;
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
            display: none;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            color: var(--text-sec);
            padding: 60px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="control">
        <label>Liga</label>
        <select id="league">
            <option value="Copa%20do%20Mundo">Copa do Mundo</option>
            <option value="Ligas%20dos%20Campe%C3%B5es">Ligas dos Campeões</option>
            <option value="Am%C3%A9rica%20Latina">América Latina</option>
        </select>
    </div>
    <div class="control">
        <label>Jogos</label>
        <select id="games">
            <option value="20">20</option>
            <option value="40">40</option>
            <option value="80">80</option>
            <option value="160">160</option>
            <option value="320">320</option>
            <option value="640">640</option>
        </select>
    </div>
</div>

<div class="layout">
    <div class="chart-wrap" id="chartWrap">
        <div class="loading" id="loadMsg">Selecione uma liga</div>
        <canvas id="pfCanvas" style="display:none"></canvas>
    </div>
    <div class="stats">
        <div class="stat">
            <div class="stat-label">Max Over</div>
            <div class="stat-value over" id="maxOver">-</div>
        </div>
        <div class="stat">
            <div class="stat-label">Max Under</div>
            <div class="stat-value under" id="maxUnder">-</div>
        </div>
        <div class="stat">
            <div class="stat-label">Reversões</div>
            <div class="stat-value" id="reversions">-</div>
        </div>
        <div class="stat">
            <div class="stat-label">Tendência</div>
            <div class="stat-value" id="trend">-</div>
        </div>
    </div>
</div>

<div id="tooltip"></div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const CELL      = 20;    // px por célula
const AXIS_W    = 36;    // largura do eixo Y (px)
const PAD_TOP   = 10;    // padding topo
const FONT_SZ   = 13;    // tamanho fonte símbolo
const AXIS_FONT = '11px Courier New';
const SYM_FONT  = `bold ${FONT_SZ}px Courier New`;
const COL_W     = CELL;  // largura de cada coluna de símbolos

const C_BG      = '#252a33';
const C_AXIS_BG = '#1e2229';
const C_GRID    = '#2e333d';
const C_BORDER  = '#3a3f4a';
const C_LABEL   = '#6b7280';
const C_X       = '#10b981';
const C_O       = '#ef4444';
const C_TEXT    = '#e8eaed';

// ─── STATE ─────────────────────────────────────────────────────────────────
let columns   = [];   // array de colunas P&F
let minRow    = 0;    // menor índice de linha usado
let maxRow    = 0;    // maior índice de linha usado
let hitMap    = [];   // [{col, row, item}] para hover

let updateTimer = null;

// ─── ELEMENTOS ─────────────────────────────────────────────────────────────
const leagueEl  = document.getElementById('league');
const gamesEl   = document.getElementById('games');
const chartWrap = document.getElementById('chartWrap');
const canvas    = document.getElementById('pfCanvas');
const ctx       = canvas.getContext('2d');
const loadMsg   = document.getElementById('loadMsg');
const tooltipEl = document.getElementById('tooltip');

// ─── LOCALSTORAGE ──────────────────────────────────────────────────────────
const saved_l = localStorage.getItem('pf_league');
const saved_g = localStorage.getItem('pf_games');
if (saved_l) leagueEl.value = saved_l;
if (saved_g) gamesEl.value  = saved_g;

leagueEl.addEventListener('change', () => { localStorage.setItem('pf_league', leagueEl.value); loadData(); });
gamesEl.addEventListener('change',  () => { localStorage.setItem('pf_games',  gamesEl.value);  loadData(); });

// ─── DADOS ─────────────────────────────────────────────────────────────────
async function loadData() {
    loadMsg.style.display = 'block';
    canvas.style.display  = 'none';
    if (updateTimer) clearInterval(updateTimer);

    const league = leagueEl.value;
    const limit  = parseInt(gamesEl.value);

    try {
        const results = await fetchResults(league, limit);
        build(results);
        render();
        updateStats(results);
        updateTimer = setInterval(async () => {
            const r = await fetchResults(league, limit);
            build(r);
            render();
            updateStats(r);
        }, 60000);
    } catch(e) {
        loadMsg.textContent = 'Erro ao carregar';
        console.error(e);
    }
}

async function fetchResults(league, limit) {
    const url = `https://betstat.site/resultados/estrela/${league}`;
    const resp = await fetch(url);
    const html = await resp.text();
    const m = html.match(/window\.__INITIAL_STATE__\s*=\s*({.*?});/s);
    if (m) {
        const data = JSON.parse(m[1]);
        return (data.matches || []).slice(0, limit).map(x => ({
            ft:     (x.ft || '0x0').trim(),
            hora:   parseInt(x.hora)   || 0,
            minuto: parseInt(x.minuto) || 0
        }));
    }
    return generateDemo(limit);
}

function generateDemo(limit) {
    const now = new Date();
    return Array.from({length: limit}, (_, i) => {
        const d = new Date(now - (limit - 1 - i) * 3 * 60000);
        return { ft: Math.random() > 0.45 ? '3x1' : '1x0', hora: d.getHours(), minuto: d.getMinutes() };
    });
}

// ─── BUILD P&F ─────────────────────────────────────────────────────────────
// Cada jogo = 1 símbolo. Mudança de tipo = nova coluna.
// O símbolo novo começa na última posição da coluna anterior (ponto de reversão).
function build(results) {
    columns = [];
    hitMap  = [];

    // Converter cada resultado num tipo e índice de linha "absoluto"
    // Vamos usar um índice acumulativo: cada jogo é +1 (X sobe) ou -1 (O desce)
    // A linha é o índice acumulado, que cria o movimento vertical.

    let cursor = 0;   // posição vertical atual (cresce pra baixo = under, sobe = over)
    let dir    = null; // 'X' ou 'O'
    let col    = null;

    // Para consistência visual, X sobe (row diminui) e O desce (row aumenta)
    results.forEach(r => {
        const goals = (parseInt(r.ft?.split('x')[0]) || 0)
                    + (parseInt(r.ft?.split('x')[1]) || 0);
        const type  = goals > 2.5 ? 'X' : 'O';

        if (type === 'X') cursor--;  // sobe
        else              cursor++;  // desce

        if (!col || col.type !== type) {
            // Nova coluna — começa no cursor atual
            col = { type, startRow: cursor, items: [] };
            columns.push(col);
        }

        col.items.push({ type, row: cursor, result: r });
    });

    // Calcular limites do eixo Y
    minRow = Infinity; maxRow = -Infinity;
    columns.forEach(c => c.items.forEach(it => {
        if (it.row < minRow) minRow = it.row;
        if (it.row > maxRow) maxRow = it.row;
    }));
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function render() {
    if (!columns.length) return;

    const totalRows = maxRow - minRow + 1;
    const totalCols = columns.length;

    const W = AXIS_W + totalCols * COL_W + 10;
    const H = PAD_TOP * 2 + totalRows * CELL;

    canvas.width  = W;
    canvas.height = H;
    canvas.style.display = 'block';
    loadMsg.style.display = 'none';

    // Fundo
    ctx.fillStyle = C_BG;
    ctx.fillRect(0, 0, W, H);

    // ── Grade horizontal ───────────────────────────────────────────
    ctx.strokeStyle = C_GRID;
    ctx.lineWidth   = 0.5;
    for (let r = minRow; r <= maxRow; r++) {
        const y = rowToY(r) + CELL / 2;
        ctx.beginPath();
        ctx.moveTo(AXIS_W, y);
        ctx.lineTo(W, y);
        ctx.stroke();
    }

    // ── Eixo Y (fundo) ─────────────────────────────────────────────
    ctx.fillStyle = C_AXIS_BG;
    ctx.fillRect(0, 0, AXIS_W, H);

    // Linha separadora eixo
    ctx.strokeStyle = C_BORDER;
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(AXIS_W, 0);
    ctx.lineTo(AXIS_W, H);
    ctx.stroke();

    // Labels eixo Y: mostrar a cada 2 linhas para não poluir
    ctx.fillStyle  = C_LABEL;
    ctx.font       = AXIS_FONT;
    ctx.textAlign  = 'right';
    ctx.textBaseline = 'middle';

    for (let r = minRow; r <= maxRow; r++) {
        const y = rowToY(r) + CELL / 2;
        // Marcar apenas múltiplos de 2 ou extremos
        if ((r % 2 === 0) || r === minRow || r === maxRow) {
            ctx.fillText(String(r), AXIS_W - 4, y);
        }
    }

    // ── Símbolos ───────────────────────────────────────────────────
    hitMap = [];
    ctx.font      = SYM_FONT;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    columns.forEach((col, ci) => {
        const x = AXIS_W + ci * COL_W + COL_W / 2;
        ctx.fillStyle = col.type === 'X' ? C_X : C_O;

        col.items.forEach(item => {
            const y = rowToY(item.row) + CELL / 2;
            ctx.fillText(item.type, x, y);

            hitMap.push({ cx: x, cy: y, half: COL_W / 2, item });
        });
    });

    // Scroll para o final (coluna mais recente)
    chartWrap.scrollLeft = chartWrap.scrollWidth;
}

function rowToY(r) {
    return PAD_TOP + (r - minRow) * CELL;
}

// ─── STATS ─────────────────────────────────────────────────────────────────
function updateStats(results) {
    let maxOver = 0, maxUnder = 0, curr = 0, lastType = null, rev = 0;

    results.forEach(r => {
        const goals = (parseInt(r.ft?.split('x')[0]) || 0)
                    + (parseInt(r.ft?.split('x')[1]) || 0);
        const type  = goals > 2.5 ? 'X' : 'O';

        if (lastType !== null && lastType !== type) { rev++; curr = 0; }
        curr++;
        if (type === 'X') maxOver  = Math.max(maxOver,  curr);
        else              maxUnder = Math.max(maxUnder, curr);
        lastType = type;
    });

    document.getElementById('maxOver').textContent   = maxOver;
    document.getElementById('maxUnder').textContent  = maxUnder;
    document.getElementById('reversions').textContent = rev;
    document.getElementById('trend').textContent =
        lastType === 'X' ? '↑ OVER' : '↓ UNDER';
}

// ─── TOOLTIP ───────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx   = e.clientX - rect.left;
    const my   = e.clientY - rect.top;

    let found = null;
    for (const h of hitMap) {
        if (Math.abs(mx - h.cx) <= h.half && Math.abs(my - h.cy) <= CELL / 2) {
            found = h;
            break;
        }
    }

    if (found) {
        const r  = found.item.result;
        const hh = String(r.hora).padStart(2, '0');
        const mm = String(r.minuto).padStart(2, '0');
        tooltipEl.innerHTML = `${hh}:${mm}<br>${r.ft || 'N/A'}`;
        tooltipEl.style.display = 'block';

        const TW = tooltipEl.offsetWidth;
        const TH = tooltipEl.offsetHeight;
        let tx = e.clientX + 12;
        let ty = e.clientY - TH - 8;
        if (tx + TW > window.innerWidth - 6)  tx = e.clientX - TW - 12;
        if (ty < 4)                            ty = e.clientY + 12;
        tooltipEl.style.left = tx + 'px';
        tooltipEl.style.top  = ty + 'px';
    } else {
        tooltipEl.style.display = 'none';
    }
});

canvas.addEventListener('mouseleave', () => { tooltipEl.style.display = 'none'; });

// ─── INIT ───────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
