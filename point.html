<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto & Figura</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #1c1f26;
            --bg2: #252a33;
            --border: #3a3f4a;
            --text: #e8eaed;
            --text-sec: #9ca3af;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            padding: 16px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .control { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 10px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.5px; }
        select {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 12px;
            border-radius: 3px;
            font-size: 12px;
            min-width: 140px;
            cursor: pointer;
            outline: none;
        }
        .chart-wrap {
            flex: 1;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        #pfCanvas { display: block; }
        #loadMsg {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sec);
            font-size: 13px;
        }
        #tooltip {
            position: fixed;
            background: rgba(10,12,16,0.97);
            color: #e8eaed;
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'Segoe UI', sans-serif;
            border: 1px solid #3a3f4a;
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
            display: none;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="control">
        <label>Liga</label>
        <select id="league">
            <option value="Copa%20do%20Mundo">Copa do Mundo</option>
            <option value="Ligas%20dos%20Campe%C3%B5es">Ligas dos Campeões</option>
            <option value="Am%C3%A9rica%20Latina">América Latina</option>
        </select>
    </div>
    <div class="control">
        <label>Jogos</label>
        <select id="games">
            <option value="20">20</option>
            <option value="40">40</option>
            <option value="80">80</option>
            <option value="160">160</option>
            <option value="320">320</option>
            <option value="640">640</option>
        </select>
    </div>
</div>

<div class="chart-wrap" id="chartWrap">
    <div id="loadMsg">Selecione uma liga</div>
    <canvas id="pfCanvas"></canvas>
</div>
<div id="tooltip"></div>

<script>
/*
  LÓGICA P&F CORRETA:
  ─────────────────────────────────────────────────────────────────────
  - Eixo Y FIXO: representa o índice do jogo na sequência (1, 2, 3...N)
    porém exibido de 5 em 5 (5, 10, 15... 100).
    O topo do gráfico = jogo mais antigo (índice 1).
    A base = jogo mais recente (índice N).

  - Eixo X (horizontal): colunas de símbolos. Cada coluna é uma sequência
    consecutiva do mesmo tipo (X ou O).

  - Cada jogo ocupa EXATAMENTE sua linha no eixo Y.
    Se o jogo 7 é Over → X na linha 7 da coluna atual.
    Se o jogo 8 muda para Under → nova coluna, O na linha 8.

  - O gráfico é determinístico: mesmos dados = mesmo gráfico sempre.
  ─────────────────────────────────────────────────────────────────────
*/

const C_BG        = '#252a33';
const C_AXIS_BG   = '#1c1f26';
const C_GRID_5    = '#3a4050';   // linha a cada 5
const C_GRID_1    = '#2a2f3a';   // linha a cada 1 (sutil)
const C_BORDER    = '#4a5060';
const C_LABEL     = '#8a95a8';
const C_X         = '#10b981';
const C_O         = '#ef4444';

let columns    = [];   // [{type, items:[{row, result}]}]
let totalGames = 0;
let hitMap     = [];
let updateTimer = null;

const leagueEl  = document.getElementById('league');
const gamesEl   = document.getElementById('games');
const chartWrap = document.getElementById('chartWrap');
const canvas    = document.getElementById('pfCanvas');
const ctx       = canvas.getContext('2d');
const loadMsg   = document.getElementById('loadMsg');
const tooltipEl = document.getElementById('tooltip');

// ── LocalStorage ─────────────────────────────────────────────────────────────
const sl = localStorage.getItem('pf_league');
const sg = localStorage.getItem('pf_games');
if (sl) leagueEl.value = sl;
if (sg) gamesEl.value  = sg;

leagueEl.addEventListener('change', () => { localStorage.setItem('pf_league', leagueEl.value); loadData(); });
gamesEl.addEventListener('change',  () => { localStorage.setItem('pf_games',  gamesEl.value);  loadData(); });

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function loadData() {
    loadMsg.style.display   = 'flex';
    canvas.style.visibility = 'hidden';
    if (updateTimer) clearInterval(updateTimer);

    const league = leagueEl.value;
    const limit  = parseInt(gamesEl.value);

    try {
        const results = await fetchResults(league, limit);
        build(results);
        render();
        updateTimer = setInterval(async () => {
            const r = await fetchResults(league, limit).catch(() => null);
            if (r) { build(r); render(); }
        }, 60000);
    } catch(e) {
        loadMsg.textContent = 'Erro ao carregar';
        console.error(e);
    }
}

async function fetchResults(league, limit) {
    const resp = await fetch(`https://betstat.site/resultados/estrela/${league}`);
    const html = await resp.text();
    const m    = html.match(/window\.__INITIAL_STATE__\s*=\s*({.*?});/s);
    if (m) {
        const data = JSON.parse(m[1]);
        return (data.matches || []).slice(0, limit).map(x => ({
            ft:     (x.ft || '0x0').trim(),
            hora:   parseInt(x.hora)   || 0,
            minuto: parseInt(x.minuto) || 0
        }));
    }
    return generateDemo(limit);
}

function generateDemo(limit) {
    // Demo determinístico baseado em seed fixa — não muda ao recarregar
    function seededRand(seed) {
        let s = seed;
        return function() {
            s = (s * 1664525 + 1013904223) & 0xffffffff;
            return (s >>> 0) / 0xffffffff;
        };
    }
    const rand = seededRand(42);
    const now  = new Date('2024-01-01T08:00:00');
    return Array.from({length: limit}, (_, i) => {
        const d = new Date(now.getTime() + i * 3 * 60000);
        return {
            ft:     rand() > 0.45 ? '3x1' : '1x0',
            hora:   d.getHours(),
            minuto: d.getMinutes()
        };
    });
}

// ── Build P&F ─────────────────────────────────────────────────────────────────
// row = índice do jogo na lista (1-based), fixo e determinístico
function build(results) {
    columns    = [];
    totalGames = results.length;
    hitMap     = [];

    let col = null;

    results.forEach((r, i) => {
        const gameIndex = i + 1; // 1-based, fixo
        const goals = (parseInt(r.ft?.split('x')[0]) || 0)
                    + (parseInt(r.ft?.split('x')[1]) || 0);
        const type  = goals > 2.5 ? 'X' : 'O';

        if (!col || col.type !== type) {
            col = { type, items: [] };
            columns.push(col);
        }
        col.items.push({ row: gameIndex, result: r });
    });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
    if (!columns.length) return;

    const wrapW = chartWrap.clientWidth;
    const wrapH = chartWrap.clientHeight;

    // Dimensões fixas de layout
    const AXIS_W  = 42;   // largura do eixo Y
    const PAD_T   = 8;
    const PAD_B   = 8;
    const PAD_R   = 8;

    // Eixo Y vai de 1 até totalGames
    const numRows  = totalGames;
    const numCols  = columns.length;

    // Tamanho da célula para caber exatamente no container
    const cellH = (wrapH - PAD_T - PAD_B) / numRows;
    const cellW = (wrapW - AXIS_W - PAD_R) / numCols;
    const cell  = Math.max(3, Math.min(cellH, cellW));

    // Canvas = tamanho exato do container (sem overflow)
    canvas.width  = wrapW;
    canvas.height = wrapH;
    canvas.style.visibility = 'visible';
    loadMsg.style.display   = 'none';

    // Centrar o bloco de conteúdo verticalmente
    const totalContentH = numRows * cell;
    const totalContentW = numCols * cell;
    const offsetY = PAD_T + Math.max(0, (wrapH - PAD_T - PAD_B - totalContentH) / 2);
    const offsetX = AXIS_W;

    function rowToY(row) {
        // row 1 = topo (mais antigo), row N = base (mais recente)
        return offsetY + (row - 1) * cell;
    }

    // ── Fundo ──────────────────────────────────────────────────────────────
    ctx.fillStyle = C_BG;
    ctx.fillRect(0, 0, wrapW, wrapH);

    // ── Linhas horizontais de grade ────────────────────────────────────────
    // Mostrar linha para cada jogo, mais destacada a cada 5
    const fontSize = Math.max(8, Math.min(11, cell - 1));

    for (let row = 1; row <= numRows; row++) {
        const y     = rowToY(row) + cell / 2;
        const is5   = row % 5 === 0;
        const isEnd = row === 1 || row === numRows;

        if (is5 || isEnd) {
            ctx.strokeStyle = C_GRID_5;
            ctx.lineWidth   = 0.8;
            ctx.setLineDash([]);
        } else {
            ctx.strokeStyle = C_GRID_1;
            ctx.lineWidth   = 0.3;
            ctx.setLineDash([1, 5]);
        }
        ctx.beginPath();
        ctx.moveTo(AXIS_W, y);
        ctx.lineTo(wrapW, y);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // ── Eixo Y ─────────────────────────────────────────────────────────────
    ctx.fillStyle = C_AXIS_BG;
    ctx.fillRect(0, 0, AXIS_W, wrapH);

    // Borda do eixo
    ctx.strokeStyle = C_BORDER;
    ctx.lineWidth   = 1;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(AXIS_W, 0);
    ctx.lineTo(AXIS_W, wrapH);
    ctx.stroke();

    // Labels: só a cada 5
    ctx.fillStyle    = C_LABEL;
    ctx.font         = `${fontSize}px Courier New`;
    ctx.textAlign    = 'right';
    ctx.textBaseline = 'middle';

    for (let row = 5; row <= numRows; row += 5) {
        const y = rowToY(row) + cell / 2;
        // Tick mark
        ctx.fillStyle = C_BORDER;
        ctx.fillRect(AXIS_W - 5, y - 0.5, 5, 1);
        // Label
        ctx.fillStyle = C_LABEL;
        ctx.fillText(String(row), AXIS_W - 7, y);
    }
    // Label do primeiro
    {
        const y = rowToY(1) + cell / 2;
        ctx.fillStyle = C_BORDER;
        ctx.fillRect(AXIS_W - 5, y - 0.5, 5, 1);
        ctx.fillStyle = C_LABEL;
        ctx.fillText('1', AXIS_W - 7, y);
    }

    // ── Símbolos ───────────────────────────────────────────────────────────
    const symSize = Math.max(6, cell - 2);
    ctx.font      = `bold ${symSize}px Courier New`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    columns.forEach((col, ci) => {
        const cx = offsetX + ci * cell + cell / 2;
        ctx.fillStyle = col.type === 'X' ? C_X : C_O;

        col.items.forEach(item => {
            const cy = rowToY(item.row) + cell / 2;
            ctx.fillText(item.type, cx, cy);
            hitMap.push({ cx, cy, hr: cell / 2, item });
        });
    });
}

// ── Resize ────────────────────────────────────────────────────────────────────
let resizeTimer = null;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { if (columns.length) render(); }, 120);
});

// ── Tooltip ───────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    let found = null;
    for (const h of hitMap) {
        if (Math.abs(mx - h.cx) <= h.hr && Math.abs(my - h.cy) <= h.hr) { found = h; break; }
    }

    if (found) {
        const r  = found.item.result;
        const hh = String(r.hora).padStart(2,'0');
        const mm = String(r.minuto).padStart(2,'0');
        tooltipEl.innerHTML = `${hh}:${mm}<br>${r.ft || 'N/A'}`;
        tooltipEl.style.display = 'block';

        const TW = tooltipEl.offsetWidth, TH = tooltipEl.offsetHeight;
        let tx = e.clientX + 14, ty = e.clientY - TH - 8;
        if (tx + TW > window.innerWidth - 6) tx = e.clientX - TW - 14;
        if (ty < 4) ty = e.clientY + 12;
        tooltipEl.style.left = tx + 'px';
        tooltipEl.style.top  = ty + 'px';
    } else {
        tooltipEl.style.display = 'none';
    }
});
canvas.addEventListener('mouseleave', () => { tooltipEl.style.display = 'none'; });

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
