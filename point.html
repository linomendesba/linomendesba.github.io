<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ponto & Figura — Futebol Virtual</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#111318;
  --bg2:#181c23;
  --border:#2a3040;
  --border2:#38445a;
  --text:#dce3ef;
  --muted:#6b7894;
  --muted2:#4a5468;
  --X:#00e5a0;
  --O:#ff4a6e;
  --accent:#3b82f6;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'Courier New',monospace;
  display:flex;flex-direction:column;
  padding:10px 12px 8px;gap:8px;
}

/* HEADER */
.header{display:flex;gap:10px;align-items:flex-end;flex-shrink:0;flex-wrap:wrap;}
.ctrl{display:flex;flex-direction:column;gap:3px}
.ctrl label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
select{
  background:var(--bg2);border:1px solid var(--border);color:var(--text);
  padding:5px 8px;border-radius:3px;font-size:11px;cursor:pointer;
  outline:none;font-family:'Courier New',monospace;transition:border-color .2s;min-width:0;
}
select:hover,select:focus{border-color:var(--border2)}

/* BADGE */
.badge{
  padding:5px 12px;border-radius:3px;font-size:10px;font-weight:bold;
  margin-left:auto;align-self:center;letter-spacing:.5px;
  font-family:'Courier New',monospace;transition:all .3s;white-space:nowrap;
}
.b-up{background:rgba(0,229,160,.12);color:var(--X);border:1px solid rgba(0,229,160,.25)}
.b-dn{background:rgba(255,74,110,.12);color:var(--O);border:1px solid rgba(255,74,110,.25)}
.b-neu{background:var(--bg2);color:var(--muted);border:1px solid var(--border)}

/* STATS */
.stats{display:flex;gap:0;flex-shrink:0;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.stat{flex:1;padding:5px 10px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:1px;}
.stat:last-child{border-right:none}
.stat-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.stat-val{font-size:13px;font-weight:bold;color:var(--text)}
.stat-val.up{color:var(--X)}
.stat-val.dn{color:var(--O)}
.stat-val.acc{color:var(--accent)}

/* CHART */
.chart-wrap{
  flex:1;min-height:0;position:relative;
  background:var(--bg2);border:1px solid var(--border);border-radius:3px;
  overflow-x:auto;overflow-y:hidden;
}
.chart-wrap::-webkit-scrollbar{height:4px}
.chart-wrap::-webkit-scrollbar-track{background:var(--bg)}
.chart-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
canvas{display:block;height:100%}
#loadMsg{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  color:var(--muted);font-size:12px;pointer-events:none;
}
.spinner{
  width:20px;height:20px;border:2px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* LEGENDA */
.legend{display:flex;gap:16px;flex-shrink:0;align-items:center;font-size:10px;color:var(--muted);}
.leg{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:2px}
.dot-x{background:var(--X)}
.dot-o{background:var(--O)}
.leg-note{margin-left:auto;font-size:9px;color:var(--muted2)}

/* TOOLTIP */
#ttip{
  position:fixed;background:rgba(10,12,18,.97);color:var(--text);
  padding:7px 12px;border-radius:3px;font-size:11px;
  font-family:'Courier New',monospace;border:1px solid var(--border2);
  pointer-events:none;z-index:9999;white-space:nowrap;display:none;
  line-height:2;box-shadow:0 4px 20px rgba(0,0,0,.5);
}
</style>
</head>
<body>

<div class="header">
  <div class="ctrl">
    <label>Liga</label>
    <select id="selLeague">
      <option value="Copa%20do%20Mundo">Copa do Mundo</option>
      <option value="Ligas%20dos%20Campe%C3%B5es">Liga dos Campeões</option>
      <option value="Am%C3%A9rica%20Latina">América Latina</option>
    </select>
  </div>
  <div class="ctrl">
    <label>Jogos</label>
    <select id="selGames">
      <option value="40">40</option>
      <option value="80" selected>80</option>
      <option value="160">160</option>
      <option value="320">320</option>
      <option value="640">640</option>
    </select>
  </div>
  <div class="ctrl">
    <label>Reversão (gols)</label>
    <select id="selRev">
      <option value="1">1 gol</option>
      <option value="2">2 gols</option>
      <option value="3" selected>3 gols</option>
      <option value="4">4 gols</option>
    </select>
  </div>
  <div class="badge b-neu" id="badge">TENDÊNCIA: NEUTRO</div>
</div>

<div class="stats">
  <div class="stat"><span class="stat-lbl">Jogos</span><span class="stat-val acc" id="sJogos">—</span></div>
  <div class="stat"><span class="stat-lbl">Média Gols</span><span class="stat-val" id="sMedia">—</span></div>
  <div class="stat"><span class="stat-lbl">Jogos 0 gols</span><span class="stat-val dn" id="s0">—</span></div>
  <div class="stat"><span class="stat-lbl">Jogos 1-2 gols</span><span class="stat-val" id="s12">—</span></div>
  <div class="stat"><span class="stat-lbl">Jogos 3-4 gols</span><span class="stat-val up" id="s34">—</span></div>
  <div class="stat"><span class="stat-lbl">Jogos 5+ gols</span><span class="stat-val up" id="s5">—</span></div>
  <div class="stat"><span class="stat-lbl">Colunas</span><span class="stat-val acc" id="sCols">—</span></div>
  <div class="stat"><span class="stat-lbl">Última Col.</span><span class="stat-val" id="sUltCol">—</span></div>
</div>

<div class="chart-wrap" id="chartWrap">
  <div id="loadMsg"><div class="spinner"></div><span>Carregando...</span></div>
  <canvas id="pf"></canvas>
</div>

<div class="legend">
  <div class="leg"><div class="dot dot-x"></div><span>X = gols aumentam</span></div>
  <div class="leg"><div class="dot dot-o"></div><span>O = gols diminuem</span></div>
  <div class="leg-note" id="sBreak"></div>
</div>

<div id="ttip"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   PONTO & FIGURA — Futebol Virtual
   
   Eixo Y: FIXO de 0 a 8 gols (BOX = 1 gol por caixa sempre)
   Reversão: em gols (REV gols para inverter coluna)
   
   Regras P&F clássicas com BOX=1:
   • Coluna X: sobe se gols >= topo + 1
   • Coluna X → O: reverte se gols <= topo - REV  (nova coluna O a partir de topo-1)
   • Coluna O: desce se gols <= fundo - 1
   • Coluna O → X: reverte se gols >= fundo + REV (nova coluna X a partir de fundo+1)
   • Pulos preenchem todos os níveis intermediários
   • Dados mais recentes à DIREITA
═══════════════════════════════════════════════════════════════ */

const Y_MIN = 0;
const Y_MAX = 8;  /* eixo fixo 0-8 gols */
const BOX   = 1;  /* sempre 1 gol por caixa */
const LEVELS = Y_MAX - Y_MIN + 1; /* 9 níveis */

let columns=[], hitMap=[], timer=null;

const LS={
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

const $=id=>document.getElementById(id);
const wrap=$('chartWrap'), canvas=$('pf'), ctx=canvas.getContext('2d');
const loadMsg=$('loadMsg'), ttip=$('ttip'), badge=$('badge');
const selLeague=$('selLeague'), selGames=$('selGames'), selRev=$('selRev');

['selLeague','selGames','selRev'].forEach(id=>{
  $(id).value=LS.get('pf_'+id, $(id).value);
  $(id).addEventListener('change',()=>{LS.set('pf_'+id,$(id).value);load();});
});

/* ── Fetch ─────────────────────────────────────────────────── */
async function fetchData(league, limit){
  const resp=await fetch(`https://betstat.site/resultados/estrela/${league}`);
  if(!resp.ok) throw new Error(resp.status);
  const ct=resp.headers.get('content-type')||'';
  let arr;
  if(ct.includes('application/json')){
    const json=await resp.json();
    arr=Array.isArray(json)?json:(json.matches||json.data||[]);
  } else {
    const html=await resp.text();
    const m=html.match(/window\.__INITIAL_STATE__\s*=\s*({.*?});/s);
    if(!m) throw new Error('formato inesperado');
    arr=JSON.parse(m[1]).matches||[];
  }
  return arr.slice(0,limit).reverse().map((m,i)=>({
    ft:(m.ft||'0x0').trim(),
    hora:+m.hora||0,
    minuto:+m.minuto||0,
    jogo:i+1
  }));
}

/* ── Total de Gols (clampado em Y_MAX) ─────────────────────── */
function totalGoals(r){
  const p=(r.ft||'0x0').split('x');
  const g=(+p[0]||0)+(+p[1]||0);
  return Math.min(g, Y_MAX); /* clamp: 8+ gols vai para 8 */
}

/* ── Build P&F ─────────────────────────────────────────────── */
function build(results, REV){
  columns=[]; hitMap=[];
  if(!results.length) return;

  const g0=totalGoals(results[0]);
  let price=g0;
  let colType=null, col=null;

  function newCol(type, startPrice){
    col={type, items:[], topPrice:startPrice, botPrice:startPrice};
    columns.push(col);
    colType=type;
  }
  function addSym(p, result){
    /* clamp no eixo fixo */
    const pc=Math.max(Y_MIN, Math.min(Y_MAX, p));
    col.items.push({price:pc, result});
    if(pc>col.topPrice) col.topPrice=pc;
    if(pc<col.botPrice) col.botPrice=pc;
  }

  /* primeiro jogo: inicia coluna X se gols > 0, senão O */
  newCol(g0>0?'X':'O', g0);
  addSym(g0, results[0]);

  for(let i=1;i<results.length;i++){
    const r=results[i];
    const g=totalGoals(r);

    if(colType==='X'){
      if(g >= price+BOX){
        /* sobe: preenche até g */
        for(let p=price+BOX; p<=g; p+=BOX) addSym(p,r);
        price=g;
      } else if(g <= price-REV){
        /* reversão X→O */
        newCol('O', price-BOX);
        for(let p=price-BOX; p>=g; p-=BOX) addSym(p,r);
        price=g;
      }
      /* dentro da faixa: sem marcação */
    } else {
      if(g <= price-BOX){
        /* desce: preenche até g */
        for(let p=price-BOX; p>=g; p-=BOX) addSym(p,r);
        price=g;
      } else if(g >= price+REV){
        /* reversão O→X */
        newCol('X', price+BOX);
        for(let p=price+BOX; p<=g; p+=BOX) addSym(p,r);
        price=g;
      }
    }
  }
}

/* ── Badge de Tendência ────────────────────────────────────── */
function updateBadge(){
  if(!columns.length){badge.className='badge b-neu';badge.textContent='TENDÊNCIA: NEUTRO';return;}
  const last=columns[columns.length-1];
  const prev=columns.length>1?columns[columns.length-2]:null;
  let txt='NEUTRO',cls='b-neu';
  if(last.type==='X'){
    if(prev&&prev.type==='X'&&last.topPrice>prev.topPrice){txt='ALTA FORTE ▲▲';cls='b-up';}
    else{txt='ALTA ▲';cls='b-up';}
  } else {
    if(prev&&prev.type==='O'&&last.botPrice<prev.botPrice){txt='BAIXA FORTE ▼▼';cls='b-dn';}
    else{txt='BAIXA ▼';cls='b-dn';}
  }
  badge.className=`badge ${cls}`;badge.textContent=`TENDÊNCIA: ${txt}`;
}

/* ── Estatísticas ──────────────────────────────────────────── */
function updateStats(data){
  const total=data.length;
  const avg=total?(data.reduce((s,r)=>s+totalGoals(r),0)/total).toFixed(2):0;
  const g0=data.filter(r=>totalGoals(r)===0).length;
  const g12=data.filter(r=>{const g=totalGoals(r);return g>=1&&g<=2;}).length;
  const g34=data.filter(r=>{const g=totalGoals(r);return g>=3&&g<=4;}).length;
  const g5=data.filter(r=>totalGoals(r)>=5).length;
  const last=columns.length?columns[columns.length-1]:null;
  const pct=n=>total?` (${Math.round(n/total*100)}%)`:'';

  $('sJogos').textContent=total;
  $('sMedia').textContent=avg;
  $('s0').textContent=g0+pct(g0);
  $('s12').textContent=g12+pct(g12);
  $('s34').textContent=g34+pct(g34);
  $('s5').textContent=g5+pct(g5);
  $('sCols').textContent=columns.length;
  $('sUltCol').textContent=last?`${last.type} (${last.items.length})`:'—';

  /* último breakout/breakdown */
  const breaks=[];
  for(let i=1;i<columns.length;i++){
    const c=columns[i],p=columns[i-1];
    if(c.type==='X'&&c.topPrice>p.topPrice) breaks.push('▲ breakout col.'+(i+1));
    if(c.type==='O'&&c.botPrice<p.botPrice) breaks.push('▼ breakdown col.'+(i+1));
  }
  $('sBreak').textContent=breaks.length?breaks[breaks.length-1]:'';
}

/* ── Cores do eixo Y por faixa de gols ─────────────────────── */
function goalColor(v){
  if(v===0) return '#c04a4a';      /* 0 gols — baixíssimo */
  if(v<=2)  return '#bf7a7a';      /* 1-2 gols — baixo   */
  if(v<=4)  return '#7abf9a';      /* 3-4 gols — médio   */
  return '#4caf7d';                /* 5-8 gols — alto    */
}

/* ── Draw ──────────────────────────────────────────────────── */
const C={
  bg:'#181c23', axBg:'#111318',
  gridMain:'#252b3b', gridSub:'#1e2330',
  axBorder:'#2a3040', label:'#4a5468',
  X:'#00e5a0', O:'#ff4a6e', zero:'#1a2a4a'
};

function draw(){
  if(!columns.length) return;
  const H=wrap.clientHeight;
  const AXIS_W=44, PAD_T=8, PAD_B=20, PAD_R=8;
  const availH=H-PAD_T-PAD_B;

  /* cellH: divide a altura pelos 9 níveis fixos (0-8) */
  const cellH=Math.max(6, Math.min(56, availH/LEVELS));

  /* cellW: mínimo 12px, máximo 28px; scroll se não cabe */
  const wrapW=wrap.clientWidth;
  const naturalCellW=(wrapW-AXIS_W-PAD_R)/Math.max(1,columns.length);
  const cellW=Math.max(12, Math.min(28, naturalCellW));

  const totalW=AXIS_W+PAD_R+columns.length*cellW;
  const W=Math.max(wrapW, totalW);
  canvas.width=W; canvas.height=H;

  /* posição vertical: Y_MAX no topo, Y_MIN na base */
  const oY=PAD_T;
  const oX=AXIS_W;
  const posToY=v=> oY + (Y_MAX-v)*cellH;  /* v=8 → topo, v=0 → base */

  /* Fundo */
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H);

  /* Faixas de cor de fundo por zona de gols */
  const zones=[
    {from:0,to:0,  color:'rgba(192,74,74,0.07)'},
    {from:1,to:2,  color:'rgba(191,122,122,0.05)'},
    {from:3,to:4,  color:'rgba(122,191,154,0.05)'},
    {from:5,to:8,  color:'rgba(76,175,125,0.07)'},
  ];
  zones.forEach(z=>{
    const y1=posToY(z.to);          /* topo da faixa (valor maior = mais alto) */
    const y2=posToY(z.from)+cellH;  /* base da faixa */
    ctx.fillStyle=z.color;
    ctx.fillRect(AXIS_W, y1, W-AXIS_W, y2-y1);
  });

  /* Grade horizontal — uma linha por gol */
  for(let v=Y_MIN; v<=Y_MAX; v++){
    const y=posToY(v)+cellH/2;
    ctx.beginPath(); ctx.moveTo(AXIS_W,y); ctx.lineTo(W,y);
    ctx.strokeStyle= v%2===0 ? C.gridMain : C.gridSub;
    ctx.lineWidth=0.5; ctx.stroke();
  }
  /* linha de base (0 gols) mais destacada */
  const yBase=posToY(0)+cellH;
  ctx.beginPath(); ctx.moveTo(AXIS_W,yBase); ctx.lineTo(W,yBase);
  ctx.strokeStyle='#2a3a5e'; ctx.lineWidth=1; ctx.stroke();

  /* Grade vertical a cada 5 colunas */
  for(let ci=0;ci<columns.length;ci+=5){
    const x=oX+ci*cellW;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H);
    ctx.strokeStyle='rgba(255,255,255,0.025)'; ctx.lineWidth=0.5; ctx.stroke();
  }

  /* Símbolos P&F */
  hitMap=[];
  const symSz=Math.max(6, Math.min(cellH*0.76, 18));
  ctx.font=`bold ${symSz}px 'Courier New',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';

  columns.forEach((col,ci)=>{
    const cx=oX+ci*cellW+cellW/2;

    /* Highlight coluna atual */
    if(ci===columns.length-1){
      ctx.fillStyle=col.type==='X'?'rgba(0,229,160,0.08)':'rgba(255,74,110,0.08)';
      ctx.fillRect(oX+ci*cellW, oY, cellW, LEVELS*cellH);
    }

    ctx.fillStyle=col.type==='X'?C.X:C.O;
    col.items.forEach(item=>{
      const cy=posToY(item.price)+cellH/2;
      ctx.fillText(col.type, cx, cy);
      hitMap.push({cx,cy,hrX:cellW/2+1,hrY:cellH/2+1,colIdx:ci+1,item,colType:col.type});
    });

    /* Marcador breakout/breakdown */
    if(ci>0&&cellH>=10){
      const prev=columns[ci-1];
      if(col.type==='X'&&col.topPrice>prev.topPrice){
        const by=posToY(col.topPrice)+cellH/2;
        ctx.save(); ctx.fillStyle='#00e5a0';
        ctx.font=`${Math.max(7,cellH*0.5)}px sans-serif`;
        ctx.fillText('▲',cx,by-cellH*0.92); ctx.restore();
      }
      if(col.type==='O'&&col.botPrice<prev.botPrice){
        const by=posToY(col.botPrice)+cellH/2;
        ctx.save(); ctx.fillStyle='#ff4a6e';
        ctx.font=`${Math.max(7,cellH*0.5)}px sans-serif`;
        ctx.fillText('▼',cx,by+cellH*0.92); ctx.restore();
      }
    }
  });

  /* Número da coluna no rodapé (a cada 5) */
  if(cellW>=10){
    ctx.font=`7px 'Courier New',monospace`; ctx.textAlign='center';
    ctx.fillStyle=C.label;
    for(let ci=0;ci<columns.length;ci+=5){
      const cx=oX+ci*cellW+cellW/2;
      ctx.fillText(ci+1, cx, oY+LEVELS*cellH+10);
    }
  }

  /* Eixo Y fixo — desenhado POR ÚLTIMO para ficar sobre tudo */
  ctx.fillStyle=C.axBg; ctx.fillRect(0,0,AXIS_W,H);
  ctx.strokeStyle=C.axBorder; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(AXIS_W,0); ctx.lineTo(AXIS_W,H); ctx.stroke();

  const fs=Math.max(8,Math.min(11,cellH));
  ctx.font=`${fs}px 'Courier New',monospace`;
  ctx.textAlign='right'; ctx.textBaseline='middle';

  for(let v=Y_MIN; v<=Y_MAX; v++){
    const y=posToY(v)+cellH/2;
    ctx.fillStyle=C.axBorder; ctx.fillRect(AXIS_W-5,y-0.5,5,1);
    ctx.fillStyle=goalColor(v);
    ctx.fillText(v===Y_MAX?'8+':v+'g', AXIS_W-7, y);
  }
}

/* ── Load ──────────────────────────────────────────────────── */
async function load(){
  loadMsg.style.display='flex'; canvas.style.visibility='hidden';
  loadMsg.innerHTML='<div class="spinner"></div><span>Carregando...</span>';
  if(timer) clearInterval(timer);
  const league=selLeague.value, limit=+selGames.value, REV=+selRev.value;
  try{
    const data=await fetchData(league,limit);
    build(data,REV); draw(); updateBadge(); updateStats(data);
    loadMsg.style.display='none'; canvas.style.visibility='visible';
    timer=setInterval(async()=>{
      try{
        const d=await fetchData(league,limit);
        build(d,REV); draw(); updateBadge(); updateStats(d);
      }catch{}
    },60000);
  } catch(e){
    loadMsg.innerHTML='<span style="color:#6b7894;font-size:11px">Erro ao conectar com a API</span>';
    console.error(e);
  }
}

/* ── Resize ────────────────────────────────────────────────── */
let rsz=null;
window.addEventListener('resize',()=>{
  clearTimeout(rsz); rsz=setTimeout(()=>{if(columns.length) draw();},80);
});

/* ── Tooltip ───────────────────────────────────────────────── */
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  let found=null;
  for(const h of hitMap){
    if(Math.abs(mx-h.cx)<=h.hrX&&Math.abs(my-h.cy)<=h.hrY){found=h;break;}
  }
  if(found){
    const res=found.item.result;
    const g=totalGoals(res);
    const hh=String(res.hora).padStart(2,'0'), mm=String(res.minuto).padStart(2,'0');
    const placar=`<b style="color:#dce3ef">${res.ft||'?'}</b>`;
    const gColor=found.colType==='X'?'#00e5a0':'#ff4a6e';
    ttip.innerHTML=
      `${hh}:${mm} &nbsp;|&nbsp; ${placar} &nbsp;→&nbsp; <b style="color:${gColor}">${g} gol${g!==1?'s':''}</b><br>`+
      `Nível: <b>${found.item.price}g</b> &nbsp;|&nbsp; Coluna <b>${found.colIdx}</b> (${found.colType})`;
    ttip.style.display='block';
    const TW=ttip.offsetWidth, TH=ttip.offsetHeight;
    let tx=e.clientX+14, ty=e.clientY-TH-8;
    if(tx+TW>window.innerWidth-6) tx=e.clientX-TW-14;
    if(ty<4) ty=e.clientY+12;
    ttip.style.left=tx+'px'; ttip.style.top=ty+'px';
  } else {
    ttip.style.display='none';
  }
});
canvas.addEventListener('mouseleave',()=>{ttip.style.display='none';});

load();
</script>
</body>
