<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candlestick de Gols</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg:#1c1f26; --bg2:#252a33; --border:#3a3f4a; --text:#e8eaed; --muted:#9ca3af; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Courier New', monospace;
            padding: 14px; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
        select {
            background:var(--bg2); border:1px solid var(--border); color:var(--text);
            padding:6px 10px; border-radius:3px; font-size:12px; min-width:150px; cursor:pointer; outline:none;
        }
        .metric {
            background:var(--bg2); border-radius:4px; padding:10px 14px;
        }
        .metric-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
        .metric-value { font-size:22px; font-weight:500; color:var(--text); }
        #statBadge {
            padding:5px 12px; border-radius:3px; font-size:12px; font-weight:500;
            background:var(--bg2); color:var(--muted); border:1px solid var(--border);
            align-self:center; margin-left:auto;
        }
        #tooltip {
            position:fixed; background:rgba(8,10,14,.97); color:#e8eaed;
            padding:8px 12px; border-radius:3px; font-size:12px;
            border:1px solid #3a3f4a; pointer-events:none; display:none;
            z-index:9999; white-space:nowrap; line-height:1.8;
        }
        .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
        .legend-box { width:10px; height:10px; border-radius:2px; }
        .legend-line { width:10px; height:2px; display:inline-block; }
    </style>
</head>
<body>

<div style="display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; align-items:flex-end;">
    <div style="display:flex; flex-direction:column; gap:4px;">
        <label>Liga</label>
        <select id="selLeague">
            <option value="Copa%20do%20Mundo">Copa do Mundo</option>
            <option value="Ligas%20dos%20Campe%C3%B5es" selected>Ligas dos Campeões</option>
            <option value="Am%C3%A9rica%20Latina">América Latina</option>
        </select>
    </div>
    <div style="display:flex; flex-direction:column; gap:4px;">
        <label>Jogos totais</label>
        <select id="selGames">
            <option value="80">80</option>
            <option value="160">160</option>
            <option value="320" selected>320</option>
            <option value="640">640</option>
        </select>
    </div>
    <div style="display:flex; flex-direction:column; gap:4px;">
        <label>Jogos por vela</label>
        <select id="selBlock">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="40">40</option>
        </select>
    </div>
    <div id="statBadge">—</div>
</div>

<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;">
    <div class="metric">
        <div class="metric-label">Média de gols</div>
        <div class="metric-value" id="mAvg">—</div>
    </div>
    <div class="metric">
        <div class="metric-label">% over 2.5</div>
        <div class="metric-value" id="mOver">—</div>
    </div>
    <div class="metric">
        <div class="metric-label">Velas analisadas</div>
        <div class="metric-value" id="mCandles">—</div>
    </div>
</div>

<div style="background:var(--bg2); border:1px solid var(--border); border-radius:4px; padding:12px; flex:1;">
    <div style="position:relative; width:100%; height:340px;">
        <canvas id="pfChart"></canvas>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:16px; margin-top:12px;">
        <div class="legend-item"><span class="legend-box" style="background:#1d9e75;"></span>Alta (fecha ≥ abre)</div>
        <div class="legend-item"><span class="legend-box" style="background:#d85a30;"></span>Baixa (fecha &lt; abre)</div>
        <div class="legend-item"><span class="legend-line" style="background:#378add;"></span>Média de gols</div>
        <div class="legend-item"><span class="legend-line" style="background:#ba7517;"></span>Linha over 2.5</div>
    </div>
</div>

<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const selLeague = document.getElementById('selLeague');
const selGames  = document.getElementById('selGames');
const selBlock  = document.getElementById('selBlock');
const statBadge = document.getElementById('statBadge');
const mAvg      = document.getElementById('mAvg');
const mOver     = document.getElementById('mOver');
const mCandles  = document.getElementById('mCandles');
const tip       = document.getElementById('tooltip');

const GREEN   = '#1d9e75';
const RED     = '#d85a30';
const GREEN_A = 'rgba(29,158,117,0.15)';
const RED_A   = 'rgba(216,90,48,0.15)';

let chartInst  = null;
let rawCandles = [];

selLeague.addEventListener('change', load);
selGames.addEventListener('change',  load);
selBlock.addEventListener('change',  () => { if (rawCandles.length) renderChart(); });

async function load() {
    statBadge.textContent = 'Carregando...';
    const league = selLeague.value;
    const limit  = parseInt(selGames.value);
    try {
        const resp = await fetch(`https://betstat.site/resultados/estrela/${league}`);
        if (!resp.ok) throw new Error(resp.status);
        const ct = resp.headers.get('content-type') || '';
        let arr;
        if (ct.includes('application/json')) {
            const json = await resp.json();
            arr = Array.isArray(json) ? json : (json.matches || json.data || []);
        } else {
            const html = await resp.text();
            const m = html.match(/window\.__INITIAL_STATE__\s*=\s*({.*?});/s);
            if (!m) throw new Error('formato inesperado');
            arr = JSON.parse(m[1]).matches || [];
        }
        const results = arr.slice(0, limit).reverse().map(r => ({
            ft:     (r.ft || '0x0').trim(),
            hora:   parseInt(r.hora)   || 0,
            minuto: parseInt(r.minuto) || 0,
        }));
        buildCandles(results);
        renderChart();
    } catch(e) {
        statBadge.textContent = 'Erro ao carregar';
        console.error(e);
    }
}

function buildCandles(results) {
    const block = parseInt(selBlock.value);
    rawCandles = [];
    for (let i = 0; i < results.length; i += block) {
        const chunk = results.slice(i, i + block);
        if (chunk.length < Math.ceil(block / 2)) continue;
        const goals = chunk.map(r =>
            (parseInt(r.ft?.split('x')[0]) || 0) + (parseInt(r.ft?.split('x')[1]) || 0)
        );
        const open  = goals[0];
        const close = goals[goals.length - 1];
        const high  = Math.max(...goals);
        const low   = Math.min(...goals);
        const avg   = goals.reduce((a, b) => a + b, 0) / goals.length;
        const overs = goals.filter(g => g > 2.5).length;
        rawCandles.push({ open, close, high, low, avg, overs, total: goals.length, idx: Math.floor(i / block) + 1 });
    }
}

function renderChart() {
    if (!rawCandles.length) return;

    const totalGames = rawCandles.reduce((a, c) => a + c.total, 0);
    const totalGoals = rawCandles.reduce((a, c) => a + c.avg * c.total, 0);
    const totalOvers = rawCandles.reduce((a, c) => a + c.overs, 0);
    mAvg.textContent    = (totalGoals / totalGames).toFixed(2);
    mOver.textContent   = Math.round((totalOvers / totalGames) * 100) + '%';
    mCandles.textContent = rawCandles.length;

    const last  = rawCandles[rawCandles.length - 1];
    const isUp  = last.close >= last.open;
    const trend = isUp ? 'ALTA ▲' : 'BAIXA ▼';
    statBadge.textContent   = `TENDÊNCIA: ${trend}`;
    statBadge.style.color   = isUp ? GREEN : RED;
    statBadge.style.borderColor = isUp ? GREEN : RED;
    statBadge.style.background  = isUp ? GREEN_A : RED_A;

    const labels = rawCandles.map(c => `Vela ${c.idx}`);

    const candlePlugin = {
        id: 'candlestick',
        afterDatasetsDraw(chart) {
            const { ctx: c, scales: { x, y } } = chart;
            rawCandles.forEach((cd, i) => {
                const xPos = x.getPixelForValue(i);
                const barW = Math.max(4, Math.min(20, (x.width / rawCandles.length) * 0.6));
                const yO = y.getPixelForValue(cd.open);
                const yC = y.getPixelForValue(cd.close);
                const yH = y.getPixelForValue(cd.high);
                const yL = y.getPixelForValue(cd.low);
                const up  = cd.close >= cd.open;
                const col = up ? GREEN : RED;
                const colA = up ? GREEN_A : RED_A;

                c.save();
                c.strokeStyle = col;
                c.lineWidth = 1.5;
                c.beginPath(); c.moveTo(xPos, yH); c.lineTo(xPos, Math.min(yO, yC)); c.stroke();
                c.beginPath(); c.moveTo(xPos, yL); c.lineTo(xPos, Math.max(yO, yC)); c.stroke();
                const bodyH = Math.max(2, Math.abs(yC - yO));
                c.fillStyle = colA;
                c.strokeStyle = col;
                c.lineWidth = 1.5;
                c.beginPath();
                c.rect(xPos - barW / 2, Math.min(yO, yC), barW, bodyH);
                c.fill();
                c.stroke();
                c.restore();
            });
        }
    };

    if (chartInst) { chartInst.destroy(); chartInst = null; }

    const ctx2 = document.getElementById('pfChart').getContext('2d');
    chartInst = new Chart(ctx2, {
        type: 'line',
        data: {
            labels,
            datasets: [
                {
                    label: 'Média de gols',
                    data: rawCandles.map(c => parseFloat(c.avg.toFixed(2))),
                    borderColor: 'rgba(55,138,221,0.5)',
                    borderWidth: 1.5,
                    borderDash: [4, 3],
                    pointRadius: 0,
                    tension: 0.3,
                    fill: false,
                },
                {
                    label: 'Linha Over 2.5',
                    data: rawCandles.map(() => 2.5),
                    borderColor: 'rgba(186,117,23,0.4)',
                    borderWidth: 1,
                    borderDash: [6, 4],
                    pointRadius: 0,
                    fill: false,
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: {
                legend: { display: false },
                tooltip: { enabled: false },
            },
            scales: {
                x: {
                    ticks: { color: '#9ca3af', font: { size: 11 }, maxTicksLimit: 12, maxRotation: 0 },
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    border: { color: 'rgba(255,255,255,0.1)' },
                },
                y: {
                    min: 0,
                    max: Math.max(...rawCandles.map(c => c.high)) + 1,
                    ticks: { color: '#9ca3af', font: { size: 11 }, stepSize: 1 },
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    border: { color: 'rgba(255,255,255,0.1)' },
                    title: { display: true, text: 'Gols', color: '#9ca3af', font: { size: 11 } }
                }
            }
        },
        plugins: [candlePlugin]
    });

    const canvas = document.getElementById('pfChart');
    canvas.onmousemove = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx   = e.clientX - rect.left;
        const xScale = chartInst.scales.x;
        const idx = Math.round((mx - xScale.left) / (xScale.width / (rawCandles.length - 1 || 1)));
        if (idx < 0 || idx >= rawCandles.length) { tip.style.display = 'none'; return; }
        const cd = rawCandles[idx];
        const overPct = Math.round((cd.overs / cd.total) * 100);
        tip.innerHTML = `<b>Vela ${cd.idx}</b> &nbsp;(${cd.total} jogos)<br>Máx: <b>${cd.high}</b> &nbsp; Mín: <b>${cd.low}</b><br>Abertura: <b>${cd.open}</b> &nbsp; Fechamento: <b>${cd.close}</b><br>Média: <b>${cd.avg.toFixed(2)}</b> &nbsp; Over 2.5: <b>${overPct}%</b>`;
        tip.style.display = 'block';
        let tx = e.clientX + 14, ty = e.clientY - tip.offsetHeight - 8;
        if (tx + tip.offsetWidth > window.innerWidth - 8) tx = e.clientX - tip.offsetWidth - 14;
        if (ty < 4) ty = e.clientY + 12;
        tip.style.left = tx + 'px';
        tip.style.top  = ty + 'px';
    };
    canvas.onmouseleave = () => { tip.style.display = 'none'; };
}

load();
</script>
</body>
</html>
