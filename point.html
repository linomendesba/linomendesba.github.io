<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto & Figura</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg:#1c1f26; --bg2:#252a33; --border:#3a3f4a; --text:#e8eaed; --muted:#9ca3af; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Courier New', monospace;
            padding: 14px; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        .header { display:flex; gap:16px; margin-bottom:12px; align-items:flex-end; flex-shrink:0; flex-wrap:wrap; }
        .ctrl { display:flex; flex-direction:column; gap:4px; }
        label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
        select {
            background:var(--bg2); border:1px solid var(--border); color:var(--text);
            padding:6px 10px; border-radius:3px; font-size:12px; min-width:150px; cursor:pointer; outline:none;
        }
        .trend-badge {
            padding: 4px 10px; border-radius: 3px; font-size: 11px; font-weight: bold;
            margin-left: auto; align-self: center; font-family: 'Segoe UI', sans-serif;
            transition: all 0.3s ease;
        }
        .trend-up { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .trend-down { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .trend-neutral { background: rgba(156,163,175,0.15); color: #9ca3af; border: 1px solid rgba(156,163,175,0.3); }
        .chart-wrap {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:4px; overflow:hidden; position:relative;
            height: 420px;
            flex-shrink: 0;
        }
        canvas { display:block; }
        #loadMsg {
            position:absolute; inset:0; display:flex;
            align-items:center; justify-content:center; color:var(--muted); font-size:13px;
        }
        #tooltip {
            position:fixed; background:rgba(8,10,14,.97); color:#e8eaed;
            padding:6px 10px; border-radius:3px; font-size:11px;
            font-family:'Segoe UI',sans-serif; border:1px solid #3a3f4a;
            pointer-events:none; z-index:9999; white-space:nowrap; display:none; line-height:1.7;
        }
    </style>
<base target="_blank">
</head>
<body>

<div class="header">
    <div class="ctrl">
        <label>Liga</label>
        <select id="selLeague">
            <option value="Copa%20do%20Mundo">Copa do Mundo</option>
            <option value="Ligas%20dos%20Campe%C3%B5es">Ligas dos Campeões</option>
            <option value="Am%C3%A9rica%20Latina">América Latina</option>
        </select>
    </div>
    <div class="ctrl">
        <label>Jogos</label>
        <select id="selGames">
            <option value="500">500</option>
            <option value="600">600</option>
            <option value="700" selected>700</option>
            <option value="800">800</option>
            <option value="900">900</option>
            <option value="1000">1000</option>
        </select>
    </div>
    <div class="ctrl">
        <label>Mercado</label>
        <select id="selMarket">
            <option value="over25">Over / Under 2.5</option>
            <option value="over35">Over / Under 3.5</option>
            <option value="btts">Ambas Marcam (Sim / Não)</option>
            <option value="home">Casa Vence / Fora Vence</option>
        </select>
    </div>
    <div class="trend-badge trend-neutral" id="trendBadge">TENDÊNCIA: NEUTRO</div>
</div>

<div class="chart-wrap" id="chartWrap">
    <div id="loadMsg">Carregando...</div>
    <canvas id="pf"></canvas>
</div>
<div id="tooltip"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   PONTO & FIGURA
   • Inversão fixa: 2 (equilibrado)
   • Jogos: 500–1000
   • Mercados: Over/Under 2.5, Over/Under 3.5, Ambas Marcam, Casa/Fora
═══════════════════════════════════════════════════════════════════ */

const REV_AMT = 2;

const Y_MIN    = 0;
const Y_MAX    = 100;
const Y_STEP   = 5;
const Y_LEVELS = (Y_MAX - Y_MIN) / Y_STEP + 1;

const AXIS_W = 46;
const PAD_T  = 10;
const PAD_B  = 10;
const PAD_R  = 10;

const C = {
    bg:'#252a33', axBg:'#1c1f26',
    grid:'#2e3442',
    axBorder:'#464f62', label:'#7a8699', tick:'#4a5268',
    X:'#10b981', O:'#ef4444',
    zero: '#5a6478',
};

// Labels dinâmicos por mercado
const MARKET_LABELS = {
    over25: { x: 'Over 2.5', o: 'Under 2.5' },
    over35: { x: 'Over 3.5', o: 'Under 3.5' },
    btts:   { x: 'Ambas Sim', o: 'Ambas Não' },
    home:   { x: 'Casa Vence', o: 'Fora Vence' },
};

let columns = [];
let hitMap  = [];
let timer   = null;

const selLeague = document.getElementById('selLeague');
const selGames  = document.getElementById('selGames');
const selMarket = document.getElementById('selMarket');
const wrap      = document.getElementById('chartWrap');
const canvas    = document.getElementById('pf');
const ctx       = canvas.getContext('2d');
const loadMsg   = document.getElementById('loadMsg');
const tip       = document.getElementById('tooltip');
const trendBadge = document.getElementById('trendBadge');

// ── LocalStorage ─────────────────────────────────────
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

selLeague.value = lsGet('pf7_league', selLeague.value);
selGames.value  = lsGet('pf7_games',  selGames.value);
selMarket.value = lsGet('pf7_market', selMarket.value);

selLeague.addEventListener('change', ()=>{ lsSet('pf7_league', selLeague.value); load(); });
selGames.addEventListener('change',  ()=>{ lsSet('pf7_games',  selGames.value);  load(); });
selMarket.addEventListener('change', ()=>{ lsSet('pf7_market', selMarket.value); load(); });

// ── Fetch ─────────────────────────────────────────────
async function load() {
    loadMsg.style.display   = 'flex';
    canvas.style.visibility = 'hidden';
    if (timer) clearInterval(timer);

    const league = selLeague.value;
    const limit  = parseInt(selGames.value);
    const market = selMarket.value;

    try {
        const data = await fetchData(league, limit);
        build(data, market);
        updateTrendBadge(market);
        draw(market);
        timer = setInterval(async () => {
            try {
                const d = await fetchData(league, limit);
                build(d, market);
                updateTrendBadge(market);
                draw(market);
            } catch {}
        }, 60000);
    } catch(e) {
        loadMsg.textContent = 'Erro ao carregar';
        console.error(e);
    }
}

async function fetchData(league, limit) {
    const resp = await fetch(`https://betstat.site/resultados/estrela/${league}`);
    if (!resp.ok) throw new Error(resp.status);
    const ct = resp.headers.get('content-type') || '';
    let arr;
    if (ct.includes('application/json')) {
        const json = await resp.json();
        arr = Array.isArray(json) ? json : (json.matches || json.data || []);
    } else {
        const html = await resp.text();
        const m = html.match(/window\.__INITIAL_STATE__\s*=\s*({.*?});/s);
        if (!m) throw new Error('formato inesperado');
        arr = JSON.parse(m[1]).matches || [];
    }
    return arr.slice(0, limit).reverse().map(m => ({
        ft:     (m.ft || '0x0').trim(),
        hora:   parseInt(m.hora)   || 0,
        minuto: parseInt(m.minuto) || 0,
    }));
}

// ── Classificador por mercado ─────────────────────────
function classify(r, market) {
    const parts = r.ft?.split('x') || ['0','0'];
    const h = parseInt(parts[0]) || 0;
    const a = parseInt(parts[1]) || 0;
    const goals = h + a;

    switch (market) {
        case 'over25': return goals > 2.5;
        case 'over35': return goals > 3.5;
        case 'btts':   return h > 0 && a > 0;
        case 'home':   return h > a;  // casa vence = X, fora vence ou empate = O
        default:       return goals > 2.5;
    }
}

// ── Build P&F ─────────────────────────────────────────
function build(results, market) {
    columns = [];
    hitMap  = [];
    let cursor = 50;
    let col    = null;
    let pendingType = null;
    let pendingCount = 0;

    results.forEach(r => {
        const isPositive = classify(r, market);
        const type = isPositive ? 'X' : 'O';

        if (isPositive) cursor = Math.min(Y_MAX, cursor + Y_STEP);
        else            cursor = Math.max(Y_MIN, cursor - Y_STEP);

        if (!col) {
            col = { type, items: [] };
            columns.push(col);
            pendingType = null;
            pendingCount = 0;
        } else if (col.type === type) {
            pendingType = null;
            pendingCount = 0;
        } else {
            if (pendingType === type) pendingCount++;
            else { pendingType = type; pendingCount = 1; }
            if (pendingCount >= REV_AMT) {
                col = { type, items: [] };
                columns.push(col);
                pendingType = null;
                pendingCount = 0;
            }
        }
        col.items.push({ pos: cursor, result: r });
    });
}

// ── Tendência ──────────────────────────────────────────
function updateTrendBadge(market) {
    if (!columns.length) {
        trendBadge.className = 'trend-badge trend-neutral';
        trendBadge.textContent = 'TENDÊNCIA: NEUTRO';
        return;
    }
    const lastCol = columns[columns.length - 1];
    const prevCol = columns.length > 1 ? columns[columns.length - 2] : null;
    let trend = 'NEUTRO', cls = 'trend-neutral';
    const lbl = MARKET_LABELS[market] || MARKET_LABELS.over25;

    if (lastCol.type === 'X') {
        if (prevCol && prevCol.type === 'X') {
            const lastHigh = Math.max(...lastCol.items.map(i => i.pos));
            const prevHigh = Math.max(...prevCol.items.map(i => i.pos));
            if (lastHigh > prevHigh) { trend = `${lbl.x} FORTE ▲▲`; cls = 'trend-up'; }
            else { trend = `${lbl.x} ▲`; cls = 'trend-up'; }
        } else { trend = `${lbl.x} ▲`; cls = 'trend-up'; }
    } else {
        if (prevCol && prevCol.type === 'O') {
            const lastLow = Math.min(...lastCol.items.map(i => i.pos));
            const prevLow = Math.min(...prevCol.items.map(i => i.pos));
            if (lastLow < prevLow) { trend = `${lbl.o} FORTE ▼▼`; cls = 'trend-down'; }
            else { trend = `${lbl.o} ▼`; cls = 'trend-down'; }
        } else { trend = `${lbl.o} ▼`; cls = 'trend-down'; }
    }
    trendBadge.className = `trend-badge ${cls}`;
    trendBadge.textContent = `TENDÊNCIA: ${trend}`;
}

// ── Draw ──────────────────────────────────────────────
function draw(market) {
    if (!columns.length) return;

    const W = wrap.clientWidth;
    const H = wrap.clientHeight;
    canvas.width  = W;
    canvas.height = H;

    const numCols = columns.length;
    const cellH = (H - PAD_T - PAD_B) / Y_LEVELS;
    const cellW = (W - AXIS_W - PAD_R) / numCols;
    const cell  = Math.max(2, Math.min(cellH, cellW));
    const blockH = Y_LEVELS * cell;
    const oY = PAD_T + Math.max(0, (H - PAD_T - PAD_B - blockH) / 2);
    const oX = AXIS_W;
    const posToY = pos => oY + ((Y_MAX - pos) / Y_STEP) * cell;

    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    for (let v = Y_MIN; v <= Y_MAX; v += Y_STEP) {
        if (v % 25 !== 0) continue;
        const y = posToY(v) + cell / 2;
        ctx.beginPath();
        ctx.moveTo(AXIS_W, y);
        ctx.lineTo(W, y);
        ctx.strokeStyle = v === 50 ? C.zero : C.grid;
        ctx.lineWidth = v === 50 ? 1 : 0.5;
        ctx.stroke();
    }

    ctx.fillStyle = C.axBg;
    ctx.fillRect(0, 0, AXIS_W, H);
    ctx.strokeStyle = C.axBorder;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(AXIS_W, 0);
    ctx.lineTo(AXIS_W, H);
    ctx.stroke();

    const fs = Math.max(8, Math.min(11, cell - 1));
    ctx.font = `${fs}px Courier New`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';

    for (let v = Y_MIN; v <= Y_MAX; v += Y_STEP) {
        if (v % 10 !== 0) continue;
        const y = posToY(v) + cell / 2;
        ctx.fillStyle = C.tick;
        ctx.fillRect(AXIS_W - 5, y - 0.5, 5, 1);
        if (v >= 70) ctx.fillStyle = '#4caf7d';
        else if (v >= 50) ctx.fillStyle = '#7abf9a';
        else if (v >= 30) ctx.fillStyle = '#bf7a7a';
        else ctx.fillStyle = '#c04a4a';
        ctx.fillText(String(v), AXIS_W - 8, y);
    }

    hitMap = [];
    const symSz = Math.max(5, Math.min(cell * 0.82, 14));
    ctx.font = `bold ${symSz}px Courier New`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    columns.forEach((col, ci) => {
        const cx = oX + ci * cell + cell / 2;
        ctx.fillStyle = col.type === 'X' ? C.X : C.O;
        col.items.forEach(item => {
            const cy = posToY(item.pos) + cell / 2;
            ctx.fillText(col.type, cx, cy);
            hitMap.push({ cx, cy, hr: cell / 2, colIdx: ci + 1, item, market });
        });
    });

    canvas.style.visibility = 'visible';
    loadMsg.style.display = 'none';
}

// ── Resize ─────────────────────────────────────────────
let rsz = null;
window.addEventListener('resize', () => {
    clearTimeout(rsz);
    rsz = setTimeout(() => { if (columns.length) draw(selMarket.value); }, 100);
});

// ── Tooltip ────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;
    let found = null;
    for (const h of hitMap) {
        if (Math.abs(mx - h.cx) <= h.hr && Math.abs(my - h.cy) <= h.hr) { found = h; break; }
    }
    if (found) {
        const res = found.item.result;
        const market = found.market || selMarket.value;
        const lbl = MARKET_LABELS[market] || MARKET_LABELS.over25;
        const hh = String(res.hora).padStart(2,'0');
        const mm = String(res.minuto).padStart(2,'0');
        const isPos = classify(res, market);
        const tipo = isPos
            ? `<span style="color:#10b981">▲ ${lbl.x}</span>`
            : `<span style="color:#ef4444">▼ ${lbl.o}</span>`;
        tip.innerHTML = `${hh}:${mm} &nbsp;|&nbsp; ${res.ft || 'N/A'} &nbsp;→&nbsp; ${tipo}<br>Nível: <b>${found.item.pos}</b> &nbsp;|&nbsp; Coluna ${found.colIdx}`;
        tip.style.display = 'block';
        const TW = tip.offsetWidth, TH = tip.offsetHeight;
        let tx = e.clientX + 14, ty = e.clientY - TH - 8;
        if (tx + TW > window.innerWidth - 6) tx = e.clientX - TW - 14;
        if (ty < 4) ty = e.clientY + 12;
        tip.style.left = tx + 'px';
        tip.style.top = ty + 'px';
    } else {
        tip.style.display = 'none';
    }
});
canvas.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

// ── Init ───────────────────────────────────────────────
load();
</script>
</body>
</html>
