  ><style>
    :root {
      --primary: #1fac89;
      --primary-hover: #189976;
      --primary-dim: rgba(31, 172, 137, 0.12);
      --primary-border: rgba(31, 172, 137, 0.28);
      --bg: #1c1f26;
      --surface: #23272f;
      --surface-2: #2a2f3a;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0f2f5;
      --text-muted: #8b93a1;
      --text-dim: #5d6572;
      --red: #e05252;
      --yellow: #e0b352;
      --tr: all 0.15s ease;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.75rem 1.5rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.125rem 2rem;
    }
    .config-grid .full {
      grid-column: 1/-1;
    }
    .field-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.45rem;
    }
    .multi-hint {
      font-size: 0.71rem;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }
    .btn-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .btn {
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 0.375rem 0.825rem;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--tr);
      font-family: Roboto, sans-serif;
      white-space: nowrap;
    }
    .btn:hover {
      color: var(--text);
      border-color: var(--primary-border);
      background: var(--primary-dim);
    }
    .btn.active {
      background: var(--primary-dim);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 700;
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.125rem 0;
    }
    .actions {
      display: flex;
      gap: 0.5rem;
    }
    .action-btn {
      flex: 1;
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
      font-family: Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
    }
    .btn-clear {
      background: 0 0;
      color: var(--text-muted);
      border: 1px solid var(--border);
      flex: 0 0 auto;
    }
    .btn-clear:hover {
      background: var(--surface-2);
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .btn-generate {
      background: var(--primary);
      color: #fff;
      flex: 1;
    }
    .btn-generate:hover {
      background: var(--primary-hover);
    }
    .btn-generate:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .btn-nova {
      background: var(--surface-2);
      color: var(--primary);
      border: 1px solid var(--primary-border);
      flex: 1;
    }
    .btn-nova:hover {
      background: var(--primary-dim);
    }
    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    .spinner-g {
      border-color: rgba(31, 172, 137, 0.3);
      border-top-color: var(--primary);
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    .result-card {
      background: var(--surface);
      border: 1px solid var(--primary-border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .result-header {
      background: var(--primary-dim);
      border-bottom: 1px solid var(--primary-border);
      padding: 0.8rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .result-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }
    .result-title-text {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--primary);
    }
    .liga-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .liga-tab {
      padding: 0.3rem 0.7rem;
      border-radius: 5px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--tr);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      font-family: Roboto, sans-serif;
    }
    .liga-tab:hover {
      color: var(--text);
      border-color: var(--primary-border);
    }
    .liga-tab.active {
      background: var(--primary-dim);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 700;
    }
    .liga-panel {
      display: none;
    }
    .liga-panel.active {
      display: block;
    }
    .result-body {
      padding: 1.25rem;
    }
    .analysis-block {
      margin-bottom: 1.125rem;
      padding-bottom: 1.125rem;
      border-bottom: 1px solid var(--border);
    }
    .analysis-block:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .block-title {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.55rem;
    }
    .analysis-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem 1.25rem;
      font-size: 0.79rem;
      color: var(--text-muted);
    }
    .analysis-meta strong {
      color: var(--text);
      font-weight: 500;
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      flex-wrap: wrap;
    }
    .score-badge {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
    }
    .score-label {
      font-size: 0.77rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .score-detail {
      font-size: 0.74rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }
    .score-bar-track {
      flex: 1;
      min-width: 90px;
      height: 5px;
      background: var(--surface-2);
      border-radius: 3px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
    }
    .streak-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.84rem;
    }
    .streak-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .s-green {
      background: var(--primary);
    }
    .s-red {
      background: var(--red);
    }
    .streak-alert {
      font-size: 0.74rem;
      color: var(--yellow);
      margin-top: 0.2rem;
    }
    .times-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }
    .time-chip {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.18rem 0.45rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .time-chip strong {
      color: var(--text);
      font-weight: 500;
    }
    .stat-line {
      font-size: 0.79rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
    }
    .stat-line strong {
      color: var(--text);
    }
    .pattern-list {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }
    .pattern-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.575rem 0.825rem;
    }
    .pattern-name {
      font-size: 0.79rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.28rem;
      word-break: break-word;
    }
    .pattern-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.28rem 0.825rem;
      font-size: 0.71rem;
      color: var(--text-muted);
    }
    .pct-ex {
      color: var(--primary);
      font-weight: 700;
    }
    .pct-fo {
      color: #7dcfb0;
      font-weight: 700;
    }
    .pct-mo {
      color: var(--yellow);
      font-weight: 700;
    }
    .badge-n {
      display: inline-flex;
      align-items: center;
      padding: 0.07rem 0.32rem;
      border-radius: 3px;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .b-ex {
      background: rgba(31, 172, 137, 0.15);
      color: var(--primary);
    }
    .b-fo {
      background: rgba(125, 207, 176, 0.15);
      color: #7dcfb0;
    }
    .b-mo {
      background: rgba(224, 179, 82, 0.12);
      color: var(--yellow);
    }
    .odds-table-wrap {
      overflow-x: auto;
    }
    .next-table,
    .odds-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.77rem;
    }
    .next-table th,
    .odds-table th {
      text-align: left;
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0.28rem 0.45rem;
      border-bottom: 1px solid var(--border);
    }
    .next-table td,
    .odds-table td {
      padding: 0.32rem 0.45rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
    }
    .next-table tr:last-child td,
    .odds-table tr:last-child td {
      border-bottom: none;
    }
    .star {
      color: var(--primary);
      font-size: 0.71rem;
    }
    .pct-bar {
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }
    .pct-track {
      width: 40px;
      height: 3px;
      background: var(--surface-2);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .pct-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 2px;
    }
    .match-name {
      color: var(--text);
    }
    .temp-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.55rem;
    }
    .temp-pct {
      font-size: 1.35rem;
      font-weight: 700;
    }
    .temp-desc {
      font-size: 0.79rem;
      color: var(--text-muted);
    }
    .temp5-list {
      display: flex;
      flex-direction: column;
      gap: 0.28rem;
    }
    .temp5-item {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.74rem;
      color: var(--text-muted);
    }
    .temp5-item .rank {
      color: var(--text-dim);
      width: 14px;
      text-align: right;
      flex-shrink: 0;
    }
    .temp5-item .grp {
      color: var(--text);
      min-width: 80px;
    }
    .temp5-item .pct {
      font-weight: 700;
      color: var(--primary);
    }
    .opp-header {
      font-size: 0.77rem;
      color: var(--text-muted);
      margin-bottom: 0.55rem;
    }
    .opp-list {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }
    .opp-item {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.55rem 0.825rem;
      flex-wrap: wrap;
    }
    .opp-item.principal {
      border-color: var(--primary-border);
    }
    .opp-role {
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      min-width: 56px;
    }
    .opp-role.pr {
      color: var(--primary);
    }
    .opp-time {
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .opp-match {
      font-size: 0.84rem;
      color: var(--text);
      font-weight: 500;
    }
    .opp-odd {
      font-size: 0.77rem;
      color: var(--text-muted);
      margin-left: auto;
    }
    .opp-tag {
      font-size: 0.66rem;
      padding: 0.1rem 0.375rem;
      border-radius: 3px;
      font-weight: 700;
      background: rgba(31, 172, 137, 0.15);
      color: var(--primary);
    }
    .opp-just {
      font-size: 0.73rem;
      color: var(--text-dim);
      margin-top: 0.28rem;
    }
    .mart-text {
      font-size: 0.81rem;
      color: var(--text-muted);
    }
    .rec-box {
      border-radius: 7px;
      padding: 0.825rem 1rem;
      font-size: 0.84rem;
      font-weight: 500;
      line-height: 1.65;
    }
    .rec-forte {
      background: rgba(31, 172, 137, 0.1);
      border: 1px solid rgba(31, 172, 137, 0.3);
      color: var(--primary);
    }
    .rec-normal {
      background: rgba(224, 179, 82, 0.08);
      border: 1px solid rgba(224, 179, 82, 0.3);
      color: var(--yellow);
    }
    .rec-cautela {
      background: rgba(224, 140, 50, 0.08);
      border: 1px solid rgba(224, 140, 50, 0.3);
      color: #e08c32;
    }
    .rec-aguardar {
      background: rgba(224, 82, 82, 0.08);
      border: 1px solid rgba(224, 82, 82, 0.3);
      color: var(--red);
    }
    .error-box {
      background: rgba(224, 82, 82, 0.08);
      border: 1px solid rgba(224, 82, 82, 0.3);
      border-radius: 8px;
      padding: 0.825rem 1rem;
      color: var(--red);
      font-size: 0.81rem;
    }
    .loading-box {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.84rem;
      color: var(--primary);
      padding: 0.375rem 0;
    }
    @media (max-width: 700px) {
      .container {
        padding: 1rem;
      }
      .card {
        padding: 1rem;
      }
      .config-grid {
        grid-template-columns: 1fr;
      }
      .config-grid .full {
        grid-column: 1;
      }
    }
  </style>
  <body>
    <div id="header"></div>
    <br /><br />
    <div class="container">
      <div class="card">
        <div class="config-grid">
          <div>
            <div class="field-label">Casa de Aposta</div>
            <div class="btn-grid" id="casas-group">
              <button class="btn" data-value="betano">Betano</button>
              <button class="btn" data-value="kiron">Kiron</button>
              <button class="btn" data-value="estrela">Estrelabet</button>
              <button class="btn" data-value="bet365">Bet365</button>
            </div>
          </div>
          <div>
            <div class="field-label">Período de Análise</div>
            <div class="btn-grid" id="periodo-group">
              <button class="btn" data-value="120">6h</button>
              <button class="btn" data-value="240">12h</button>
              <button class="btn" data-value="480">24h</button>
              <button class="btn" data-value="960">48h</button>
              <button class="btn" data-value="1440">72h</button>
            </div>
          </div>
          <div class="full" id="liga-section" style="display: none">
            <div class="field-label">Liga</div>
            <p class="multi-hint">
              Selecione uma ou mais ligas — ou clique em "Todas"
            </p>
            <div class="btn-grid" id="ligas-group"></div>
          </div>
          <div class="full">
            <div class="field-label">Mercado da Análise</div>
            <div class="btn-grid" id="mercados-group">
              <button class="btn" data-value="casaVence">Casa Vence</button>
              <button class="btn" data-value="foraVence">Fora Vence</button>
              <button class="btn" data-value="empate">Empate</button>
              <button class="btn" data-value="ambasMarcam">Ambas Sim</button>
              <button class="btn" data-value="ambasNaoMarcam">Ambas Não</button>
              <button class="btn" data-value="over1.5">Over 1.5</button>
              <button class="btn" data-value="over2.5">Over 2.5</button>
              <button class="btn" data-value="over3.5">Over 3.5</button>
              <button class="btn" data-value="under1.5">Under 1.5</button>
              <button class="btn" data-value="under2.5">Under 2.5</button>
              <button class="btn" data-value="under3.5">Under 3.5</button>
              <button class="btn" data-value="over5">5+ Gols</button>
              <button class="btn" data-value="exact1">1 Gol Exato</button>
              <button class="btn" data-value="exact2">2 Gols Exatos</button>
              <button class="btn" data-value="exact3">3 Gols Exatos</button>
              <button class="btn" data-value="exact4">4 Gols Exatos</button>
            </div>
          </div>
          <div>
            <div class="field-label">Estratégia Martingale</div>
            <div class="btn-grid" id="martingale-group">
              <button class="btn" data-value="0">Nenhum</button>
              <button class="btn" data-value="1">1 Cobertura</button>
              <button class="btn" data-value="2">2 Coberturas</button>
              <button class="btn" data-value="3">3 Coberturas</button>
            </div>
          </div>
        </div>
        <hr class="divider" />
        <div class="actions">
          <button class="action-btn btn-clear" onclick="limparAnalise()">
            Limpar
          </button>
          <button
            class="action-btn btn-generate"
            id="btn-gerar"
            onclick="gerarAnalise()"
          >
            Gerar Análise
          </button>
        </div>
      </div>
      <div id="result-container" style="display: none"></div>
    </div>
    <script>
      const casasConfig = {
          betano: {
            name: "Betano",
            ligas: [
              { name: "Clássicos da América", value: "Taça Glória Eterna" },
              "Copa América",
              "Euro",
              "Campeonato Italiano",
              "Copa das Estrelas",
              "Brasileirão Betano",
            ],
          },
          kiron: {
            name: "Kiron",
            ligas: ["England", "Italy", "Spain"],
            path: "kiron",
          },
          estrela: {
            name: "Estrelabet",
            ligas: ["Copa do Mundo", "Ligas dos Campeões", "América Latina"],
            path: "estrela",
          },
          bet365: {
            name: "Bet365",
            ligas: ["Copa", "Euro", "Super", "Premier"],
            path: "bet365",
          },
        },
        _apiCache = new Map(),
        CACHE_TTL_MS = 18e4;
      async function fetchComCache(e) {
        const a = _apiCache.get(e);
        if (a && Date.now() - a.ts < 18e4) return a.data;
        const t = await fetch(e).then((e) => e.json());
        return (_apiCache.set(e, { ts: Date.now(), data: t }), t);
      }
      const LS_KEY = "betstat_config";
      function salvarConfig() {
        const e = {
          casa: getSelectedValue("casas-group"),
          mercado: getSelectedValue("mercados-group"),
          martingale: getSelectedValue("martingale-group"),
          periodo: getSelectedValue("periodo-group"),
          ligas: getSelectedLigas(),
        };
        try {
          localStorage.setItem(LS_KEY, JSON.stringify(e));
        } catch (e) {}
      }
      function restaurarConfig() {
        let e;
        try {
          e = JSON.parse(localStorage.getItem(LS_KEY));
        } catch (e) {
          return;
        }
        if (e) {
          if (e.casa) {
            const a = document.querySelector(
              `#casas-group .btn[data-value="${e.casa}"]`,
            );
            a && (a.classList.add("active"), mostrarLigas(e.casa));
          }
          (["mercado", "martingale", "periodo"].forEach((a) => {
            const t =
              "mercado" === a
                ? "mercados-group"
                : "martingale" === a
                  ? "martingale-group"
