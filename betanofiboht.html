        /* ── CONTROL PANEL (global) ── */
  .global-control-panel {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    background: #161b27;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 14px;
  }
  .global-control-panel label {
    font-size: 0.78em;
    color: #9ab;
    margin-right: 3px;
  }
  .global-control-panel select {
    background: #1e2535;
    color: #e0e0e0;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 0.82em;
    cursor: pointer;
  }
  .global-control-panel select:focus { outline: none; border-color: #1fad8b; }
  .checkbox-container {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.82em;
    color: #cdd;
    cursor: pointer;
    user-select: none;
  }
  .checkbox-container input[type=checkbox] { accent-color: #1fad8b; cursor: pointer; }

  /* ── ACCORDION ── */
  .accordion-item {
    background: #131820;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: visible;
  }
  .accordion-button {
    width: 100%;
    background: #1a2030;
    color: #e0e0e0;
    font-size: 0.92em;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 10px 16px;
    border: none;
    text-align: left;
    cursor: pointer;
    transition: background 0.2s;
  }
  .accordion-button:hover { background: #202840; }
  .accordion-content {
    display: none;
    padding: 10px 10px 14px;
    overflow: visible;
  }
  .accordion-content.open { display: block; }

  /* ── CHART WRAPPER ── */
  .canvas-wrapper {
    position: relative;
    width: 100%;
    height: 360px;
    margin-bottom: 4px;
  }
  .canvas-wrapper canvas { width: 100% !important; height: 100% !important; }

  /* ── LOCAL CONTROL PANEL (per chart) ── */
  .control-panel {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    background: #161b27;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 6px;
  }
  .control-panel select {
    background: #1e2535;
    color: #e0e0e0;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 0.82em;
    cursor: pointer;
  }
  .control-panel select:focus { outline: none; border-color: #1fad8b; }
  .linha-atual-toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.82em;
    color: #cdd;
    cursor: pointer;
  }
  .linha-atual-toggle input { accent-color: #1fad8b; }


  /* ══ ADD LINHA — PAINEL FLUTUANTE ══ */
  .linha-tools-wrapper {
    position: relative !important;
    display: inline-flex !important;
    align-items: center !important;
  }
  .btn-add-linha {
    background: #1e2535 !important;
    color: #1fad8b !important;
    border: 1px solid rgba(31,173,139,0.4) !important;
    border-radius: 6px !important;
    padding: 4px 12px !important;
    font-size: 0.82em !important;
    cursor: pointer !important;
    margin: 0 !important;
    width: auto !important;
    display: inline-block !important;
    font-family: inherit !important;
    line-height: 1.5 !important;
    font-weight: normal !important;
    transition: background 0.2s !important;
  }
  .btn-add-linha:hover { background: rgba(31,173,139,0.18) !important; }
  .linha-tools-panel {
    display: none !important;
    position: absolute !important;
    top: calc(100% + 4px) !important;
    left: 0 !important;
    z-index: 99999 !important;
    background: #1a2030 !important;
    border: 1px solid rgba(31,173,139,0.35) !important;
    border-radius: 8px !important;
    padding: 12px !important;
    width: 190px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.8) !important;
  }
  .linha-tools-panel.show {
    display: flex !important;
    flex-direction: column !important;
    gap: 6px !important;
  }
  .linha-tools-panel .contador-linhas {
    font-size: 0.76em !important; color: #1fad8b !important;
    margin: 0 !important; padding: 0 !important; display: block !important;
  }
  .linha-tools-panel > label {
    font-size: 0.76em !important; color: #9ab !important;
    margin: 0 !important; padding: 0 !important; display: block !important; font-weight: normal !important;
  }
  .linha-tools-panel input[type=color] {
    width: 100% !important; height: 30px !important; border: none !important;
    border-radius: 4px !important; cursor: pointer !important;
    margin: 0 !important; padding: 0 !important; display: block !important;
  }
  .linha-tools-panel .separador-panel {
    border-top: 1px solid rgba(255,255,255,0.1) !important;
    margin: 0 !important; padding: 0 !important; display: block !important;
  }
  .btn-linha {
    width: 100% !important; display: block !important;
    padding: 6px 8px !important; margin: 0 !important;
    border-radius: 5px !important; font-size: 0.80em !important;
    font-weight: 500 !important; cursor: pointer !important;
    text-align: center !important; font-family: inherit !important;
    line-height: 1.4 !important; transition: filter 0.15s !important;
  }
  .btn-linha.green  { background: rgba(31,173,139,0.15) !important; color: #1fad8b !important; border: 1px solid rgba(31,173,139,0.4) !important; }
  .btn-linha.yellow { background: rgba(244,180,0,0.13)  !important; color: #f4b400 !important; border: 1px solid rgba(244,180,0,0.4)  !important; }
  .btn-linha.red    { background: rgba(231,76,60,0.13)  !important; color: #e74c3c !important; border: 1px solid rgba(231,76,60,0.4)  !important; }
  .btn-linha:hover  { filter: brightness(1.4) !important; }
    </style>

/* ─── STATE ────────────────────────────────────── */

/* ─── VISIBLE DATASETS PERSISTENCE ─────────────── */
function loadVisible(league) {
  try {
    const raw = localStorage.getItem(VIS_KEY_PREFIX + league);
    return raw ? Object.assign({}, DEFAULT_VISIBLE, JSON.parse(raw)) : { ...DEFAULT_VISIBLE };
  } catch { return { ...DEFAULT_VISIBLE }; }
}
function saveVisible(league, obj) {

}

LEAGUES.forEach(l => visibleDatasets[l] = loadVisible(l));

/* ─── DRAG LINES PERSISTENCE ────────────────────── */
function loadDragLines(league) {
  try {
    const arr = JSON.parse(localStorage.getItem(DRAG_KEY_PREFIX + league) || '[]');
    return Array.isArray(arr) ? arr.map(l => ({ y: Number(l.y), color: l.color || '#1fcc59', dragging: false })) : [];
  } catch { return []; }
}
function saveDragLines(league, lines) {
  try { localStorage.setItem(DRAG_KEY_PREFIX + league, JSON.stringify(lines.map(l => ({ y: l.y, color: l.color })))); } catch {}
}
function updateDragCounter(league) {

}

/* ═══════════════════════════════════════════════════════
   UTILITÁRIOS
═══════════════════════════════════════════════════════ */
function formatHtResult(ht) {
  if (!ht) return '';
  if (ht === 'OUT') return 'OUT';
  if (ht.includes(' x ')) {
    const p = ht.split(' x ');
    return `${p[0]}-${p[1]}`;
  }
  return ht;
}

/**
 * Parseia HT: "OUT" = 3+ gols (retorna 3), "A x B" = A+B
 */
function parseHtGoals(ht) {
  if (!ht) return 0;
  if (ht === 'OUT') return 3;
  if (ht.includes(' x ')) {
    const parts = ht.split(' x ').map(Number);
    return (!isNaN(parts[0]) && !isNaN(parts[1])) ? parts[0] + parts[1] : 0;
  }
  return 0;
}

/* ═══════════════════════════════════════════════════════
   PROCESSAMENTO DE DADOS
═══════════════════════════════════════════════════════ */
function processApiData(data, league) {
  const sorted = [...data].sort((a, b) => {
    const dA = new Date(a.data), dB = new Date(b.data);
    if (dA - dB !== 0) return dA - dB;
    if (a.hora !== b.hora) return a.hora - b.hora;
    return a.minuto - b.minuto;
  });

  const sliced = sorted.slice(-numPoints - averagePoints);
  chartData[league] = sliced;

  const labels     = [];
  const d00        = [], d01 = [], d10 = [], d11 = [];
  const d02        = [], d20 = [], dOUT = [];
  const dOverHT    = [], dUnderHT = [];
  const dCasaHT    = [], dEmpateHT = [], dForaHT = [];
  const dGolsHT    = [];

  const avg = averagePoints + 1;

  for (let i = averagePoints; i < sliced.length; i++) {
    let s00=0, s01=0, s10=0, s11=0, s02=0, s20=0, sOUT=0;
    let sOverHT=0, sUnderHT=0, sCasaHT=0, sEmpateHT=0, sForaHT=0, sGolsHT=0;

    for (let j = Math.max(0, i - averagePoints); j <= i; j++) {
      const m  = sliced[j];
      const ht = formatHtResult(m.ht); // "A-B" or "OUT"

      // Contagens por placar HT
      if (ht === '0-0') s00++;
      else if (ht === '0-1') s01++;
      else if (ht === '1-0') s10++;
      else if (ht === '1-1') s11++;
      else if (ht === '0-2') s02++;
      else if (ht === '2-0') s20++;
      else if (ht === 'OUT') sOUT++;

      // Over/Under HT (baseado em gols totais HT)
      const htGoals = parseHtGoals(m.ht);
      if (htGoals >= 2) sOverHT++;   // 2+ gols no HT = Over
      else sUnderHT++;               // 0 ou 1 gol no HT = Under

      // Resultado HT (casa/empate/fora), OUT ignorado nos placares
      if (ht !== 'OUT' && ht.includes('-')) {
        const [hg, ag] = ht.split('-').map(Number);
        if (hg > ag) sCasaHT++;
        else if (hg < ag) sForaHT++;
        else sEmpateHT++;
      }
      // Gols HT (soma bruta, OUT = 3)
      sGolsHT += htGoals;
    }

    const m = sliced[i];
    labels.push(`${m.hora}:${String(m.minuto).padStart(2,'0')}`);

    d00.push(s00 / avg * 100);
    d01.push(s01 / avg * 100);
    d10.push(s10 / avg * 100);
    d11.push(s11 / avg * 100);
    d02.push(s02 / avg * 100);
    d20.push(s20 / avg * 100);
    dOUT.push(sOUT / avg * 100);
    dOverHT.push(sOverHT / avg * 100);
    dUnderHT.push(sUnderHT / avg * 100);
    dCasaHT.push(sCasaHT / avg * 100);
    dEmpateHT.push(sEmpateHT / avg * 100);
    dForaHT.push(sForaHT / avg * 100);
    dGolsHT.push(sGolsHT);
  }

  return { labels, d00, d01, d10, d11, d02, d20, dOUT, dOverHT, dUnderHT, dCasaHT, dEmpateHT, dForaHT, dGolsHT };
}

function buildHtmlLegendPlugin(league) {

  return {

    beforeInit(chart) {
      if (!document.getElementById(legendId)) {
        const container = document.createElement('div');
        container.id = legendId;
        container.className = 'ht-legenda';
        // Insert before canvas wrapper
        const wrapper = chart.canvas.closest('.canvas-wrapper');
        if (wrapper) wrapper.parentNode.insertBefore(container, wrapper);
      }
    },
    afterUpdate(chart) {
      const container = document.getElementById(legendId);
      if (!container) return;
      const items = chart.options.plugins.legend.labels.generateLabels(chart);
      if (container.children.length === items.length) {
        Array.from(container.children).forEach((el, i) => el.classList.toggle('leg-hidden', items[i].hidden));
        return;
      }
      container.innerHTML = '';
      items.forEach(item => {

        pill.appendChild(dot); pill.appendChild(lbl);
        pill.addEventListener('click', () => {
          const idx = chart.data.datasets.findIndex(ds => ds.label === item.text);
          if (idx < 0) return;
          const meta = chart.getDatasetMeta(idx);
          meta.hidden = !meta.hidden;
          visibleDatasets[league][item.text] = !meta.hidden;
          saveVisible(league, visibleDatasets[league]);
          pill.classList.toggle('leg-hidden', meta.hidden);
          chart.update('active');
        });
        container.appendChild(pill);
      });
    }
  };
}

/* ═══════════════════════════════════════════════════════
   PLUGIN: FIBONACCI
═══════════════════════════════════════════════════════ */
function buildFibonacciPlugin(league) {
  return {
    id: 'fibonacci_' + league,
    afterDraw(chart) {
      if (!showFibonacci[league]) return;
      const { ctx, scales: { y: yS }, chartArea: { left, right } } = chart;
      if (!yS) return;
      const levels = [0, 23.6, 38.2, 50, 61.8, 100];
      const range = yS.max - yS.min;
      ctx.save();
      levels.forEach((lv, i) => {
        const yPx = yS.getPixelForValue(yS.min + (lv / 100) * range);
        ctx.beginPath(); ctx.setLineDash([5, 5]);
        ctx.moveTo(left, yPx); ctx.lineTo(right, yPx);
        ctx.strokeStyle = 'rgba(0,255,0,0.5)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(0,255,0,0.85)'; ctx.font = '10px Arial';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(`${lv}%`, right + 54, yPx - (i === 0 ? -8 : 0));
      });
      ctx.restore();
    }
  };
}

/* ═══════════════════════════════════════════════════════
   PLUGIN: RÓTULOS ACIMA DOS PONTOS
═══════════════════════════════════════════════════════ */
const rotulosPlugin = {
  id: 'rotulosHT',
  afterDatasetsDraw(chart, args, opts) {
    const cfg = chart.options?.plugins?.rotulosHT ?? {};
    if (cfg.enabled === false) return;
    const { ctx } = chart;
    chart.data.datasets.forEach((ds, i) => {
      if (!chart.isDatasetVisible(i)) return;
      const meta = chart.getDatasetMeta(i);
      meta.data.forEach((point, j) => {
        const val = ds.data[j];
        if (val === null || val === undefined) return;
        const text = Number.isInteger(val) ? String(val) : val.toFixed(1);
        ctx.save();
        ctx.font = 'bold 9px Arial, sans-serif';
        ctx.fillStyle = ds.borderColor || '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(text, point.x, point.y - 5);
        ctx.restore();
      });
    });
  }
};

/* ═══════════════════════════════════════════════════════
   PLUGIN: LINHA ATUAL (última linha tracejada por dataset)
═══════════════════════════════════════════════════════ */
const linhaAtualPlugin = {
  id: 'linhaAtualHT',
  afterDraw(chart) {
    const cfg = chart.options?.plugins?.linhaAtualHT ?? {};
    if (cfg.enabled === false) return;
    const { ctx, chartArea, scales } = chart;
    if (!chartArea || !scales.y) return;
    const yS = scales.y;
    const { left, right, top, bottom } = chartArea;
    const PAD = 5, H = 18;

    const entries = [];
    chart.data.datasets.forEach((d, i) => {
      if (!chart.isDatasetVisible(i)) return;
      const arr = d.data;
      if (!arr?.length) return;
      let yVal = null;
      for (let j = arr.length - 1; j >= 0; j--) {
        const v = arr[j];
        if (v !== null && v !== undefined && typeof v === 'number' && isFinite(v)) { yVal = v; break; }
      }
      if (yVal === null) return;
      const yPx = yS.getPixelForValue(yVal);
      if (!isFinite(yPx) || yPx < top || yPx > bottom) return;
      entries.push({ yVal, yPx, color: d.borderColor || '#fff' });
    });
    if (!entries.length) return;

    entries.sort((a, b) => a.yPx - b.yPx);
    entries.forEach((e, i) => {
      e.badgeY = i === 0 ? e.yPx : (e.yPx - entries[i-1].badgeY < H + 2 ? entries[i-1].badgeY + H + 2 : e.yPx);
    });

    entries.forEach(({ yVal, yPx, badgeY, color }) => {
      ctx.save();
      ctx.strokeStyle = color; ctx.lineWidth = 1.2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.moveTo(left, yPx); ctx.lineTo(right, yPx); ctx.stroke();
      ctx.setLineDash([]);
      const text = Number.isInteger(yVal) ? `${yVal}` : `${yVal.toFixed(1)}`;
      ctx.font = 'bold 10px Arial, sans-serif';
      ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      const bw = Math.ceil(ctx.measureText(text).width) + PAD * 2;
      const bx = right + 4, by = badgeY - H / 2;
      ctx.fillStyle = 'rgba(10,12,20,0.95)';
      ctx.fillRect(bx, by, bw, H);
      ctx.strokeStyle = color; ctx.lineWidth = 1.2;
      ctx.strokeRect(bx, by, bw, H);
      ctx.fillStyle = color;
      ctx.fillText(text, bx + PAD, badgeY);
      ctx.restore();
    });
  }
};

/* ═══════════════════════════════════════════════════════
   PLUGIN: LINHAS ARRASTÁVEIS
═══════════════════════════════════════════════════════ */
function buildDragPlugin(league) {
  return {
    id: 'linhaDraggable_' + league,
    afterInit(chart) {
      const canvas = chart.canvas;
      chart.dragLines = loadDragLines(league);
      chart._selectedDragLine = -1;
      const HIT = 8;
      let dragIdx = -1;

      const getYS   = () => chart.scales.y;
      const getEvtY = evt => {
        const rect = canvas.getBoundingClientRect();
        return ((evt.touches?.[0]?.clientY) ?? evt.clientY ?? 0) - rect.top;
      };
      const nearest = pxY => {
        const yS = getYS();
        if (!yS || !chart.chartArea) return -1;
        const { top, bottom } = chart.chartArea;
        let best = -1, bestD = Infinity;
        (chart.dragLines || []).forEach((l, i) => {
          const ly = yS.getPixelForValue(l.y);
          if (ly < top || ly > bottom) return;
          const d = Math.abs(ly - pxY);
          if (d < bestD && d <= HIT) { bestD = d; best = i; }
        });
        return best;
      };

      chart.addDragLine = (color = '#1fcc59') => {
        if ((chart.dragLines || []).length >= MAX_DRAG_LINES) { alert(`Máximo de ${MAX_DRAG_LINES} linhas!`); return; }
        const yS = getYS(); if (!yS) return;
        chart.dragLines.push({ y: Math.round((yS.min + yS.max) / 2), color, dragging: false });
        chart._selectedDragLine = chart.dragLines.length - 1;
        saveDragLines(league, chart.dragLines); updateDragCounter(league); chart.update();
      };
      chart.deleteDragLine = () => {
        const idx = chart._selectedDragLine;
        if (idx >= 0 && idx < (chart.dragLines || []).length) {
          chart.dragLines.splice(idx, 1); chart._selectedDragLine = -1;
          saveDragLines(league, chart.dragLines); updateDragCounter(league); chart.update();
        }
      };
      chart.clearDragLines = () => {
        chart.dragLines = []; chart._selectedDragLine = -1;
        saveDragLines(league, chart.dragLines); updateDragCounter(league); chart.update();
      };

      const startDrag = evt => {
        const pxY = getEvtY(evt), idx = nearest(pxY);
        if (idx >= 0) {
          if (evt.cancelable) evt.preventDefault();
          dragIdx = idx; chart.dragLines[idx].dragging = true; chart._selectedDragLine = idx;
        } else { chart._selectedDragLine = -1; }
        chart.update();
      };
      const moveDrag = evt => {
        if (dragIdx < 0) return;
        if (evt.cancelable) evt.preventDefault();
        const yS = getYS(); if (!yS) return;
        let v = yS.getValueForPixel(getEvtY(evt));
        v = Math.max(yS.min, Math.min(yS.max, Math.round(v * 10) / 10));
        chart.dragLines[dragIdx].y = v; chart.update('active');
      };
      const stopDrag = () => {
        if (dragIdx >= 0 && chart.dragLines[dragIdx]) chart.dragLines[dragIdx].dragging = false;
        if (dragIdx >= 0) saveDragLines(league, chart.dragLines);
        dragIdx = -1;
      };

      canvas.addEventListener('mousedown',   startDrag);
      canvas.addEventListener('mousemove',   moveDrag);
      canvas.addEventListener('mouseleave',  stopDrag);
      window.addEventListener('mouseup',     stopDrag);
      canvas.addEventListener('touchstart',  startDrag, { passive: false });
      canvas.addEventListener('touchmove',   moveDrag,  { passive: false });
      canvas.addEventListener('touchend',    stopDrag,  { passive: true });
      canvas.addEventListener('touchcancel', stopDrag,  { passive: true });
      window.addEventListener('keydown', e => {
        if ((e.key === 'Delete' || e.key === 'Backspace') && chartInstances[league])
          chartInstances[league].deleteDragLine();
      });
      updateDragCounter(league);
    },

    afterDatasetsDraw(chart) {
      const yS = chart.scales.y, lines = chart.dragLines || [];
      if (!yS || !lines.length || !chart.chartArea) return;
      const { ctx, chartArea: { left, right } } = chart;
      lines.forEach((l, idx) => {
        const yPx = yS.getPixelForValue(l.y);
        if (!Number.isFinite(yPx)) return;
        const isSel = idx === chart._selectedDragLine;
        ctx.save();
        ctx.beginPath(); ctx.setLineDash(isSel ? [4, 2] : []);
        ctx.lineWidth = isSel ? 1.8 : 1.2;
        ctx.strokeStyle = l.color || '#1fcc59';
        ctx.moveTo(left, yPx); ctx.lineTo(right, yPx); ctx.stroke(); ctx.setLineDash([]);
        if (isSel) {
          ctx.beginPath(); ctx.arc(left + 10, yPx, 4, 0, Math.PI * 2);
          ctx.fillStyle = l.color || '#1fcc59'; ctx.fill();
        }
        const text = l.y.toFixed(1);
        ctx.font = isSel ? 'bold 10px Arial' : '10px Arial';
        ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
        const PAD = 5, BH = 16;
        const bw = Math.ceil(ctx.measureText(text).width) + PAD * 2;
        const bx = right + 4, by = yPx - BH / 2;
        ctx.fillStyle = 'rgba(10,12,20,0.95)';
        ctx.fillRect(bx, by, bw, BH);
        ctx.strokeStyle = l.color || '#1fcc59'; ctx.lineWidth = isSel ? 1.5 : 1;
        ctx.strokeRect(bx, by, bw, BH);
        ctx.fillStyle = l.color || '#1fcc59';
        ctx.fillText(text, bx + PAD, yPx);
        ctx.restore();
      });
    }
  };
}

/* ═══════════════════════════════════════════════════════
   CRIAR GRÁFICO
═══════════════════════════════════════════════════════ */
function createChart(league, processedData) {
  const canvas = document.getElementById(CANVAS_IDS[league]);
  if (!canvas) return;

  const datasets = DATASET_CONFIGS.map(cfg => ({
    label:                cfg.label,
    data:                 processedData[LABEL_TO_KEY[cfg.label]],
    borderColor:          cfg.color,
    backgroundColor:      cfg.color,
    pointBackgroundColor: cfg.color,
    pointBorderColor:     'rgba(0,0,0,0)',
    pointBorderWidth:     0,
    borderWidth:          2,
    pointRadius:          4,
    fill:                 false,
    hidden:               !visibleDatasets[league][cfg.label]
  }));

  const chart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: { labels: processedData.labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 30, right: 80 } },
      plugins: {
        legend:       { display: false, labels: { color: '#e0e0e0', font: { size: 12 }, generateLabels: Chart.defaults.plugins.legend.labels.generateLabels } },
        datalabels:   { display: false },   // desativado, usamos rotulosPlugin
        rotulosHT:    { enabled: true },
        linhaAtualHT: { enabled: true },
        tooltip: {
          enabled: true,
          backgroundColor: 'rgba(0,0,0,0.85)',
          titleColor:  '#1fad8b',
          bodyColor:   '#e0e0e0',
          borderColor: '#1fad8b',
          borderWidth: 1,
          callbacks: {
            title(items) {
              const idx = items[0].dataIndex + averagePoints;
              const m   = chartData[league]?.[idx];
              return m ? `${m.hora}:${String(m.minuto).padStart(2,'0')}` : '';
            },
            label(ctx) {
              const idx = ctx.dataIndex + averagePoints;
              const m   = chartData[league]?.[idx];
              const ftScore = m?.ft || 'N/A';
              const htScore = formatHtResult(m?.ht) || 'N/A';
              return [`FT: ${ftScore}`, `HT: ${htScore}`, `${ctx.dataset.label}: ${Math.round(ctx.raw)}`];
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { display: false },
          grid:  { display: false }
        },
        y: {
          beginAtZero: false,
          ticks: { color: '#b0b0b0' },
          grid:  { color: 'rgba(255,255,255,0.1)', lineWidth: 0.5 },
          afterFit(scale) { scale.paddingTop = 20; }
        }
      }
    },
    plugins: [
      buildFibonacciPlugin(league),
      rotulosPlugin,
      linhaAtualPlugin,
      buildDragPlugin(league),
      buildHtmlLegendPlugin(league)
    ]
  });

  chartInstances[league] = chart;
}

/* ═══════════════════════════════════════════════════════
   ATUALIZAR GRÁFICO EXISTENTE
═══════════════════════════════════════════════════════ */
function updateChart(league, processedData) {
  const chart = chartInstances[league];
  if (!chart) return;
  chart.data.labels = processedData.labels;
  chart.data.datasets.forEach(ds => {
    const key = LABEL_TO_KEY[ds.label];
    if (key) ds.data = processedData[key];
  });
  chart.update('none');
}

/* ═══════════════════════════════════════════════════════
   FETCH + REFRESH
═══════════════════════════════════════════════════════ */
function updateCharts() {
  LEAGUES.forEach(league => {
    const url = `${LEAGUE_URLS[league]}?timestamp=${Date.now()}`;
    fetch(url)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        const processed = processApiData(data, league);
        if (!chartInstances[league]) createChart(league, processed);
        else updateChart(league, processed);
      })
      .catch(err => console.error(`Erro ${league}:`, err));
  });
}

/* ═══════════════════════════════════════════════════════
   ACCORDION
═══════════════════════════════════════════════════════ */
function toggleAccordion(btn) {
  const content = btn.nextElementSibling;
  content.classList.toggle('open');
  btn.textContent = btn.textContent.includes('▼')
    ? btn.textContent.replace('▼', '▶')
    : btn.textContent.replace('▶', '▼');
}

/* ═══════════════════════════════════════════════════════
   LINHA PANEL
═══════════════════════════════════════════════════════ */
function toggleLinhaPanel(league, e) {
  e.stopPropagation();
  LEAGUES.forEach(l => {
    const p = document.getElementById('linhaToolsPanel_' + l);
    if (p && l !== league) p.classList.remove('show');
  });
  const p = document.getElementById('linhaToolsPanel_' + league);
  if (p) p.classList.toggle('show');
}
document.addEventListener('click', () => {
  LEAGUES.forEach(l => {
    const p = document.getElementById('linhaToolsPanel_' + l);
    if (p) p.classList.remove('show');
  });
});
LEAGUES.forEach(l => {
  const p = document.getElementById('linhaToolsPanel_' + l);
  if (p) p.addEventListener('click', e => e.stopPropagation());
});

function adicionarLinha(league) {
  const color = document.getElementById('lineColorPicker_' + league)?.value || '#1fcc59';
  chartInstances[league]?.addDragLine(color);
}
function deletarLinhaSelecionada(league) { chartInstances[league]?.deleteDragLine(); }
function limparTodasLinhas(league)       { chartInstances[league]?.clearDragLines(); }

/* ═══════════════════════════════════════════════════════
   CONTROLES GLOBAIS
═══════════════════════════════════════════════════════ */
document.getElementById('pointsSelector').addEventListener('change', function () {
  numPoints = parseInt(this.value, 10);
  updateCharts();
});
document.getElementById('averageSelector').addEventListener('change', function () {
  averagePoints = parseInt(this.value, 10);
  updateCharts();
});

/* Fibonacci por liga */
document.querySelectorAll('.fibToggle').forEach(cb => {
  cb.addEventListener('change', function () {
    const league = this.dataset.league;
    showFibonacci[league] = this.checked;
    chartInstances[league]?.update();
  });
});

/* Rótulos por liga */
document.querySelectorAll('.rotulosToggle').forEach(cb => {
  cb.addEventListener('change', function () {
    const league = this.dataset.league;
    const chart  = chartInstances[league];
    if (!chart) return;
    chart.options.plugins.rotulosHT.enabled = this.checked;
    chart.update();
  });
});

/* Linha Atual por liga */
document.querySelectorAll('.linhaAtualToggle').forEach(cb => {
  cb.addEventListener('change', function () {
    const league = this.dataset.league;
    const chart  = chartInstances[league];
    if (!chart) return;
    chart.options.plugins.linhaAtualHT.enabled = this.checked;
    chart.update();
  });
});

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
window.addEventListener('load', updateCharts);
setInterval(updateCharts, 3000);
    </script>
