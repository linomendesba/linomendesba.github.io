    <style>
        .logo2 { width: 60px; height: auto; }

        .sample-badge {
            display: block;
            font-size: 9px;
            font-weight: 400;
            opacity: 0.65;
            line-height: 1;
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        td[title] { cursor: default; }

        .current-hour-label {
            font-size: 11px;
            color: #aaa;
            text-align: right;
            padding: 2px 8px 4px;
            font-style: italic;
        }

        .legend-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 6px 8px 10px;
            font-size: 11px;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

        /* NOVOS ESTILOS PARA A LISTA 100% - ALTO CONTRASTE */
        .percent100-section {
            margin-top: 30px;
            padding: 20px;
            background: #0d1117;
            border-radius: 12px;
            border: 2px solid #30363d;
        }
        
        .percent100-title {
            font-size: 18px;
            font-weight: 700;
            color: #f0f6fc;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .percent100-title::before {
            content: "📊";
            font-size: 22px;
        }
        
        /* CONTROLES - MODO HORA */
        .percent100-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            background: #161b22;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .control-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .percent100-btn {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .percent100-btn:hover {
            background: #30363d;
            border-color: #58a6ff;
            color: #f0f6fc;
        }
        
        .percent100-btn.active {
            background: #238636;
            color: #ffffff;
            border-color: #2ea043;
            box-shadow: 0 0 10px rgba(35, 134, 54, 0.4);
        }
        
        /* BOTÃO EXPORTAR LISTA LIMPA */
        .export-list-btn {
            background: #1f6feb;
            color: #ffffff;
            border: 1px solid #388bfd;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .export-list-btn:hover {
            background: #388bfd;
            border-color: #58a6ff;
            box-shadow: 0 0 15px rgba(31, 111, 235, 0.4);
            transform: translateY(-1px);
        }
        
        .export-list-btn:active {
            transform: translateY(0);
        }
        
        .export-list-btn::before {
            content: "📥";
            font-size: 14px;
        }
        
        .hour-select {
            background: #21262d;
            color: #f0f6fc;
            border: 1px solid #30363d;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            min-width: 120px;
        }
        
        .hour-select:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }
        
        /* GRID DE LIGAS */
        .percent100-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }
        
        .percent100-column {
            background: #161b22;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid #30363d;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }
        
        .percent100-column:hover {
            transform: translateY(-2px);
            border-color: #58a6ff;
        }
        
        /* BOTÃO EXPORTAR INDIVIDUAL POR LIGA */
        .export-column-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #58a6ff;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .export-column-btn:hover {
            background: #1f6feb;
            color: white;
            border-color: #388bfd;
        }
        
        .percent100-league-name {
            font-size: 14px;
            font-weight: 700;
            color: #f0f6fc;
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 2px solid #30363d;
            margin-bottom: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding-right: 30px;
        }
        
        .percent100-league-name::before {
            content: "🏆";
            font-size: 16px;
        }
        
        .percent100-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .percent100-item {
            font-size: 14px;
            font-weight: 600;
            color: #7ee787;
            padding: 8px 0;
            text-align: center;
            border-bottom: 1px solid #21262d;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .percent100-item::before {
            content: "✓";
            color: #238636;
            font-weight: bold;
        }
        
        .percent100-item:last-child {
            border-bottom: none;
        }
        
        .percent100-item.dash {
            color: #484f58;
        }
        
        .percent100-item.dash::before {
            content: "—";
            color: #484f58;
        }
        
        .percent100-empty {
            color: #8b949e;
            text-align: center;
            font-size: 13px;
            padding: 20px 0;
            font-style: italic;
        }
        
        .percent100-loading {
            text-align: center;
            color: #8b949e;
            font-size: 14px;
            padding: 30px;
            font-weight: 500;
        }
        
        .percent100-stats {
            text-align: center;
            font-size: 12px;
            color: #8b949e;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #21262d;
        }
        
        .percent100-count {
            color: #7ee787;
            font-weight: 700;
            font-size: 16px;
        }
    </style>
