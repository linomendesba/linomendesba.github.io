<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BetStat</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background-color:#1c1f26;color:#e4e4e7;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;padding:30px 20px;min-height:100vh}.container{max-width:1600px;margin:0 auto}h1{text-align:center;color:#1fac89;margin-bottom:40px;font-size:2.2em;font-weight:600;letter-spacing:-.5px}.controls{display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:30px;padding:24px;background-color:#252932;border-radius:12px;border:1px solid #2d3139;box-shadow:0 2px 8px rgba(0,0,0,.2)}.controls label{font-size:1em;color:#a1a1aa;font-weight:500}.controls select{padding:12px 24px;font-size:.95em;background-color:#1c1f26;color:#e4e4e7;border:1px solid #3f444e;border-radius:8px;cursor:pointer;transition:all .2s ease;outline:0}.controls select:hover{border-color:#1fac89}.controls select:focus{border-color:#1fac89;box-shadow:0 0 0 3px rgba(31,172,137,.1)}.stats-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:40px}.stat-card{background-color:#252932;padding:24px;border-radius:12px;border:1px solid #2d3139;box-shadow:0 2px 8px rgba(0,0,0,.2)}.stat-card h3{color:#1fac89;font-size:.9em;font-weight:500;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}.stat-value{color:#e4e4e7;font-size:1.4em;font-weight:600;margin-bottom:8px}.stat-detail{color:#a1a1aa;font-size:.9em}.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(700px,1fr));gap:30px;margin-bottom:30px}.chart-container{background-color:#252932;padding:24px;border-radius:12px;border:1px solid #2d3139;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s ease}.chart-container:hover{transform:translateY(-2px)}.chart-title{text-align:center;color:#1fac89;font-size:1.2e elhor combinação: ${e[r.name].avgGoals.toFixed(1)} gols/hora + tendência positiva`}function createChart(e,t){const a=document.getElementById(e).getContext("2d");return new Chart(a,{type:"bar",data:{labels:[],datasets:[{label:"Total de Gols",data:[],backgroundColor:[],borderColor:[],borderWidth:2}]},options:{responsive:!0,maintainAspectRatio:!1,scales:{y:{beginAtZero:!0,ticks:{color:"#a1a1aa",stepSize:10,font:{size:11}},grid:{color:"rgba(255, 255, 255, 0.08)",drawBorder:!1}},x:{ticks:{display:!1},grid:{color:"rgba(255, 255, 255, 0.15)",drawBorder:!0,borderColor:"rgba(255, 255, 255, 0.2)"}}},plugins:{legend:{display:!0,labels:{color:"#1fac89",font:{size:13,weight:"500"}}},tooltip:{backgroundColor:"rgba(0, 0, 0, 0.9)",titleColor:"#1fac89",bodyColor:"#e4e4e7",borderColor:"#1fac89",borderWidth:1,padding:12,callbacks:{title:e=>{const t=e[0].dataIndex,a=e[0].chart.hourData[t];return`${a.date.toString().padStart(2,"0")}/${(a.month+1).toString().padStart(2,"0")} às ${a.hour.toString().padStart(2,"0")}:00`},label:e=>`Total de Gols: ${e.parsed.y}`}}}}})}async function updateChart(e,t){const a=parseInt(document.getElementById("hoursSelector").value),r=processDataByHour(await fetchLeagueData(e.url),a);leaguesData[e.name]=r;const o=r.map((e,t)=>t),n=r.map(e=>e.goals),s=r.map(e=>e.isCurrent?"rgba(31, 172, 137, 0.7)":"rgba(255, 255, 0, 0.6)"),l=r.map(e=>e.isCurrent?"rgba(31, 172, 137, 1)":"rgba(255, 255, 0, 1)"),c=`chart-${t}`;charts[c]&&(charts[c].data.labels=o,charts[c].data.datasets[0].data=n,charts[c].data.datasets[0].backgroundColor=s,charts[c].data.datasets[0].borderColor=l,charts[c].hourData=r,charts[c].update())}async function initializeCharts(){const e=document.getElementById("chartsGrid");e.innerHTML="",LEAGUES.forEach((t,a)=>{const r=document.createElement("div");r.className="chart-container",r.innerHTML=`\n                    <div class="chart-title">${t.name}</div>\n                    <div class="chart-wrapper">\n                        <canvas id="chart-${a}"></canva
