<body>
<div id="nav-header"></div>
<div class="container">
    <h1>⏰ Hora Fixa - Análise Temporal</h1>

    <div class="controls">

            <select id="marketSelect">
                <option value="ambas">Ambas Marcam</option>

    <div class="legend-bar">

        <div class="legend-item"><div class="legend-dot percent-70-80"></div> 70-79%</div>
        <div class="legend-item"><div class="legend-dot percent-60-70"></div> 60-69%</div>
        <div class="legend-item"><div class="legend-dot percent-50-60"></div> 50-59%</div>
        <div class="legend-item"><div class="legend-dot percent-40-50"></div> 40-49%</div>

    <div class="current-hour-label" id="currentHourLabel"></div>

        <thead id="currentHourHeader"></thead>
        <tbody id="currentHourBody"></tbody>

    <table>
        <thead id="tableHeader"></thead>
        <tbody id="resultsBody"></tbody>
    </table>

    <!-- SEÇÃO 100% COM AUTO-SAVE -->
    <div class="percent100-section">
        <div class="percent100-title">Minutos 100%</div>

        <div class="percent100-controls">
            <div class="control-group">
                <span class="control-label">Modo de Exibição</span>
                <div style="display: flex; gap: 8px;">
                    <button class="percent100-btn active" onclick="togglePercent100Mode('current')">Hora Atual</button>
                    <button class="percent100-btn" onclick="togglePercent100Mode('all')">Todas Horas</button>
                </div>
            </div>

            <div class="control-group">
                <span class="control-label">Filtrar por Horário</span>
                <div style="display: flex; gap: 8px;">
                    <button class="percent100-btn hour-filter active" onclick="toggleHourMode('all')">Todas</button>
                    <select class="hour-select" id="hourFilterSelect" onchange="applyHourFilter()">
                        <option value="all">Selecione</option>
                    </select>
                </div>
            </div>

            <button class="export-list-btn" onclick="exportFullList()">Exportar Lista</button>
        </div>

        <div class="percent100-grid" id="percent100Grid"></div>
    </div>
</div>

<script>
    // ARMAZENAMENTO GLOBAL DAS LISTAS CALCULADAS
    let lastCalculatedResults = [];
    let currentPercent100Mode = 'current';
    let currentHourFilter = 'all';

    const leagueUrls = {
        "Bundesliga": "https://betstat.site/api/alemanha",
        "Ligue 1": "https://betstat.site/api/franca",
        "LaLiga": "https://betstat.site/api/espanha",
        "Liga Italiana": "https://betstat.site/api/italia",
        "Liga Atalanta": "https://betstat.site/api/atalanta",
        "Premier League": "https://betstat.site/api/inglaterra"
    };

    const leagueNames = Object.keys(leagueUrls);

    function initHourSelect() {
        const sel = document.getElementById('hourFilterSelect');
        sel.innerHTML = '<option value="all">Todas as Horas</option>';
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            const opt = document.createElement('option');
            opt.value = hh;
            opt.textContent = hh + ':00';
            sel.appendChild(opt);
        }
    }

    function toggleHourMode(mode) {
        currentHourFilter = mode;
        document.querySelectorAll('.hour-filter').forEach(b => b.classList.remove('active'));
        if (mode === 'all') {
            document.querySelector('.hour-filter[onclick*="all"]').classList.add('active');
            document.getElementById('hourFilterSelect').value = 'all';
            document.getElementById('hourFilterSelect').disabled = true;
        } else {
            document.getElementById('hourFilterSelect').disabled = false;
        }
        saveCurrentState();
        renderPercent100List();
    }

    function applyHourFilter() {
        const val = document.getElementById('hourFilterSelect').value;
        currentHourFilter = val;
        document.querySelectorAll('.hour-filter').forEach(b => b.classList.remove('active'));
        saveCurrentState();
        renderPercent100List();
    }

    function togglePercent100Mode(mode) {
        currentPercent100Mode = mode;
        document.querySelectorAll('.percent100-btn').forEach(b => {
            if (b.textContent.includes('Hora Atual') || b.textContent.includes('Todas Horas')) {
                b.classList.remove('active');
            }
        });
        if (mode === 'current') {
            document.querySelector('.percent100-btn[onclick*="current"]').classList.add('active');
        } else {
            document.querySelector('.percent100-btn[onclick*="all"]').classList.add('active');
        }
        saveCurrentState();
        renderPercent100List();
    }

    // SISTEMA DE AUTO-SAVE
    function saveCurrentState() {
        const state = {
            league: document.getElementById('leagueSelect').value,
            market: document.getElementById('marketSelect').value,
            gales: document.getElementById('rangeSelect').value,
            mode: currentPercent100Mode,
            hourFilter: currentHourFilter,
            timestamp: new Date().toISOString()
        };
        localStorage.setItem('horaFixaState', JSON.stringify(state));
    }

    function loadSavedState() {
        const saved = localStorage.getItem('horaFixaState');
        if (saved) {
            try {
                const state = JSON.parse(saved);
                if (state.league) document.getElementById('leagueSelect').value = state.league;
                if (state.market) document.getElementById('marketSelect').value = state.market;
                if (state.gales) document.getElementById('rangeSelect').value = state.gales;
                if (state.mode) currentPercent100Mode = state.mode;
                if (state.hourFilter) currentHourFilter = state.hourFilter;
            } catch (e) {
                console.error('Erro ao carregar estado salvo:', e);
            }
        }
    }

    function getLeagueNameFromUrl(url) {
        for (const [name, leagueUrl] of Object.entries(leagueUrls)) {
            if (leagueUrl === url) return name;
        }
        return "Liga";
    }

    function getMarketText(market) {
        const marketMap = {
            'ambas': 'Ambas Marcam',
            'mais05': 'Mais de 0.5 Gols',
            'mais15': 'Mais de 1.5 Gols',
            'mais25': 'Mais de 2.5 Gols',
            'mais35': 'Mais de 3.5 Gols'
        };
        return marketMap[market] || market;
    }

    async function handleSelectionChange() {
        saveCurrentState();
        
        const selectedLeague = document.getElementById("leagueSelect").value;
        const market = document.getElementById("marketSelect").value;
        const gales = parseInt(document.getElementById("rangeSelect").value, 10);

        if (selectedLeague === "todos") {
            const promises = leagueNames.map(name => {
                const url = leagueUrls[name];
                return fetch(url)
                    .then(r => r.json())
                    .then(data => calculate100PercentMinutes(data, market, gales, name))
                    .catch(() => ({ leagueName: name, minutes: [] }));
            });
            lastCalculatedResults = await Promise.all(promises);
        } else {
            const url = leagueUrls[selectedLeague];
            if (!url) return;
            try {
                const data = await fetch(url).then(r => r.json());
                const result = calculate100PercentMinutes(data, market, gales, selectedLeague);
                lastCalculatedResults = [result];
                processApiData(data);
            } catch (err) {
                console.error("Erro ao buscar dados:", err);
            }
        }

        renderPercent100List();
    }

    document.getElementById("leagueSelect").addEventListener("change", handleSelectionChange);
    document.getElementById("marketSelect").addEventListener("change", handleSelectionChange);
    document.getElementById("rangeSelect").addEventListener("change", handleSelectionChange);

    const leagueSelect = document.getElementById("leagueSelect");
    leagueNames.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        leagueSelect.appendChild(opt);
    });

    function getDayKey(game, gameIndex, gamesPerHour) {
        const d = new Date(`${game.data}T${String(game.hora).padStart(2, '0')}:${String(game.minuto).padStart(2, '0')}:00`);
        if (isNaN(d.getTime())) {
            const dayNum = Math.floor(gameIndex / (gamesPerHour * 24));
            return `day${dayNum}`;
        }
        return d.toISOString().split('T')[0];
    }

    function checkMarket(game, market) {
        const gh = parseInt(game.gols_casa_ht, 10) || 0;
        const ga = parseInt(game.gols_fora_ht, 10) || 0;
        const total = gh + ga;
        if (market === "ambas") return gh > 0 && ga > 0;
        if (market === "mais05") return total > 0;
        if (market === "mais15") return total > 1;
        if (market === "mais25") return total > 2;
        if (market === "mais35") return total > 3;
        return false;
    }

    function calculate100PercentMinutes(data, market, gales, leagueName) {
        const uniqueMinutes = [...new Set(data.map(g => parseInt(g.minuto, 10)))].sort((a, b) => a - b);
        const numMins = uniqueMinutes.length;
        const gamesPerHour = numMins;

        const daySet = new Set();
        data.forEach((game, idx) => {
            daySet.add(getDayKey(game, idx, gamesPerHour));
        });
        const sortedDays = [...daySet].sort();

        const slotMap = {};
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            slotMap[hh] = {};
            uniqueMinutes.forEach(m => {
                slotMap[hh][String(m).padStart(2, '0')] = {};
            });
        }

        data.forEach((game, idx) => {
            const hh = String(game.hora).padStart(2, '0');
            const mm = String(game.minuto).padStart(2, '0');
            const dk = getDayKey(game, idx, gamesPerHour);
            if (slotMap[hh] && slotMap[hh][mm] !== undefined) {
                slotMap[hh][mm][dk] = game;
            }
        });

        const result100 = [];

        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            uniqueMinutes.forEach((baseMin, minIdx) => {
                const bm = String(baseMin).padStart(2, '0');

                let totalGames = 0;
                let greenGames = 0;

                sortedDays.forEach(dayKey => {
                    const baseGame = slotMap[hh][bm][dayKey];
                    if (!baseGame) return;

                    totalGames++;
                    let green = false;

                    for (let attempt = 0; attempt < gales && !green; attempt++) {
                        const targetMinIdx = minIdx + attempt;
                        if (targetMinIdx >= numMins) break;

                        const tm = String(uniqueMinutes[targetMinIdx]).padStart(2, '0');
                        const targetGame = slotMap[hh][tm][dayKey];
                        if (!targetGame) continue;

                        if (checkMarket(targetGame, market)) {
                            green = true;
                        }
                    }
                    if (green) greenGames++;
                });

                if (totalGames > 0) {
                    const pct = (greenGames / totalGames) * 100;
                    if (pct >= 100) {
                        result100.push({ hour: hh, minute: bm });
                    }
                }
            });
        }

        return {
            leagueName: leagueName,
            minutes: result100.map(m => `${m.hour}:${m.minute}`)
        };
    }

    function renderPercent100List() {
        const grid = document.getElementById('percent100Grid');
        grid.innerHTML = '';

        if (lastCalculatedResults.length === 0) {
            grid.innerHTML = '<div class="no-data-msg">Nenhum dado disponível. Selecione uma liga para ver os minutos 100%.</div>';
            return;
        }

        const now = new Date();
        const currentHour = String(now.getHours()).padStart(2, '0');

        lastCalculatedResults.forEach(data => {
            let minutesToShow = [];

            if (currentPercent100Mode === 'current') {
                minutesToShow = data.minutes.filter(m => m.startsWith(currentHour + ':'));
            } else {
                minutesToShow = data.minutes;
            }

            if (currentHourFilter !== 'all') {

                noData.className = 'no-data-msg';

                minutesToShow.forEach(minute => {

                    item.className = 'minute-item';
                    item.textContent = minute;
                    list.appendChild(item);
                });
            }

            col.appendChild(exportBtn);
            col.appendChild(header);
            col.appendChild(list);
            grid.appendChild(col);
        });
    }

        const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        return { date, time };

    function downloadTxt(content, filename) {
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function showExportFeedback(btn) {
        if (!btn) return;
        const originalHTML = btn.innerHTML;
        const originalBg = btn.style.background;
        
        btn.innerHTML = '✓';
        btn.style.background = '#238636';
        
        setTimeout(() => {
            btn.innerHTML = originalHTML;
            btn.style.background = originalBg;
        }, 1500);
    }

    function processApiData(data) {
        const market = document.getElementById("marketSelect").value;
        const gales  = parseInt(document.getElementById("rangeSelect").value, 10);

        const uniqueMinutes = [...new Set(data.map(g => parseInt(g.minuto, 10)))].sort((a, b) => a - b);
        const numMins = uniqueMinutes.length;

        const gamesPerHour = numMins;

        const daySet = new Set();
        data.forEach((game, idx) => {
            daySet.add(getDayKey(game, idx, gamesPerHour));
        });
        const sortedDays = [...daySet].sort();
        const numDays = sortedDays.length;

        const slotMap = {};
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            slotMap[hh] = {};
            uniqueMinutes.forEach(m => {
                slotMap[hh][String(m).padStart(2, '0')] = {};
            });
        }

        data.forEach((game, idx) => {
            const hh = String(game.hora).padStart(2, '0');
            const mm = String(game.minuto).padStart(2, '0');
            const dk = getDayKey(game, idx, gamesPerHour);
            if (slotMap[hh] && slotMap[hh][mm] !== undefined) {
                slotMap[hh][mm][dk] = game;
            }
        });

        const result = {};
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            result[hh] = {};
            uniqueMinutes.forEach(m => {
                result[hh][String(m).padStart(2, '0')] = { total: 0, green: 0 };
            });
        }
        const totals = {};
        uniqueMinutes.forEach(m => { totals[String(m).padStart(2, '0')] = { total: 0, green: 0 }; });

        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');

            uniqueMinutes.forEach((baseMin, minIdx) => {
                const bm = String(baseMin).padStart(2, '0');

                sortedDays.forEach(dayKey => {
                    const baseGame = slotMap[hh][bm][dayKey];
                    if (!baseGame) return;

                    result[hh][bm].total += 1;
                    totals[bm].total += 1;

                    let green = false;

                    for (let attempt = 0; attempt < gales && !green; attempt++) {
                        const targetMinIdx = minIdx + attempt;
                        if (targetMinIdx >= numMins) break;

                        const tm = String(uniqueMinutes[targetMinIdx]).padStart(2, '0');
                        const targetGame = slotMap[hh][tm][dayKey];
                        if (!targetGame) continue;

                        if (checkMarket(targetGame, market)) {
                            green = true;
                        }
                    }

                    if (green) {
                        result[hh][bm].green += 1;
                        totals[bm].green += 1;
                    }
                });
            });
        }

        displayTable(result, uniqueMinutes, totals, numDays);
    }

    function pct(slot) {
        return slot.total > 0 ? (slot.green / slot.total) * 100 : 0;
    }

    function cellClass(p) {
        if (p >= 100) return "percent-100";
        if (p >= 90)  return "percent-90-99";
        if (p >= 80)  return "percent-80-90";
        if (p >= 70)  return "percent-70-80";
        if (p >= 60)  return "percent-60-70";
        if (p >= 50)  return "percent-50-60";
        if (p >= 40)  return "percent-40-50";
        return "percent-0-40";
    }

    function makeCell(slot, tag = "td") {
        const p = pct(slot);
        const el = document.createElement(tag);
        el.textContent = Math.round(p) + "%";
        el.className = cellClass(p);
        return el;
    }

    function displayTable(result, uniqueMinutes, totals, numDays) {
        const now = new Date();
        const currentHour = String(now.getHours()).padStart(2, '0');

        document.getElementById("currentHourLabel").textContent =
            `Hora atual: ${currentHour}h — ${numDays} dias de dados`;

        const headerHTML = "<tr><th>H</th>" +
            uniqueMinutes.map(m => `<th>${String(m).padStart(2, '0')}</th>`).join("") +
            "</tr>";
        document.getElementById("tableHeader").innerHTML = headerHTML;
        document.getElementById("currentHourHeader").innerHTML = headerHTML;

        const curBody = document.getElementById("currentHourBody");
        curBody.innerHTML = "";
        const curRow = document.createElement("tr");
        const curHCell = document.createElement("td");
        curHCell.textContent = currentHour;
        curRow.appendChild(curHCell);
        uniqueMinutes.forEach(m => {
            curRow.appendChild(makeCell(result[currentHour][String(m).padStart(2, '0')]));
        });
        curBody.appendChild(curRow);

        const body = document.getElementById("resultsBody");
        body.innerHTML = "";
        for (let h = 23; h >= 0; h--) {
            const hh = String(h).padStart(2, '0');
            const row = document.createElement("tr");
            const hCell = document.createElement("td");
            hCell.textContent = hh;
            row.appendChild(hCell);
            uniqueMinutes.forEach(m => {
                row.appendChild(makeCell(result[hh][String(m).padStart(2, '0')]));
            });
            body.appendChild(row);
        }

        const totalRow = document.createElement("tr");
        totalRow.className = "total-row";
        const tLabel = document.createElement("th");
        tLabel.textContent = "%";
        totalRow.appendChild(tLabel);
        uniqueMinutes.forEach(m => {
            totalRow.appendChild(makeCell(totals[String(m).padStart(2, '0')]));
        });
        body.appendChild(totalRow);
    }
