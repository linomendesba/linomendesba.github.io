<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="img/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="fixos.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4WT805FFHQ"></script>
    <title>BetStat</title>
    <meta name="description" content="Transforme suas apostas com BetStat - a única plataforma especializada em futebol virtual Betano." />
    <meta property="og:title" content="BetStat | Plataforma de Análise para Apostas Esportivas" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.betstat.site/payment.html" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="BetStat" />
    <script type="module" src="js/firebase-auth.js"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag("js", new Date());
        gtag("config", "G-4WT805FFHQ");
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        .logo2 { width: 60px; height: auto; }

        .sample-badge {
            display: block;
            font-size: 9px;
            font-weight: 400;
            opacity: 0.65;
            line-height: 1;
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        td[title] { cursor: default; }

        .current-hour-label {
            font-size: 11px;
            color: #aaa;
            text-align: right;
            padding: 2px 8px 4px;
            font-style: italic;
        }

        .legend-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 6px 8px 10px;
            font-size: 11px;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

        /* Estilos para a lista de minutos 100% */
        .perfect-minutes-container {
            margin: 20px auto;
            max-width: 1200px;
            padding: 0 15px;
        }

        .perfect-minutes-header {
            background: linear-gradient(135deg, #6a0dad 0%, #8b24d8 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 8px 8px 0 0;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .perfect-minutes-header .count-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 600;
        }

        .perfect-minutes-content {
            background: #1a1a1a;
            border: 1px solid #333;
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 20px;
            min-height: 60px;
        }

        .perfect-minutes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .minute-item {
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
            border: 2px solid #6a0dad;
            border-radius: 8px;
            padding: 12px 15px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .minute-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(106, 13, 173, 0.4);
            border-color: #8b24d8;
        }

        .minute-item .hour {
            font-size: 24px;
            font-weight: 600;
            color: #6a0dad;
            margin-bottom: 4px;
        }

        .minute-item .minute {
            font-size: 14px;
            color: #aaa;
        }

        .no-perfect-minutes {
            text-align: center;
            color: #777;
            padding: 30px 20px;
            font-size: 14px;
        }

        .no-perfect-minutes .icon {
            font-size: 48px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .perfect-minutes-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            
            .minute-item .hour {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <div id="header"></div>
    <br><br>

    <div class="controls">
        <label for="leagueSelect">Liga:</label>
        <select id="leagueSelect" onchange="handleSelectionChange()">
            <option value="Copa%20Am%C3%A9rica" selected>Copa América</option>
            <option value="Ta%C3%A7a%20Gl%C3%B3ria%20eterna">Clássicos da América</option>
            <option value="Euro">Euro</option>
            <option value="Campeonato%20Italiano">Campeonato Italiano</option>
            <option value="Copa%20das%20estrelas">Copa das Estrelas</option>
            <option value="Brasileir%C3%A3o%20Betano">Brasileirão Betano</option>
        </select>

        <label for="marketSelect">Mercado:</label>
        <select id="marketSelect" onchange="handleSelectionChange()">
            <optgroup label="── Ambas Marcam ──">
                <option value="ambasMarcam" selected>Ambas Sim</option>
                <option value="ambasNaoMarcam">Ambas Não</option>
            </optgroup>
            <optgroup label="── Resultado FT ──">
                <option value="casaVence">Casa Vence</option>
                <option value="empate">Empate FT</option>
                <option value="foraVence">Fora Vence</option>
            </optgroup>
            <optgroup label="── Over ──">
                <option value="over0.5">Over 0.5</option>
                <option value="over1.5">Over 1.5</option>
                <option value="over2.5">Over 2.5</option>
                <option value="over3.5">Over 3.5</option>
                <option value="over5">Over 5+</option>
            </optgroup>
            <optgroup label="── Under ──">
                <option value="under0.5">Under 0.5</option>
                <option value="under1.5">Under 1.5</option>
                <option value="under2.5">Under 2.5</option>
                <option value="under3.5">Under 3.5</option>
            </optgroup>
            <optgroup label="── Gols Exatos FT ──">
                <option value="exato0">0 Gol</option>
                <option value="exato1">1 Gol</option>
                <option value="exato2">2 Gols</option>
                <option value="exato3">3 Gols</option>
                <option value="exato4">4 Gols</option>
            </optgroup>
            <optgroup label="── Gols Exatos 2º Tempo ──">
                <option value="exato2t0">0 gol / 2° tempo</option>
                <option value="exato2t1">1 gol / 2° tempo</option>
                <option value="exato2t2">2 gols / 2° tempo</option>
                <option value="exato2t3">3 gols / 2° tempo</option>
                <option value="exato2t4">4 gols / 2° tempo</option>
            </optgroup>
            <optgroup label="── Total de Gols — Casa ──">
                <option value="casa0Gols">Casa 0 Gols</option>
                <option value="casa1Gol">Casa 1 Gol</option>
                <option value="casa2Gols">Casa 2 Gols</option>
                <option value="casa3Gols">Casa 3 Gols</option>
                <option value="casa4Gols">Casa 4 Gols</option>
            </optgroup>
            <optgroup label="── Total de Gols — Fora ──">
                <option value="fora0Gols">Fora 0 Gols</option>
                <option value="fora1Gol">Fora 1 Gol</option>
                <option value="fora2Gols">Fora 2 Gols</option>
                <option value="fora3Gols">Fora 3 Gols</option>
                <option value="fora4Gols">Fora 4 Gols</option>
            </optgroup>
        </select>

        <label for="rangeSelect">Gales:</label>
        <select id="rangeSelect" onchange="handleSelectionChange()">
            <option value="1">01</option>
            <option value="2"selected>02</option>
            <option value="3">03</option>
            <option value="4">04</option>
            <option value="5">05</option>
        </select>
    </div>

    <!-- Legenda -->
    <div class="legend-bar">
        <span style="color:#aaa; margin-right:2px;">Legenda:</span>
        <div class="legend-item"><div class="legend-dot" style="background:#6a0dad"></div><span>100%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#1a7a1a"></div><span>90-99%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#2eb82e"></div><span>80-89%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#66cc00"></div><span>70-79%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#cccc00"></div><span>60-69%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#e67e00"></div><span>50-59%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#cc4400"></div><span>40-49%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#990000"></div><span>&lt;40%</span></div>
    </div>

    <div id="loading" class="loading" style="display:none;">Carregando dados...</div>

    <div class="current-hour-label" id="currentHourLabel"></div>
    <table id="currentHourTable">
        <thead id="currentHourHeader"></thead>
        <tbody id="currentHourBody"></tbody>
    </table>

    <table id="resultsTable">
        <thead id="tableHeader"></thead>
        <tbody id="resultsBody"></tbody>
    </table>

    <!-- Nova seção: Lista de minutos com 100% -->
    <div class="perfect-minutes-container">
        <div class="perfect-minutes-header">
            <span>⭐ Minutos com 100% de Assertividade</span>
            <span class="count-badge" id="perfectCount">0</span>
        </div>
        <div class="perfect-minutes-content" id="perfectMinutesContent">
            <div class="no-perfect-minutes">
                <div class="icon">🔍</div>
                <div>Nenhum minuto com 100% encontrado para os filtros selecionados</div>
            </div>
        </div>
    </div>

<script>
    let cachedData = {};

    function handleSelectionChange() {
        const league = document.getElementById("leagueSelect").value;
        if (cachedData[league]) {
            processApiData(cachedData[league]);
        } else {
            fetchApiData(league);
        }
    }

    function showLoading(show) {
        document.getElementById("loading").style.display = show ? "block" : "none";
    }

    function fetchApiData(league) {
        showLoading(true);
        fetch(`https://betstat.site/resultados/${league}`)
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(data => { cachedData[league] = data; processApiData(data); showLoading(false); })
            .catch(err => { console.error(err); showLoading(false); alert("Erro ao buscar dados da API."); });
    }

    function checkMarket(game, market) {
        const golsCasa = game.golsCasa;
        const golsFora = game.golsFora;
        const total = golsCasa + golsFora;

        const gols2t = (game.segundotempo || "").trim();
        const [casa2t = 0, fora2t = 0] = gols2t ? gols2t.split("-").map(Number) : [0, 0];

        switch (market) {
            case "ambasMarcam": return golsCasa > 0 && golsFora > 0;
            case "ambasNaoMarcam": return golsCasa === 0 || golsFora === 0;
            case "casaVence": return golsCasa > golsFora;
            case "empate": return golsCasa === golsFora;
            case "foraVence": return golsFora > golsCasa;
            case "over0.5": return total >= 1;
            case "over1.5": return total >= 2;
            case "over2.5": return total >= 3;
            case "over3.5": return total >= 4;
            case "over5": return total >= 6;
            case "under0.5": return total <= 0;
            case "under1.5": return total <= 1;
            case "under2.5": return total <= 2;
            case "under3.5": return total <= 3;
            case "exato0": return total === 0;
            case "exato1": return total === 1;
            case "exato2": return total === 2;
            case "exato3": return total === 3;
            case "exato4": return total === 4;
            case "exato2t0": return (casa2t + fora2t) === 0;
            case "exato2t1": return (casa2t + fora2t) === 1;
            case "exato2t2": return (casa2t + fora2t) === 2;
            case "exato2t3": return (casa2t + fora2t) === 3;
            case "exato2t4": return (casa2t + fora2t) === 4;
            case "casa0Gols": return golsCasa === 0;
            case "casa1Gol": return golsCasa === 1;
            case "casa2Gols": return golsCasa === 2;
            case "casa3Gols": return golsCasa === 3;
            case "casa4Gols": return golsCasa === 4;
            case "fora0Gols": return golsFora === 0;
            case "fora1Gol": return golsFora === 1;
            case "fora2Gols": return golsFora === 2;
            case "fora3Gols": return golsFora === 3;
            case "fora4Gols": return golsFora === 4;
            default: return false;
        }
    }

    function getDayKey(game, idx, gamesPerHour) {
        return String(Math.floor(idx / gamesPerHour));
    }

    function processApiData(data) {
        const market = document.getElementById("marketSelect").value;
        const gales = parseInt(document.getElementById("rangeSelect").value, 10);

        const minutesSet = new Set();
        data.forEach(g => minutesSet.add(g.minuto));
        const uniqueMinutes = [...minutesSet].sort((a, b) => a - b);
        const numMins = uniqueMinutes.length;
        const gamesPerHour = numMins;

        const daySet = new Set();
        data.forEach((game, idx) => {
            daySet.add(getDayKey(game, idx, gamesPerHour));
        });
        const sortedDays = [...daySet].sort();
        const numDays = sortedDays.length;

        const slotMap = {};
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            slotMap[hh] = {};
            uniqueMinutes.forEach(m => {
                slotMap[hh][String(m).padStart(2, '0')] = {};
            });
        }

        data.forEach((game, idx) => {
            const hh = String(game.hora).padStart(2, '0');
            const mm = String(game.minuto).padStart(2, '0');
            const dk = getDayKey(game, idx, gamesPerHour);
            if (slotMap[hh] && slotMap[hh][mm] !== undefined) {
                slotMap[hh][mm][dk] = game;
            }
        });

        const result = {};
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            result[hh] = {};
            uniqueMinutes.forEach(m => {
                result[hh][String(m).padStart(2, '0')] = { total: 0, green: 0 };
            });
        }
        const totals = {};
        uniqueMinutes.forEach(m => { totals[String(m).padStart(2, '0')] = { total: 0, green: 0 }; });

        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');

            uniqueMinutes.forEach((baseMin, minIdx) => {
                const bm = String(baseMin).padStart(2, '0');

                sortedDays.forEach(dayKey => {
                    const baseGame = slotMap[hh][bm][dayKey];
                    if (!baseGame) return;

                    result[hh][bm].total += 1;
                    totals[bm].total += 1;

                    let green = false;

                    for (let attempt = 0; attempt < gales && !green; attempt++) {
                        const targetMinIdx = minIdx + attempt;
                        if (targetMinIdx >= numMins) break;

                        const tm = String(uniqueMinutes[targetMinIdx]).padStart(2, '0');
                        const targetGame = slotMap[hh][tm][dayKey];
                        if (!targetGame) continue;

                        if (checkMarket(targetGame, market)) {
                            green = true;
                        }
                    }

                    if (green) {
                        result[hh][bm].green += 1;
                        totals[bm].green += 1;
                    }
                });
            });
        }

        displayTable(result, uniqueMinutes, totals, numDays);
        displayPerfectMinutes(result, uniqueMinutes);
    }

    function pct(slot) {
        return slot.total > 0 ? (slot.green / slot.total) * 100 : 0;
    }

    function cellClass(p) {
        if (p >= 100) return "percent-100";
        if (p >= 90)  return "percent-90-99";
        if (p >= 80)  return "percent-80-90";
        if (p >= 70)  return "percent-70-80";
        if (p >= 60)  return "percent-60-70";
        if (p >= 50)  return "percent-50-60";
        if (p >= 40)  return "percent-40-50";
        return "percent-0-40";
    }

    function makeCell(slot, tag = "td") {
        const p = pct(slot);
        const el = document.createElement(tag);
        el.textContent = Math.round(p) + "%";
        el.className = cellClass(p);
        return el;
    }

    function displayTable(result, uniqueMinutes, totals, numDays) {
        const now = new Date();
        const currentHour = String(now.getHours()).padStart(2, '0');

        document.getElementById("currentHourLabel").textContent =
            `Hora atual: ${currentHour}h — ${numDays} dias de dados`;

        const headerHTML = "<tr><th>H</th>" +
            uniqueMinutes.map(m => `<th>${String(m).padStart(2, '0')}</th>`).join("") +
            "</tr>";
        document.getElementById("tableHeader").innerHTML = headerHTML;
        document.getElementById("currentHourHeader").innerHTML = headerHTML;

        const curBody = document.getElementById("currentHourBody");
        curBody.innerHTML = "";
        const curRow = document.createElement("tr");
        const curHCell = document.createElement("td");
        curHCell.textContent = currentHour;
        curRow.appendChild(curHCell);
        uniqueMinutes.forEach(m => {
            curRow.appendChild(makeCell(result[currentHour][String(m).padStart(2, '0')]));
        });
        curBody.appendChild(curRow);

        const body = document.getElementById("resultsBody");
        body.innerHTML = "";
        for (let h = 23; h >= 0; h--) {
            const hh = String(h).padStart(2, '0');
            const row = document.createElement("tr");
            const hCell = document.createElement("td");
            hCell.textContent = hh;
            row.appendChild(hCell);
            uniqueMinutes.forEach(m => {
                row.appendChild(makeCell(result[hh][String(m).padStart(2, '0')]));
            });
            body.appendChild(row);
        }

        const totalRow = document.createElement("tr");
        totalRow.className = "total-row";
        const tLabel = document.createElement("th");
        tLabel.textContent = "%";
        totalRow.appendChild(tLabel);
        uniqueMinutes.forEach(m => {
            totalRow.appendChild(makeCell(totals[String(m).padStart(2, '0')]));
        });
        body.appendChild(totalRow);
    }

    function displayPerfectMinutes(result, uniqueMinutes) {
        const perfectMinutes = [];

        // Percorre todas as horas e minutos para encontrar 100%
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            uniqueMinutes.forEach(m => {
                const mm = String(m).padStart(2, '0');
                const slot = result[hh][mm];
                const p = pct(slot);
                
                // Se tiver dados e for 100%, adiciona à lista
                if (slot.total > 0 && p >= 100) {
                    perfectMinutes.push({ hour: hh, minute: mm });
                }
            });
        }

        const contentDiv = document.getElementById("perfectMinutesContent");
        const countBadge = document.getElementById("perfectCount");
        
        countBadge.textContent = perfectMinutes.length;

        if (perfectMinutes.length === 0) {
            contentDiv.innerHTML = `
                <div class="no-perfect-minutes">
                    <div class="icon">🔍</div>
                    <div>Nenhum minuto com 100% encontrado para os filtros selecionados</div>
                </div>
            `;
        } else {
            const gridHTML = perfectMinutes.map(item => `
                <div class="minute-item">
                    <div class="hour">${item.hour}:${item.minute}</div>
                    <div class="minute">100%</div>
                </div>
            `).join('');

            contentDiv.innerHTML = `<div class="perfect-minutes-grid">${gridHTML}</div>`;
        }
    }

    window.onload = handleSelectionChange;
</script>

<script src="header-loader.js"></script>
<script src="redirecionar.js"></script>
<script src="app.utils.min.js"></script>
</body>
</html>
