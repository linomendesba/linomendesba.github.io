        <title>BetStat</title>
        <meta name="description" content="Transforme suas apostas com BetStat - a única plataforma especializada em futebol virtual Betano." />
        <meta name="keywords" content="BetStat, apostas esportivas, futebol virtual, Betano, estatísticas apostas" />
        <meta property="og:title" content="BetStat | Plataforma de Análise para Apostas Esportivas" />

          gtag("config", "G-4WT805FFHQ");

    <style>
        .logo2 {
            width: 60px;
            height: auto;
        }

    <body>
        <div id="header"></div>
        <br><br>

        <div class="controls">
            <label for="leagueSelect">Liga:</label>
            <select id="leagueSelect" onchange="handleSelectionChange()">
                <option value="Copa%20Am%C3%A9rica" selected>Copa América</option>
                <option value="Ta%C3%A7a%20Gl%C3%B3ria%20eterna">Clássicos da América</option>
                <option value="Euro">Euro</option>
                <option value="Campeonato%20Italiano">Campeonato Italiano</option>
                <option value="Copa%20das%20estrelas">Copa das Estrelas</option>
                <option value="Brasileir%C3%A3o%20Betano">Brasileirão Betano</option>
            </select>

            <label for="marketSelect">Mercado:</label>
            <select id="marketSelect" onchange="handleSelectionChange()">
                <optgroup label="── Ambas Marcam ──">
                    <option value="ambasMarcam" selected>Ambas Sim</option>
                    <option value="ambasNaoMarcam">Ambas Não</option>
                </optgroup>
                <optgroup label="── Resultado FT ──">
                    <option value="casaVence">Casa Vence</option>
                    <option value="empate">Empate FT</option>
                    <option value="foraVence">Fora Vence</option>
                </optgroup>
                <optgroup label="── Over ──">
                    <option value="over0.5">Over 0.5</option>
                    <option value="over1.5">Over 1.5</option>
                    <option value="over2.5">Over 2.5</option>
                    <option value="over3.5">Over 3.5</option>
                    <option value="over5">Over 5+</option>
                </optgroup>
                <optgroup label="── Under ──">
                    <option value="under0.5">Under 0.5</option>
                    <option value="under1.5">Under 1.5</option>
                    <option value="under2.5">Under 2.5</option>
                    <option value="under3.5">Under 3.5</option>
                </optgroup>
                <optgroup label="── Gols Exatos FT ──">
                    <option value="exato0">0 Gol</option>
                    <option value="exato1">1 Gol</option>
                    <option value="exato2">2 Gols</option>
                    <option value="exato3">3 Gols</option>
                    <option value="exato4">4 Gols</option>
                </optgroup>
                <optgroup label="── Gols Exatos 2º Tempo ──">
                    <option value="exato2t0">0 gol / 2° tempo</option>
                    <option value="exato2t1">1 gol / 2° tempo</option>
                    <option value="exato2t2">2 gols / 2° tempo</option>
                    <option value="exato2t3">3 gols / 2° tempo</option>
                    <option value="exato2t4">4 gols / 2° tempo</option>
                </optgroup>
                <optgroup label="── Total de Gols — Casa ──">
                    <option value="casa0Gols">Casa 0 Gols</option>
                    <option value="casa1Gol">Casa 1 Gol</option>
                    <option value="casa2Gols">Casa 2 Gols</option>
                    <option value="casa3Gols">Casa 3 Gols</option>
                    <option value="casa4Gols">Casa 4 Gols</option>
                </optgroup>
                <optgroup label="── Total de Gols — Fora ──">
                    <option value="fora0Gols">Fora 0 Gols</option>
                    <option value="fora1Gol">Fora 1 Gol</option>
                    <option value="fora2Gols">Fora 2 Gols</option>
                    <option value="fora3Gols">Fora 3 Gols</option>
                    <option value="fora4Gols">Fora 4 Gols</option>
                </optgroup>
            </select>

            <label for="rangeSelect">Gales:</label>
            <select id="rangeSelect" onchange="handleSelectionChange()">
                <option value="1">01</option>
                <option value="2" selected>02</option>
                <option value="3">03</option>
                <option value="4">04</option>
                <option value="5">05</option>
            </select>

            <label for="gameLimitSelect">Período:</label>
            <select id="gameLimitSelect" onchange="handleSelectionChange()">
                <option value="todos" selected>Todos</option>
                <option value="480">1 Dia</option>
                <option value="960">2 Dias</option>
                <option value="1440">3 Dias</option>
                <option value="1920">4 Dias</option>
                <option value="2400">5 Dias</option>
            </select>
        </div>

        <div id="loading" class="loading" style="display: none;">Carregando dados...</div>

        <!-- Tabela para a linha da hora atual -->
        <table id="currentHourTable">
            <thead id="currentHourHeader"></thead>
            <tbody id="currentHourBody"></tbody>
        </table>

        <!-- Tabela principal -->
        <table id="resultsTable">
            <thead id="tableHeader"></thead>
            <tbody id="resultsBody"></tbody>
        </table>

    <script>
        let cachedData = {};

        function handleSelectionChange() {
            const leagueSelect = document.getElementById("leagueSelect");
            const selectedLeague = leagueSelect.value;

            if (cachedData[selectedLeague]) {
                processApiData(cachedData[selectedLeague]);
            } else {
                fetchApiData(selectedLeague);
            }
        }

        function showLoading(show) {
            document.getElementById("loading").style.display = show ? "block" : "none";
        }

        function fetchApiData(league) {
            showLoading(true);
            const apiUrl = `https://betstat.site/resultados/${league}`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    cachedData[league] = data;
                    processApiData(data);
                    showLoading(false);
                })
                .catch(error => {
                    console.error("Erro ao buscar dados:", error);
                    showLoading(false);
                    alert("Erro ao buscar dados da API.");
                });
        }

        // Verifica se um jogo atende ao mercado selecionado
        function checkMarket(game, marketSelect) {
            const [g1, g2] = extractGoalsFromScore(game.ft);
            const [ht1, ht2] = extractGoalsFromScore(game.ht);
            // Gols do 2º tempo
            const st1 = g1 - ht1;
            const st2 = g2 - ht2;
            const total = g1 + g2;

            switch (marketSelect) {
                // Ambas Marcam
                case "ambasMarcam":       return g1 > 0 && g2 > 0;
                case "ambasNaoMarcam":    return g1 === 0 || g2 === 0;

                // Resultado FT
                case "casaVence":         return g1 > g2;
                case "empate":            return g1 === g2;
                case "foraVence":         return g1 < g2;

                // Over
                case "over0.5":           return total > 0;
                case "over1.5":           return total > 1;
                case "over2.5":           return total > 2;
                case "over3.5":           return total > 3;
                case "over5":             return total > 4;

                // Under
                case "under0.5":          return total < 1;
                case "under1.5":          return total < 2;
                case "under2.5":          return total < 3;
                case "under3.5":          return total < 4;

                // Gols Exatos FT
                case "exato0":            return total === 0;
                case "exato1":            return total === 1;
                case "exato2":            return total === 2;
                case "exato3":            return total === 3;
                case "exato4":            return total === 4;

                // Gols Exatos 2º Tempo
                case "exato2t0":          return (st1 + st2) === 0;
                case "exato2t1":          return (st1 + st2) === 1;
                case "exato2t2":          return (st1 + st2) === 2;
                case "exato2t3":          return (st1 + st2) === 3;
                case "exato2t4":          return (st1 + st2) === 4;

                // Total Gols Casa
                case "casa0Gols":         return g1 === 0;
                case "casa1Gol":          return g1 === 1;
                case "casa2Gols":         return g1 === 2;
                case "casa3Gols":         return g1 === 3;
                case "casa4Gols":         return g1 === 4;

                // Total Gols Fora
                case "fora0Gols":         return g2 === 0;
                case "fora1Gol":          return g2 === 1;
                case "fora2Gols":         return g2 === 2;
                case "fora3Gols":         return g2 === 3;
                case "fora4Gols":         return g2 === 4;

                // Legados (compatibilidade)
                case "ambas":             return g1 > 0 && g2 > 0;
                case "ambasnao":          return g1 === 0 || g2 === 0;
                case "casa":              return g1 > g2;
                case "fora":              return g1 < g2;
                case "cincog":            return total > 4;

                default: return false;
            }
        }

        function processApiData(data) {
            const marketSelect = document.getElementById("marketSelect").value;
            const range = parseInt(document.getElementById("rangeSelect").value, 10);
            const gameLimit = document.getElementById("gameLimitSelect").value;

            const limitedData = gameLimit === "todos" ? data : data.slice(-parseInt(gameLimit, 10));

            // Extrair os minutos únicos dos dados
            const uniqueMinutes = [...new Set(limitedData.map(game => parseInt(game.minuto, 10)))].sort((a, b) => a - b);

            // Inicializar a matriz de resultados (24 horas x minutos únicos)
            const resultsByHourMinute = {};
            for (let h = 0; h < 24; h++) {
                const hour = String(h).padStart(2, '0');
                resultsByHourMinute[hour] = {};
                uniqueMinutes.forEach(minute => {
                    const minuteStr = String(minute).padStart(2, '0');
                    resultsByHourMinute[hour][minuteStr] = { totalGames: 0, greenGames: 0 };
                });
            }

            // Inicializar totais por minuto
            const totalsByMinute = {};
            uniqueMinutes.forEach(minute => {
                const minuteStr = String(minute).padStart(2, '0');
                totalsByMinute[minuteStr] = { totalGames: 0, greenGames: 0 };
            });

            /*
             * LÓGICA DE GALES CORRIGIDA
             * ─────────────────────────
             * Para cada jogo (hora H, minuto M):
             *   - Incrementa totalGames para [H][M]
             *   - Percorre até `range` tentativas:
             *       tentativa 0 → minuto M (tiro seco)
             *       tentativa 1 → próximo minuto da liga na MESMA hora H (1º gale)
             *       tentativa 2 → próximo minuto após o gale anterior na MESMA hora H (2º gale)
             *       ...
             *   - Se qualquer tentativa for GREEN → greenGames++
             *
             * "Próximo minuto" = próximo valor em uniqueMinutes (circular, mas
             *   só dentro da mesma hora no mesmo dia/passagem).
             */

            // Agrupar jogos por (hora, minuto) para facilitar busca
            // Estrutura: gamesByHourMinute[hora][minuto] = [game, game, ...]
            const gamesByHourMinute = {};
            limitedData.forEach(game => {
                const hora = String(game.hora).padStart(2, '0');
                const minuto = String(game.minuto).padStart(2, '0');
                if (!gamesByHourMinute[hora]) gamesByHourMinute[hora] = {};
                if (!gamesByHourMinute[hora][minuto]) gamesByHourMinute[hora][minuto] = [];
                gamesByHourMinute[hora][minuto].push(game);
            });

            // Para cada hora e cada ocorrência de um minuto nessa hora, aplicar gales
            for (let h = 0; h < 24; h++) {
                const hora = String(h).padStart(2, '0');
                if (!gamesByHourMinute[hora]) continue;

                uniqueMinutes.forEach((minute, minuteIdx) => {
                    const minuteStr = String(minute).padStart(2, '0');
                    const gamesAtSlot = gamesByHourMinute[hora][minuteStr];
                    if (!gamesAtSlot || gamesAtSlot.length === 0) return;

                    // Cada ocorrência daquele minuto naquela hora é uma "rodada"
                    gamesAtSlot.forEach(baseGame => {
                        resultsByHourMinute[hora][minuteStr].totalGames += 1;
                        totalsByMinute[minuteStr].totalGames += 1;

                        let foundGreen = false;

                        // Percorre as tentativas de gale
                        for (let attempt = 0; attempt < range; attempt++) {
                            // Índice do minuto nesta tentativa (circular dentro dos uniqueMinutes)
                            const targetMinuteIdx = (minuteIdx + attempt) % uniqueMinutes.length;
                            const targetMinute = String(uniqueMinutes[targetMinuteIdx]).padStart(2, '0');

                            // Pega um jogo desse minuto na mesma hora
                            // (usa a mesma "rodada" relativa – baseGame é rodada 0,
                            //  para gale 1 buscamos o mesmo slot no mesmo momento)
                            const gamesAtTarget = gamesByHourMinute[hora][targetMinute];
                            if (!gamesAtTarget || gamesAtTarget.length === 0) continue;

                            // Usamos o mesmo índice de ocorrência do baseGame dentro do slot
                            const baseIdx = gamesAtSlot.indexOf(baseGame);
                            const targetGame = gamesAtTarget[baseIdx] || gamesAtTarget[0];

                            if (checkMarket(targetGame, marketSelect)) {
                                foundGreen = true;
                                break;
                            }
                        }

                        if (foundGreen) {
                            resultsByHourMinute[hora][minuteStr].greenGames += 1;
                            totalsByMinute[minuteStr].greenGames += 1;
                        }
                    });
                });
            }

            displayResultsTable(resultsByHourMinute, uniqueMinutes, totalsByMinute);
        }

        function extractGoalsFromScore(scoreString) {
            if (!scoreString || typeof scoreString !== 'string') return [0, 0];
            const scoreParts = scoreString.split('x').map(part => part.trim());
            return scoreParts.length === 2
                ? [parseInt(scoreParts[0], 10) || 0, parseInt(scoreParts[1], 10) || 0]
                : [0, 0];
        }

        function getCellClass(percentage) {
            if (percentage == 100)    return "percent-100";
            if (percentage >= 90)     return "percent-90-99";
            if (percentage >= 80)     return "percent-80-90";
            if (percentage >= 70)     return "percent-70-80";
            if (percentage >= 60)     return "percent-60-70";
            if (percentage >= 50)     return "percent-50-60";
            if (percentage >= 40)     return "percent-40-50";
            return "percent-0-40";
        }

        function makeCell(data, tag = "td") {
            const pct = data.totalGames > 0
                ? (data.greenGames / data.totalGames) * 100
                : 0;

            const cell = document.createElement(tag);
            // Exibe sem casas decimais + símbolo %
            cell.textContent = Math.round(pct) + "%";
            cell.className = getCellClass(pct);
            return cell;
        }

        function displayResultsTable(resultsByHourMinute, uniqueMinutes, totalsByMinute) {
            const tableHeader = document.getElementById("tableHeader");
            const resultsBody = document.getElementById("resultsBody");
            const currentHourHeader = document.getElementById("currentHourHeader");
            const currentHourBody = document.getElementById("currentHourBody");

            // Cabeçalho
            let headerRow = "<tr><th>H</th>";
            uniqueMinutes.forEach(minute => {
                headerRow += `<th>${String(minute).padStart(2, '0')}</th>`;
            });
            headerRow += "</tr>";
            tableHeader.innerHTML = headerRow;
            currentHourHeader.innerHTML = headerRow;

            // Hora atual
            const now = new Date();
            const currentHour = String(now.getHours()).padStart(2, '0');

            currentHourBody.innerHTML = "";
            const currentRow = document.createElement("tr");
            const currentHourCell = document.createElement("td");
            currentHourCell.textContent = currentHour;
            currentRow.appendChild(currentHourCell);

            uniqueMinutes.forEach(minute => {
                const minuteStr = String(minute).padStart(2, '0');
                currentRow.appendChild(makeCell(resultsByHourMinute[currentHour][minuteStr]));
            });
            currentHourBody.appendChild(currentRow);

            // Tabela principal (23h → 00h)
            resultsBody.innerHTML = "";
            for (let h = 23; h >= 0; h--) {
                const hour = String(h).padStart(2, '0');
                const row = document.createElement("tr");

                const hourCell = document.createElement("td");
                hourCell.textContent = hour;
                row.appendChild(hourCell);

                uniqueMinutes.forEach(minute => {
                    const minuteStr = String(minute).padStart(2, '0');
                    row.appendChild(makeCell(resultsByHourMinute[hour][minuteStr]));
                });

                resultsBody.appendChild(row);
            }

            // Linha de totais
            const totalRow = document.createElement("tr");
            totalRow.className = "total-row";

            const totalLabelCell = document.createElement("th");
            totalLabelCell.textContent = "%";
            totalRow.appendChild(totalLabelCell);

            uniqueMinutes.forEach(minute => {
                const minuteStr = String(minute).padStart(2, '0');
                totalRow.appendChild(makeCell(totalsByMinute[minuteStr]));
            });

            resultsBody.appendChild(totalRow);
        }

        window.onload = handleSelectionChange;
    </script>

    <script src="header-loader.js"></script>
    <script src="redirecionar.js"></script>
    <script src="app.utils.min.js"></script>
    </body>
</html>
