        /* Cores modo Gols */
        .gols-0  { background-color: #0a0a2e !important; color: #aaa; }
        .gols-1  { background-color: #1a3a6e !important; color: #fff; }
        .gols-3  { background-color: #1a6a9a !important; color: #fff; }
        .gols-5  { background-color: #1a9a4a !important; color: #fff; }
        .gols-7  { background-color: #66cc00 !important; color: #111; }
        .gols-9  { background-color: #cccc00 !important; color: #111; }

<body>
    <div id="header"></div>
    <br><br>

    <div class="controls">
        <label for="leagueSelect">Liga:</label>
        <select id="leagueSelect" onchange="handleSelectionChange()">
            <option value="Copa%20Am%C3%A9rica" selected>Copa América</option>
            <option value="Ta%C3%A7a%20Gl%C3%B3ria%20eterna">Clássicos da América</option>
            <option value="Euro">Euro</option>
            <option value="Campeonato%20Italiano">Campeonato Italiano</option>
            <option value="Copa%20das%20estrelas">Copa das Estrelas</option>
            <option value="Brasileir%C3%A3o%20Betano">Brasileirão Betano</option>
        </select>

        <label for="marketSelect">Mercado:</label>
        <select id="marketSelect" onchange="handleSelectionChange()">
            <optgroup label="── Ambas Marcam ──">
                <option value="ambasMarcam" selected>Ambas Sim</option>
                <option value="ambasNaoMarcam">Ambas Não</option>
            </optgroup>
            <optgroup label="── Resultado FT ──">
                <option value="casaVence">Casa Vence</option>
                <option value="empate">Empate FT</option>
                <option value="foraVence">Fora Vence</option>
            </optgroup>
            <optgroup label="── Over ──">
                <option value="over0.5">Over 0.5</option>
                <option value="over1.5">Over 1.5</option>
                <option value="over2.5">Over 2.5</option>
                <option value="over3.5">Over 3.5</option>
                <option value="over5">Over 5+</option>
            </optgroup>
            <optgroup label="── Under ──">
                <option value="under0.5">Under 0.5</option>
                <option value="under1.5">Under 1.5</option>
                <option value="under2.5">Under 2.5</option>
                <option value="under3.5">Under 3.5</option>
            </optgroup>
            <optgroup label="── Gols Exatos FT ──">
                <option value="exato0">0 Gol</option>
                <option value="exato1">1 Gol</option>
                <option value="exato2">2 Gols</option>
                <option value="exato3">3 Gols</option>
                <option value="exato4">4 Gols</option>
            </optgroup>
            <optgroup label="── Gols Exatos 2º Tempo ──">
                <option value="exato2t0">0 gol / 2° tempo</option>
                <option value="exato2t1">1 gol / 2° tempo</option>
                <option value="exato2t2">2 gols / 2° tempo</option>
                <option value="exato2t3">3 gols / 2° tempo</option>
                <option value="exato2t4">4 gols / 2° tempo</option>
            </optgroup>
            <optgroup label="── Total de Gols — Casa ──">
                <option value="casa0Gols">Casa 0 Gols</option>
                <option value="casa1Gol">Casa 1 Gol</option>
                <option value="casa2Gols">Casa 2 Gols</option>
                <option value="casa3Gols">Casa 3 Gols</option>
                <option value="casa4Gols">Casa 4 Gols</option>
            </optgroup>
            <optgroup label="── Total de Gols — Fora ──">
                <option value="fora0Gols">Fora 0 Gols</option>
                <option value="fora1Gol">Fora 1 Gol</option>
                <option value="fora2Gols">Fora 2 Gols</option>
                <option value="fora3Gols">Fora 3 Gols</option>
                <option value="fora4Gols">Fora 4 Gols</option>
            </optgroup>
        </select>

        <label for="modeSelect">Modo:</label>
        <select id="modeSelect" onchange="handleSelectionChange()">
            <option value="mercado" selected>Mercados</option>
            <option value="gols">Volume de Gols</option>
        </select>

        <label for="rangeSelect">Gales:</label>
        <select id="rangeSelect" onchange="handleSelectionChange()">
            <option value="1">01</option>
            <option value="2">02</option>
            <option value="3" selected>03</option>
            <option value="4">04</option>
            <option value="5">05</option>
        </select>
    </div>

    <!-- Legenda Mercados -->
    <div class="legend-bar" id="legendMercado">
        <span style="color:#aaa; margin-right:2px;">Legenda:</span>
        <div class="legend-item"><div class="legend-dot" style="background:#6a0dad"></div><span>100%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#1a7a1a"></div><span>90-99%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#2eb82e"></div><span>80-89%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#66cc00"></div><span>70-79%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#cccc00"></div><span>60-69%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#e67e00"></div><span>50-59%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#cc4400"></div><span>40-49%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#990000"></div><span>&lt;40%</span></div>
    </div>
    <!-- Legenda Gols -->
    <div class="legend-bar" id="legendGols" style="display:none;">
        <span style="color:#aaa; margin-right:2px;">Volume de Gols:</span>
        <div class="legend-item"><div class="legend-dot" style="background:#0a0a2e"></div><span>0</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#1a3a6e"></div><span>1-2</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#1a6a9a"></div><span>3-4</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#1a9a4a"></div><span>5-6</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#66cc00"></div><span>7-8</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#cccc00"></div><span>9-10</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#e67e00"></div><span>11-13</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#cc2200"></div><span>14+</span></div>
    </div>

    <div id="loading" class="loading" style="display:none;">Carregando dados...</div>

    <div class="current-hour-label" id="currentHourLabel"></div>
    <table id="currentHourTable">
        <thead id="currentHourHeader"></thead>
        <tbody id="currentHourBody"></tbody>
    </table>

    <table id="resultsTable">
        <thead id="tableHeader"></thead>
        <tbody id="resultsBody"></tbody>
    </table>

<script>
    let cachedData = {};

    function handleSelectionChange() {
        const league = document.getElementById("leagueSelect").value;
        if (cachedData[league]) {
            processApiData(cachedData[league]);
        } else {
            fetchApiData(league);
        }
    }

    function showLoading(show) {
        document.getElementById("loading").style.display = show ? "block" : "none";
    }

    function fetchApiData(league) {
        showLoading(true);
        fetch(`https://betstat.site/resultados/${league}`)
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(data => { cachedData[league] = data; processApiData(data); showLoading(false); })
            .catch(err => { console.error(err); showLoading(false); alert("Erro ao buscar dados da API."); });
    }

    function parseScore(s) {
        if (!s || typeof s !== 'string') return [0, 0];
        const p = s.split('x').map(v => parseInt(v.trim(), 10) || 0);
        return p.length === 2 ? p : [0, 0];
    }

    function checkMarket(game, market) {
        const [g1, g2] = parseScore(game.ft);
        const [h1, h2] = parseScore(game.ht);
        const st1 = g1 - h1, st2 = g2 - h2;
        const tot = g1 + g2;
        switch (market) {
            case "ambasMarcam":    return g1 > 0 && g2 > 0;
            case "ambasNaoMarcam": return g1 === 0 || g2 === 0;
            case "casaVence":      return g1 > g2;
            case "empate":         return g1 === g2;
            case "foraVence":      return g1 < g2;
            case "over0.5":        return tot > 0;
            case "over1.5":        return tot > 1;
            case "over2.5":        return tot > 2;
            case "over3.5":        return tot > 3;
            case "over5":          return tot > 4;
            case "under0.5":       return tot < 1;
            case "under1.5":       return tot < 2;
            case "under2.5":       return tot < 3;
            case "under3.5":       return tot < 4;
            case "exato0":         return tot === 0;
            case "exato1":         return tot === 1;
            case "exato2":         return tot === 2;
            case "exato3":         return tot === 3;
            case "exato4":         return tot === 4;
            case "exato2t0":       return (st1 + st2) === 0;
            case "exato2t1":       return (st1 + st2) === 1;
            case "exato2t2":       return (st1 + st2) === 2;
            case "exato2t3":       return (st1 + st2) === 3;
            case "exato2t4":       return (st1 + st2) === 4;
            case "casa0Gols":      return g1 === 0;
            case "casa1Gol":       return g1 === 1;
            case "casa2Gols":      return g1 === 2;
            case "casa3Gols":      return g1 === 3;
            case "casa4Gols":      return g1 === 4;
            case "fora0Gols":      return g2 === 0;
            case "fora1Gol":       return g2 === 1;
            case "fora2Gols":      return g2 === 2;
            case "fora3Gols":      return g2 === 3;
            case "fora4Gols":      return g2 === 4;
            // legados
            case "ambas":          return g1 > 0 && g2 > 0;
            case "ambasnao":       return g1 === 0 || g2 === 0;
            case "casa":           return g1 > g2;
            case "fora":           return g1 < g2;
            case "cincog":         return tot > 4;
            default: return false;
        }
    }

    /*
     * Extrai a chave de "dia" de um registro.
     * Tenta vários campos possíveis: data, date, dia, day, created_at, timestamp.
     * Se nenhum existir, usa o índice do registro dividido pelo número de jogos por hora (20)
     * para inferir o dia com base na posição na lista.
     */
    function getDayKey(game, index, gamesPerHour) {
        // Tenta campo de data explícito (vários nomes possíveis)
        const dateField = game.data || game.date || game.dia || game.day
            || game.created_at || game.timestamp || game.dt;

        if (dateField) {
            // Normaliza: pega só a parte de data (YYYY-MM-DD ou DD/MM/YYYY etc.)
            const s = String(dateField);
            // Se for timestamp numérico, converte
            if (/^\d{10,}$/.test(s)) {
                return new Date(parseInt(s) * (s.length === 10 ? 1000 : 1))
                    .toISOString().slice(0, 10);
            }
            // Pega os primeiros 10 chars (data sem hora)
            return s.slice(0, 10);
        }

        // Fallback: infere o dia pela posição na lista.
        // A API retorna os dados em ordem cronológica.
        // Cada "ciclo completo" de hora+minutos = gamesPerHour registros.
        // Em 5 dias, o mesmo slot (hora, minuto) aparece 5 vezes.
        // Usamos Math.floor(index / gamesPerHour) como proxy de dia.
        return String(Math.floor(index / gamesPerHour));
    }

    function getDayKey(game, index, gamesPerHour) {
        const dateField = game.data || game.date || game.dia || game.day
            || game.created_at || game.timestamp || game.dt;
        if (dateField) {
            const s = String(dateField);
            if (/^\d{10,}$/.test(s)) {
                return new Date(parseInt(s) * (s.length === 10 ? 1000 : 1))
                    .toISOString().slice(0, 10);
            }
            return s.slice(0, 10);
        }
        return String(Math.floor(index / gamesPerHour));
    }

    function buildSlotMap(data, uniqueMinutes, sortedDays) {
        const gamesPerHour = uniqueMinutes.length;
        const slotMap = {};
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            slotMap[hh] = {};
            uniqueMinutes.forEach(m => { slotMap[hh][String(m).padStart(2, '0')] = {}; });
        }
        data.forEach((game, idx) => {
            const dk = getDayKey(game, idx, gamesPerHour);
            if (!sortedDays.includes(dk)) return;
            const hh = String(game.hora).padStart(2, '0');
            const mm = String(game.minuto).padStart(2, '0');
            if (slotMap[hh] && slotMap[hh][mm] !== undefined) {
                slotMap[hh][mm][dk] = game;
            }
        });
        return slotMap;
    }

    function processApiData(data) {
        const mode    = document.getElementById("modeSelect").value;
        const market  = document.getElementById("marketSelect").value;
        const gales   = parseInt(document.getElementById("rangeSelect").value, 10);

        // Mostra/oculta seletor de mercado e legendas conforme modo
        document.getElementById("marketSelect").closest("label") &&
            (document.getElementById("marketSelect").parentElement.style.display = mode === "gols" ? "none" : "");
        document.querySelector('label[for="marketSelect"]') &&
            (document.querySelector('label[for="marketSelect"]').style.display = mode === "gols" ? "none" : "");
        document.getElementById("legendMercado").style.display = mode === "gols" ? "none" : "";
        document.getElementById("legendGols").style.display    = mode === "gols" ? ""     : "none";

        const uniqueMinutes = [...new Set(data.map(g => parseInt(g.minuto, 10)))].sort((a, b) => a - b);
        const numMins = uniqueMinutes.length;
        const gamesPerHour = numMins;

        const allDayKeys = new Set();
        data.forEach((g, i) => allDayKeys.add(getDayKey(g, i, gamesPerHour)));
        const sortedDays = [...allDayKeys].sort().slice(-5);
        const numDays = sortedDays.length;

        const slotMap = buildSlotMap(data, uniqueMinutes, sortedDays);

        if (mode === "gols") {
            processGols(data, uniqueMinutes, numMins, sortedDays, numDays, slotMap, gales);
        } else {
            processMercado(data, uniqueMinutes, numMins, sortedDays, numDays, slotMap, gales, market);
        }
    }

    /* ── MODO MERCADOS ── */
    function processMercado(data, uniqueMinutes, numMins, sortedDays, numDays, slotMap, gales, market) {
        const result = {};
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            result[hh] = {};
            uniqueMinutes.forEach(m => { result[hh][String(m).padStart(2, '0')] = { total: 0, green: 0 }; });
        }
        const totals = {};
        uniqueMinutes.forEach(m => { totals[String(m).padStart(2, '0')] = { total: 0, green: 0 }; });

        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            uniqueMinutes.forEach((baseMin, minIdx) => {
                const bm = String(baseMin).padStart(2, '0');
                sortedDays.forEach(dayKey => {
                    if (!slotMap[hh][bm][dayKey]) return;
                    result[hh][bm].total++;
                    totals[bm].total++;
                    let green = false;
                    for (let a = 0; a < gales && !green; a++) {
                        const ti = minIdx + a;
                        if (ti >= numMins) break;
                        const tm = String(uniqueMinutes[ti]).padStart(2, '0');
                        const tg = slotMap[hh][tm][dayKey];
                        if (tg && checkMarket(tg, market)) green = true;
                    }
                    if (green) { result[hh][bm].green++; totals[bm].green++; }
                });
            });
        }
        displayTable(result, uniqueMinutes, totals, numDays, "mercado");
    }

    /* ── MODO GOLS ── */
    function getGoals(game) {
        const [g1, g2] = parseScore(game.ft);
        return g1 + g2;
    }

    function processGols(data, uniqueMinutes, numMins, sortedDays, numDays, slotMap, gales) {
        // result[hh][mm] = { totalGols: number, count: number }
        const result = {};
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            result[hh] = {};
            uniqueMinutes.forEach(m => { result[hh][String(m).padStart(2, '0')] = { totalGols: 0, count: 0 }; });
        }
        const totals = {};
        uniqueMinutes.forEach(m => { totals[String(m).padStart(2, '0')] = { totalGols: 0, count: 0 }; });

        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            uniqueMinutes.forEach((baseMin, minIdx) => {
                const bm = String(baseMin).padStart(2, '0');
                sortedDays.forEach(dayKey => {
                    if (!slotMap[hh][bm][dayKey]) return;
                    // Soma gols dos N próximos minutos (gales)
                    let somaGols = 0;
                    let jogosContados = 0;
                    for (let a = 0; a < gales; a++) {
                        const ti = minIdx + a;
                        if (ti >= numMins) break;
                        const tm = String(uniqueMinutes[ti]).padStart(2, '0');
                        const tg = slotMap[hh][tm][dayKey];
                        if (tg) { somaGols += getGoals(tg); jogosContados++; }
                    }
                    if (jogosContados > 0) {
                        result[hh][bm].totalGols += somaGols;
                        result[hh][bm].count++;
                        totals[bm].totalGols += somaGols;
                        totals[bm].count++;
                    }
                });
            });
        }
        displayTable(result, uniqueMinutes, totals, numDays, "gols");
    }

    /* ── CORES GOLS ── */
    function golsClass(media) {
        if (media >= 14)  return "gols-14";
        if (media >= 11)  return "gols-11";
        if (media >= 9)   return "gols-9";
        if (media >= 7)   return "gols-7";
        if (media >= 5)   return "gols-5";
        if (media >= 3)   return "gols-3";
        if (media >= 1)   return "gols-1";
        return "gols-0";
    }

    function pct(slot) {
        return slot.total > 0 ? (slot.green / slot.total) * 100 : 0;
    }

    function cellClass(p) {
        if (p >= 100) return "percent-100";
        if (p >= 90)  return "percent-90-99";
        if (p >= 80)  return "percent-80-90";
        if (p >= 70)  return "percent-70-80";
        if (p >= 60)  return "percent-60-70";
        if (p >= 50)  return "percent-50-60";
        if (p >= 40)  return "percent-40-50";
        return "percent-0-40";
    }

    function makeCell(slot, tag = "td", mode = "mercado") {
        const el = document.createElement(tag);
        if (mode === "gols") {
            const media = slot.count > 0 ? slot.totalGols / slot.count : 0;
            el.textContent = media.toFixed(1);
            el.className = golsClass(media);
        } else {
            const p = pct(slot);
            el.textContent = Math.round(p) + "%";
            el.className = cellClass(p);
        }
        return el;
    }

    function displayTable(result, uniqueMinutes, totals, numDays, mode = "mercado") {
        const now = new Date();
        const currentHour = String(now.getHours()).padStart(2, '0');
        const modeLabel = mode === "gols" ? "Média de Gols" : "Mercados";

        document.getElementById("currentHourLabel").textContent =
            `Hora atual: ${currentHour}h — ${numDays} dias — ${modeLabel}`;

        const headerHTML = "<tr><th>H</th>" +
            uniqueMinutes.map(m => `<th>${String(m).padStart(2, '0')}</th>`).join("") +
            "</tr>";
        document.getElementById("tableHeader").innerHTML = headerHTML;
        document.getElementById("currentHourHeader").innerHTML = headerHTML;

        // Linha hora atual
        const curBody = document.getElementById("currentHourBody");
        curBody.innerHTML = "";
        const curRow = document.createElement("tr");
        const curHCell = document.createElement("td");
        curHCell.textContent = currentHour;
        curRow.appendChild(curHCell);
        uniqueMinutes.forEach(m => {
            curRow.appendChild(makeCell(result[currentHour][String(m).padStart(2, '0')], "td", mode));
        });
        curBody.appendChild(curRow);

        // Tabela principal (23h → 00h)
        const body = document.getElementById("resultsBody");
        body.innerHTML = "";
        for (let h = 23; h >= 0; h--) {
            const hh = String(h).padStart(2, '0');
            const row = document.createElement("tr");
            const hCell = document.createElement("td");
            hCell.textContent = hh;
            row.appendChild(hCell);
            uniqueMinutes.forEach(m => {
                row.appendChild(makeCell(result[hh][String(m).padStart(2, '0')], "td", mode));
            });
            body.appendChild(row);
        }

        // Linha de totais
        const totalRow = document.createElement("tr");
        totalRow.className = "total-row";
        const tLabel = document.createElement("th");
        tLabel.textContent = mode === "gols" ? "Gols" : "%";
        totalRow.appendChild(tLabel);
        uniqueMinutes.forEach(m => {
            totalRow.appendChild(makeCell(totals[String(m).padStart(2, '0')], "td", mode));
        });
        body.appendChild(totalRow);
    }

    window.onload = handleSelectionChange;
</script>
