    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: "Roboto", Arial, sans-serif;
        margin: 30px;
        background-color: #1c1f26;
        color: #ffffff;
    }

    .logo2 { width: 60px; height: auto; }
    .espaco { width: 50px; height: 50px; }
    option:hover { background-color: #ff8000; color: #ffffff; }
    canvas { cursor: pointer; border-radius: 4px; }

    button {
        background-color: #1c1f26;
        color: #ffffff;
        font-family: "Roboto", Arial, sans-serif;
        border: none;
        padding: 5px 8px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s;
        margin: 0;
    }
    button:hover { background-color: #0f1013; }

    option { background-color: #1c1f26; color: #ffffff; }

    h1, h2, label { color: #1fad8b; }
    h1 { font-size: 24px; margin-bottom: 20px; text-align: center; }

    /* ── ACCORDION ── */
    .accordion-item {
        background: #131820;
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 10px;
        margin-bottom: 14px;
        overflow: visible;
    }
    .accordion-button {
        width: 100%;
        background: #1a2030;
        color: #e0e0e0;
        font-size: 0.95em;
        font-weight: 700;
        letter-spacing: 0.05em;
        padding: 12px 18px;
        border: none;
        text-align: left;
        cursor: pointer;
        border-radius: 10px;
        transition: background 0.2s;
    }
    .accordion-button:hover { background: #202840; }
    .accordion-content {
        display: none;
        padding: 12px 12px 16px;
        overflow: visible;
    }
    .accordion-content.open { display: block; }

    /* ── CHART WRAPPER ── */
    .canvas-wrapper {
        position: relative;
        width: 100%;
        height: 360px;
        margin-bottom: 6px;
    }
    .canvas-wrapper canvas { width: 100% !important; height: 100% !important; }

    /* ── CONTROL PANEL por liga ── */
    .control-panel {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        background: #161b27;
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 8px;
        padding: 8px 12px;
        margin-top: 6px;
    }
    .control-panel .ctrl-group {
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }
    .control-panel label.ctrl-label {
        font-size: 0.78em;
        color: #9ab;
        white-space: nowrap;
    }
    .control-panel select {
        background: #1e2535;
        color: #e0e0e0;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 0.82em;
        cursor: pointer;
        width: auto;
        font-family: "Roboto", Arial, sans-serif;
        transition: border-color 0.2s;
    }
    .control-panel select:focus { outline: none; border-color: #1fad8b; }
    .control-panel select:hover { border-color: #34d8ab; }

    .checkbox-container {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.82em;
        color: #cdd;
        cursor: pointer;
        user-select: none;
    }
    .checkbox-container input[type=checkbox] { accent-color: #1fad8b; cursor: pointer; }

    .linha-atual-toggle {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.82em;
        color: #cdd;
        cursor: pointer;
    }
    .linha-atual-toggle input { accent-color: #1fad8b; }

    /* ── ADD LINHA — PAINEL FLUTUANTE ── */
    .linha-tools-wrapper {
        position: relative !important;
        display: inline-flex !important;
        align-items: center !important;
    }
    .btn-add-linha {
        background: #1e2535 !important;
        color: #1fad8b !important;
        border: 1px solid rgba(31,173,139,0.4) !important;
        border-radius: 6px !important;
        padding: 4px 12px !important;
        font-size: 0.82em !important;
        cursor: pointer !important;
        margin: 0 !important;
        width: auto !important;
        display: inline-block !important;
        font-family: inherit !important;
        line-height: 1.5 !important;
        font-weight: normal !important;
        transition: background 0.2s !important;
    }
    .btn-add-linha:hover { background: rgba(31,173,139,0.18) !important; }

    .linha-tools-panel {
        display: none !important;
        position: absolute !important;
        top: calc(100% + 4px) !important;
        left: 0 !important;
        z-index: 99999 !important;
        background: #1a2030 !important;
        border: 1px solid rgba(31,173,139,0.35) !important;
        border-radius: 8px !important;
        padding: 12px !important;
        width: 190px !important;
        box-shadow: 0 8px 32px rgba(0,0,0,0.8) !important;
    }
    .linha-tools-panel.show {
        display: flex !important;
        flex-direction: column !important;
        gap: 6px !important;
    }
    .linha-tools-panel .contador-linhas {
        font-size: 0.76em !important; color: #1fad8b !important;
        margin: 0 !important; padding: 0 !important; display: block !important;
    }
    .linha-tools-panel > label {
        font-size: 0.76em !important; color: #9ab !important;
        margin: 0 !important; padding: 0 !important; display: block !important; font-weight: normal !important;
    }
    .linha-tools-panel input[type=color] {
        width: 100% !important; height: 30px !important; border: none !important;
        border-radius: 4px !important; cursor: pointer !important;
        margin: 0 !important; padding: 0 !important; display: block !important;
    }
    .linha-tools-panel .separador-panel {
        border-top: 1px solid rgba(255,255,255,0.1) !important;
        margin: 0 !important; padding: 0 !important; display: block !important;
    }
    .btn-linha {
        width: 100% !important; display: block !important;
        padding: 6px 8px !important; margin: 0 !important;
        border-radius: 5px !important; font-size: 0.80em !important;
        font-weight: 500 !important; cursor: pointer !important;
        text-align: center !important; font-family: inherit !important;
        line-height: 1.4 !important; transition: filter 0.15s !important;
    }
    .btn-linha.green  { background: rgba(31,173,139,0.15) !important; color: #1fad8b !important; border: 1px solid rgba(31,173,139,0.4) !important; }
    .btn-linha.yellow { background: rgba(244,180,0,0.13)  !important; color: #f4b400 !important; border: 1px solid rgba(244,180,0,0.4)  !important; }
    .btn-linha.red    { background: rgba(231,76,60,0.13)  !important; color: #e74c3c !important; border: 1px solid rgba(231,76,60,0.4)  !important; }
    .btn-linha:hover  { filter: brightness(1.4) !important; }

    /* ── LEGENDA HTML ── */
    .ht-legenda {
        display: flex; flex-wrap: wrap; gap: 5px 6px;
        padding: 8px 6px 10px;
    }
    .ht-legenda .leg-item {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 3px 10px 3px 7px; border-radius: 20px;
        cursor: pointer; user-select: none; font-size: 0.75em;
        font-weight: 500; color: #e0e0e0;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.10);
        white-space: nowrap;
        transition: background 0.2s, opacity 0.2s, border-color 0.2s;
    }
    .ht-legenda .leg-item:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.28); }
    .ht-legenda .leg-item.leg-hidden { opacity: 0.28; text-decoration: line-through; background: rgba(255,255,255,0.02); border-color: transparent; }
    .ht-legenda .leg-item.leg-hidden:hover { opacity: 0.65; background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.20); }
    .ht-legenda .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; transition: transform 0.15s; }
    .ht-legenda .leg-item:hover .leg-dot { transform: scale(1.3); }

    /* Logout */
    .logout-btn {
        background-color: #1c1f26;
        color: white;
        padding: 8px 10px;
        font-size: 14px;
        border-radius: 5px;
        cursor: pointer;
        border: 1px solid #ffffff81;
    }
    .logout-btn:hover { background-color: #720000; }
    </style>

    Chart.register(ChartDataLabels);

const LEAGUES     = ['CopaAmerica', 'TacaGloria', 'Euro', 'CampeonatoItaliano', 'CopaEstrelas', 'Brasileirao'];
const LEAGUE_URLS = {

};
const CANVAS_IDS = {

    const MAX_DRAG_LINES  = 6;
    const DRAG_KEY_PREFIX = 'ht_draglines_';
    const VIS_KEY_PREFIX  = 'ht_visible_';

    /* ─── DATASETS ─────────────────────────────────────────── */
    const DATASET_COLORS = {
        'Ambas Sim':'#B0BEC5','Ambas Não':'#F44336',
        'Casa Vence':'#AB47BC','Empate':'#78909C','Fora Vence':'#2196F3',
        'Over 0.5':'#80DEEA','Over 1.5':'#26A69A','Over 2.5':'#FFEB3B','Over 3.5':'#00BCD4','Over 5+':'#FF7043',
        'Under 0.5':'#A5D6A7','Under 1.5':'#388E3C','Under 2.5':'#FF9800','Under 3.5':'#F06292',
        '0 Gol Exato':'#D81B60','1 Gol Exato':'#8E24AA','2 Gols Exatos':'#A0522D',
        '3 Gols Exatos':'#546E7A','4 Gols Exatos':'#FFB300','5 Gols Exatos':'#00897B',
        '0 Gol 2T':'#CE93D8','1 Gol 2T':'#BA68C8','2 Gols 2T':'#9C27B0','3 Gols 2T':'#7B1FA2','4 Gols 2T':'#4A148C',
        'Casa 0 Gols':'#FFCCBC','Casa 1 Gol':'#FF8A65','Casa 2 Gols':'#FF5722','Casa 3 Gols':'#E64A19','Casa 4 Gols':'#BF360C',
        'Fora 0 Gols':'#B3E5FC','Fora 1 Gol':'#4FC3F7','Fora 2 Gols':'#0288D1','Fora 3 Gols':'#01579B','Fora 4 Gols':'#002F6C',
        'Gols FT':'#1E88E5',
        '0x0':'#E91E63','1x0':'#9C27B0','2x0':'#673AB7','3x0':'#3F51B5',
        '2x1':'#009688','3x1':'#4CAF50','3x2':'#8BC34A','4x0':'#CDDC39','4x1':'#FFC107',
        '0x0 HT':'#FF6090'
    };

    const labelToKey = {
        'Gols FT':'golsFT','Casa Vence':'casaVence','Empate':'empate','Fora Vence':'foraVence',
        'Ambas Sim':'ambasSim','Ambas Não':'ambasNao',
        'Over 0.5':'over05','Over 1.5':'over15','Over 2.5':'over25','Over 3.5':'over35','Over 5+':'over5',
        'Under 0.5':'under05','Under 1.5':'under15','Under 2.5':'under25','Under 3.5':'under35',
        '0 Gol Exato':'gol0','1 Gol Exato':'gol1','2 Gols Exatos':'gol2',
        '3 Gols Exatos':'gol3','4 Gols Exatos':'gol4','5 Gols Exatos':'gol5',
        '0 Gol 2T':'gol2t0','1 Gol 2T':'gol2t1','2 Gols 2T':'gol2t2','3 Gols 2T':'gol2t3','4 Gols 2T':'gol2t4',
        'Casa 0 Gols':'casa0','Casa 1 Gol':'casa1','Casa 2 Gols':'casa2','Casa 3 Gols':'casa3','Casa 4 Gols':'casa4',
        'Fora 0 Gols':'fora0','Fora 1 Gol':'fora1','Fora 2 Gols':'fora2','Fora 3 Gols':'fora3','Fora 4 Gols':'fora4',
        '0x0':'placar0x0','1x0':'placar1x0','2x0':'placar2x0','3x0':'placar3x0',
        '2x1':'placar2x1','3x1':'placar3x1','3x2':'placar3x2','4x0':'placar4x0','4x1':'placar4x1',
        '0x0 HT':'placarHT0x0'
    };

    const LEGEND_GROUPS = [
        { title: 'Resultado',   labels: ['Casa Vence','Empate','Fora Vence'] },
        { title: 'Ambas',       labels: ['Ambas Sim','Ambas Não'] },
        { title: 'Over',        labels: ['Over 0.5','Over 1.5','Over 2.5','Over 3.5','Over 5+'] },
        { title: 'Under',       labels: ['Under 0.5','Under 1.5','Under 2.5','Under 3.5'] },
        { title: 'Gols Exatos', labels: ['0 Gol Exato','1 Gol Exato','2 Gols Exatos','3 Gols Exatos','4 Gols Exatos','5 Gols Exatos'] },
        { title: 'Gols 2T',     labels: ['0 Gol 2T','1 Gol 2T','2 Gols 2T','3 Gols 2T','4 Gols 2T'] },
        { title: 'Casa',        labels: ['Casa 0 Gols','Casa 1 Gol','Casa 2 Gols','Casa 3 Gols','Casa 4 Gols'] },
        { title: 'Fora',        labels: ['Fora 0 Gols','Fora 1 Gol','Fora 2 Gols','Fora 3 Gols','Fora 4 Gols'] },
        { title: 'Placares',    labels: ['0x0','1x0','2x0','3x0','2x1','3x1','3x2','4x0','4x1','0x0 HT'] },
        { title: 'Geral',       labels: ['Gols FT'] }
    ];

    const DEFAULT_VISIBLE = {};
    Object.keys(labelToKey).forEach(k => DEFAULT_VISIBLE[k] = k === 'Ambas Sim');

    /* ─── STATE POR LIGA ─────────────────────────────────── */
    // Cada liga tem seus próprios valores de numPoints, averagePoints, fibonacci, MA
    const leagueState = {};
    LEAGUES.forEach(l => {
        leagueState[l] = {
            numPoints:     20,
            averagePoints: 19,
            showFibonacci: false,
            showMA:        false,
            showLinhaAtual: true
        };
    });

    const chartInstances = {};
    const chartData      = {};

    /* ─── VISIBILIDADE DATASETS ──────────────────────────── */
    function loadVisible(league) {
        try {
            const raw = localStorage.getItem(VIS_KEY_PREFIX + league);
            return raw ? Object.assign({}, DEFAULT_VISIBLE, JSON.parse(raw)) : { ...DEFAULT_VISIBLE };
        } catch { return { ...DEFAULT_VISIBLE }; }
    }
    function saveVisible(league, obj) {
        try { localStorage.setItem(VIS_KEY_PREFIX + league, JSON.stringify(obj)); } catch {}
    }
    const visibleDatasets = {};
    LEAGUES.forEach(l => visibleDatasets[l] = loadVisible(l));

    /* ─── DRAG LINES ─────────────────────────────────────── */
    function loadDragLines(league) {
        try {
            const arr = JSON.parse(localStorage.getItem(DRAG_KEY_PREFIX + league) || '[]');
            return Array.isArray(arr) ? arr.map(l => ({ y: Number(l.y), color: l.color || '#1fcc59', dragging: false })) : [];
        } catch { return []; }
    }
    function saveDragLines(league, lines) {
        try { localStorage.setItem(DRAG_KEY_PREFIX + league, JSON.stringify(lines.map(l => ({ y: l.y, color: l.color })))); } catch {}
    }
    function updateDragCounter(league) {
        const el = document.getElementById('contadorLinhas_' + league);
        const ch = chartInstances[league];
        if (el && ch) el.textContent = `${(ch.dragLines || []).length} / ${MAX_DRAG_LINES} linhas`;
    }

    /* ─── TAB VISIBILITY ─────────────────────────────────── */
    let _tabVisible = !document.hidden;
    document.addEventListener('visibilitychange', () => {
        _tabVisible = !document.hidden;
        if (_tabVisible) LEAGUES.forEach(l => fetchAndUpdate(l));
    });

    /* ═══════════════════════════════════════════════════════
       UTILITÁRIOS
    ═══════════════════════════════════════════════════════ */
    function computeMA(arr, period) {
        return arr.map((_, i) => {
            let sum = 0, count = 0;
            for (let j = Math.max(0, i - period + 1); j <= i; j++) {
                if (arr[j] !== null) { sum += arr[j]; count++; }
            }
            return count > 0 ? sum / count : null;
        });
    }
    function getKeyFromLabel(label) {
        if (label.includes(' - ')) {
            const [main, maPart] = label.split(' - ');
            return labelToKey[main] + maPart.split(' ')[0];
        }
        return labelToKey[label];
    }

    /* ═══════════════════════════════════════════════════════
       PROCESSAMENTO DE DADOS (por liga com estado independente)
    ═══════════════════════════════════════════════════════ */
    function processApiData(data, league) {
        const { numPoints, averagePoints } = leagueState[league];

        const sorted = [...data].sort((a, b) => {
            const dA = new Date(a.data), dB = new Date(b.data);
            if (dA - dB !== 0) return dA - dB;
            if (a.hora !== b.hora) return a.hora - b.hora;
            return a.minuto - b.minuto;
        });
        const sliced = sorted.slice(-numPoints - averagePoints);
        chartData[league] = sliced;

        let labels=[];
        let golsFT=[],casaVence=[],empate=[],foraVence=[],ambasSim=[],ambasNao=[];
        let over05=[],over15=[],over25=[],over35=[],over5=[];
        let under05=[],under15=[],under25=[],under35=[];
        let gol0=[],gol1=[],gol2=[],gol3=[],gol4=[],gol5=[];
        let gol2t0=[],gol2t1=[],gol2t2=[],gol2t3=[],gol2t4=[];
        let casa0=[],casa1=[],casa2=[],casa3=[],casa4=[];
        let fora0=[],fora1=[],fora2=[],fora3=[],fora4=[];
        let placar0x0=[],placar1x0=[],placar2x0=[],placar3x0=[];
        let placar2x1=[],placar3x1=[],placar3x2=[],placar4x0=[],placar4x1=[];
        let placarHT0x0=[];

        let golsFTColors=[],casaVenceColors=[],empateColors=[],foraVenceColors=[],ambasSimColors=[],ambasNaoColors=[];
        let over05Colors=[],over15Colors=[],over25Colors=[],over35Colors=[],over5Colors=[];
        let under05Colors=[],under15Colors=[],under25Colors=[],under35Colors=[];
        let gol0Colors=[],gol1Colors=[],gol2Colors=[],gol3Colors=[],gol4Colors=[],gol5Colors=[];
        let gol2t0Colors=[],gol2t1Colors=[],gol2t2Colors=[],gol2t3Colors=[],gol2t4Colors=[];
        let casa0Colors=[],casa1Colors=[],casa2Colors=[],casa3Colors=[],casa4Colors=[];
        let fora0Colors=[],fora1Colors=[],fora2Colors=[],fora3Colors=[],fora4Colors=[];
        let placar0x0Colors=[],placar1x0Colors=[],placar2x0Colors=[],placar3x0Colors=[];
        let placar2x1Colors=[],placar3x1Colors=[],placar3x2Colors=[],placar4x0Colors=[],placar4x1Colors=[];
        let placarHT0x0Colors=[];

        const green='#00FF00', red='#FF0000', golsFTColor='#1E88E5', transparent='transparent';

        const allData=[
            golsFT,casaVence,empate,foraVence,ambasSim,ambasNao,
            over05,over15,over25,over35,over5,
            under05,under15,under25,under35,
            gol0,gol1,gol2,gol3,gol4,gol5,
            gol2t0,gol2t1,gol2t2,gol2t3,gol2t4,
            casa0,casa1,casa2,casa3,casa4,
            fora0,fora1,fora2,fora3,fora4,
            placar0x0,placar1x0,placar2x0,placar3x0,
            placar2x1,placar3x1,placar3x2,placar4x0,placar4x1,
            placarHT0x0
        ];
        const allColors=[
            golsFTColors,casaVenceColors,empateColors,foraVenceColors,ambasSimColors,ambasNaoColors,
            over05Colors,over15Colors,over25Colors,over35Colors,over5Colors,
            under05Colors,under15Colors,under25Colors,under35Colors,
            gol0Colors,gol1Colors,gol2Colors,gol3Colors,gol4Colors,gol5Colors,
            gol2t0Colors,gol2t1Colors,gol2t2Colors,gol2t3Colors,gol2t4Colors,
            casa0Colors,casa1Colors,casa2Colors,casa3Colors,casa4Colors,
            fora0Colors,fora1Colors,fora2Colors,fora3Colors,fora4Colors,
            placar0x0Colors,placar1x0Colors,placar2x0Colors,placar3x0Colors,
            placar2x1Colors,placar3x1Colors,placar3x2Colors,placar4x0Colors,placar4x1Colors,
            placarHT0x0Colors
        ];

        function hasGap(p, c) {
            const pt = new Date(p.data+'T'+p.hora+':'+p.minuto+':00');
            const ct = new Date(c.data+'T'+c.hora+':'+c.minuto+':00');
            return (ct - pt) / 60000 > 1;
        }

        for (let i = averagePoints; i < sliced.length; i++) {
            let s = {
                golsFT:0,casaVence:0,empate:0,foraVence:0,ambasSim:0,ambasNao:0,
                over05:0,over15:0,over25:0,over35:0,over5:0,
                under05:0,under15:0,under25:0,under35:0,
                gol0:0,gol1:0,gol2:0,gol3:0,gol4:0,gol5:0,
                gol2t0:0,gol2t1:0,gol2t2:0,gol2t3:0,gol2t4:0,
                casa0:0,casa1:0,casa2:0,casa3:0,casa4:0,
                fora0:0,fora1:0,fora2:0,fora3:0,fora4:0,
                p0x0:0,p1x0:0,p2x0:0,p3x0:0,p2x1:0,p3x1:0,p3x2:0,p4x0:0,p4x1:0,
                ht0x0:0,valid:0
            };
            for (let j = Math.max(0, i - averagePoints); j <= i; j++) {
                const m = sliced[j];
                if (j > 0 && hasGap(sliced[j-1], m)) {
                    labels.push(`${m.hora}:${m.minuto.toString().padStart(2,'0')}`);
                    allData.forEach(a => a.push(null));
                    allColors.forEach(a => a.push(transparent));
                    continue;
                }
                let ft=[0,0]; if(m.ft?.includes(' x ')) ft=m.ft.split(' x ').map(Number);
                let ht=[0,0]; if(m.ht?.includes(' x ')) ht=m.ht.split(' x ').map(Number);
                const tg=ft[0]+ft[1], tg2t=(ft[0]-ht[0])+(ft[1]-ht[1]);
                s.golsFT+=tg; s.casaVence+=ft[0]>ft[1]?1:0; s.empate+=ft[0]===ft[1]?1:0; s.foraVence+=ft[0]<ft[1]?1:0;
                s.ambasSim+=ft[0]>0&&ft[1]>0?1:0; s.ambasNao+=ft[0]===0||ft[1]===0?1:0;
                s.over05+=tg>0.5?1:0; s.over15+=tg>1.5?1:0; s.over25+=tg>2.5?1:0; s.over35+=tg>3.5?1:0; s.over5+=tg>=5?1:0;
                s.under05+=tg<=0.5?1:0; s.under15+=tg<1.5?1:0; s.under25+=tg<2.5?1:0; s.under35+=tg<3.5?1:0;
                s.gol0+=tg===0?1:0; s.gol1+=tg===1?1:0; s.gol2+=tg===2?1:0; s.gol3+=tg===3?1:0; s.gol4+=tg===4?1:0; s.gol5+=tg===5?1:0;
                s.gol2t0+=tg2t===0?1:0; s.gol2t1+=tg2t===1?1:0; s.gol2t2+=tg2t===2?1:0; s.gol2t3+=tg2t===3?1:0; s.gol2t4+=tg2t===4?1:0;
                s.casa0+=ft[0]===0?1:0; s.casa1+=ft[0]===1?1:0; s.casa2+=ft[0]===2?1:0; s.casa3+=ft[0]===3?1:0; s.casa4+=ft[0]===4?1:0;
                s.fora0+=ft[1]===0?1:0; s.fora1+=ft[1]===1?1:0; s.fora2+=ft[1]===2?1:0; s.fora3+=ft[1]===3?1:0; s.fora4+=ft[1]===4?1:0;
                s.p0x0+=ft[0]===0&&ft[1]===0?1:0; s.p1x0+=ft[0]===1&&ft[1]===0?1:0; s.p2x0+=ft[0]===2&&ft[1]===0?1:0;
                s.p3x0+=ft[0]===3&&ft[1]===0?1:0; s.p2x1+=ft[0]===2&&ft[1]===1?1:0; s.p3x1+=ft[0]===3&&ft[1]===1?1:0;
                s.p3x2+=ft[0]===3&&ft[1]===2?1:0; s.p4x0+=ft[0]===4&&ft[1]===0?1:0; s.p4x1+=ft[0]===4&&ft[1]===1?1:0;
                s.ht0x0+=ht[0]===0&&ht[1]===0?1:0;
                s.valid++;
            }

            const m=sliced[i];
            labels.push(`${m.hora}:${m.minuto.toString().padStart(2,'0')}`);
            let ft=[0,0]; if(m.ft?.includes(' x ')) ft=m.ft.split(' x ').map(Number);
            let ht=[0,0]; if(m.ht?.includes(' x ')) ht=m.ht.split(' x ').map(Number);
            const tg=ft[0]+ft[1], tg2t=(ft[0]-ht[0])+(ft[1]-ht[1]);
            const avg=s.valid||1;

            golsFT.push(s.golsFT/avg*100);      golsFTColors.push(golsFTColor);
            casaVence.push(s.casaVence/avg*100); casaVenceColors.push(ft[0]>ft[1]?green:red);
            empate.push(s.empate/avg*100);       empateColors.push(ft[0]===ft[1]?green:red);
            foraVence.push(s.foraVence/avg*100); foraVenceColors.push(ft[0]<ft[1]?green:red);
            ambasSim.push(s.ambasSim/avg*100);   ambasSimColors.push(ft[0]>0&&ft[1]>0?green:red);
            ambasNao.push(s.ambasNao/avg*100);   ambasNaoColors.push(ft[0]===0||ft[1]===0?green:red);
            over05.push(s.over05/avg*100);  over05Colors.push(tg>0.5?green:red);
            over15.push(s.over15/avg*100);  over15Colors.push(tg>1.5?green:red);
            over25.push(s.over25/avg*100);  over25Colors.push(tg>2.5?green:red);
            over35.push(s.over35/avg*100);  over35Colors.push(tg>3.5?green:red);
            over5.push(s.over5/avg*100);    over5Colors.push(tg>=5?green:red);
            under05.push(s.under05/avg*100); under05Colors.push(tg<=0.5?green:red);
            under15.push(s.under15/avg*100); under15Colors.push(tg<1.5?green:red);
            under25.push(s.under25/avg*100); under25Colors.push(tg<2.5?green:red);

            fora4.push(s.fora4/avg*100); fora4Colors.push(ft[1]===4?green:red);
            placar0x0.push(s.p0x0/avg*100); placar0x0Colors.push(ft[0]===0&&ft[1]===0?green:red);
            placar1x0.push(s.p1x0/avg*100); placar1x0Colors.push(ft[0]===1&&ft[1]===0?green:red);
            placar2x0.push(s.p2x0/avg*100); placar2x0Colors.push(ft[0]===2&&ft[1]===0?green:red);
            placar3x0.push(s.p3x0/avg*100); placar3x0Colors.push(ft[0]===3&&ft[1]===0?green:red);
            placar2x1.push(s.p2x1/avg*100); placar2x1Colors.push(ft[0]===2&&ft[1]===1?green:red);
            placar3x1.push(s.p3x1/avg*100); placar3x1Colors.push(ft[0]===3&&ft[1]===1?green:red);
            placar3x2.push(s.p3x2/avg*100); placar3x2Colors.push(ft[0]===3&&ft[1]===2?green:red);

        const result = {
            labels,golsFT,casaVence,empate,foraVence,ambasSim,ambasNao,
            over05,over15,over25,over35,over5,

            placar2x1,placar3x1,placar3x2,placar4x0,placar4x1,

            gol0Colors,gol1Colors,gol2Colors,gol3Colors,gol4Colors,gol5Colors,

        };

        // Médias móveis
        const shortP=5, longP=20;
        Object.keys(labelToKey).forEach(label => {
            const key = labelToKey[label];
            result[key+'Short'] = computeMA(result[key], shortP);
            result[key+'Long']  = computeMA(result[key], longP);
        });
        return result;
    }

    /* ═══════════════════════════════════════════════════════
       PLUGIN: LEGENDA HTML POR LIGA
    ═══════════════════════════════════════════════════════ */
    function buildHtmlLegendPlugin(league) {
        const legendId = 'legenda_' + league;
        return {
            id: 'htmlLegend_' + league,
            beforeInit(chart) {
                if (!document.getElementById(legendId)) {
                    const container = document.createElement('div');
                    container.id = legendId;
                    container.className = 'ht-legenda';
                    const wrapper = chart.canvas.closest('.canvas-wrapper');
                    if (wrapper) wrapper.parentNode.insertBefore(container, wrapper);
                }
            },
            afterUpdate(chart) {
                const container = document.getElementById(legendId);
                if (!container) return;

                if (container.dataset.built === '1') {
                    container.querySelectorAll('.leg-item[data-label]').forEach(pill => {
                        pill.classList.toggle('leg-hidden', !visibleDatasets[league][pill.dataset.label]);
                    });
                    return;
                }

                // Botões mostrar/ocultar todos
                const btnShow = document.createElement('button');
                btnShow.className = 'leg-item';
                btnShow.style.cssText = 'background:rgba(31,173,139,0.15);border-color:rgba(31,173,139,0.4);color:#1fad8b;';
                btnShow.textContent = '✦ Mostrar todos';
                btnShow.addEventListener('click', () => _toggleAllDatasets(chart, league, true));
                container.appendChild(btnShow);

                const btnHide = document.createElement('button');
                btnHide.className = 'leg-item';
                btnHide.style.cssText = 'background:rgba(231,76,60,0.12);border-color:rgba(231,76,60,0.35);color:#e74c3c;';
                btnHide.textContent = '✦ Ocultar todos';
                btnHide.addEventListener('click', () => _toggleAllDatasets(chart, league, false));
                container.appendChild(btnHide);

                // Separador de grupos inline
                LEGEND_GROUPS.forEach(group => {
                    const sep = document.createElement('span');
                    sep.style.cssText = 'font-size:0.65em;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.28);padding:0 4px 0 6px;border-left:1px solid rgba(255,255,255,0.12);white-space:nowrap;';
                    sep.textContent = group.title;
                    container.appendChild(sep);

                    group.labels.forEach(labelText => {
                        const color = DATASET_COLORS[labelText] || '#888';
                        const isHidden = !visibleDatasets[league][labelText];

                        const pill = document.createElement('div');
                        pill.className = 'leg-item' + (isHidden ? ' leg-hidden' : '');
                        pill.dataset.label = labelText;
                        pill.title = labelText;

                        const dot = document.createElement('span');
                        dot.className = 'leg-dot';
                        dot.style.background = color;

                        const lbl = document.createElement('span');
                        lbl.textContent = labelText;

                        pill.appendChild(dot); pill.appendChild(lbl);

                        pill.addEventListener('click', () => {
                            const mainIdx = chart.data.datasets.findIndex(ds => ds.label === labelText);
                            if (mainIdx < 0) return;
                            const meta = chart.getDatasetMeta(mainIdx);
                            const nowVisible = meta.hidden;
                            meta.hidden = !meta.hidden;
                            visibleDatasets[league][labelText] = nowVisible;
                            saveVisible(league, visibleDatasets[league]);
                            pill.classList.toggle('leg-hidden', !nowVisible);

                            // Sincroniza MAs
                            chart.data.datasets.forEach((ds, dsIdx) => {
                                if (ds.label.startsWith(labelText + ' -'))
                                    chart.getDatasetMeta(dsIdx).hidden = !leagueState[league].showMA || !nowVisible;
                            });
                            chart.update();
                        });
                        container.appendChild(pill);
                    });
                });

                container.dataset.built = '1';
            }
        };
    }

    function _toggleAllDatasets(chart, league, visible) {
        Object.keys(visibleDatasets[league]).forEach(label => {
            visibleDatasets[league][label] = visible;
        });
        saveVisible(league, visibleDatasets[league]);
        chart.data.datasets.forEach((ds, idx) => {
            chart.getDatasetMeta(idx).hidden = ds.label.includes(' - ')
                ? !leagueState[league].showMA || !visible
                : !visible;
        });
        const container = document.getElementById('legenda_' + league);
        if (container) {
            container.querySelectorAll('.leg-item[data-label]').forEach(pill => {
                pill.classList.toggle('leg-hidden', !visible);
            });
        }
        chart.update();
    }

    /* ═══════════════════════════════════════════════════════
       PLUGIN: FIBONACCI POR LIGA
    ═══════════════════════════════════════════════════════ */
    function buildFibonacciPlugin(league) {
        return {
            id: 'fibonacci_' + league,
            afterDraw(chart) {
                if (!leagueState[league].showFibonacci) return;
                const { ctx, scales: { y: yS }, chartArea: { left, right } } = chart;
                if (!yS) return;
                const levels = [0, 23.6, 38.2, 50, 61.8, 100];
                const range = yS.max - yS.min;
                ctx.save();
                levels.forEach((lv, i) => {
                    const yPx = yS.getPixelForValue(yS.min + (lv / 100) * range);
                    ctx.beginPath(); ctx.setLineDash([5, 5]);
                    ctx.moveTo(left, yPx); ctx.lineTo(right, yPx);
                    ctx.strokeStyle = 'rgba(0,255,0,0.5)'; ctx.lineWidth = 1; ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.fillStyle = 'rgba(0,255,0,0.85)'; ctx.font = '10px Arial';
                    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                    ctx.fillText(`${lv}%`, right + 54, yPx - (i === 0 ? -8 : 0));
                });
                ctx.restore();
            }
        };
    }

    /* ═══════════════════════════════════════════════════════
       PLUGIN: LINHA ATUAL POR LIGA
    ═══════════════════════════════════════════════════════ */
    function buildLinhaAtualPlugin(league) {
        return {
            id: 'linhaAtual_' + league,
            afterDraw(chart) {
                if (!leagueState[league].showLinhaAtual) return;
                const { ctx, chartArea, scales } = chart;
                if (!chartArea || !scales.y) return;
                const yS = scales.y;
                const { left, right, top, bottom } = chartArea;
                const PAD = 5, H = 18;
                const entries = [];
                chart.data.datasets.forEach((d, i) => {
                    if (!d.label || d.label.includes(' - ') || !chart.isDatasetVisible(i)) return;
                    const arr = d.data; if (!arr?.length) return;
                    let yVal = null;
                    for (let j = arr.length - 1; j >= 0; j--) {
                        const v = arr[j];
                        if (v !== null && v !== undefined && isFinite(v)) { yVal = v; break; }
                    }
                    if (yVal === null) return;
                    const yPx = yS.getPixelForValue(yVal);
                    if (!isFinite(yPx) || yPx < top || yPx > bottom) return;
                    entries.push({ yVal, yPx, color: d.borderColor || '#fff' });
                });
                if (!entries.length) return;
                entries.sort((a, b) => a.yPx - b.yPx);
                for (let i = 1; i < entries.length; i++) {
                    const prev = entries[i-1], curr = entries[i];
                    curr.badgeY = (curr.yPx - (prev.badgeY ?? prev.yPx) < H + 2) ? (prev.badgeY ?? prev.yPx) + H + 2 : curr.yPx;
                    if (i === 1) prev.badgeY = prev.badgeY ?? prev.yPx;
                }
                if (entries.length === 1) entries[0].badgeY = entries[0].yPx;
                entries.forEach(({ yVal, yPx, badgeY, color }) => {
                    ctx.save();
                    ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.setLineDash([6, 4]);
                    ctx.beginPath(); ctx.moveTo(left, yPx); ctx.lineTo(right, yPx); ctx.stroke(); ctx.setLineDash([]);
                    const text = yVal.toFixed(1) + '%';
                    ctx.font = 'bold 10px Arial,sans-serif'; ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
                    const bw = Math.ceil(ctx.measureText(text).width) + PAD*2, bx = right + 4, by = badgeY - H/2;
                    ctx.fillStyle = 'rgba(10,12,20,0.95)'; ctx.fillRect(bx, by, bw, H);
                    ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.strokeRect(bx, by, bw, H);
                    ctx.fillStyle = color; ctx.fillText(text, bx + PAD, badgeY);
                    ctx.restore();
                });
            }
        };
    }

    /* ═══════════════════════════════════════════════════════
       PLUGIN: LINHAS ARRASTÁVEIS POR LIGA
    ═══════════════════════════════════════════════════════ */
    function buildDragPlugin(league) {
        return {
            id: 'linhaDraggable_' + league,
            afterInit(chart) {
                const canvas = chart.canvas;
                chart.dragLines = loadDragLines(league);
                chart._selectedDragLine = -1;
                const HIT = 8;
                let dragIdx = -1;
                const getYS   = () => chart.scales.y;
                const getEvtY = evt => {
                    const rect = canvas.getBoundingClientRect();
                    return ((evt.touches?.[0]?.clientY) ?? evt.clientY ?? 0) - rect.top;
                };
                const nearest = pxY => {
                    const yS = getYS();
                    if (!yS || !chart.chartArea) return -1;
                    const { top, bottom } = chart.chartArea;
                    let best = -1, bestD = Infinity;
                    (chart.dragLines || []).forEach((l, i) => {
                        const ly = yS.getPixelForValue(l.y);
                        if (ly < top || ly > bottom) return;
                        const d = Math.abs(ly - pxY);
                        if (d < bestD && d <= HIT) { bestD = d; best = i; }
                    });
                    return best;
                };
                chart.addDragLine = (color = '#1fcc59') => {
                    if ((chart.dragLines || []).length >= MAX_DRAG_LINES) { alert(`Máximo de ${MAX_DRAG_LINES} linhas!`); return; }
                    const yS = getYS(); if (!yS) return;
                    chart.dragLines.push({ y: Math.round((yS.min + yS.max) / 2), color, dragging: false });
                    chart._selectedDragLine = chart.dragLines.length - 1;
                    saveDragLines(league, chart.dragLines); updateDragCounter(league); chart.update();
                };
                chart.deleteDragLine = () => {
                    const idx = chart._selectedDragLine;
                    if (idx >= 0 && idx < (chart.dragLines || []).length) {
                        chart.dragLines.splice(idx, 1); chart._selectedDragLine = -1;
                        saveDragLines(league, chart.dragLines); updateDragCounter(league); chart.update();
                    }
                };
                chart.clearDragLines = () => {
                    chart.dragLines = []; chart._selectedDragLine = -1;
                    saveDragLines(league, chart.dragLines); updateDragCounter(league); chart.update();
                };
                const startDrag = evt => {
                    const pxY = getEvtY(evt), idx = nearest(pxY);
                    if (idx >= 0) { if (evt.cancelable) evt.preventDefault(); dragIdx = idx; chart.dragLines[idx].dragging = true; chart._selectedDragLine = idx; }
                    else { chart._selectedDragLine = -1; }
                    chart.update();
                };
                const moveDrag = evt => {
                    if (dragIdx < 0) return; if (evt.cancelable) evt.preventDefault();
                    const yS = getYS(); if (!yS) return;
                    let v = yS.getValueForPixel(getEvtY(evt));
                    v = Math.max(yS.min, Math.min(yS.max, Math.round(v * 10) / 10));
                    chart.dragLines[dragIdx].y = v; chart.update('active');
                };
                const stopDrag = () => {
                    if (dragIdx >= 0 && chart.dragLines[dragIdx]) chart.dragLines[dragIdx].dragging = false;
                    if (dragIdx >= 0) saveDragLines(league, chart.dragLines);
                    dragIdx = -1;
                };
                canvas.addEventListener('mousedown',   startDrag);
                canvas.addEventListener('mousemove',   moveDrag);
                canvas.addEventListener('mouseleave',  stopDrag);
                window.addEventListener('mouseup',     stopDrag);
                canvas.addEventListener('touchstart',  startDrag, { passive: false });
                canvas.addEventListener('touchmove',   moveDrag,  { passive: false });
                canvas.addEventListener('touchend',    stopDrag,  { passive: true });
                canvas.addEventListener('touchcancel', stopDrag,  { passive: true });
                window.addEventListener('keydown', e => {
                    if ((e.key === 'Delete' || e.key === 'Backspace') && chartInstances[league])
                        chartInstances[league].deleteDragLine();
                });
                updateDragCounter(league);
            },
            afterDatasetsDraw(chart) {
                const yS = chart.scales.y, lines = chart.dragLines || [];
                if (!yS || !lines.length || !chart.chartArea) return;
                const { ctx, chartArea: { left, right } } = chart;
                lines.forEach((l, idx) => {
                    const yPx = yS.getPixelForValue(l.y);
                    if (!Number.isFinite(yPx)) return;
                    const isSel = idx === chart._selectedDragLine;
                    ctx.save();
                    ctx.beginPath(); ctx.setLineDash(isSel ? [4, 2] : []);
                    ctx.lineWidth = isSel ? 1.8 : 1.2; ctx.strokeStyle = l.color || '#1fcc59';
                    ctx.moveTo(left, yPx); ctx.lineTo(right, yPx); ctx.stroke(); ctx.setLineDash([]);
                    if (isSel) { ctx.beginPath(); ctx.arc(left + 10, yPx, 4, 0, Math.PI * 2); ctx.fillStyle = l.color || '#1fcc59'; ctx.fill(); }
                    const text = l.y.toFixed(1) + '%';
                    ctx.font = isSel ? 'bold 10px Arial' : '10px Arial';
                    ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
                    const PAD = 5, BH = 16;
                    const bw = Math.ceil(ctx.measureText(text).width) + PAD * 2;
                    const bx = right + 4, by = yPx - BH / 2;
                    ctx.fillStyle = 'rgba(10,12,20,0.95)'; ctx.fillRect(bx, by, bw, BH);
                    ctx.strokeStyle = l.color || '#1fcc59'; ctx.lineWidth = isSel ? 1.5 : 1; ctx.strokeRect(bx, by, bw, BH);
                    ctx.fillStyle = l.color || '#1fcc59'; ctx.fillText(text, bx + PAD, yPx);
                    ctx.restore();
                });
            }
        };
    }

    /* ═══════════════════════════════════════════════════════
       CRIAR GRÁFICO POR LIGA
    ═══════════════════════════════════════════════════════ */
    Chart.defaults.animation.duration = 0;

    function createChart(league, pd) {
        const canvas = document.getElementById(CANVAS_IDS[league]);
        if (!canvas) return;

        const shortColor = '#00FF00', longColor = '#FF0000';
        const datasets = [];

        Object.entries(labelToKey).forEach(([label, key]) => {
            const color = DATASET_COLORS[label] || '#888';
            datasets.push({
                label, data: pd[key],
                borderColor: color, backgroundColor: color,
                pointBackgroundColor: pd[key + 'Colors'],
                pointBorderColor: 'rgba(0,0,0,0)', pointBorderWidth: 0,
                borderWidth: 2, pointRadius: 3, pointHoverRadius: 4,
                fill: false,
                hidden: !visibleDatasets[league][label]
            });
            // Short MA
            datasets.push({
                label: label + ' - Short MA', data: pd[key + 'Short'],
                borderColor: shortColor, backgroundColor: 'transparent',
                tension: 0, borderWidth: 2, pointRadius: 0, fill: false,
                borderDash: [5, 5],
                hidden: !leagueState[league].showMA || !visibleDatasets[league][label]
            });
            // Long MA
            datasets.push({
                label: label + ' - Long MA', data: pd[key + 'Long'],
                borderColor: longColor, backgroundColor: 'transparent',
                tension: 0, borderWidth: 2, pointRadius: 0, fill: false,
                borderDash: [5, 5],
                hidden: !leagueState[league].showMA || !visibleDatasets[league][label]
            });
        });

        const chart = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: { labels: pd.labels, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 },
                layout: { padding: { top: 30, right: 80 } },
                plugins: {
                    legend: { display: false },
                    datalabels: { display: false },
                    tooltip: {
                        enabled: true,
                        backgroundColor: 'rgba(0,0,0,0.85)',
                        titleColor: '#1fad8b', bodyColor: '#e0e0e0',
                        borderColor: '#1fad8b', borderWidth: 1,
                        callbacks: {
                            title(items) {
                                const { averagePoints } = leagueState[league];
                                const m = chartData[league]?.[items[0].dataIndex + averagePoints];
                                return m ? `${m.hora}:${String(m.minuto).padStart(2,'0')}` : '';
                            },
                            label(ctx) {
                                const v = ctx.parsed.y;
                                return v !== null ? `${ctx.dataset.label}: ${v.toFixed(2)}%` : '';
                            },
                            afterBody(items) {
                                const { averagePoints } = leagueState[league];
                                const m = chartData[league]?.[items[0].dataIndex + averagePoints];
                                return m ? `FT: ${m.ft || 'N/A'}  HT: ${m.ht || 'N/A'}` : '';
                            }
                        }
                    }
                },
                scales: {
                    x: { ticks: { display: false }, grid: { display: false } },
                    y: {
                        beginAtZero: false,
                        ticks: { color: '#b0b0b0', stepSize: 5 },
                        grid: { color: 'rgba(255,255,255,0.1)', lineWidth: 0.5 },
                        afterFit: s => { s.paddingTop = 20; }
                    }
                }
            },
            plugins: [
                buildFibonacciPlugin(league),
                buildLinhaAtualPlugin(league),
                buildDragPlugin(league),
                buildHtmlLegendPlugin(league),
                ChartDataLabels
            ]
        });

        chartInstances[league] = chart;
    }

    /* ═══════════════════════════════════════════════════════
       ATUALIZAR GRÁFICO
    ═══════════════════════════════════════════════════════ */
    function updateStatsChart(league, pd) {
        const chart = chartInstances[league];
        if (!chart) return;
        chart.data.labels = pd.labels;
        chart.data.datasets.forEach(ds => {
            const key = getKeyFromLabel(ds.label);
            if (key && pd[key] !== undefined) {
                ds.data = pd[key];
                if (!ds.label.includes(' - ') && pd[key + 'Colors'])
                    ds.pointBackgroundColor = pd[key + 'Colors'];
            }
        });
        chart.update('none');
    }

    /* ═══════════════════════════════════════════════════════
       FETCH POR LIGA
    ═══════════════════════════════════════════════════════ */
    function fetchAndUpdate(league) {
        if (!_tabVisible) return;
        const url = `${LEAGUE_URLS[league]}?timestamp=${Date.now()}`;
        fetch(url)
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(data => {
                const pd = processApiData(data, league);
                if (!chartInstances[league]) createChart(league, pd);
                else updateStatsChart(league, pd);
            })
            .catch(() => {});
    }

    function updateAllCharts() {
        LEAGUES.forEach(l => fetchAndUpdate(l));
    }

    /* ═══════════════════════════════════════════════════════
       ACCORDION
    ═══════════════════════════════════════════════════════ */
    function toggleAccordion(btn) {
        const content = btn.nextElementSibling;
        content.classList.toggle('open');
        btn.textContent = btn.textContent.includes('▼')
            ? btn.textContent.replace('▼', '▶')
            : btn.textContent.replace('▶', '▼');
    }

    /* ═══════════════════════════════════════════════════════
       CONTROLES INDEPENDENTES POR LIGA
    ═══════════════════════════════════════════════════════ */
    function onSelectorChange(league) {
        leagueState[league].numPoints     = parseInt(document.getElementById('pointsSelector_' + league).value, 10);
        leagueState[league].averagePoints = parseInt(document.getElementById('averageSelector_' + league).value, 10);
        fetchAndUpdate(league);
    }

    function onFibChange(league) {
        leagueState[league].showFibonacci = document.getElementById('fibToggle_' + league).checked;
        chartInstances[league]?.update();
    }

    function onMAChange(league) {
        leagueState[league].showMA = document.getElementById('maToggle_' + league).checked;
        const chart = chartInstances[league];
        if (!chart) return;
        chart.data.datasets.forEach((ds, idx) => {
            if (ds.label.includes(' - ')) {
                const main = ds.label.split(' - ')[0];
                chart.getDatasetMeta(idx).hidden = !leagueState[league].showMA || !visibleDatasets[league][main];
            }
        });
        chart.update();
    }

    function onLinhaAtualChange(league) {
        leagueState[league].showLinhaAtual = document.getElementById('linhaAtualToggle_' + league).checked;
        chartInstances[league]?.update();
    }

    /* ═══════════════════════════════════════════════════════
       PAINEL DE LINHAS
    ═══════════════════════════════════════════════════════ */
    function toggleLinhaPanel(league, e) {
        e.stopPropagation();
        LEAGUES.forEach(l => {
            const p = document.getElementById('linhaToolsPanel_' + l);
            if (p && l !== league) p.classList.remove('show');
        });
        const p = document.getElementById('linhaToolsPanel_' + league);
        if (p) p.classList.toggle('show');
    }
    document.addEventListener('click', () => {
        LEAGUES.forEach(l => {
            const p = document.getElementById('linhaToolsPanel_' + l);
            if (p) p.classList.remove('show');
        });
    });
    LEAGUES.forEach(l => {
        const p = document.getElementById('linhaToolsPanel_' + l);
        if (p) p.addEventListener('click', e => e.stopPropagation());
    });

    function adicionarLinha(league) {
        const color = document.getElementById('lineColorPicker_' + league)?.value || '#1fcc59';
        chartInstances[league]?.addDragLine(color);
    }
    function deletarLinhaSelecionada(league) { chartInstances[league]?.deleteDragLine(); }
    function limparTodasLinhas(league)       { chartInstances[league]?.clearDragLines(); }

    /* ═══════════════════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════════════════ */
    window.addEventListener('load', updateAllCharts);
    setInterval(updateAllCharts, 3000);
    </script>

</body>
</html>
