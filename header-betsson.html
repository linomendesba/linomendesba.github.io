<!-- header-betsson.html -->
<link rel="stylesheet" href="stylehe.css">

<style>
  .home-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.08), rgba(34, 197, 94, 0.03));
    color: #e2e8f0;
    border: 1px solid rgba(34, 197, 94, 0.25);
    padding: 6px 14px 6px 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }
  .home-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.18), rgba(34, 197, 94, 0.06));
    opacity: 0;
    transition: opacity 0.25s ease;
    border-radius: inherit;
  }
  .home-btn:hover {
    color: #4ade80;
    border-color: rgba(34, 197, 94, 0.55);
    box-shadow: 0 0 12px rgba(34, 197, 94, 0.18), 0 2px 8px rgba(0,0,0,0.25);
    transform: translateY(-1px);
  }
  .home-btn:hover::before { opacity: 1; }
  .home-btn:active {
    transform: translateY(0px);
    box-shadow: 0 0 6px rgba(34, 197, 94, 0.15);
  }
  .home-btn svg {
    transition: transform 0.25s ease, color 0.25s ease;
    flex-shrink: 0;
  }
  .home-btn:hover svg { transform: scale(1.12); }
  .home-btn span { position: relative; z-index: 1; }
</style>
