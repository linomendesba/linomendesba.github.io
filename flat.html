  <style>
    :root {
      --bg:       #181b21;
      --panel:    #1e2129;
      --panel2:   #181b21;
      --line:     rgba(255,255,255,0.06);
      --line2:    rgba(255,255,255,0.10);
      --green:    #3ddc84;
      --green-bg: rgba(61,220,132,0.07);
      --green-bd: rgba(61,220,132,0.18);
      --red:      #ff6b6b;
      --red-bg:   rgba(255,107,107,0.07);
      --red-bd:   rgba(255,107,107,0.18);
      --blue:     #60a5fa;
      --gold:     #f0b429;
      --t1:       #f0f2f5;
      --t2:       #a0a8b4;
      --t3:       #5a6272;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
    }

    /* ════ TOOLBAR ════ */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--panel2);
      border-bottom: 1px solid var(--line2);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .house-seg { display: flex; gap: 2px; }

    .ht {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--t2); background: transparent;
      border: 1px solid transparent; border-radius: 5px;
      padding: 5px 13px; cursor: pointer; transition: all 0.13s;
    }
    .ht:hover { color: var(--t1); background: rgba(255,255,255,0.04); }
    .ht.on { color: #181b21; background: #767e95; }

    .toolbar-sep { width: 1px; height: 22px; background: var(--line2); margin: 0 4px; }

    .t-label { font-size: 11px; font-weight: 500; color: var(--t2); white-space: nowrap; }

    .t-select {
      font-family: 'Roboto', sans-serif; font-size: 12px;
      background: var(--panel); border: 1px solid var(--line2);
      border-radius: 5px; color: var(--t1); padding: 5px 8px;
      cursor: pointer; outline: none;
    }
    .t-select:focus { border-color: var(--green-bd); }

    .t-btn {
      font-family: 'Roboto', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      background: var(--panel); border: 1px solid var(--line2);
      border-radius: 5px; color: var(--t1); padding: 5px 14px;
      cursor: pointer; transition: all 0.13s;
    }
    .t-btn:hover { border-color: var(--green-bd); color: var(--green); }

    /* ════ LEAGUE BAR ════ */
    #leagueBar {
      display: flex; flex-wrap: wrap; gap: 4px;
      padding: 8px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel2);
    }

    .lt {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--t3); background: transparent;
      border: 1px solid transparent; border-radius: 4px;
      padding: 4px 11px; cursor: pointer; transition: all 0.12s;
    }
    .lt:hover { color: var(--t2); border-color: var(--line2); }
    .lt.on { color: #767e95; background: rgba(61,220,132,0.06); }

    /* ════ STATUS ════ */
    #statusBar {
      margin: 12px 20px 0;
      padding: 8px 14px; border-radius: 5px;
      font-size: 11px; font-weight: 500;
      background: rgba(240,180,41,0.08);
      border: 1px solid rgba(240,180,41,0.22);
      color: var(--gold);
    }
    #statusBar.hidden { display: none; }

    /* ════ MAIN LIST ════ */
    .league-list {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      box-sizing: border-box;
    }

    /* ════ LEAGUE CARD ════ */
    .lcard {
      background: var(--panel);
      border: 1px solid var(--line2);
      border-radius: 10px;
      overflow: hidden;
      width: 100%;
    }

    .lcard-head {
      padding: 11px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .lcard-head h2 { font-size: 15px; font-weight: 700; color: var(--t1); }
    .lcard-head .meta {
      font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--t3);
    }

    /* Under + Over side by side */
    .lcard-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .mode-col { padding: 16px 18px; }
    .mode-col:first-child { border-right: 1px solid var(--line); }

    @media (max-width: 700px) {
      .lcard-cols { grid-template-columns: 1fr; }
      .mode-col:first-child { border-right: none; border-bottom: 1px solid var(--line); }
    }

    /* ════ MODE LABEL ════ */
    .mode-label {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 14px;
    }
    .mode-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .mode-under .mode-dot   { background: #5ee8a0; }
    .mode-under .mode-label { color: #5ee8a0; }
    .mode-over  .mode-dot   { background: #7db8fc; }
    .mode-over  .mode-label { color: #7db8fc; }

    /* ════ NUMS 2x2 ════ */
    .nums {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }

    .num-box {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
    }
    .nb-label {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--t3); margin-bottom: 5px;
    }
    .nb-val { font-size: 22px; font-weight: 900; line-height: 1; }
    .nv-w { color: #d8dde6; }
    .nv-g { color: #5ee8a0; }
    .nv-r { color: #ff8585; }
    .nv-p { color: #5ee8a0; }
    .nv-n { color: #ff8585; }

    /* ════ SEQ STRIP ════ */
    .seq-strip {
      border-radius: 5px; padding: 8px 12px;
      margin-bottom: 10px;
      font-size: 12px; font-weight: 700;
    }
    .ss-label {
      font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      opacity: 0.5; margin-bottom: 3px;
    }
    .seq-strip.pos { background: rgba(61,220,132,0.06); border: 1px solid rgba(61,220,132,0.15); color: #5ee8a0; }
    .seq-strip.neg { background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.15); color: #ff8585; }
    .seq-strip.neu { background: rgba(255,255,255,0.02); border: 1px solid var(--line); color: var(--t2); }

    /* ════ RUNS ════ */
    .runs { display: flex; gap: 8px; margin-bottom: 12px; }
    .run-group { flex: 1; }
    .rg-label {
      font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
    }
    .rg-plus  .rg-label { color: #5ee8a0; }
    .rg-minus .rg-label { color: #ff8585; }

    .pills { display: flex; flex-wrap: wrap; gap: 4px; }
    .pill { font-size: 11px; font-weight: 700; border-radius: 3px; padding: 3px 8px; }
    .pill-g { background: rgba(61,220,132,0.06); border: 1px solid rgba(61,220,132,0.15); color: #5ee8a0; }
    .pill-r { background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.15); color: #ff8585; }
    .pill-m { background: rgba(255,255,255,0.03); border: 1px solid var(--line); color: var(--t2); }

    /* ════ CHART ════ */
    .chart-label {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--t3); margin-bottom: 6px;
    }
    .chart-wrap {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      height: 260px;
      position: relative;
    }
    .chart-wrap canvas {
      position: absolute; inset: 10px;
      width: calc(100% - 20px) !important;
      height: calc(100% - 20px) !important;
    }

    /* ════ PLACEHOLDER ════ */
    .placeholder {
      background: var(--panel); border: 1px solid var(--line2);
      border-radius: 10px; padding: 48px;
      text-align: center; font-size: 12px; font-weight: 500;
      color: var(--t3); letter-spacing: 0.04em; text-transform: uppercase;
    }
    .placeholder.err { border-color: var(--red-bd); background: var(--red-bg); color: var(--red); }
  </style>
