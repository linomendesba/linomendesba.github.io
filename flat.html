<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lateralização Under / Over 2.5</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #1c1f26;
      --panel:    #20232b;
      --panel2:   #1a1d24;
      --line:     rgba(255,255,255,0.07);
      --line2:    rgba(255,255,255,0.12);
      --green:    #3ddc84;
      --green-bg: rgba(61,220,132,0.08);
      --green-bd: rgba(61,220,132,0.22);
      --red:      #ff6b6b;
      --red-bg:   rgba(255,107,107,0.08);
      --red-bd:   rgba(255,107,107,0.22);
      --blue:     #60a5fa;
      --gold:     #f0b429;
      --t1:       #e8ecf0;
      --t2:       #7c8798;
      --t3:       #3d4352;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
    }

    /* ════ TOOLBAR ════ */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--panel2);
      border-bottom: 1px solid var(--line2);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .house-seg { display: flex; gap: 2px; }

    .ht {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--t2); background: transparent;
      border: 1px solid transparent; border-radius: 5px;
      padding: 5px 13px; cursor: pointer; transition: all 0.13s;
    }
    .ht:hover { color: var(--t1); background: rgba(255,255,255,0.05); }
    .ht.on { color: var(--bg); background: var(--green); border-color: var(--green); }

    .toolbar-sep { width: 1px; height: 22px; background: var(--line2); margin: 0 4px; }

    .t-label { font-size: 11px; font-weight: 500; color: var(--t2); white-space: nowrap; }

    .t-select {
      font-family: 'Roboto', sans-serif; font-size: 12px;
      background: var(--panel); border: 1px solid var(--line2);
      border-radius: 5px; color: var(--t1); padding: 5px 8px;
      cursor: pointer; outline: none;
    }
    .t-select:focus { border-color: var(--green-bd); }

    .t-btn {
      font-family: 'Roboto', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      background: var(--panel); border: 1px solid var(--line2);
      border-radius: 5px; color: var(--t1); padding: 5px 14px;
      cursor: pointer; transition: all 0.13s;
    }
    .t-btn:hover { border-color: var(--green-bd); color: var(--green); }

    /* ════ LEAGUE BAR ════ */
    #leagueBar {
      display: flex; flex-wrap: wrap; gap: 4px;
      padding: 8px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel2);
    }

    .lt {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--t3); background: transparent;
      border: 1px solid transparent; border-radius: 4px;
      padding: 4px 11px; cursor: pointer; transition: all 0.12s;
    }
    .lt:hover { color: var(--t2); border-color: var(--line2); }
    .lt.on { color: var(--green); border-color: var(--green-bd); background: var(--green-bg); }

    /* ════ STATUS ════ */
    #statusBar {
      margin: 12px 20px 0;
      padding: 8px 14px; border-radius: 5px;
      font-size: 11px; font-weight: 500;
      background: rgba(240,180,41,0.08);
      border: 1px solid rgba(240,180,41,0.22);
      color: var(--gold);
    }
    #statusBar.hidden { display: none; }

    /* ════ MAIN LIST ════ */
    .league-list {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 1600px;
    }

    /* ════ LEAGUE CARD ════ */
    .lcard {
      background: var(--panel);
      border: 1px solid var(--line2);
      border-radius: 10px;
      overflow: hidden;
    }

    .lcard-head {
      padding: 11px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .lcard-head h2 { font-size: 15px; font-weight: 700; color: var(--t1); }
    .lcard-head .meta {
      font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--t3);
    }

    /* Under + Over side by side */
    .lcard-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .mode-col { padding: 16px 18px; }
    .mode-col:first-child { border-right: 1px solid var(--line); }

    @media (max-width: 700px) {
      .lcard-cols { grid-template-columns: 1fr; }
      .mode-col:first-child { border-right: none; border-bottom: 1px solid var(--line); }
    }

    /* ════ MODE LABEL ════ */
    .mode-label {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 14px;
    }
    .mode-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .mode-under .mode-dot   { background: var(--green); }
    .mode-under .mode-label { color: var(--green); }
    .mode-over  .mode-dot   { background: var(--blue); }
    .mode-over  .mode-label { color: var(--blue); }

    /* ════ NUMS 2x2 ════ */
    .nums {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }

    .num-box {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
    }
    .nb-label {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--t3); margin-bottom: 5px;
    }
    .nb-val { font-size: 22px; font-weight: 900; line-height: 1; }
    .nv-w { color: var(--t1); }
    .nv-g { color: var(--green); }
    .nv-r { color: var(--red); }
    .nv-p { color: var(--green); }
    .nv-n { color: var(--red); }

    /* ════ SEQ STRIP ════ */
    .seq-strip {
      border-radius: 5px; padding: 8px 12px;
      margin-bottom: 10px;
      font-size: 12px; font-weight: 700;
    }
    .ss-label {
      font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      opacity: 0.5; margin-bottom: 3px;
    }
    .seq-strip.pos { background: var(--green-bg); border: 1px solid var(--green-bd); color: var(--green); }
    .seq-strip.neg { background: var(--red-bg);   border: 1px solid var(--red-bd);   color: var(--red); }
    .seq-strip.neu { background: rgba(255,255,255,0.03); border: 1px solid var(--line); color: var(--t2); }

    /* ════ RUNS ════ */
    .runs { display: flex; gap: 8px; margin-bottom: 12px; }
    .run-group { flex: 1; }
    .rg-label {
      font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
    }
    .rg-plus  .rg-label { color: var(--green); }
    .rg-minus .rg-label { color: var(--red); }

    .pills { display: flex; flex-wrap: wrap; gap: 4px; }
    .pill { font-size: 11px; font-weight: 700; border-radius: 3px; padding: 3px 8px; }
    .pill-g { background: var(--green-bg); border: 1px solid var(--green-bd); color: var(--green); }
    .pill-r { background: var(--red-bg);   border: 1px solid var(--red-bd);   color: var(--red); }
    .pill-m { background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: var(--t2); }

    /* ════ CHART ════ */
    .chart-label {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--t3); margin-bottom: 6px;
    }
    .chart-wrap {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      height: 260px;
      position: relative;
    }
    .chart-wrap canvas {
      position: absolute; inset: 10px;
      width: calc(100% - 20px) !important;
      height: calc(100% - 20px) !important;
    }

    /* ════ PLACEHOLDER ════ */
    .placeholder {
      background: var(--panel); border: 1px solid var(--line2);
      border-radius: 10px; padding: 48px;
      text-align: center; font-size: 12px; font-weight: 500;
      color: var(--t3); letter-spacing: 0.04em; text-transform: uppercase;
    }
    .placeholder.err { border-color: var(--red-bd); background: var(--red-bg); color: var(--red); }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="house-seg" id="houseTabs">
      <button class="ht" data-house="betano">Betano</button>
      <button class="ht" data-house="betsson">Betsson</button>
      <button class="ht" data-house="kiron">Kiron</button>
      <button class="ht" data-house="estrelabet">Estrelabet</button>
    </div>
    <div class="toolbar-sep"></div>
    <span class="t-label">Jogos:</span>
    <select id="limitSelect" class="t-select">
      <option value="40">20</option>
      <option value="60">40</option>
      <option value="80">60</option>
      <option value="100">80</option>
      <option value="120">100</option>
      <option value="160">140</option>
      <option value="200">180</option>
      <option value="320">300</option>
      <option value="4800">4800</option>
    </select>
    <button id="reloadBtn" class="t-btn">Recarregar</button>
  </div>

  <div id="leagueBar"></div>
  <div id="statusBar" class="hidden"></div>
  <div class="league-list" id="leaguesGrid">
    <div class="placeholder">Carregando...</div>
  </div>

  <script>
  // ─────────────────────────────────────────────────────────────
  //  PERSIST helpers
  // ─────────────────────────────────────────────────────────────
  const STORE_KEY = "lat_prefs_v1";

  function loadPrefs() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
  }

  function savePrefs(obj) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(obj)); } catch {}
  }

  // ─────────────────────────────────────────────────────────────
  //  CONFIG
  // ─────────────────────────────────────────────────────────────
  const HOUSES = {
    betano: {
      label: "Betano",
      leagues: [
        { key: "copa-america",        title: "Copa America",         resultados: "https://betstat.site/resultados/Copa%20Am%C3%A9rica" },
        { key: "classicos-america",   title: "Classicos da America", resultados: "https://betstat.site/resultados/Ta%C3%A7a%20Gl%C3%B3ria%20eterna" },
        { key: "euro",                title: "Euro",                 resultados: "https://betstat.site/resultados/Euro" },
        { key: "campeonato-italiano", title: "Camp. Italiano",       resultados: "https://betstat.site/resultados/Campeonato%20Italiano" },
        { key: "copa-estrelas",       title: "Copa das Estrelas",    resultados: "https://betstat.site/resultados/Copa%20das%20estrelas" },
        { key: "brasileirao",         title: "Brasileirao Betano",   resultados: "https://betstat.site/resultados/Brasileir%C3%A3o%20Betano" },
      ]
    },
    betsson: {
      label: "Betsson",
      leagues: [
        { key: "espanha",    title: "Espanha",    resultados: "https://betstat.site/resultados/betsson/Espanha" },
        { key: "inglaterra", title: "Inglaterra", resultados: "https://betstat.site/resultados/betsson/Inglaterra" },
        { key: "brasil",     title: "Brasil",     resultados: "https://betstat.site/resultados/betsson/Brasil" },
      ]
    },
    kiron: {
      label: "Kiron",
      leagues: [
        { key: "england", title: "England League", resultados: "https://betstat.site/resultados/kiron/England" },
        { key: "italy",   title: "Italy League",   resultados: "https://betstat.site/resultados/kiron/Italy" },
        { key: "spain",   title: "Spain League",   resultados: "https://betstat.site/resultados/kiron/Spain" },
      ]
    },
    estrelabet: {
      label: "Estrelabet",
      leagues: [
        { key: "copa-mundo",     title: "Copa do Mundo",      resultados: "https://betstat.site/resultados/estrela/Copa%20do%20Mundo" },
        { key: "ligas-campeoes", title: "Ligas dos Campeoes", resultados: "https://betstat.site/resultados/estrela/Ligas%20dos%20Campe%C3%B5es" },
        { key: "america-latina", title: "America Latina",     resultados: "https://betstat.site/resultados/estrela/Am%C3%A9rica%20Latina" },
      ]
    }
  };

  // ─────────────────────────────────────────────────────────────
  //  STATE  (restored from localStorage)
  // ─────────────────────────────────────────────────────────────
  const prefs = loadPrefs();

  let currentHouse    = prefs.house    || "betano";
  let activeLeagueKey = prefs.league   || null;
  const charts        = {};

  // ─────────────────────────────────────────────────────────────
  //  DOM
  // ─────────────────────────────────────────────────────────────
  const houseTabs   = document.getElementById("houseTabs");
  const leagueBar   = document.getElementById("leagueBar");
  const leaguesGrid = document.getElementById("leaguesGrid");
  const reloadBtn   = document.getElementById("reloadBtn");
  const limitSelect = document.getElementById("limitSelect");
  const statusBar   = document.getElementById("statusBar");

  // Apply saved limit
  if (prefs.limit) {
    const opt = [...limitSelect.options].find(o => o.value === String(prefs.limit));
    if (opt) opt.selected = true;
  }

  // Apply saved house button
  houseTabs.querySelectorAll(".ht").forEach(b => {
    b.classList.toggle("on", b.dataset.house === currentHouse);
  });

  function setStatus(msg, show) {
    statusBar.textContent = msg || "";
    statusBar.classList.toggle("hidden", !show);
  }

  // ─────────────────────────────────────────────────────────────
  //  SCORE PARSE
  // ─────────────────────────────────────────────────────────────
  function parseFT(ft) {
    if (!ft) return null;
    const clean = String(ft).replace(/\s/g, "").replace(/x/gi, "-");
    const m = clean.match(/^(\d+)-(\d+)$/);
    if (!m) return null;
    const h = parseInt(m[1], 10), a = parseInt(m[2], 10);
    if (!isFinite(h) || !isFinite(a)) return null;
    return { total: h + a };
  }

  // ─────────────────────────────────────────────────────────────
  //  STATS LOGIC
  // ─────────────────────────────────────────────────────────────
  function buildBlocks(games) {
    const b = [], n = Math.floor(games.length / 20);
    for (let i = 0; i < n; i++) b.push(games.slice(i * 20, i * 20 + 20));
    return b;
  }

  function topRuns(series, t) {
    const runs = []; let c = 0;
    for (const v of series) { if (v === t) c++; else { if (c) runs.push(c); c = 0; } }
    if (c) runs.push(c);
    return runs.sort((a, b) => b - a).slice(0, 3);
  }

  function currentRun(series) {
    if (!series.length) return { type: null, count: 0, label: "Sem sequencia" };
    const last = series[series.length - 1]; let c = 0;
    for (let i = series.length - 1; i >= 0 && series[i] === last; i--) c++;
    return { type: last, count: c, label: last === 1 ? `+1: ${c} seguidas` : `-1: ${c} seguidas` };
  }

  function calcStats(blocks, base) {
    const empty = { acumulado: [0], validCount: 0, plusCount: 0, minusCount: 0, top3Plus: [], top3Minus: [], run: { type: null, count: 0, label: "Sem sequencia" } };
    if (!blocks.length) return empty;
    const d = [], acc = [0];
    for (let b = blocks.length - 2; b >= 0; b--) {
      for (let i = 19; i >= 0; i--) {
        const cur = blocks[b]?.[i], ref = blocks[b + 1]?.[i];
        if (!cur || !ref) continue;
        const baseOk = base === "under" ? ref.total < 3 : ref.total > 2;
        if (!baseOk) continue;
        const ok    = base === "under" ? cur.total < 3 : cur.total > 2;
        const delta = ok ? 1 : -1;
        d.push(delta); acc.push(acc[acc.length - 1] + delta);
      }
    }
    return { acumulado: acc, validCount: d.length, plusCount: d.filter(v => v === 1).length, minusCount: d.filter(v => v === -1).length, top3Plus: topRuns(d, 1), top3Minus: topRuns(d, -1), run: currentRun(d) };
  }

  // ─────────────────────────────────────────────────────────────
  //  FETCH
  // ─────────────────────────────────────────────────────────────
  async function fetchLeague(league, limit) {
    const res = await fetch(league.resultados, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${league.title}`);
    const json = await res.json();
    const raw  = Array.isArray(json) ? json : (json.data || json.resultados || []);
    const games = raw.map(i => parseFT(i.ft)).filter(Boolean).slice(0, limit);
    const blocks = buildBlocks(games);
    return { league, totalGames: games.length, under: calcStats(blocks, "under"), over: calcStats(blocks, "over") };
  }

  // ─────────────────────────────────────────────────────────────
  //  CHART
  // ─────────────────────────────────────────────────────────────
  function renderChart(id, acc, mode) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    if (charts[id]) charts[id].destroy();
    const color = mode === "under" ? "#3ddc84" : "#60a5fa";
    charts[id] = new Chart(canvas.getContext("2d"), {
      type: "line",
      data: {
        labels: acc.map((_, i) => i),
        datasets: [{
          data: acc,
          borderColor: color,
          borderWidth: 2,
          pointRadius: acc.length > 80 ? 0 : 3,
          pointHoverRadius: 5,
          pointBackgroundColor: acc.map((v, i) => i === 0 ? "#3d4352" : v >= acc[i-1] ? "#3ddc84" : "#ff6b6b"),
          fill: false,
          tension: 0.1
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => `Acumulado: ${c.raw}` } }
        },
        scales: {
          x: { ticks: { color: "#3d4352", maxTicksLimit: 10, font: { family: "Roboto", size: 10 } }, grid: { color: "rgba(255,255,255,0.03)" } },
          y: { ticks: { color: "#3d4352", font: { family: "Roboto", size: 10 } }, grid: { color: "rgba(255,255,255,0.04)" } }
        }
      }
    });
  }

  // ─────────────────────────────────────────────────────────────
  //  HTML BUILDERS
  // ─────────────────────────────────────────────────────────────
  function pillsHTML(arr, cls) {
    if (!arr.length) return `<span class="pill pill-m">—</span>`;
    return arr.map(n => `<span class="pill ${cls}">${n}</span>`).join("");
  }

  function seqHTML(run) {
    if (!run || !run.count) return `<div class="seq-strip neu"><div class="ss-label">Sequencia atual</div>Sem leitura</div>`;
    const cls = run.type === 1 ? "pos" : "neg";
    return `<div class="seq-strip ${cls}"><div class="ss-label">Sequencia atual</div>${run.label}</div>`;
  }

  function modeHTML(key, mode, s) {
    const id      = `ch-${key}-${mode}`;
    const saldo   = s.acumulado[s.acumulado.length - 1] ?? 0;
    const saldoCls = saldo > 0 ? "nv-p" : saldo < 0 ? "nv-n" : "nv-w";
    const modeCls  = mode === "under" ? "mode-under" : "mode-over";
    const modeText = mode === "under" ? "Under 2.5" : "Over 2.5";

    return `
      <div class="mode-col ${modeCls}">
        <div class="mode-label"><span class="mode-dot"></span>${modeText}</div>

        <div class="nums">
          <div class="num-box"><div class="nb-label">Validas</div><div class="nb-val nv-w">${s.validCount}</div></div>
          <div class="num-box"><div class="nb-label">+1 Mantem</div><div class="nb-val nv-g">${s.plusCount}</div></div>
          <div class="num-box"><div class="nb-label">-1 Quebra</div><div class="nb-val nv-r">${s.minusCount}</div></div>
          <div class="num-box"><div class="nb-label">Saldo</div><div class="nb-val ${saldoCls}">${saldo}</div></div>
        </div>

        ${seqHTML(s.run)}

        <div class="runs">
          <div class="run-group rg-plus">
            <div class="rg-label">Maiores seq. +1</div>
            <div class="pills">${pillsHTML(s.top3Plus, "pill-g")}</div>
          </div>
          <div class="run-group rg-minus">
            <div class="rg-label">Maiores seq. -1</div>
            <div class="pills">${pillsHTML(s.top3Minus, "pill-r")}</div>
          </div>
        </div>

        <div class="chart-label">Acumulado</div>
        <div class="chart-wrap"><canvas id="${id}"></canvas></div>
      </div>
    `;
  }

  function cardHTML(d) {
    return `
      <div class="lcard">
        <div class="lcard-head">
          <h2>${d.league.title}</h2>
          <span class="meta">${HOUSES[currentHouse].label} &mdash; ${d.totalGames} jogos</span>
        </div>
        <div class="lcard-cols">
          ${modeHTML(d.league.key, "under", d.under)}
          ${modeHTML(d.league.key, "over",  d.over)}
        </div>
      </div>
    `;
  }

  // ─────────────────────────────────────────────────────────────
  //  LEAGUE BAR
  // ─────────────────────────────────────────────────────────────
  function buildLeagueBar() {
    const leagues = HOUSES[currentHouse].leagues;
    const allBtn  = `<button class="lt ${activeLeagueKey === null ? 'on' : ''}" data-key="__all__">Todas</button>`;
    const tabs    = leagues.map(l =>
      `<button class="lt ${l.key === activeLeagueKey ? 'on' : ''}" data-key="${l.key}">${l.title}</button>`
    ).join("");
    leagueBar.innerHTML = allBtn + tabs;

    leagueBar.querySelectorAll(".lt").forEach(b => {
      b.addEventListener("click", () => {
        activeLeagueKey = b.dataset.key === "__all__" ? null : b.dataset.key;
        savePrefs({ ...loadPrefs(), league: activeLeagueKey });
        buildLeagueBar();
        renderAll(true);
      });
    });
  }

  // ─────────────────────────────────────────────────────────────
  //  RENDER ALL
  // ─────────────────────────────────────────────────────────────
  async function renderAll(showLoading) {
    const limit   = parseInt(limitSelect.value, 10) || 100;
    const leagues = HOUSES[currentHouse].leagues.filter(l =>
      activeLeagueKey === null || l.key === activeLeagueKey
    );

    if (showLoading) leaguesGrid.innerHTML = `<div class="placeholder">Carregando...</div>`;
    setStatus("", false);

    const results = await Promise.allSettled(leagues.map(l => fetchLeague(l, limit)));
    const cards = [], queue = [], errs = [];

    for (const r of results) {
      if (r.status === "fulfilled") {
        cards.push(cardHTML(r.value));
        queue.push({ id: `ch-${r.value.league.key}-under`, acc: r.value.under.acumulado, mode: "under" });
        queue.push({ id: `ch-${r.value.league.key}-over`,  acc: r.value.over.acumulado,  mode: "over"  });
      } else {
        errs.push(r.reason?.message || "Erro");
      }
    }

    leaguesGrid.innerHTML = cards.length
      ? cards.join("")
      : `<div class="placeholder err">Nenhuma liga carregada.</div>`;

    queue.forEach(q => renderChart(q.id, q.acc, q.mode));
    if (errs.length) setStatus(errs.join(" · "), true);
  }

  // ─────────────────────────────────────────────────────────────
  //  HOUSE TABS
  // ─────────────────────────────────────────────────────────────
  houseTabs.querySelectorAll(".ht").forEach(b => {
    b.addEventListener("click", () => {
      houseTabs.querySelectorAll(".ht").forEach(x => x.classList.remove("on"));
      b.classList.add("on");
      currentHouse    = b.dataset.house;
      activeLeagueKey = null;
      savePrefs({ ...loadPrefs(), house: currentHouse, league: null });
      buildLeagueBar();
      renderAll(true);
    });
  });

  limitSelect.addEventListener("change", () => {
    savePrefs({ ...loadPrefs(), limit: limitSelect.value });
    renderAll(true);
  });

  reloadBtn.addEventListener("click", () => renderAll(true));

  // ─────────────────────────────────────────────────────────────
  //  WEB SOCKET
  // ─────────────────────────────────────────────────────────────
  const WS_URL = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`;
  let ws, backoff = 1000, hbTimer = null, hbWait = null, lastSoft = 0, softTimer = null, wsRunning = false;

  function safeRender() {
    if (wsRunning) return;
    wsRunning = true;
    setStatus("Atualizando...", true);
    Promise.resolve().then(() => renderAll(false))
      .catch(() => {})
      .finally(() => setTimeout(() => { wsRunning = false; setStatus("", false); }, 800));
  }

  function softReload() {
    const now = Date.now(), wait = Math.max(250, lastSoft + 1200 - now);
    clearTimeout(softTimer);
    softTimer = setTimeout(() => { lastSoft = Date.now(); safeRender(); }, wait);
  }

  function startHB() {
    stopHB();
    hbTimer = setInterval(() => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      try {
        ws.send(JSON.stringify({ type: "ping", t0: Date.now() }));
        hbWait = setTimeout(() => { try { ws.close(); } catch {} }, 12000);
      } catch {}
    }, 25000);
  }

  function stopHB() {
    if (hbTimer) clearInterval(hbTimer), hbTimer = null;
    if (hbWait)  clearTimeout(hbWait),  hbWait  = null;
  }

  function connectWS() {
    try { if (ws) ws.close(); } catch {}
    ws = new WebSocket(WS_URL);
    ws.onopen = () => {
      backoff = 1000; startHB();
      setStatus("Conectado", true);
      setTimeout(() => setStatus("", false), 1200);
      try { ws.send(JSON.stringify({ type: "versions:get" })); } catch {}
    };
    ws.onmessage = ev => {
      let m; try { m = JSON.parse(ev.data); } catch { return; }
      if (m.type === "ping")  { try { ws.send(JSON.stringify({ type: "pong" })); } catch {} return; }
      if (m.type === "pong")  { if (hbWait) clearTimeout(hbWait); return; }
      if (["dados:update","push:versions","vers","hint","update"].includes(m.type)) { softReload(); return; }
      if (m.type === "all:reload") location.reload();
    };
    ws.onclose = () => { stopHB(); setTimeout(connectWS, backoff); backoff = Math.min(backoff * 2, 10000); };
    ws.onerror = () => { try { ws.close(); } catch {} };
  }

  // ─────────────────────────────────────────────────────────────
  //  INIT
  // ─────────────────────────────────────────────────────────────
  buildLeagueBar();
  renderAll(true);
  connectWS();
  </script>
</body>
</html>
