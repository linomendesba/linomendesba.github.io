<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lateralização Under / Over 2.5</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #1c1f26;
      --surface:   #22262f;
      --surface2:  #191c23;
      --border:    rgba(255,255,255,0.06);
      --border2:   rgba(255,255,255,0.10);
      --accent:    #4ade80;
      --accent2:   #22c55e;
      --red:       #f87171;
      --red2:      #ef4444;
      --gold:      #fbbf24;
      --text1:     #f1f5f9;
      --text2:     #94a3b8;
      --text3:     #475569;
      --mono:      'Roboto', sans-serif;
      --display:   'Roboto', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text1);
      font-family: var(--mono);
      min-height: 100vh;
    }

    /* ── TOP BAR ─────────────────────────────────── */
    .topbar {
      border-bottom: 1px solid var(--border2);
      padding: 18px 28px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--surface2);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-brand {
      display: flex;
      flex-direction: column;
    }

    .topbar-brand h1 {
      font-family: var(--display);
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text1);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .topbar-brand p {
      font-size: 0.7rem;
      color: var(--text3);
      margin-top: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .topbar-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    /* ── HOUSE SELECTOR ──────────────────────────── */
    .house-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 3px;
    }

    .house-tab {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text2);
      background: transparent;
      border: none;
      border-radius: 5px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .house-tab:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text1);
    }

    .house-tab.active {
      background: var(--surface);
      color: var(--accent);
      border: 1px solid rgba(74,222,128,0.2);
    }

    /* ── LEAGUE SELECTOR ─────────────────────────── */
    .league-bar {
      padding: 14px 28px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .league-tab {
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text3);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 5px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .league-tab:hover {
      color: var(--text2);
      border-color: var(--border2);
    }

    .league-tab.active {
      color: var(--accent);
      border-color: rgba(74,222,128,0.25);
      background: rgba(74,222,128,0.05);
    }

    /* ── CONTROLS ────────────────────────────────── */
    .ctrl-select {
      font-family: var(--mono);
      font-size: 0.72rem;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text1);
      padding: 6px 10px;
      cursor: pointer;
      outline: none;
    }

    .ctrl-select:focus {
      border-color: rgba(74,222,128,0.35);
    }

    .ctrl-btn {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text1);
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .ctrl-btn:hover {
      border-color: rgba(74,222,128,0.3);
      color: var(--accent);
    }

    /* ── STATUS ──────────────────────────────────── */
    #statusBar {
      margin: 0 28px 0;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 0.72rem;
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.22);
      color: var(--gold);
      letter-spacing: 0.03em;
    }

    #statusBar.hidden { display: none; }

    /* ── MAIN GRID ───────────────────────────────── */
    .main {
      padding: 24px 28px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 1400px) {
      .main { grid-template-columns: 1fr 1fr; }
    }

    /* ── LEAGUE CARD ─────────────────────────────── */
    .league-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      overflow: hidden;
    }

    .league-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
    }

    .league-card-header h2 {
      font-family: var(--display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text1);
      letter-spacing: -0.01em;
    }

    .league-card-header .league-meta {
      font-size: 0.65rem;
      color: var(--text3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .league-card-body {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── SUBCARD (under/over block) ──────────────── */
    .subcard {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .subcard-title {
      font-family: var(--display);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text1);
      margin-bottom: 4px;
    }

    .subcard-desc {
      font-size: 0.65rem;
      color: var(--text3);
      letter-spacing: 0.02em;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    /* ── STATS ROW ───────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 10px 8px;
    }

    .stat-chip .label {
      font-size: 0.62rem;
      color: var(--text3);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1;
    }

    .stat-chip .value {
      font-family: var(--display);
      font-size: 1.25rem;
      font-weight: 700;
      margin-top: 5px;
      line-height: 1;
    }

    .value-white  { color: var(--text1); }
    .value-green  { color: var(--accent); }
    .value-red    { color: var(--red); }

    /* ── SEQUENCE BADGE ──────────────────────────── */
    .seq-badge {
      border-radius: 6px;
      padding: 9px 12px;
      margin-bottom: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .seq-badge .seq-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.6;
      margin-bottom: 4px;
    }

    .seq-badge.pos {
      background: rgba(74,222,128,0.07);
      border: 1px solid rgba(74,222,128,0.2);
      color: var(--accent);
    }

    .seq-badge.neg {
      background: rgba(248,113,113,0.07);
      border: 1px solid rgba(248,113,113,0.2);
      color: var(--red);
    }

    .seq-badge.neutral {
      background: rgba(148,163,184,0.06);
      border: 1px solid rgba(148,163,184,0.12);
      color: var(--text2);
    }

    /* ── TOP RUNS ────────────────────────────────── */
    .runs-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .runs-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }

    .runs-block .runs-title {
      font-size: 0.63rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .runs-block.green .runs-title { color: var(--accent2); }
    .runs-block.red   .runs-title { color: var(--red2); }

    .runs-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .pill {
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 600;
      border-radius: 4px;
      padding: 3px 8px;
    }

    .pill-green {
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.28);
      color: var(--accent);
    }

    .pill-red {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.28);
      color: var(--red);
    }

    .pill-muted {
      background: rgba(148,163,184,0.07);
      border: 1px solid rgba(148,163,184,0.14);
      color: var(--text2);
    }

    /* ── CHART ───────────────────────────────────── */
    .chart-wrap {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      height: 220px;
      position: relative;
    }

    .chart-wrap canvas {
      position: absolute;
      inset: 10px;
      width: calc(100% - 20px) !important;
      height: calc(100% - 20px) !important;
    }

    /* ── LOADING / EMPTY ─────────────────────────── */
    .placeholder {
      grid-column: 1 / -1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text3);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .placeholder.err {
      border-color: rgba(248,113,113,0.2);
      background: rgba(248,113,113,0.04);
      color: var(--red);
    }

    /* ── DIVIDER LABEL ───────────────────────────── */
    .divider-label {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">



    <div class="topbar-controls">
      <!-- House selector -->
      <div class="house-tabs" id="houseTabs">
        <button class="house-tab active" data-house="betano">Betano</button>
        <button class="house-tab" data-house="betsson">Betsson</button>
        <button class="house-tab" data-house="kiron">Kiron</button>
        <button class="house-tab" data-house="estrelabet">Estrelabet</button>
      </div>

      <!-- Limit -->
      <label style="display:flex;align-items:center;gap:6px;font-size:0.7rem;color:var(--text2);">
        Jogos:
        <select id="limitSelect" class="ctrl-select">
          <option value="40">20</option>
          <option value="60">40</option>
          <option value="80">60</option>
          <option value="100" selected>80</option>
          <option value="120">100</option>
          <option value="160">140</option>
          <option value="200">180</option>
          <option value="320">300</option>
          <option value="4800">4800</option>
        </select>
      </label>

      <button id="reloadBtn" class="ctrl-btn">Recarregar</button>
    </div>
  </header>

  <!-- LEAGUE BAR -->
  <div class="league-bar" id="leagueBar"></div>

  <!-- STATUS -->
  <div id="statusBar" class="hidden" style="margin-top:14px;"></div>

  <!-- GRID -->
  <main class="main" id="leaguesGrid">
    <div class="placeholder">Selecione uma casa para carregar os dados...</div>
  </main>

  <script>
  // ─────────────────────────────────────────────────────────────────
  //  CONFIG: casas e ligas
  // ─────────────────────────────────────────────────────────────────
  const HOUSES = {
    betano: {
      label: "Betano",
      leagues: [
        { key: "copa-america",       title: "Copa America",        resultados: "https://betstat.site/resultados/Copa%20Am%C3%A9rica",         odds: "https://betstat.site/odds/Copa%20Am%C3%A9rica" },
        { key: "classicos-america",  title: "Classicos da America", resultados: "https://betstat.site/resultados/Ta%C3%A7a%20Gl%C3%B3ria%20eterna",   odds: "https://betstat.site/odds/Ta%C3%A7a%20Gl%C3%B3ria%20eterna" },
        { key: "euro",               title: "Euro",                resultados: "https://betstat.site/resultados/Euro",                        odds: "https://betstat.site/odds/Euro" },
        { key: "campeonato-italiano",title: "Camp. Italiano",      resultados: "https://betstat.site/resultados/Campeonato%20Italiano",        odds: "https://betstat.site/odds/Campeonato%20Italiano" },
        { key: "copa-estrelas",      title: "Copa das Estrelas",   resultados: "https://betstat.site/resultados/Copa%20das%20estrelas",        odds: "https://betstat.site/odds/Copa%20das%20estrelas" },
        { key: "brasileirao",        title: "Brasileirao Betano",  resultados: "https://betstat.site/resultados/Brasileir%C3%A3o%20Betano",    odds: "https://betstat.site/odds/Brasileir%C3%A3o%20Betano" },
      ]
    },
    betsson: {
      label: "Betsson",
      leagues: [
        { key: "espanha",    title: "Espanha",   resultados: "https://betstat.site/resultados/betsson/Espanha",   odds: "https://betstat.site/odds/betsson/Espanha" },
        { key: "inglaterra", title: "Inglaterra",resultados: "https://betstat.site/resultados/betsson/Inglaterra", odds: "https://betstat.site/odds/betsson/Inglaterra" },
        { key: "brasil",     title: "Brasil",    resultados: "https://betstat.site/resultados/betsson/Brasil",    odds: "https://betstat.site/odds/betsson/Brasil" },
      ]
    },
    kiron: {
      label: "Kiron",
      leagues: [
        { key: "england", title: "England League", resultados: "https://betstat.site/resultados/kiron/England", odds: "https://betstat.site/odds/kiron/England" },
        { key: "italy",   title: "Italy League",   resultados: "https://betstat.site/resultados/kiron/Italy",   odds: "https://betstat.site/odds/kiron/Italy" },
        { key: "spain",   title: "Spain League",   resultados: "https://betstat.site/resultados/kiron/Spain",   odds: "https://betstat.site/odds/kiron/Spain" },
      ]
    },
    estrelabet: {
      label: "Estrelabet",
      leagues: [
        { key: "copa-mundo",       title: "Copa do Mundo",       resultados: "https://betstat.site/resultados/estrela/Copa%20do%20Mundo",        odds: "https://betstat.site/odds/estrela/Copa%20do%20Mundo" },
        { key: "ligas-campeoes",   title: "Ligas dos Campeoes",  resultados: "https://betstat.site/resultados/estrela/Ligas%20dos%20Campe%C3%B5es", odds: "https://betstat.site/odds/estrela/Ligas%20dos%20Campe%C3%B5es" },
        { key: "america-latina",   title: "America Latina",      resultados: "https://betstat.site/resultados/estrela/Am%C3%A9rica%20Latina",     odds: "https://betstat.site/odds/estrela/Am%C3%A9rica%20Latina" },
      ]
    }
  };

  // ─────────────────────────────────────────────────────────────────
  //  STATE
  // ─────────────────────────────────────────────────────────────────
  let currentHouse    = "betano";
  let activeLeagueKey = null;   // null = all
  const chartsAccum   = {};

  // ─────────────────────────────────────────────────────────────────
  //  DOM refs
  // ─────────────────────────────────────────────────────────────────
  const houseTabs   = document.getElementById("houseTabs");
  const leagueBar   = document.getElementById("leagueBar");
  const leaguesGrid = document.getElementById("leaguesGrid");
  const reloadBtn   = document.getElementById("reloadBtn");
  const limitSelect = document.getElementById("limitSelect");
  const statusBar   = document.getElementById("statusBar");

  // ─────────────────────────────────────────────────────────────────
  //  STATUS
  // ─────────────────────────────────────────────────────────────────
  function setStatus(msg, show) {
    statusBar.textContent = msg || "";
    statusBar.classList.toggle("hidden", !show);
  }

  // ─────────────────────────────────────────────────────────────────
  //  SCORE PARSING (reads "ft" field like "1 x 2" or "1-2")
  // ─────────────────────────────────────────────────────────────────
  function parseFT(ft) {
    if (!ft) return null;
    const clean = String(ft).replace(/\s/g, "").replace(/x/gi, "-");
    const m = clean.match(/^(\d+)-(\d+)$/);
    if (!m) return null;
    const home = parseInt(m[1], 10);
    const away = parseInt(m[2], 10);
    if (!isFinite(home) || !isFinite(away)) return null;
    return { home, away, total: home + away };
  }

  // ─────────────────────────────────────────────────────────────────
  //  LOGIC
  // ─────────────────────────────────────────────────────────────────
  function buildBlocks(games) {
    const blocks = [];
    const n = Math.floor(games.length / 20);
    for (let i = 0; i < n; i++) blocks.push(games.slice(i * 20, i * 20 + 20));
    return blocks;
  }

  function getTopRuns(series, target) {
    const runs = [];
    let count = 0;
    for (const v of series) {
      if (v === target) { count++; }
      else { if (count > 0) runs.push(count); count = 0; }
    }
    if (count > 0) runs.push(count);
    return runs.sort((a, b) => b - a).slice(0, 3);
  }

  function getCurrentRun(series) {
    if (!series.length) return { type: null, count: 0, label: "Sem sequencia atual" };
    const last = series[series.length - 1];
    let count = 0;
    for (let i = series.length - 1; i >= 0 && series[i] === last; i--) count++;
    return {
      type: last,
      count,
      label: last === 1 ? `Atual +1: ${count} seguidas` : `Atual -1: ${count} seguidas`
    };
  }

  function calcStats(blocks, baseType) {
    const empty = { deltas: [], acumulado: [0], validCount: 0, plusCount: 0, minusCount: 0, top3Plus: [], top3Minus: [], currentRun: { type: null, count: 0, label: "Sem sequencia atual" } };
    if (!blocks.length) return empty;

    const deltas = [];
    const acumulado = [0];

    for (let b = blocks.length - 2; b >= 0; b--) {
      for (let i = 19; i >= 0; i--) {
        const atual = blocks[b]?.[i];
        const ref   = blocks[b + 1]?.[i];
        if (!atual || !ref) continue;

        const baseOk  = baseType === "under" ? ref.total < 3  : ref.total > 2;
        if (!baseOk) continue;

        const atualOk = baseType === "under" ? atual.total < 3 : atual.total > 2;
        const delta   = atualOk ? 1 : -1;
        deltas.push(delta);
        acumulado.push(acumulado[acumulado.length - 1] + delta);
      }
    }

    return {
      deltas,
      acumulado,
      validCount: deltas.length,
      plusCount:  deltas.filter(v => v === 1).length,
      minusCount: deltas.filter(v => v === -1).length,
      top3Plus:   getTopRuns(deltas, 1),
      top3Minus:  getTopRuns(deltas, -1),
      currentRun: getCurrentRun(deltas)
    };
  }

  // ─────────────────────────────────────────────────────────────────
  //  FETCH
  // ─────────────────────────────────────────────────────────────────
  async function fetchLeague(league, limit) {
    const res = await fetch(league.resultados, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${league.title}`);
    const json = await res.json();

    // API returns array of objects with "ft" field
    const raw = Array.isArray(json) ? json : (json.data || json.resultados || []);
    const games = raw
      .slice(0, limit * 2) // take more than enough
      .map(item => {
        const score = parseFT(item.ft);
        return score;
      })
      .filter(Boolean)
      .slice(0, limit);

    const blocks     = buildBlocks(games);
    const underStats = calcStats(blocks, "under");
    const overStats  = calcStats(blocks, "over");

    return { league, stats: { totalGames: games.length, under: underStats, over: overStats } };
  }

  // ─────────────────────────────────────────────────────────────────
  //  RENDER CHART
  // ─────────────────────────────────────────────────────────────────
  function renderChart(chartId, acumulado, mode) {
    const canvas = document.getElementById(chartId);
    if (!canvas) return;
    if (chartsAccum[chartId]) { chartsAccum[chartId].destroy(); }

    const lineColor = mode === "under" ? "#4ade80" : "#60a5fa";
    const ctx = canvas.getContext("2d");

    chartsAccum[chartId] = new Chart(ctx, {
      type: "line",
      data: {
        labels: acumulado.map((_, i) => i),
        datasets: [{
          label: mode === "under" ? "Acumulado Under" : "Acumulado Over",
          data: acumulado,
          borderColor: lineColor,
          borderWidth: 1.5,
          pointRadius: acumulado.length > 80 ? 0 : 2,
          pointHoverRadius: 4,
          pointBackgroundColor: acumulado.map((v, i) => {
            if (i === 0) return "#475569";
            return v >= acumulado[i - 1] ? "#4ade80" : "#f87171";
          }),
          fill: false,
          tension: 0.1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: ctx => `Acumulado: ${ctx.raw}` }
          }
        },
        scales: {
          x: {
            ticks: { color: "#475569", maxTicksLimit: 10, font: { family: "'Roboto'", size: 10 } },
            grid:  { color: "rgba(255,255,255,0.03)" }
          },
          y: {
            ticks: { color: "#475569", font: { family: "'Roboto'", size: 10 } },
            grid:  { color: "rgba(255,255,255,0.04)" }
          }
        }
      }
    });
  }

  // ─────────────────────────────────────────────────────────────────
  //  BUILD HTML
  // ─────────────────────────────────────────────────────────────────
  function pillHTML(arr, type) {
    if (!arr.length) return `<span class="pill pill-muted">—</span>`;
    return arr.map(n => `<span class="pill pill-${type}">${n}</span>`).join("");
  }

  function seqBadgeHTML(run) {
    if (!run || !run.count) return `<div class="seq-badge neutral"><div class="seq-label">Sequencia atual</div>Sem leitura</div>`;
    const cls = run.type === 1 ? "pos" : "neg";
    return `<div class="seq-badge ${cls}"><div class="seq-label">Sequencia atual</div>${run.label}</div>`;
  }

  function modeBlockHTML(leagueKey, mode, stats) {
    const modeLabel = mode === "under" ? "Base Under 2.5" : "Base Over 2.5";
    const modeDesc  = mode === "under"
      ? "Entra quando o ref e under 2.5. Se atual tambem for under: +1. Se quebrar para over: -1."
      : "Entra quando o ref e over 2.5. Se atual tambem for over: +1. Se quebrar para under: -1.";
    const chartId = `chart-${leagueKey}-${mode}`;
    const saldo   = stats.acumulado[stats.acumulado.length - 1] ?? 0;
    const saldoClass = saldo > 0 ? "value-green" : saldo < 0 ? "value-red" : "value-white";

    return `
      <div class="subcard">
        <div class="subcard-title">${modeLabel}</div>
        <div class="subcard-desc">${modeDesc}</div>

        <div class="stats-row">
          <div class="stat-chip">
            <div class="label">Bases validas</div>
            <div class="value value-white">${stats.validCount}</div>
          </div>
          <div class="stat-chip">
            <div class="label">+1 Mantem</div>
            <div class="value value-green">${stats.plusCount}</div>
          </div>
          <div class="stat-chip">
            <div class="label">-1 Quebra</div>
            <div class="value value-red">${stats.minusCount}</div>
          </div>
          <div class="stat-chip">
            <div class="label">Saldo</div>
            <div class="value ${saldoClass}">${saldo}</div>
          </div>
        </div>

        ${seqBadgeHTML(stats.currentRun)}

        <div class="runs-row">
          <div class="runs-block green">
            <div class="runs-title">3 maiores seq. +1</div>
            <div class="runs-pills">${pillHTML(stats.top3Plus, "green")}</div>
          </div>
          <div class="runs-block red">
            <div class="runs-title">3 maiores seq. -1</div>
            <div class="runs-pills">${pillHTML(stats.top3Minus, "red")}</div>
          </div>
        </div>

        <div class="divider-label">Acumulado da lateralizacao</div>
        <div class="chart-wrap">
          <canvas id="${chartId}"></canvas>
        </div>
      </div>
    `;
  }

  function leagueCardHTML(league, stats) {
    return `
      <div class="league-card">
        <div class="league-card-header">
          <div>
            <h2>${league.title}</h2>
            <div class="league-meta">${HOUSES[currentHouse].label} — ${stats.totalGames} jogos carregados</div>
          </div>
        </div>
        <div class="league-card-body">
          ${modeBlockHTML(league.key, "under", stats.under)}
          ${modeBlockHTML(league.key, "over",  stats.over)}
        </div>
      </div>
    `;
  }

  // ─────────────────────────────────────────────────────────────────
  //  LEAGUE BAR
  // ─────────────────────────────────────────────────────────────────
  function renderLeagueBar() {
    const leagues = HOUSES[currentHouse].leagues;
    const allBtn  = `<button class="league-tab ${activeLeagueKey === null ? 'active' : ''}" data-key="__all__">Todas</button>`;
    const tabs    = leagues.map(l =>
      `<button class="league-tab ${l.key === activeLeagueKey ? 'active' : ''}" data-key="${l.key}">${l.title}</button>`
    ).join("");
    leagueBar.innerHTML = allBtn + tabs;

    leagueBar.querySelectorAll(".league-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        const key = btn.dataset.key;
        activeLeagueKey = key === "__all__" ? null : key;
        renderLeagueBar();
        renderAll(true);
      });
    });
  }

  // ─────────────────────────────────────────────────────────────────
  //  RENDER ALL
  // ─────────────────────────────────────────────────────────────────
  async function renderAll(showLoading = false) {
    const limit   = parseInt(limitSelect.value, 10) || 100;
    const leagues = HOUSES[currentHouse].leagues.filter(l =>
      activeLeagueKey === null || l.key === activeLeagueKey
    );

    if (showLoading) {
      leaguesGrid.innerHTML = `<div class="placeholder">Carregando dados...</div>`;
    }
    setStatus("", false);

    const results = await Promise.allSettled(leagues.map(l => fetchLeague(l, limit)));

    const cards     = [];
    const chartQueue = [];
    const failed    = [];

    for (const r of results) {
      if (r.status === "fulfilled") {
        const { league, stats } = r.value;
        cards.push(leagueCardHTML(league, stats));
        chartQueue.push({ id: `chart-${league.key}-under`, acumulado: stats.under.acumulado, mode: "under" });
        chartQueue.push({ id: `chart-${league.key}-over`,  acumulado: stats.over.acumulado,  mode: "over" });
      } else {
        failed.push(r.reason?.message || "Erro desconhecido");
      }
    }

    leaguesGrid.innerHTML = cards.length
      ? cards.join("")
      : `<div class="placeholder err">Nenhuma liga carregada.</div>`;

    chartQueue.forEach(q => renderChart(q.id, q.acumulado, q.mode));

    if (failed.length) setStatus(failed.join(" · "), true);
  }

  // ─────────────────────────────────────────────────────────────────
  //  HOUSE TABS
  // ─────────────────────────────────────────────────────────────────
  houseTabs.querySelectorAll(".house-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      houseTabs.querySelectorAll(".house-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentHouse    = btn.dataset.house;
      activeLeagueKey = null;
      renderLeagueBar();
      renderAll(true);
    });
  });

  reloadBtn.addEventListener("click", () => renderAll(true));
  limitSelect.addEventListener("change", () => renderAll(true));

  // ─────────────────────────────────────────────────────────────────
  //  WEB SOCKET AUTO-UPDATE
  // ─────────────────────────────────────────────────────────────────
  const WS_URL           = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`;
  const HEARTBEAT_MS     = 25000;
  const PONG_GRACE_MS    = 12000;
  const SOFT_DEBOUNCE_MS = 250;
  const SOFT_MIN_MS      = 1200;

  let ws, backoff = 1000, hbTimer = null, hbWait = null, lastSoft = 0, softTimer = null, wsReloading = false;

  function safeRenderAll() {
    if (wsReloading) return;
    wsReloading = true;
    setStatus("Atualizando dados automaticamente...", true);
    Promise.resolve()
      .then(() => renderAll(false))
      .catch(() => setStatus("Falha ao atualizar. Tentando novamente...", true))
      .finally(() => setTimeout(() => { wsReloading = false; setStatus("", false); }, 800));
  }

  function softReload() {
    const now = Date.now();
    const wait = Math.max(SOFT_DEBOUNCE_MS, lastSoft + SOFT_MIN_MS - now);
    clearTimeout(softTimer);
    softTimer = setTimeout(() => { lastSoft = Date.now(); safeRenderAll(); }, wait);
  }

  function startHB() {
    stopHB();
    hbTimer = setInterval(() => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      try {
        ws.send(JSON.stringify({ type: "ping", t0: Date.now() }));
        hbWait = setTimeout(() => { try { ws.close(); } catch {} }, PONG_GRACE_MS);
      } catch {}
    }, HEARTBEAT_MS);
  }

  function stopHB() {
    if (hbTimer)  clearInterval(hbTimer), hbTimer = null;
    if (hbWait)   clearTimeout(hbWait), hbWait = null;
  }

  function connectWS() {
    try { if (ws) ws.close(); } catch {}
    ws = new WebSocket(WS_URL);
    ws.onopen = () => { backoff = 1000; startHB(); setStatus("Conectado ao auto update", true); setTimeout(() => setStatus("", false), 1200); try { ws.send(JSON.stringify({ type: "versions:get" })); } catch {} };
    ws.onmessage = ev => {
      let msg; try { msg = JSON.parse(ev.data); } catch { return; }
      if (msg.type === "ping") { try { ws.send(JSON.stringify({ type: "pong" })); } catch {} return; }
      if (msg.type === "pong") { if (hbWait) clearTimeout(hbWait); return; }
      if (["dados:update","push:versions","vers","hint","update"].includes(msg.type)) { softReload(); return; }
      if (msg.type === "all:reload") location.reload();
    };
    ws.onclose = () => { stopHB(); setTimeout(connectWS, backoff); backoff = Math.min(backoff * 2, 10000); };
    ws.onerror = () => { try { ws.close(); } catch {} };
  }

  // ─────────────────────────────────────────────────────────────────
  //  INIT
  // ─────────────────────────────────────────────────────────────────
  renderLeagueBar();
  renderAll(true);
  connectWS();
  </script>
</body>
</html>
