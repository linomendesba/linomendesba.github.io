            gap: 8px;

            font-size: 11px;
        }

        /* NOVOS ESTILOS PARA A LISTA 100% - ALTO CONTRASTE */

            margin-top: 30px;
            padding: 20px;
            background: #0d1117;
            border-radius: 12px;
            border: 2px solid #30363d;
        }
        
        .percent100-title {
            font-size: 18px;
            font-weight: 700;
            color: #f0f6fc;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .percent100-title::before {
            content: "📊";
            font-size: 22px;
        }
        
        /* CONTROLES - MODO HORA */
        .percent100-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            background: #161b22;

        }

            display: flex;
            flex-direction: column;

        }

            font-size: 11px;

        }
        
        .percent100-btn {
            background: #21262d;

            border: 1px solid #30363d;

            border-radius: 6px;

            font-size: 13px;

            transition: all 0.2s;

        .percent100-btn.active {
            background: #238636;
            color: #ffffff;
            border-color: #2ea043;
            box-shadow: 0 0 10px rgba(35, 134, 54, 0.4);
        }
        
        /* BOTÃO EXPORTAR LISTA LIMPA */
        .export-list-btn {
            background: #1f6feb;

            border: 1px solid #388bfd;

        .hour-select {
            background: #21262d;

        /* GRID DE LIGAS */
        .percent100-grid {

        .percent100-list {

        }
        
        .percent100-count {
            color: #7ee787;
            font-weight: 700;

<body>

        <label for="rangeSelect">Gales:</label>
        <select id="rangeSelect" onchange="handleSelectionChange()">
            <option value="1">01</option>

    <!-- Legenda -->
    <div class="legend-bar">
        <span style="color:#aaa; margin-right:2px;">Legenda:</span>
        <div class="legend-item"><div class="legend-dot" style="background:#6a0dad"></div><span>100%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#1a7a1a"></div><span>90-99%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#2eb82e"></div><span>80-89%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#66cc00"></div><span>70-79%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#cccc00"></div><span>60-69%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#e67e00"></div><span>50-59%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#cc4400"></div><span>40-49%</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#990000"></div><span>&lt;40%</span></div>

    <div id="loading" class="loading" style="display:none;">Carregando dados...</div>

    <div class="current-hour-label" id="currentHourLabel"></div>

        <thead id="currentHourHeader"></thead>

    <table id="resultsTable">
        <thead id="tableHeader"></thead>
        <tbody id="resultsBody"></tbody>
    </table>

    <!-- SEÇÃO MINUTOS 100% COM EXPORTAÇÃO -->
    <div class="percent100-section">
        <div class="percent100-title">Minutos com 100% de Aproveitamento</div>
        
        <div class="percent100-controls">
            <div class="control-group">
                <span class="control-label">Modo de Liga</span>
                <div style="display: flex; gap: 8px;">
                    <button class="percent100-btn" id="btnCurrentLeague" onclick="togglePercent100Mode('current')">Liga Atual</button>
                    <button class="percent100-btn" id="btnAllLeagues" onclick="togglePercent100Mode('all')">Todas as Ligas</button>
                </div>
            </div>
            
            <div class="control-group">
                <span class="control-label">Filtrar por Hora</span>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button class="percent100-btn" id="btnAllHours" onclick="toggleHourMode('all')">Todas</button>
                    <button class="percent100-btn" id="btnCurrentHourFilter" onclick="toggleHourMode('current')">Agora</button>
                    <button class="percent100-btn" id="btnSpecificHour" onclick="toggleHourMode('specific')">Escolher</button>
                    <select id="specificHourSelect" class="hour-select" style="display: none;" onchange="handleSpecificHourChange()">
                        <!-- Opções geradas via JS -->
                    </select>
                </div>
            </div>
            
            <div class="control-group">
                <span class="control-label">Exportar Lista</span>
                <button class="export-list-btn" onclick="exportAllLists()">Baixar TXT</button>
            </div>
        </div>
        
        <div id="percent100Container" class="percent100-grid">
            <!-- Conteúdo gerado dinamicamente -->
        </div>
    </div>

<script>
    let cachedData = {};
    let percent100Mode = 'current';
    let hourMode = 'all';
    let specificHour = null;
    let lastCalculatedResults = [];

    const leaguesList = [
        { value: "England", name: "England" },
        { value: "Italy", name: "Italy" },
        { value: "Spain", name: "Spain" }
    ];

    function initHourSelect() {
        const select = document.getElementById('specificHourSelect');
        select.innerHTML = '';
        for (let h = 0; h < 24; h++) {
            const option = document.createElement('option');
            option.value = String(h).padStart(2, '0');
            option.textContent = `${String(h).padStart(2, '0')}:00 - ${String(h).padStart(2, '0')}:59`;
            select.appendChild(option);
        }
        const now = new Date();
        select.value = String(now.getHours()).padStart(2, '0');
    }

    function togglePercent100Mode(mode) {
        percent100Mode = mode;
        document.getElementById('btnCurrentLeague').classList.toggle('active', mode === 'current');
        document.getElementById('btnAllLeagues').classList.toggle('active', mode === 'all');
        updatePercent100Display();
    }

    function toggleHourMode(mode) {
        hourMode = mode;
        const specificSelect = document.getElementById('specificHourSelect');
        
        document.getElementById('btnAllHours').classList.toggle('active', mode === 'all');
        document.getElementById('btnCurrentHourFilter').classList.toggle('active', mode === 'current');
        document.getElementById('btnSpecificHour').classList.toggle('active', mode === 'specific');
        
        specificSelect.style.display = mode === 'specific' ? 'block' : 'none';
        
        if (mode === 'specific' && !specificHour) {
            const now = new Date();
            specificHour = String(now.getHours()).padStart(2, '0');
            specificSelect.value = specificHour;
        }
        
        updatePercent100Display();
    }

    function handleSpecificHourChange() {
        specificHour = document.getElementById('specificHourSelect').value;
        if (hourMode === 'specific') {
            updatePercent100Display();
        }
    }

    function handleSelectionChange() {
        const league = document.getElementById("leagueSelect").value;
        if (cachedData[league]) {
            processApiData(cachedData[league]);
        } else {
            fetchApiData(league);
        }
        
        if (percent100Mode === 'all') {
            updatePercent100Display();
        }
    }

    function showLoading(show) {
        document.getElementById("loading").style.display = show ? "block" : "none";
    }

    function fetchApiData(league) {
        showLoading(true);
        fetch(`https://betstat.site/resultados/kiron/${league}`)
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(data => { 
                cachedData[league] = data; 
                processApiData(data); 
                showLoading(false); 
                if (percent100Mode === 'current') {
                    updatePercent100Display();
                }
            })
            .catch(err => { console.error(err); showLoading(false); alert("Erro ao buscar dados da API."); });
    }

    function parseScore(s) {
        if (!s || typeof s !== 'string') return [0, 0];
        const p = s.split('x').map(v => parseInt(v.trim(), 10) || 0);
        return p.length === 2 ? p : [0, 0];
    }

    function checkMarket(game, market) {
        const [g1, g2] = parseScore(game.ft);
        const [h1, h2] = parseScore(game.ht);
        const st1 = g1 - h1, st2 = g2 - h2;
        const tot = g1 + g2;
        switch (market) {
            case "ambasMarcam":    return g1 > 0 && g2 > 0;
            case "ambasNaoMarcam": return g1 === 0 || g2 === 0;
            case "casaVence":      return g1 > g2;
            case "empate":         return g1 === g2;
            case "foraVence":      return g1 < g2;
            case "over0.5":        return tot > 0;
            case "over1.5":        return tot > 1;
            case "over2.5":        return tot > 2;
            case "over3.5":        return tot > 3;
            case "over5":          return tot > 4;
            case "under0.5":       return tot < 1;
            case "under1.5":       return tot < 2;
            case "under2.5":       return tot < 3;
            case "under3.5":       return tot < 4;
            case "exato0":         return tot === 0;
            case "exato1":         return tot === 1;
            case "exato2":         return tot === 2;
            case "exato3":         return tot === 3;
            case "exato4":         return tot === 4;
            case "exato2t0":       return (st1 + st2) === 0;
            case "exato2t1":       return (st1 + st2) === 1;
            case "exato2t2":       return (st1 + st2) === 2;
            case "exato2t3":       return (st1 + st2) === 3;
            case "exato2t4":       return (st1 + st2) === 4;
            case "casa0Gols":      return g1 === 0;
            case "casa1Gol":       return g1 === 1;
            case "casa2Gols":      return g1 === 2;
            case "casa3Gols":      return g1 === 3;
            case "casa4Gols":      return g1 === 4;
            case "fora0Gols":      return g2 === 0;
            case "fora1Gol":       return g2 === 1;
            case "fora2Gols":      return g2 === 2;
            case "fora3Gols":      return g2 === 3;
            case "fora4Gols":      return g2 === 4;
            case "ambas":          return g1 > 0 && g2 > 0;
            case "ambasnao":       return g1 === 0 || g2 === 0;
            case "casa":           return g1 > g2;
            case "fora":           return g1 < g2;
            case "cincog":         return tot > 4;
            default: return false;
        }
    }

    function getDayKey(game, index, gamesPerHour) {
        const dateField = game.data || game.date || game.dia || game.day
            || game.created_at || game.timestamp || game.dt;

        if (dateField) {
            const s = String(dateField);
            if (/^\d{10,}$/.test(s)) {
                return new Date(parseInt(s) * (s.length === 10 ? 1000 : 1))
                    .toISOString().slice(0, 10);
            }
            return s.slice(0, 10);
        }

        return String(Math.floor(index / gamesPerHour));
    }

    function calculateLeaguePercent100(data, market, gales, targetHour = null) {
        const uniqueMinutes = [...new Set(data.map(g => parseInt(g.minuto, 10)))].sort((a, b) => a - b);
        const numMins = uniqueMinutes.length;
        const gamesPerHour = numMins;

        const daySet = new Set();
        data.forEach((game, idx) => {
            daySet.add(getDayKey(game, idx, gamesPerHour));
        });
        const sortedDays = [...daySet].sort();
        const numDays = sortedDays.length;

        const slotMap = {};
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            slotMap[hh] = {};
            uniqueMinutes.forEach(m => {
                slotMap[hh][String(m).padStart(2, '0')] = {};
            });
        }

        data.forEach((game, idx) => {
            const hh = String(game.hora).padStart(2, '0');
            const mm = String(game.minuto).padStart(2, '0');
            const dk = getDayKey(game, idx, gamesPerHour);
            if (slotMap[hh] && slotMap[hh][mm] !== undefined) {
                slotMap[hh][mm][dk] = game;
            }
        });

        const result = {};
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            result[hh] = {};
            uniqueMinutes.forEach(m => {
                result[hh][String(m).padStart(2, '0')] = { total: 0, green: 0 };
            });
        }

        const hoursToCalc = targetHour ? [targetHour] : Array.from({length: 24}, (_, i) => String(i).padStart(2, '0'));

        hoursToCalc.forEach(hh => {
            uniqueMinutes.forEach((baseMin, minIdx) => {
                const bm = String(baseMin).padStart(2, '0');

                sortedDays.forEach(dayKey => {
                    const baseGame = slotMap[hh][bm][dayKey];
                    if (!baseGame) return;

                    result[hh][bm].total += 1;

                    let green = false;

                    for (let attempt = 0; attempt < gales && !green; attempt++) {
                        const targetMinIdx = minIdx + attempt;
                        if (targetMinIdx >= numMins) break;

                        const tm = String(uniqueMinutes[targetMinIdx]).padStart(2, '0');
                        const targetGame = slotMap[hh][tm][dayKey];
                        if (!targetGame) continue;

                        if (checkMarket(targetGame, market)) {
                            green = true;
                        }
                    }

                    if (green) {
                        result[hh][bm].green += 1;
                    }
                });
            });
        });

        const percent100Minutes = [];
        hoursToCalc.forEach(hh => {
            uniqueMinutes.forEach(m => {
                const mm = String(m).padStart(2, '0');
                const slot = result[hh][mm];
                if (slot.total > 0 && slot.green === slot.total) {
                    percent100Minutes.push(`${hh}:${mm}`);
                }
            });
        });

        return {
            minutes: percent100Minutes.sort(),
            count: percent100Minutes.length,
            targetHour: targetHour,
            totalHours: hoursToCalc.length,
            numDays: numDays
        };
    }

    async function updatePercent100Display() {
        const container = document.getElementById('percent100Container');
        const market = document.getElementById("marketSelect").value;
        const gales = parseInt(document.getElementById("rangeSelect").value, 10);
        
        let targetHour = null;
        if (hourMode === 'current') {
            targetHour = String(new Date().getHours()).padStart(2, '0');
        } else if (hourMode === 'specific') {
            targetHour = specificHour || String(new Date().getHours()).padStart(2, '0');
        }

        container.innerHTML = '<div class="percent100-loading">Analisando dados...</div>';
        lastCalculatedResults = [];

        if (percent100Mode === 'current') {
            const currentLeague = document.getElementById("leagueSelect").value;
            const currentLeagueName = leaguesList.find(l => l.value === currentLeague)?.name || currentLeague;
            
            if (!cachedData[currentLeague]) {
                container.innerHTML = '<div class="percent100-empty">Carregue uma liga primeiro</div>';
                return;
            }

            const result = calculateLeaguePercent100(cachedData[currentLeague], market, gales, targetHour);
            const leagueData = {
                leagueName: currentLeagueName,
                leagueValue: currentLeague,
                ...result
            };
            lastCalculatedResults.push(leagueData);
            
            container.innerHTML = '';
            const column = createPercent100Column(leagueData, 0);
            container.appendChild(column);
            
        } else {
            const fetchPromises = leaguesList.map(l => 
                fetch(`https://betstat.site/resultados/kiron/${l.value}`)
                    .then(r => r.json())
                    .then(data => { cachedData[l.value] = data; })
                    .catch(() => { cachedData[l.value] = null; })
            );
            
            await Promise.all(fetchPromises);

            container.innerHTML = '';
            let hasAnyData = false;
            
            leaguesList.forEach((league, index) => {
                if (cachedData[league.value]) {
                    const result = calculateLeaguePercent100(cachedData[league.value], market, gales, targetHour);
                    const leagueData = {
                        leagueName: league.name,
                        leagueValue: league.value,
                        ...result
                    };
                    lastCalculatedResults.push(leagueData);
                    const column = createPercent100Column(leagueData, index);
                    container.appendChild(column);
                    hasAnyData = true;
                }
            });

            if (!hasAnyData) {
                container.innerHTML = '<div class="percent100-empty">Nenhuma liga disponível</div>';
            }
        }
    }

    function createPercent100Column(leagueData, index) {
        const column = document.createElement('div');
        column.className = 'percent100-column';
        
        // Botão exportar individual
        const exportBtn = document.createElement('button');
        exportBtn.className = 'export-column-btn';
        exportBtn.innerHTML = '💾';
        exportBtn.title = 'Exportar esta lista';
        exportBtn.onclick = () => exportSingleList(index);
        column.appendChild(exportBtn);
        
        const title = document.createElement('div');
        title.className = 'percent100-league-name';
        title.textContent = leagueData.leagueName;
        column.appendChild(title);
        
        const list = document.createElement('ul');
        list.className = 'percent100-list';
        
        if (leagueData.minutes.length === 0) {
            const empty = document.createElement('li');
            empty.className = 'percent100-empty';
            empty.textContent = leagueData.targetHour ? 
                `Nenhum minuto 100% na hora ${leagueData.targetHour}` : 
                'Nenhum minuto 100% encontrado';
            list.appendChild(empty);
        } else {
            leagueData.minutes.forEach(time => {
                const item = document.createElement('li');
                item.className = 'percent100-item';
                item.textContent = time;
                list.appendChild(item);
            });
        }
        
        column.appendChild(list);
        
        const stats = document.createElement('div');
        stats.className = 'percent100-stats';
        stats.innerHTML = `<span class="percent100-count">${leagueData.count}</span> minuto${leagueData.count !== 1 ? 's' : ''} 100%`;
        if (leagueData.targetHour) {
            stats.innerHTML += ` <span style="color: #58a6ff;">(@ ${leagueData.targetHour}h)</span>`;
        }
        column.appendChild(stats);
        
        return column;
    }

    // EXPORTAR LISTA INDIVIDUAL (uma liga específica)
    function exportSingleList(index) {
        const data = lastCalculatedResults[index];
        if (!data || data.minutes.length === 0) {
            alert('Nenhum minuto 100% para exportar nesta liga.');
            return;
        }

        // Cria conteúdo LIMPO - apenas os minutos, um por linha
        let content = data.minutes.join('\n');
        
        // Nome do arquivo simples
        const safeName = data.leagueName.replace(/[^a-zA-Z0-9]/g, '-');
        const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
        const filename = `${safeName}-100percent-${timestamp}.txt`;
        
        downloadTxt(content, filename);
        
        // Feedback
        showExportFeedback(document.querySelectorAll('.export-column-btn')[index]);
    }

    // EXPORTAR TODAS AS LISTAS (botão principal)
    function exportAllLists() {
        if (lastCalculatedResults.length === 0) {
            alert('Nenhuma lista para exportar. Gere os dados primeiro.');
            return;
        }

        const market = document.getElementById("marketSelect");
        const marketText = market.options[market.selectedIndex].text;
        const gales = document.getElementById("rangeSelect").value;
        
        let targetHour = null;
        let hourFilterText = "Todas";
        if (hourMode === 'current') {
            targetHour = String(new Date().getHours()).padStart(2, '0');
            hourFilterText = `Hora${targetHour}`;
        } else if (hourMode === 'specific') {
            targetHour = specificHour || String(new Date().getHours()).padStart(2, '0');
            hourFilterText = `Hora${targetHour}`;
        }

        // Se for apenas uma liga, exporta lista limpa direto
        if (lastCalculatedResults.length === 1) {
            const data = lastCalculatedResults[0];
            if (data.minutes.length === 0) {
                alert('Nenhum minuto 100% para exportar.');
                return;
            }
            
            let content = data.minutes.join('\n');
            const safeName = data.leagueName.replace(/[^a-zA-Z0-9]/g, '-');
            const filename = `${safeName}-${marketText.replace(/\s+/g, '-')}-${hourFilterText}-G${gales}.txt`;
            downloadTxt(content, filename);
            showExportFeedback(document.querySelector('.export-list-btn'));
            return;
        }

        // Se forem múltiplas ligas, cria arquivo com separadores
        let content = '';
        lastCalculatedResults.forEach((data, index) => {
            if (data.minutes.length > 0) {
                content += `=== ${data.leagueName} ===\n`;
                content += data.minutes.join('\n');
                content += '\n\n';
            }
        });

        if (content === '') {
            alert('Nenhum minuto 100% encontrado nas ligas analisadas.');
            return;
        }

        const filename = `Todas-Ligas-${marketText.replace(/\s+/g, '-')}-${hourFilterText}-G${gales}.txt`;
        downloadTxt(content, filename);
        showExportFeedback(document.querySelector('.export-list-btn'));
    }

    // FUNÇÃO AUXILIAR PARA DOWNLOAD
    function downloadTxt(content, filename) {
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    // FEEDBACK VISUAL DO BOTÃO
    function showExportFeedback(btn) {
        if (!btn) return;
        const originalHTML = btn.innerHTML;
        const originalBg = btn.style.background;
        
        btn.innerHTML = '✓';
        btn.style.background = '#238636';
        
        setTimeout(() => {
            btn.innerHTML = originalHTML;
            btn.style.background = originalBg;
        }, 1500);
    }

    function processApiData(data) {
        const market = document.getElementById("marketSelect").value;
        const gales  = parseInt(document.getElementById("rangeSelect").value, 10);

        const uniqueMinutes = [...new Set(data.map(g => parseInt(g.minuto, 10)))].sort((a, b) => a - b);
        const numMins = uniqueMinutes.length;

        const gamesPerHour = numMins;

        const daySet = new Set();
        data.forEach((game, idx) => {
            daySet.add(getDayKey(game, idx, gamesPerHour));
        });
        const sortedDays = [...daySet].sort();
        const numDays = sortedDays.length;

        const slotMap = {};
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            slotMap[hh] = {};
            uniqueMinutes.forEach(m => {
                slotMap[hh][String(m).padStart(2, '0')] = {};
            });
        }

        data.forEach((game, idx) => {
            const hh = String(game.hora).padStart(2, '0');
            const mm = String(game.minuto).padStart(2, '0');
            const dk = getDayKey(game, idx, gamesPerHour);
            if (slotMap[hh] && slotMap[hh][mm] !== undefined) {
                slotMap[hh][mm][dk] = game;
            }
        });

        const result = {};
        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');
            result[hh] = {};
            uniqueMinutes.forEach(m => {
                result[hh][String(m).padStart(2, '0')] = { total: 0, green: 0 };
            });
        }
        const totals = {};
        uniqueMinutes.forEach(m => { totals[String(m).padStart(2, '0')] = { total: 0, green: 0 }; });

        for (let h = 0; h < 24; h++) {
            const hh = String(h).padStart(2, '0');

            uniqueMinutes.forEach((baseMin, minIdx) => {
                const bm = String(baseMin).padStart(2, '0');

                sortedDays.forEach(dayKey => {
                    const baseGame = slotMap[hh][bm][dayKey];
                    if (!baseGame) return;

                    result[hh][bm].total += 1;
                    totals[bm].total += 1;

                    let green = false;

                    for (let attempt = 0; attempt < gales && !green; attempt++) {
                        const targetMinIdx = minIdx + attempt;
                        if (targetMinIdx >= numMins) break;

                        const tm = String(uniqueMinutes[targetMinIdx]).padStart(2, '0');
                        const targetGame = slotMap[hh][tm][dayKey];
                        if (!targetGame) continue;

                        if (checkMarket(targetGame, market)) {
                            green = true;
                        }
                    }

                    if (green) {
                        result[hh][bm].green += 1;
                        totals[bm].green += 1;
                    }
                });
            });
        }

        displayTable(result, uniqueMinutes, totals, numDays);
    }

    function pct(slot) {
        return slot.total > 0 ? (slot.green / slot.total) * 100 : 0;
    }

    function cellClass(p) {
        if (p >= 100) return "percent-100";
        if (p >= 90)  return "percent-90-99";
        if (p >= 80)  return "percent-80-90";
        if (p >= 70)  return "percent-70-80";
        if (p >= 60)  return "percent-60-70";
        if (p >= 50)  return "percent-50-60";
        if (p >= 40)  return "percent-40-50";
        return "percent-0-40";
    }

    function makeCell(slot, tag = "td") {
        const p = pct(slot);
        const el = document.createElement(tag);
        el.textContent = Math.round(p) + "%";
        el.className = cellClass(p);
        return el;
    }

    function displayTable(result, uniqueMinutes, totals, numDays) {
        const now = new Date();
        const currentHour = String(now.getHours()).padStart(2, '0');

        document.getElementById("currentHourLabel").textContent =
            `Hora atual: ${currentHour}h — ${numDays} dias de dados`;

        const headerHTML = "<tr><th>H</th>" +
            uniqueMinutes.map(m => `<th>${String(m).padStart(2, '0')}</th>`).join("") +
            "</tr>";
        document.getElementById("tableHeader").innerHTML = headerHTML;
        document.getElementById("currentHourHeader").innerHTML = headerHTML;

        const curBody = document.getElementById("currentHourBody");
        curBody.innerHTML = "";
        const curRow = document.createElement("tr");
        const curHCell = document.createElement("td");
        curHCell.textContent = currentHour;
        curRow.appendChild(curHCell);
        uniqueMinutes.forEach(m => {
            curRow.appendChild(makeCell(result[currentHour][String(m).padStart(2, '0')]));
        });
        curBody.appendChild(curRow);

        const body = document.getElementById("resultsBody");
        body.innerHTML = "";
        for (let h = 23; h >= 0; h--) {
            const hh = String(h).padStart(2, '0');
            const row = document.createElement("tr");
            const hCell = document.createElement("td");
            hCell.textContent = hh;
            row.appendChild(hCell);
            uniqueMinutes.forEach(m => {
                row.appendChild(makeCell(result[hh][String(m).padStart(2, '0')]));
            });
            body.appendChild(row);
        }

        const totalRow = document.createElement("tr");
        totalRow.className = "total-row";
        const tLabel = document.createElement("th");
        tLabel.textContent = "%";
        totalRow.appendChild(tLabel);
        uniqueMinutes.forEach(m => {
            totalRow.appendChild(makeCell(totals[String(m).padStart(2, '0')]));
        });
        body.appendChild(totalRow);
    }

    window.onload = function() {
        initHourSelect();
        handleSelectionChange();
        togglePercent100Mode('current');
        toggleHourMode('all');
    };
</script>
