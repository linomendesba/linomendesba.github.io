<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/favicon.ico" type="image/x-icon" />
    <title>BetStat | Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Cloudflare Turnstile SDK -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
        :root {
            --primary-color: #00ff88;
            --bg-body: #0f1216;
            --bg-card: #161a1f;
            --text-main: #ffffff;
            --text-dim: #9ba1a6;
            --border-color: #2d3339;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .login-container {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .logo {
            height: 55px;
            width: auto;
            margin-bottom: 25px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.2));
            flex-shrink: 0;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-dim);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: #1c2128;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }

        .btn-login {
            background-color: var(--primary-color);
            color: #000;
            margin-top: 10px;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-payment {
            background-color: transparent;
            color: var(--text-dim);
            margin-top: 15px;
            font-size: 13px;
            text-decoration: underline;
        }

        .btn-payment:hover {
            color: var(--primary-color);
        }

        /* Container do widget Turnstile — centralizado e com margem */
        .cf-turnstile {
            margin-top: 16px;
            display: flex;
            justify-content: center;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmLGMBnUa2YOdP0b-zlZepXjm-zlV477A",
            authDomain: "linoautenticador.firebaseapp.com",
            projectId: "linoautenticador",
            storageBucket: "linoautenticador.firebasestorage.app",
            messagingSenderId: "946057648829",
            appId: "1:946057648829:web:ac5c2b1ba66e651f9d75d4",
            measurementId: "G-4WT805FFHQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = async function() {
            const email    = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (!email || !password) {
                return alert("Preencha os campos.");
            }

            // Pega o token gerado pelo Turnstile
            const token = document.querySelector('[name="cf-turnstile-response"]')?.value;

            if (!token) {
                return alert("Por favor, aguarde a verificação de segurança.");
            }

            // ─────────────────────────────────────────────────────────────────
            // OPCIONAL: Validar o token no seu backend antes de logar
            //
            // Se você tiver uma API/backend Node.js, envie o token assim:
            //
            //   const verify = await fetch('/api/verify-captcha', {
            //       method: 'POST',
            //       headers: { 'Content-Type': 'application/json' },
            //       body: JSON.stringify({ token })
            //   });
            //   const result = await verify.json();
            //   if (!result.success) return alert("Falha na verificação de segurança.");
            //
            // No Node.js (/api/verify-captcha), use a SECRET KEY:
            //
            //   const resp = await fetch('https://challenges.cloudflare.com/turnstile/v0/siteverify', {
            //       method: 'POST',
            //       headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            //       body: new URLSearchParams({
            //           secret: 'SUA_SECRET_KEY_AQUI',
            //           response: token
            //       })
            //   });
            //   const data = await resp.json();
            //   res.json({ success: data.success });
            //
            // ─────────────────────────────────────────────────────────────────

            const btn = document.querySelector('.btn-login');
            btn.disabled = true;
            btn.textContent = 'Entrando...';

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    window.location.href = "/home.html";
                })
                .catch(() => {
                    alert("E-mail ou senha incorretos.");
                    btn.disabled = false;
                    btn.textContent = 'Entrar';
                    // Reseta o widget para gerar novo token
                    if (window.turnstile) turnstile.reset();
                });
        }

        window.goToPayment = function() {
            window.location.href = "payment.html";
        }
    </script>

    <script>
        document.addEventListener("contextmenu", function(e) { e.preventDefault(); });
        document.addEventListener("keydown", function(e) {
            if (e.key === "F12") e.preventDefault();
            if (e.ctrlKey && e.shiftKey && e.key === "I") e.preventDefault();
            if (e.ctrlKey && e.key === "u") e.preventDefault();
            if (e.ctrlKey && e.shiftKey && e.key === "J") e.preventDefault();
            if (e.ctrlKey && e.shiftKey && e.key === "C") e.preventDefault();
            if (e.ctrlKey && e.key === "s") e.preventDefault();
            if (e.ctrlKey && e.key === "p") e.preventDefault();
        });
        document.addEventListener('selectstart', function(e) { e.preventDefault(); });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); });
        console.log = function() {};
        console.debug = function() {};
        console.info = function() {};
    </script>
</head>
<body>

    <div class="login-container">
        <img src="img/logo3.png" alt="BetStat" class="logo">
        
        <h2>Login</h2>

        <div class="input-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="Seu e-mail">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="password" placeholder="Sua senha">
        </div>

        <!--
            Widget Turnstile — substitua SUA_SITE_KEY_AQUI pela chave
            que você copiou no painel do Cloudflare → Turnstile
        -->
        <div class="cf-turnstile"
             data-sitekey="0x4AAAAAABMb1ZbXMk4zcM_U"
             data-theme="dark">
        </div>

        <button class="btn-login" onclick="login()">Entrar</button>
        <button class="btn-payment" onclick="goToPayment()">Não tem uma conta? Assine aqui</button>
    </div>

</body>
</html>
