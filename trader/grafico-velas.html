<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gráfico Velas — BetStat</title>
<link rel="stylesheet" href="grafico-trading.css">
</head>
<body>

<div class="gv-selector-bar">
    <div class="gv-selector-group">
        <label for="gvCasaSelector">Casa</label>
        <select id="gvCasaSelector"></select>
    </div>
    <div class="gv-selector-group" style="flex:1;">
        <label>Ligas (marque uma ou mais)</label>
        <div id="gvLigaChecks" class="gv-liga-checks"></div>
    </div>
    <div class="gv-active-count" id="gvActiveCount"></div>
</div>

<div id="gvEmptyHint" class="gv-empty-hint">Selecione uma casa e marque pelo menos uma liga acima para ver o gráfico.</div>
<div id="gvPaineis"></div>

<script src="lightweight-charts.standalone.production.js"></script>
<script src="grafico-trading-tools.js"></script>
<script src="grafico-velas-core.js"></script>
<script>
(function(){
    "use strict";

    const LIGAS_DB = window.GraficoVelas.LIGAS_DB;
    const PERSIST_KEY = 'betstat:velas:paineis-ativos:v1';

    const casaSelector = document.getElementById('gvCasaSelector');
    const ligaChecks   = document.getElementById('gvLigaChecks');
    const paineisEl    = document.getElementById('gvPaineis');
    const emptyHint    = document.getElementById('gvEmptyHint');
    const activeCount  = document.getElementById('gvActiveCount');

    // painéis ativos: Map key = casaKey + '::' + ligaNome -> { panel, casaKey, ligaNome }
    const painéisAtivos = new Map();

    function chaveDe(casaKey, ligaNome){ return casaKey + '::' + ligaNome; }

    function persistir(){
        const lista = [...painéisAtivos.keys()].map(k => {
            const [casaKey, ligaNome] = k.split('::');
            return { casaKey, ligaNome };
        });
        try { localStorage.setItem(PERSIST_KEY, JSON.stringify(lista)); } catch {}
    }

    function carregarPersistido(){
        try {
            const raw = localStorage.getItem(PERSIST_KEY);
            return raw ? JSON.parse(raw) : [];
        } catch { return []; }
    }

    function atualizarContador(){
        const n = painéisAtivos.size;
        activeCount.textContent = n ? `${n} gráfico${n > 1 ? 's' : ''} aberto${n > 1 ? 's' : ''}` : '';
        emptyHint.style.display = n ? 'none' : '';
    }

    function abrirPainel(casaKey, ligaNome){
        const key = chaveDe(casaKey, ligaNome);
        if (painéisAtivos.has(key)) return;

        const casa = LIGAS_DB[casaKey];
        const liga = casa.ligas.find(l => l.nome === ligaNome);
        if (!liga) return;

        const panel = window.GraficoVelas.createPanel({
            casaKey,
            casaNome: casa.nome,
            ligaNome: liga.nome,
            url: liga.url,
            mountEl: paineisEl,
            onClose: () => {
                painéisAtivos.delete(key);
                persistir();
                atualizarContador();
                syncChipsChecked();
            }
        });

        painéisAtivos.set(key, panel);
        persistir();
        atualizarContador();
    }

    function fecharPainel(casaKey, ligaNome){
        const key = chaveDe(casaKey, ligaNome);
        const p = painéisAtivos.get(key);
        if (!p) return;
        p.destroy();
        painéisAtivos.delete(key);
        persistir();
        atualizarContador();
    }

    function syncChipsChecked(){
        ligaChecks.querySelectorAll('.gv-liga-chip').forEach(chip => {
            const casaKey = chip.dataset.casaKey;
            const ligaNome = chip.dataset.ligaNome;
            const ativo = painéisAtivos.has(chaveDe(casaKey, ligaNome));
            chip.classList.toggle('checked', ativo);
            chip.querySelector('input').checked = ativo;
        });
    }

    function renderLigaChecks(casaKey){
        const casa = LIGAS_DB[casaKey];
        ligaChecks.innerHTML = '';
        casa.ligas.forEach(liga => {
            const id = 'chk_' + casaKey + '_' + liga.nome.replace(/\W+/g, '_');
            const label = document.createElement('label');
            label.className = 'gv-liga-chip';
            label.dataset.casaKey = casaKey;
            label.dataset.ligaNome = liga.nome;
            label.innerHTML = `<input type="checkbox" id="${id}"> ${liga.nome}`;

            const input = label.querySelector('input');
            input.checked = painéisAtivos.has(chaveDe(casaKey, liga.nome));
            label.classList.toggle('checked', input.checked);

            input.addEventListener('change', () => {
                if (input.checked) abrirPainel(casaKey, liga.nome);
                else fecharPainel(casaKey, liga.nome);
                label.classList.toggle('checked', input.checked);
            });

            ligaChecks.appendChild(label);
        });
    }

    // popula seletor de casas
    Object.keys(LIGAS_DB).forEach(casaKey => {
        const opt = document.createElement('option');
        opt.value = casaKey;
        opt.textContent = LIGAS_DB[casaKey].nome;
        casaSelector.appendChild(opt);
    });

    casaSelector.addEventListener('change', () => renderLigaChecks(casaSelector.value));

    // ---------- BOOT: restaura painéis salvos e mostra checks da primeira casa ----------
    const persistidos = carregarPersistido();
    const primeiraCasa = persistidos[0]?.casaKey || Object.keys(LIGAS_DB)[0];
    casaSelector.value = primeiraCasa;
    renderLigaChecks(primeiraCasa);

    persistidos.forEach(({ casaKey, ligaNome }) => {
        if (LIGAS_DB[casaKey]?.ligas.some(l => l.nome === ligaNome)) {
            abrirPainel(casaKey, ligaNome);
        }
    });
    syncChipsChecked();
    atualizarContador();
})();
</script>
</body>
</html>
