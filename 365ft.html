    <script>
        // Bloqueia o menu de contexto (clique direito)
        document.addEventListener("contextmenu", function(e) { e.preventDefault(); });

        document.addEventListener("keydown", function(e) {
            if (e.key === "F12") e.preventDefault();
            if (e.ctrlKey && e.shiftKey && e.key === "I") e.preventDefault();
            if (e.ctrlKey && e.key === "u") e.preventDefault();
            if (e.ctrlKey && e.shiftKey && e.key === "J") e.preventDefault();
            if (e.ctrlKey && e.shiftKey && e.key === "C") e.preventDefault();
            if (e.ctrlKey && e.key === "s") e.preventDefault();
            if (e.ctrlKey && e.key === "p") e.preventDefault();
        });

        const devtools = { open: false };
        const element = new Image();
        Object.defineProperty(element, 'id', { get: function () { devtools.open = true; } });

        (function() {
            const threshold = 160;
            const checkDevTools = function() {
                if ((window.outerWidth - window.innerWidth) > threshold ||
                    (window.outerHeight - window.innerHeight) > threshold) {
                    devtools.open = true;
                }
            };
            window.addEventListener('resize', checkDevTools);
            setInterval(checkDevTools, 500);
        })();

        console.log('%c', element);
        setInterval(function() {
            if (devtools.open) {
                document.body.innerHTML = '<h1>Acesso não autorizado detectado</h1>';
                devtools.open = false;
            }
        }, 1000);

        document.addEventListener('selectstart', function(e) { e.preventDefault(); });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); });

        // Ofusca console
        console.log = function() {};
        console.debug = function() {};
        console.info = function() {};
    </script>

    // Cria plugin de legenda por instância de chart (para suportar múltiplas ligas)
    function createHtmlLegendPlugin(legendContainerId) {

            afterUpdate(chart) {
                const container = document.getElementById(legendContainerId);

                    container.querySelectorAll('.leg-item[data-label]').forEach(pill => {
                        pill.classList.toggle('leg-hidden', !statsChartVisibleDatasets[pill.dataset.label]);

                    return;
                }

                const btnShow = document.createElement('button');
                btnShow.className = 'leg-btn';
                btnShow.textContent = '✦ Mostrar todos';
                btnShow.addEventListener('click', () => _toggleAllDatasets(chart, true));
                container.appendChild(btnShow);

                const btnHide = document.createElement('button');
                btnHide.className = 'leg-btn';
                btnHide.textContent = '✦ Ocultar todos';
                btnHide.addEventListener('click', () => _toggleAllDatasets(chart, false));
                container.appendChild(btnHide);

                LEGEND_GROUPS.forEach(group => {
                    const sep = document.createElement('span');
                    sep.className = 'leg-separator';
                    sep.textContent = group.title;
                    container.appendChild(sep);

                    group.labels.forEach(labelText => {
                        const color = DATASET_COLORS[labelText] || '#888';
                        const isHidden = !statsChartVisibleDatasets[labelText];

                        const pill = document.createElement('div');
                        pill.className = 'leg-item' + (isHidden ? ' leg-hidden' : '');
                        pill.dataset.label = labelText;
                        pill.title = labelText;

                        const dot = document.createElement('span');
                        dot.className = 'leg-dot';
                        dot.style.background = color;

                        const lbl = document.createElement('span');
                        lbl.textContent = labelText;

                        pill.appendChild(dot);
                        pill.appendChild(lbl);

                        pill.addEventListener('click', () => {
                            const mainIdx = chart.data.datasets.findIndex(ds => ds.label === labelText);
                            if (mainIdx < 0) return;
                            const meta = chart.getDatasetMeta(mainIdx);
                            const nowVisible = meta.hidden; // se estava hidden, vai ficar visível

                            meta.hidden = !meta.hidden;
                            statsChartVisibleDatasets[labelText] = nowVisible;
                            _saveVisibleDatasets(statsChartVisibleDatasets);
                            pill.classList.toggle('leg-hidden', !nowVisible);

                            chart.data.datasets.forEach((ds, dsIdx) => {
                                if (ds.label.startsWith(labelText + ' -'))
                                    chart.getDatasetMeta(dsIdx).hidden = !showMovingAverages || !nowVisible;
                            });
                            chart.update();
                        });

                        container.appendChild(pill);
                    });
                });

                container.dataset.built = '1';
            }
        };
    }

    function _toggleAllDatasets(chart, visible) {
        Object.keys(statsChartVisibleDatasets).forEach(label => {
            statsChartVisibleDatasets[label] = visible;
        });
        _saveVisibleDatasets(statsChartVisibleDatasets);

        chart.data.datasets.forEach((ds, idx) => {
            chart.getDatasetMeta(idx).hidden = ds.label.includes(' - ')
                ? !showMovingAverages || !visible
                : !visible;
        });

        // Sincroniza todas as legendas de todas as ligas
        document.querySelectorAll('.leg-item[data-label]').forEach(pill => {
            pill.classList.toggle('leg-hidden', !visible);
        });

        chart.update();
    }

    function hexToRgba(hex, alpha) {
        const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},${alpha})`;
    }
    function getKeyFromLabel(label) {
        if (label.includes(' - ')) {
            const [mainLabel, maPart] = label.split(' - ');
            return labelToKey[mainLabel] + maPart.split(' ')[0];
        }
        return labelToKey[label];
    }
    function computeMA(dataArray, period) {
        return dataArray.map((_, i) => {
            let sum = 0, count = 0;
            for (let j = Math.max(0, i - period + 1); j <= i; j++) {
                if (dataArray[j] !== null) { sum += dataArray[j]; count++; }
            }
            return count > 0 ? sum / count : null;
        });
    }

    function updateStatsChart(chart, newData) {
        if (!chart) return;
        chart.data.labels = newData.labels;
        chart.data.datasets.forEach(ds => {
            ds.data = newData[getKeyFromLabel(ds.label)];

    const fibonacciLinesPlugin = {
        id: 'fibonacciLines',
        afterDraw(chart) {
            if (!showFibonacciLines) return;
            const ctx=chart.ctx,yAxis=chart.scales.y; if(!yAxis)return;
            const fibLevels=[0,23.6,38.2,50,61.8,100];
            const {left,right}=chart.chartArea,range=yAxis.max-yAxis.min;
            ctx.save();
            fibLevels.forEach((lvl,i)=>{
                const y=yAxis.getPixelForValue(yAxis.min+(lvl/100)*range);
                ctx.beginPath();ctx.setLineDash([5,5]);ctx.moveTo(left,y);ctx.lineTo(right,y);
                ctx.strokeStyle='rgba(0,255,0,0.5)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
                ctx.fillStyle='rgba(0,255,0,0.85)';ctx.font='10px Arial';
                ctx.textAlign='left';ctx.textBaseline='middle';
                ctx.fillText(`${fibLevels[i]}%`,right+52,y-(i===0?-8:0));
            });
            ctx.restore();
        }
    };

    /* ═══════════════════════════════════════════════════════════════════
       PLUGIN: LINHA ATUAL
    ═══════════════════════════════════════════════════════════════════ */
    const linhaAtualPlugin = {
        id: 'linhaAtual',
        afterDraw(chart,args,opts) {
            const cfg=(opts?.enabled!==undefined)?opts:(chart.options?.plugins?.linhaAtual??{});
            if (cfg.enabled===false) return;
            const {ctx,chartArea,scales}=chart; if(!chartArea||!scales.y)return;
            const yS=scales.y,{left,right,top,bottom}=chartArea,padX=5,BAD_H=18;
            const entries=[];
            chart.data.datasets.forEach((d,i)=>{
                if(!d.label||d.label.includes(' MA')||!chart.isDatasetVisible(i))return;
                const arr=d.data; if(!arr?.length)return;
                let yVal=null;
                for(let j=arr.length-1;j>=0;j--){const v=arr[j];if(v!==null&&v!==undefined&&isFinite(v)){yVal=v;break;}}
                if(yVal===null)return;
                const yPx=yS.getPixelForValue(yVal);
                if(!isFinite(yPx)||yPx<top||yPx>bottom)return;
                entries.push({yVal,yPx,color:d.borderColor||'#fff'});
            });
            if(!entries.length)return;
            entries.sort((a,b)=>a.yPx-b.yPx);
            for(let i=1;i<entries.length;i++){
                const prev=entries[i-1],curr=entries[i];
                curr.badgeY=(curr.yPx-(prev.badgeY??prev.yPx)<BAD_H+2)?(prev.badgeY??prev.yPx)+BAD_H+2:curr.yPx;
                if(i===1)prev.badgeY=prev.badgeY??prev.yPx;
            }
            if(entries.length===1)entries[0].badgeY=entries[0].yPx;
            entries.forEach(({yVal,yPx,badgeY,color})=>{
                ctx.save();
                ctx.strokeStyle=color;ctx.lineWidth=1.2;ctx.setLineDash([6,4]);
                ctx.beginPath();ctx.moveTo(left,yPx);ctx.lineTo(right,yPx);ctx.stroke();ctx.setLineDash([]);
                const text=yVal.toFixed(1)+'%';
                ctx.font='bold 10px Arial,sans-serif';ctx.textBaseline='middle';ctx.textAlign='left';
                const bw=Math.ceil(ctx.measureText(text).width)+padX*2,bx=right+4,by=badgeY-BAD_H/2;
                ctx.fillStyle='rgba(10,12,20,0.95)';ctx.strokeStyle=color;ctx.lineWidth=1.2;
                ctx.fillRect(bx,by,bw,BAD_H);ctx.strokeRect(bx,by,bw,BAD_H);
                ctx.fillStyle=color;ctx.fillText(text,bx+padX,badgeY);
                ctx.restore();
            });
        }
    };

    /* ═══════════════════════════════════════════════════════════════════
       PLUGIN: LINHAS ARRASTÁVEIS (por liga)
    ═══════════════════════════════════════════════════════════════════ */
    const DRAG_LINES_KEY='betstat:draglines';
    const MAX_DRAG_LINES=6;
    function _loadDragLines(){try{const a=JSON.parse(localStorage.getItem(DRAG_LINES_KEY)||'[]');return Array.isArray(a)?a.map(l=>({y:Number(l.y),color:l.color||'#1fcc59',dragging:false})):[];}catch{return[];}}
    function _saveDragLines(l){try{localStorage.setItem(DRAG_LINES_KEY,JSON.stringify(l.map(x=>({y:x.y,color:x.color||'#1fcc59'}))));}catch{}}
    function _atualizarContador(l){const el=document.getElementById('contadorLinhas');if(el)el.textContent=`${(l||[]).length} / ${MAX_DRAG_LINES} linhas`;}

    const linhaDraggablePlugin={
        id:'linhaDraggable',
        afterInit(chart){
            const canvas=chart.canvas;
            chart.dragLines=_loadDragLines();chart._selectedDragLine=-1;
            const HIT_PX=8;let draggingIdx=-1;
            const getYS=()=>chart.scales.y;
            const getEvtY=evt=>{const r=canvas.getBoundingClientRect();return((evt.touches&&evt.touches[0]?.clientY)??evt.clientY??0)-r.top;};
            const nearestLine=pxY=>{
                const yS=getYS();if(!yS||!chart.chartArea)return -1;
                const{top,bottom}=chart.chartArea;let best=-1,bestDist=Infinity;
                (chart.dragLines||[]).forEach((l,i)=>{const ly=yS.getPixelForValue(l.y);if(ly<top||ly>bottom)return;const d=Math.abs(ly-pxY);if(d<bestDist&&d<=HIT_PX){bestDist=d;best=i;}});
                return best;
            };
            chart.addDragLine=(color='#1fcc59')=>{
                if((chart.dragLines||[]).length>=MAX_DRAG_LINES){alert(`Máximo de ${MAX_DRAG_LINES} linhas!`);return;}
                const yS=getYS();if(!yS)return;
                chart.dragLines.push({y:Math.round((yS.min+yS.max)/2),color,dragging:false});
                chart._selectedDragLine=chart.dragLines.length-1;
                _saveDragLines(chart.dragLines);_atualizarContador(chart.dragLines);chart.update();
            };
            chart.deleteDragLine=()=>{const idx=chart._selectedDragLine;if(idx>=0&&idx<(chart.dragLines||[]).length){chart.dragLines.splice(idx,1);chart._selectedDragLine=-1;_saveDragLines(chart.dragLines);_atualizarContador(chart.dragLines);chart.update();}};
            chart.clearDragLines=()=>{chart.dragLines=[];chart._selectedDragLine=-1;_saveDragLines(chart.dragLines);_atualizarContador(chart.dragLines);chart.update();};

            window.adicionarLinhaDraggable=()=>{
                // Adiciona na liga ativa (a mais recente aberta)
                const c=Object.values(chartInstances).find(ci=>ci&&ci.canvas?.closest('.accordion-content.active'))||Object.values(chartInstances)[0];
                if(c)c.addDragLine(document.getElementById('lineColorPicker')?.value||'#1fcc59');
            };
            window.deletarLinhaSelecionada=()=>{
                const c=Object.values(chartInstances).find(ci=>ci&&ci.canvas?.closest('.accordion-content.active'))||Object.values(chartInstances)[0];
                if(c)c.deleteDragLine();
            };
            window.limparTodasLinhas=()=>{
                Object.values(chartInstances).forEach(c=>{ if(c)c.clearDragLines(); });
            };

            const startDrag=evt=>{const pxY=getEvtY(evt),idx=nearestLine(pxY);if(idx>=0){if(evt.cancelable)evt.preventDefault();draggingIdx=idx;chart.dragLines[idx].dragging=true;chart._selectedDragLine=idx;}else{chart._selectedDragLine=-1;}chart.update();};
            const moveDrag=evt=>{if(draggingIdx<0)return;if(evt.cancelable)evt.preventDefault();const yS=getYS();if(!yS)return;let v=yS.getValueForPixel(getEvtY(evt));v=Math.max(yS.min,Math.min(yS.max,Math.round(v*10)/10));chart.dragLines[draggingIdx].y=v;chart.update('none');};
            const stopDrag=()=>{if(draggingIdx>=0){if(chart.dragLines[draggingIdx])chart.dragLines[draggingIdx].dragging=false;_saveDragLines(chart.dragLines);}draggingIdx=-1;};
            canvas.addEventListener('mousedown',startDrag);canvas.addEventListener('mousemove',moveDrag);canvas.addEventListener('mouseleave',stopDrag);window.addEventListener('mouseup',stopDrag);
            canvas.addEventListener('touchstart',startDrag,{passive:false});canvas.addEventListener('touchmove',moveDrag,{passive:false});canvas.addEventListener('touchend',stopDrag,{passive:true});canvas.addEventListener('touchcancel',stopDrag,{passive:true});
            window.addEventListener('keydown',e=>{if(e.key==='Delete'||e.key==='Backspace'){const c=Object.values(chartInstances)[0];if(c)c.deleteDragLine();}});
            _atualizarContador(chart.dragLines);
        },
        afterDatasetsDraw(chart){
            const yS=chart.scales.y,lines=chart.dragLines||[];
            if(!yS||!lines.length||!chart.chartArea)return;
            const{ctx,chartArea:{left,right}}=chart;
            lines.forEach((l,idx)=>{
                const yPx=yS.getPixelForValue(l.y);if(!Number.isFinite(yPx))return;
                const isSel=idx===chart._selectedDragLine;
                ctx.save();
                ctx.beginPath();ctx.setLineDash(isSel?[4,2]:[]);ctx.lineWidth=isSel?1.8:1.2;ctx.strokeStyle=l.color||'#1fcc59';
                ctx.moveTo(left,yPx);ctx.lineTo(right,yPx);ctx.stroke();ctx.setLineDash([]);
                if(isSel){ctx.beginPath();ctx.arc(left+10,yPx,4,0,Math.PI*2);ctx.fillStyle=l.color||'#1fcc59';ctx.fill();}
                const text=l.y.toFixed(1)+'%';ctx.font=isSel?'bold 11px Arial,sans-serif':'10px Arial,sans-serif';
                ctx.textBaseline='middle';ctx.textAlign='left';
                const padX=5,boxW=Math.ceil(ctx.measureText(text).width)+padX*2,boxH=16,bx=right+4,by=yPx-boxH/2;
                ctx.fillStyle='rgba(10,12,20,0.95)';ctx.fillRect(bx,by,boxW,boxH);
                ctx.strokeStyle=l.color||'#1fcc59';ctx.lineWidth=isSel?1.5:1;ctx.strokeRect(bx,by,boxW,boxH);
                ctx.fillStyle=l.color||'#1fcc59';ctx.fillText(text,bx+padX,yPx);
                ctx.restore();
            });
        }
    };

    /* ═══════════════════════════════════════════════════════════════════
       CRIAÇÃO DO GRÁFICO
    ═══════════════════════════════════════════════════════════════════ */
    Chart.defaults.animation.duration = 0;
    Chart.register(ChartDataLabels);

    function createStatsChart(ctx, labels, data, league) {
        // Cria container de legenda para esta liga
        const legendId = 'legenda-' + league.toLowerCase();
        let legendContainer = document.getElementById(legendId);
        if (!legendContainer) {
            legendContainer = document.createElement('div');
            legendContainer.id = legendId;
            legendContainer.className = 'legenda-customizada';
            const canvasWrapper = ctx.canvas.closest('.canvas-wrapper');
            const chartContainer = canvasWrapper ? canvasWrapper.parentNode : ctx.canvas.parentNode;
            chartContainer.insertBefore(legendContainer, chartContainer.firstChild);
        }

        const datasetConfigs = Object.entries(labelToKey).map(([label, key]) => ({
            label, key, color: DATASET_COLORS[label] || '#888'
        }));

        const datasets=[],shortColor='#00FF00',longColor='#FF0000';
        datasetConfigs.forEach(cfg=>{
            datasets.push({
                label:cfg.label, data:data[cfg.key],
                borderColor:cfg.color, backgroundColor:cfg.color,
                pointBackgroundColor:data[cfg.key+'Colors'],
                pointBorderColor:'rgba(0,0,0,0)', pointBorderWidth:0,
                borderWidth:2, pointRadius:3, pointHoverRadius:4,
                fill:false,
                hidden:!statsChartVisibleDatasets[cfg.label]
            });
            datasets.push({label:cfg.label+' - Short MA',data:data[cfg.key+'Short'],borderColor:shortColor,backgroundColor:'transparent',tension:0,borderWidth:2,pointRadius:0,fill:false,borderDash:[5,5],hidden:!showMovingAverages||!statsChartVisibleDatasets[cfg.label]});
            datasets.push({label:cfg.label+' - Long MA', data:data[cfg.key+'Long'], borderColor:longColor, backgroundColor:'transparent',tension:0,borderWidth:2,pointRadius:0,fill:false,borderDash:[5,5],hidden:!showMovingAverages||!statsChartVisibleDatasets[cfg.label]});
        });

        const htmlLegendPlugin = createHtmlLegendPlugin(legendId);

        return new Chart(ctx,{
            type:'line',
            data:{labels,datasets},
            options:{
                responsive:true,
                maintainAspectRatio:false,
                animation:{duration:0},
                layout:{padding:{top:30,right:80}},
                plugins:{
                    legend:{display:false},
                    datalabels:{display:false},
                    tooltip:{
                        enabled:true,
                        backgroundColor:'rgba(0,0,0,0.8)',
                        titleColor:'#1fad8b',bodyColor:'#e0e0e0',
                        borderColor:'#1fad8b',borderWidth:1,
                        callbacks:{
                            title:items=>{
                                const m=chartData[league]?.[items[0].dataIndex+averagePoints];
                                return m?`${m.hora}:${m.minuto.toString().padStart(2,'0')}`:'';
                            },
                            label:ctx=>{const v=ctx.parsed.y;return v!==null?`${ctx.dataset.label}: ${v.toFixed(2)}%`:'';},
                            afterBody:items=>{
                                const m=chartData[league]?.[items[0].dataIndex+averagePoints];
                                return m?`FT: ${m.ft||'N/A'}  HT: ${m.ht||'N/A'}`:'';
                            }
                        }
                    },
                    linhaAtual:{enabled:true}
                },
                scales:{
                    x:{
                        title:{display:true,text:'',color:'#1fad8b',font:{size:14}},
                        ticks:{display:false},
                        grid:{display:false}
                    },
                    y:{
                        title:{display:true,text:'',color:'#1fad8b',font:{size:14}},
                        beginAtZero:false,
                        ticks:{color:'#b0b0b0',stepSize:5},
                        grid:{color:'rgba(255,255,255,0.3)',lineWidth:0.5},
                        afterFit:s=>{s.paddingTop=20;}
                    }
                }
            },
            plugins:[fibonacciLinesPlugin,linhaAtualPlugin,linhaDraggablePlugin,htmlLegendPlugin,ChartDataLabels]
        });
    }

    /* ═══════════════════════════════════════════════════════════════════
       UPDATE / FETCH
    ═══════════════════════════════════════════════════════════════════ */
    function updateCharts() {
        if (!_tabVisible) return;
        const ts = new Date().getTime();
        leagues.forEach(league => {
            const apiUrl = `${leagueUrls[league]}?timestamp=${ts}`;
            fetch(apiUrl)
                .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
                .then(data => {
                    const pd = processApiData(data, league);
                    const canvasId = leagueCanvasIds[league];
                    const canvas = document.getElementById(canvasId);
                    if (!canvas) return;
                    if (!chartInstances[league]) {
                        chartInstances[league] = createStatsChart(canvas.getContext('2d'), pd.labels, pd, league);
                    } else {
                        updateStatsChart(chartInstances[league], pd);
                    }
                })
                .catch(e => { /* silenciado */ });
        });
    }

    function toggleFibonacciLines(){
        showFibonacciLines=document.getElementById('fibonacciToggle').checked;
        leagues.forEach(l=>{ if(chartInstances[l])chartInstances[l].update(); });
    }

    function toggleMovingAverages(){
        showMovingAverages=document.getElementById('movingAveragesToggle').checked;
        leagues.forEach(l=>{
            const ci=chartInstances[l];if(!ci)return;
            ci.data.datasets.forEach((ds,idx)=>{
                if(ds.label.includes(' - ')){
                    const main=ds.label.split(' - ')[0];
                    ci.getDatasetMeta(idx).hidden=!showMovingAverages||!statsChartVisibleDatasets[main];
                }
            });
            ci.update();
        });
    }

    /* ═══════════════════════════════════════════════════════════════════
       EVENTOS
    ═══════════════════════════════════════════════════════════════════ */
    document.querySelectorAll('.accordion-header').forEach(header => {
        header.addEventListener('click', () => {
            header.nextElementSibling.classList.toggle('active');
        });
    });

    document.getElementById('pointsSelector').addEventListener('change', e => { numPoints=parseInt(e.target.value,10); updateCharts(); });
    document.getElementById('averageSelector').addEventListener('change', e => { averagePoints=parseInt(e.target.value,10); updateCharts(); });
    document.getElementById('fibonacciToggle').addEventListener('change', toggleFibonacciLines);
    document.getElementById('movingAveragesToggle').addEventListener('change', toggleMovingAverages);

    document.getElementById('linhaAtualToggle').addEventListener('change', function(){
        leagues.forEach(l=>{
            const ci=chartInstances[l]; if(!ci)return;
            ci.options.plugins.linhaAtual.enabled=this.checked;
            ci.update('active');
        });
    });

    document.getElementById('btnLinhaTools').addEventListener('click', e=>{
        e.stopPropagation();
        const p=document.getElementById('linhaToolsPanel');
        p.style.display=p.style.display==='none'?'block':'none';
    });
    document.addEventListener('click', ()=>{ const p=document.getElementById('linhaToolsPanel'); if(p) p.style.display='none'; });
    document.getElementById('linhaToolsPanel').addEventListener('click', e=>e.stopPropagation());

    window.onload = updateCharts;
    setInterval(updateCharts, 3000);
    </script>

</body>
