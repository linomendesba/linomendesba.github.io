<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetStat — Gráficos</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
    --bg:#333333;
    --panel:#1f2129;
    --panel2:#151821;
    --card:#101318;
    --green:#1fcc59;
    --border:rgba(31,204,89,.45);
    --text:#e5e7eb;
    --muted:#9ca3af;
}
*{box-sizing:border-box;}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden;}

/* ── HEADER ── */
.top-header{
    position:sticky;top:0;z-index:50;
    background:#1f2129;
    border-bottom:1px solid rgba(31,204,89,.55);
    display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;
    gap:12px;padding:12px 18px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-title{display:flex;flex-direction:column;line-height:1.1;}
.brand-title strong{color:var(--green);font-size:15px;letter-spacing:.02em;}
.brand-title span{color:var(--muted);font-size:11px;}

.selectors{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sel-field{display:inline-flex;align-items:center;gap:7px;color:#fff;font-size:13px;font-weight:700;}
.sel-field select{
    background:#2b2b2b;color:var(--green);
    border:1px solid rgba(31,204,89,.8);
    border-radius:8px;min-height:36px;padding:5px 12px;
    outline:none;font-size:13px;font-weight:700;cursor:pointer;
}
.sel-field select:focus{box-shadow:0 0 0 2px rgba(31,204,89,.35);}

.status-pill{
    border:1px solid rgba(148,163,184,.24);border-radius:999px;
    background:rgba(15,23,42,.65);color:#94a3b8;
    font-size:11px;font-weight:800;padding:7px 12px;white-space:nowrap;
}
.status-pill.online{border-color:rgba(31,204,89,.45);color:var(--green);background:rgba(31,204,89,.08);}

/* ── SECTION CARDS ── */
.section-wrap{max-width:1400px;margin:0 auto;padding:18px;}
.gcard{
    background:#1f2129;
    border:1px solid rgba(255,255,255,.06);
    border-radius:14px;
    margin-bottom:22px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.gcard-header{
    display:flex;align-items:center;justify-content:space-between;
    gap:10px;flex-wrap:wrap;
    padding:14px 16px;
    border-bottom:1px solid rgba(31,204,89,.18);
    background:#1a1c24;
}
.gcard-title{
    font-size:13px;font-weight:900;color:#f9fafb;
    text-transform:uppercase;letter-spacing:.06em;
    display:flex;align-items:center;gap:8px;
}
.gcard-title .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}
.gcard-body{padding:14px 16px;}

/* ── CONTROLS ── */
.controls{
    display:flex;align-items:center;justify-content:flex-start;gap:10px;
    flex-wrap:wrap;padding:8px 0 14px;
}
.field{display:inline-flex;align-items:center;gap:7px;color:#fff;font-size:12px;font-weight:700;white-space:nowrap;}
.controls select,.controls input[type="number"],.controls input[type="color"]{
    background:#2b2b2b;color:var(--green);
    border:1px solid rgba(31,204,89,.8);
    border-radius:8px;min-height:32px;padding:4px 9px;
    outline:none;font-size:12px;font-weight:700;
}
.controls select:focus,.controls input:focus{box-shadow:0 0 0 2px rgba(31,204,89,.35);}

.switch-grid{display:flex;align-items:center;flex-wrap:wrap;gap:6px 9px;padding:5px 8px;border-radius:12px;background:#2b2b2b;border:1px solid rgba(255,255,255,.16);}
.sw-item{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;white-space:nowrap;padding:2px 3px;border-radius:10px;}
.sw-item>input{position:absolute;opacity:0;width:1px;height:1px;}
.sw-track{width:28px;height:14px;border-radius:999px;background:#2a2d36;border:1px solid rgba(255,255,255,.18);position:relative;flex:0 0 auto;transition:background .18s ease,border-color .18s ease;}
.sw-track::after{content:"";width:10px;height:10px;border-radius:999px;background:#cbd5e1;position:absolute;top:50%;left:2px;transform:translateY(-50%);transition:left .18s ease,background .18s ease,box-shadow .18s ease;}
.sw-item>input:checked+.sw-track{background:rgba(31,204,89,.28);border-color:rgba(31,204,89,.65);}
.sw-item>input:checked+.sw-track::after{left:16px;background:var(--green);box-shadow:0 0 6px rgba(31,204,89,.35);}
.sw-text{font-size:11px;color:#d1d5db;font-weight:700;}

/* ── CHART BOX ── */
.chart-box{
    width:100%;background:linear-gradient(180deg,#0c0c0d,#1b1f24);
    border:1px solid rgba(255,255,255,.05);border-radius:10px;
    position:relative;overflow:hidden;
}
.chart-box canvas{display:block;width:100% !important;}

/* ── LEGEND ── */
#golsLegenda,#tradeLegenda{
    display:flex;flex-wrap:wrap;gap:8px;padding:10px 2px 0;
}
.legenda-bloco{
    display:flex;flex-direction:column;background:#2b2b2b;border-radius:7px;
    padding:5px 6px;min-width:150px;border:1px solid rgba(255,255,255,.05);
}
.legenda-titulo{
    font-size:10px;font-weight:900;color:var(--green);margin-bottom:4px;
    border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:3px;
    text-align:center;text-transform:uppercase;
}
.legenda-itens{display:grid;grid-template-columns:repeat(2,auto);gap:3px 6px;}
.item-legenda{
    display:flex;align-items:center;gap:5px;cursor:pointer;padding:3px 6px;
    border-radius:5px;background:rgba(255,255,255,.02);
    transition:opacity .15s ease,background .15s ease;user-select:none;
}
.item-legenda:hover{background:rgba(255,255,255,.06);}
.item-legenda.ativo{opacity:1;outline:1px solid rgba(255,255,255,.16);}
.item-legenda.inativo{opacity:.35;}
.circulo-legenda{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.item-legenda span:last-child{font-size:9px;color:#fff;font-weight:800;}
.item-legenda .val{color:var(--green);font-weight:900;}

/* ── RENKO ── */
.rk-header{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;padding-bottom:8px;}
.rk-badge{font-size:11px;font-weight:800;font-family:monospace;padding:4px 10px;border-radius:999px;background:rgba(31,204,89,.12);border:1px solid rgba(31,204,89,.4);color:var(--green);letter-spacing:1px;white-space:nowrap;}
.rk-acum-badge{font-size:12px;font-weight:900;font-family:monospace;padding:4px 12px;border-radius:999px;border:1px solid;white-space:nowrap;}
.rk-controls{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding-bottom:10px;}
.rk-mkt-group{display:flex;flex-wrap:wrap;gap:5px;}
.rk-mkt-btn{font-size:11px;font-family:system-ui,sans-serif;font-weight:800;padding:6px 12px;border-radius:10px;cursor:pointer;border:1px solid rgba(31,204,89,.4);background:#2b2b2b;color:#9ca3af;letter-spacing:.3px;transition:.15s;white-space:nowrap;}
.rk-mkt-btn:hover{background:rgba(31,204,89,.12);border-color:var(--green);color:#fff;}
.rk-mkt-btn.active{background:var(--green);border-color:var(--green);color:#051108;}
.rk-sep{width:1px;height:24px;background:rgba(255,255,255,.1);flex-shrink:0;margin:0 4px;}
.rk-aux-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.rk-ctrl-group{display:flex;align-items:center;gap:5px;}
.rk-ctrl-group label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:800;}
.rk-ctrl-group select{background:#2b2b2b;border:1px solid rgba(31,204,89,.6);color:var(--green);font-size:11px;padding:4px 8px;border-radius:8px;cursor:pointer;font-weight:700;outline:none;}
.rk-btn-h{width:24px;height:24px;border-radius:6px;border:1px solid rgba(31,204,89,.5);background:#2b2b2b;color:var(--green);cursor:pointer;font-size:14px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;font-weight:800;}
.rk-btn-h:hover{background:rgba(31,204,89,.15);}
.rk-altura-input{width:54px;height:24px;text-align:center;border-radius:6px;border:1px solid rgba(31,204,89,.6);background:#2b2b2b;color:var(--green);font-size:11px;outline:none;font-weight:700;}
.rk-linha-atual-wrap{display:flex;align-items:center;gap:6px;}
.rk-linha-atual-wrap label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:800;}
.rk-toggle-switch{position:relative;width:30px;height:16px;flex-shrink:0;}
.rk-toggle-switch input{opacity:0;width:0;height:0;position:absolute;}
.rk-toggle-slider{position:absolute;inset:0;cursor:pointer;background:#2a2d36;border:1px solid rgba(255,255,255,.18);border-radius:16px;transition:.2s;}
.rk-toggle-slider:before{content:'';position:absolute;width:10px;height:10px;border-radius:50%;left:2px;top:50%;transform:translateY(-50%);background:#cbd5e1;transition:.2s;}
.rk-toggle-switch input:checked+.rk-toggle-slider{background:rgba(31,204,89,.28);border-color:rgba(31,204,89,.65);}
.rk-toggle-switch input:checked+.rk-toggle-slider:before{transform:translate(14px,-50%);background:var(--green);box-shadow:0 0 6px rgba(31,204,89,.35);}
.rk-chart-outer{display:flex;width:100%;margin-top:2px;}
.rk-chart-bar{width:4px;flex-shrink:0;border-radius:4px 0 0 4px;background:rgba(31,204,89,.6);transition:background .3s;}
.rk-canvas-wrap{flex:1;min-width:0;background:linear-gradient(180deg,#0c0c0d,#1b1f24);border:1px solid rgba(255,255,255,.05);border-left:none;border-radius:0 10px 10px 0;overflow:hidden;box-sizing:border-box;}
.rk-canvas-wrap canvas{display:block;width:100% !important;height:100% !important;}
.rk-scrollbar-wrap{width:100%;margin-top:8px;position:relative;}
.rk-scrollbar{-webkit-appearance:none;-moz-appearance:none;appearance:none;width:100%;height:5px;background:#0d1018;border-radius:3px;outline:none;cursor:grab;display:block;border:none;}
.rk-scrollbar:active{cursor:grabbing;}
.rk-scrollbar::-webkit-slider-runnable-track{height:5px;border-radius:3px;background:rgba(255,255,255,.08);}
.rk-scrollbar::-webkit-slider-thumb{-webkit-appearance:none;width:36px;height:5px;border-radius:3px;background:var(--green);cursor:grab;}
.rk-scrollbar::-moz-range-track{height:5px;border-radius:3px;background:rgba(255,255,255,.08);}
.rk-scrollbar::-moz-range-thumb{width:36px;height:5px;border:none;border-radius:3px;background:var(--green);cursor:grab;}
.rk-scrollbar:disabled{opacity:.25;pointer-events:none;}
.rk-footer{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:10px;}
.rk-info{font-size:10px;color:var(--muted);font-family:monospace;flex-shrink:0;}
.rk-summary{display:flex;flex-wrap:wrap;gap:5px;}
.rk-pill{font-size:10px;padding:3px 10px;border-radius:999px;border:1px solid;white-space:nowrap;font-family:system-ui,sans-serif;font-weight:800;letter-spacing:.3px;}

/* ── TRADER ── */
.pa-bar-wrap{position:sticky;top:60px;z-index:20;background:#1a1c24;padding:8px 0;margin-bottom:6px;border-radius:10px;}
.pa-bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px 10px;padding:8px 12px;background:#2b2b2b;border:1px solid rgba(31,204,89,.25);border-radius:12px;}
.pa-lbl{font-size:11px;font-weight:800;color:var(--muted);white-space:nowrap;}
.pa-bar select,.pa-bar input[type=number]{background:#1f2129;color:var(--green);border:1px solid rgba(31,204,89,.6);border-radius:8px;padding:5px 9px;font-size:12px;font-weight:700;outline:none;}
.pa-sep{width:1px;height:24px;background:rgba(255,255,255,.1);margin:0 2px;}
.pa-sw{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;}
.pa-sw input{display:none;}
.pa-sw-track{position:relative;width:28px;height:15px;background:#1e1e1e;border-radius:999px;transition:background .2s;border:1px solid rgba(255,255,255,.12);}
.pa-sw input:checked~.pa-sw-track{background:rgba(31,204,89,.35);border-color:var(--green);}
.pa-sw-track::after{content:'';position:absolute;top:1px;left:1px;width:11px;height:11px;border-radius:50%;background:#cbd5e1;transition:transform .2s;}
.pa-sw input:checked~.pa-sw-track::after{transform:translateX(13px);background:var(--green);}
.pa-sw-txt{font-size:10px;color:#d1d5db;font-weight:700;white-space:nowrap;}
.pa-btn-legenda,.pa-btn-linha,.pa-bar button[id^=anal]{background:#1f2129;color:var(--green);border:1px solid rgba(31,204,89,.6);border-radius:8px;padding:5px 11px;font-size:11px;font-weight:800;cursor:pointer;}
.pa-btn-legenda.off{color:#6b7280;border-color:rgba(255,255,255,.12);}
.pa-fw{position:relative;}
.pa-cfg-row--toggle{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;}
.pa-sw--cfg{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;}
.pa-sw--cfg .pa-sw-txt{font-size:10px;color:#9ca3af;white-space:nowrap;}
.pa-fp,.pa-cfg{display:none;position:fixed;z-index:9999;background:#151821;border:1px solid rgba(31,204,89,.25);border-radius:12px;padding:14px 16px;box-shadow:0 18px 40px rgba(0,0,0,.75);min-width:230px;}
.pa-fp.on,.pa-cfg.on{display:block;}
.pa-cfg{min-width:270px;max-height:80vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(31,204,89,.4) transparent;}
.pa-fp-cnt{font-size:10px;color:var(--muted);text-align:center;}
.pa-fp-sep{height:1px;background:rgba(255,255,255,.1);margin:8px 0;}
.pa-fp-row{display:flex;align-items:center;gap:8px;font-size:11px;color:#9ca3af;margin-bottom:6px;}
.pa-fp input[type=color]{width:36px;height:22px;border:none;background:none;cursor:pointer;}
.pa-fp button:not(.pa-hb),.pa-cfg button:not(.pa-hb){width:100%;margin-top:6px;padding:7px 0;border-radius:999px;border:none;font-size:11px;cursor:pointer;font-weight:800;letter-spacing:.02em;}
.btn-g{background:rgba(31,204,89,.18);color:var(--green);}
.btn-y{background:#422006;color:#fbbf24;}
.btn-r{background:#450a0a;color:#f87171;}
.pa-cfg-ttl{font-size:13px;font-weight:900;color:#e5e7eb;margin-bottom:3px;}
.pa-cfg-sub{font-size:10px;color:var(--muted);margin-bottom:12px;}
.pa-cfg-sec{margin-bottom:14px;}
.pa-cfg-sec-ttl{font-size:10px;font-weight:900;color:var(--green);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.08);}
.pa-cfg-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:7px;}
.pa-cfg-row label{font-size:11px;color:#9ca3af;display:flex;align-items:center;gap:4px;}
.pa-cfg-row select,.pa-cfg-row input[type=number]{background:#1f2129;color:#e5e7eb;border:1px solid rgba(31,204,89,.4);border-radius:6px;padding:3px 6px;font-size:11px;width:58px;text-align:center;}
.pa-mm-dot{display:inline-block;width:8px;height:8px;border-radius:50%;}
.pa-mm-dot.green{background:#00FF00;}.pa-mm-dot.red{background:#FF0000;}
.pa-hr{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:7px;}
.pa-hr label{font-size:11px;color:#9ca3af;}
.pa-hc{display:inline-flex;align-items:center;gap:4px;}
.pa-hb{background:#1f2129;color:var(--green);border:1px solid rgba(31,204,89,.5);border-radius:6px;width:26px;height:26px;min-width:26px;flex-shrink:0;font-size:16px;cursor:pointer;padding:0;display:inline-flex;align-items:center;justify-content:center;font-weight:800;line-height:1;box-sizing:border-box;}
.pa-hi{width:48px;text-align:center;background:#1f2129;color:#e5e7eb;border:1px solid rgba(31,204,89,.4);border-radius:6px;padding:3px;font-size:11px;}
.pa-rst{background:#1f2129;color:#ef4444;border:1px solid #450a0a;border-radius:999px;width:100%;padding:7px 0;font-size:11px;cursor:pointer;margin-top:2px;margin-bottom:4px;font-weight:800;}
.pa-cw{position:relative;width:100%;background:linear-gradient(180deg,#0c0c0d,#1b1f24);border:1px solid rgba(255,255,255,.05);border-radius:10px;margin-bottom:6px;overflow:hidden;}
.pa-legenda{display:flex;flex-wrap:wrap;gap:8px;padding:8px 2px 0;}
.pa-legenda.oculta{display:none;}
.pa-leg-bloco{min-width:130px;background:#2b2b2b;border-radius:7px;padding:5px 6px;border:1px solid rgba(255,255,255,.05);}
.pa-leg-titulo{font-size:10px;font-weight:900;color:var(--green);margin-bottom:4px;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:3px;text-align:center;text-transform:uppercase;}
.pa-leg-itens{display:flex;flex-direction:column;gap:2px;}
.pa-leg-item{display:flex;align-items:center;gap:5px;padding:3px 6px;border-radius:5px;cursor:pointer;opacity:.35;transition:opacity .15s;background:rgba(255,255,255,.02);}
.pa-leg-item.ativo{opacity:1;outline:1px solid rgba(255,255,255,.16);}
.pa-leg-circulo{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pa-leg-item span:last-child{font-size:9px;color:#fff;font-weight:800;}

@media (max-width:768px){
    .pa-bar-wrap{top:0;}
    .top-header{padding:10px 12px;}
    .section-wrap{padding:10px;}
}
</style>
</head>
<body>

<!-- ═══════════════ HEADER / SELETOR ═══════════════ -->
<div class="top-header">
    <div class="brand">
        <div class="brand-title">
            <strong>BetStat</strong>
            <span>Gráficos · Análise Virtual</span>
        </div>
    </div>
    <div class="selectors">
        <div class="sel-field">
            <span>Casa</span>
            <select id="selCasa"></select>
        </div>
        <div class="sel-field">
            <span>Liga</span>
            <select id="selLiga"></select>
        </div>
    </div>
    <div class="status-pill online" id="statusPill">● Conectado</div>
</div>

<div class="section-wrap">

<!-- ═══════════════ GRÁFICO DE GOLS ═══════════════ -->
<div class="gcard">
    <div class="gcard-header">
        <div class="gcard-title"><span class="dot"></span> Gráfico de Gols (FT · HT · Individual)</div>
    </div>
    <div class="gcard-body">

        <div class="controls">
            <div class="field">
                <label for="pointsSelector">Janela</label>
                <select id="pointsSelector">
                    <option value="20">1 Hora</option>
                    <option value="40">2 Horas</option>
                    <option value="60">3 Horas</option>
                    <option value="80">4 Horas</option>
                    <option value="100">5 Horas</option>
                    <option value="120">6 Horas</option>
                    <option value="140">7 Horas</option>
                    <option value="160" selected>8 Horas</option>
                    <option value="180">9 Horas</option>
                    <option value="200">10 Horas</option>
                    <option value="220">11 Horas</option>
                    <option value="240">12 Horas</option>
                    <option value="480">24 Horas</option>
                    <option value="960">48 Horas</option>
                    <option value="1440">72 Horas</option>
                </select>
            </div>

            <div class="field">
                <label for="averageSelector">Base</label>
                <select id="averageSelector">
                    <option value="19" selected>Base 20</option>
                    <option value="39">Base 40</option>
                    <option value="59">Base 60</option>
                    <option value="79">Base 80</option>
                    <option value="99">Base 100</option>
                    <option value="119">Base 120</option>
                </select>
            </div>

            <div class="switch-grid">
                <label class="sw-item">
                    <input type="checkbox" id="fibonacciToggle">
                    <span class="sw-track"></span>
                    <span class="sw-text">Fibonacci</span>
                </label>
                <label class="sw-item">
                    <input type="checkbox" id="movingAveragesToggle">
                    <span class="sw-track"></span>
                    <span class="sw-text">Médias Móveis</span>
                </label>
                <label class="sw-item">
                    <input type="checkbox" id="linhaAtualToggle" checked>
                    <span class="sw-track"></span>
                    <span class="sw-text">Linha Atual</span>
                </label>
                <label class="sw-item">
                    <input type="checkbox" id="labelsToggle">
                    <span class="sw-track"></span>
                    <span class="sw-text">Rótulos</span>
                </label>
            </div>
        </div>

        <div class="chart-box">
            <canvas id="golsChart" height="380"></canvas>
        </div>

        <div id="golsLegenda"></div>
    </div>
</div>

<!-- ═══════════════ RENKO DE MERCADOS ═══════════════ -->
<div class="gcard">
    <div class="gcard-header">
        <div class="gcard-title"><span class="dot"></span> Renko de Mercados</div>
        <div id="rkAcumBadge"></div>
    </div>
    <div class="gcard-body">

        <div class="rk-header">
            <span class="rk-badge" id="rkBadgeMercado">Over 2.5</span>
        </div>

        <div class="rk-controls">
            <div class="rk-mkt-group" id="rkMktGroup">
                <button class="rk-mkt-btn active" data-mkt="over25">O2.5</button>
                <button class="rk-mkt-btn" data-mkt="under25">U2.5</button>
                <button class="rk-mkt-btn" data-mkt="over15">O1.5</button>

<script>
/* ═══════════════════════════════════════════════════════════════════
   CONFIG GERAL — BASE, LIGAS, ROTAS_API, LIGA_ATUAL
═══════════════════════════════════════════════════════════════════ */
const BASE = "https://betstat.site";

const LIGAS = {
    bet365: [
        { label: "Copa",      res: "bet365/Copa" },
        { label: "Euro Cup",  res: "bet365/Euro" },
        { label: "Super",     res: "bet365/Super" },
        { label: "Premier",   res: "bet365/Premier" },
    ],
    betano: [
        { label: "Copa América",        res: "Copa%20Am%C3%A9rica" },
        { label: "Clássicos América",   res: "Ta%C3%A7a%20Gl%C3%B3ria%20eterna" },
        { label: "Euro",                res: "Euro" },
        { label: "Camp. Italiano",      res: "Campeonato%20Italiano" },
        { label: "Copa das Estrelas",   res: "Copa%20das%20estrelas" },
        { label: "Brasileirão Betano",  res: "Brasileir%C3%A3o%20Betano" },
    ],
    kiron: [
        { label: "England League", res: "kiron/England" },
        { label: "Italy League",   res: "kiron/Italy" },
        { label: "Spain League",   res: "kiron/Spain" },
    ],
    estrela: [
        { label: "Copa do Mundo",       res: "estrela/Copa%20do%20Mundo" },
        { label: "Ligas dos Campeões",  res: "estrela/Ligas%20dos%20Campe%C3%B5es" },
        { label: "América Latina",      res: "estrela/Am%C3%A9rica%20Latina" },
    ],
    betsson: [
        { label: "Espanha",     res: "betsson/Espanha" },
        { label: "Inglaterra",  res: "betsson/Inglaterra" },
        { label: "Brasil",      res: "betsson/Brasil" },
    ],
};

const CASA_LABELS = {
    bet365:  'Bet365',
    betano:  'Betano',
    kiron:   'Kiron',
    estrela: 'Estrelabet',
    betsson: 'Betsson',
};

const ROTAS_API = {
    resultados: (liga) => `${BASE}/resultados/${liga}`
};

const LS_CASA = 'gpage:casa';
const LS_LIGA = 'gpage:liga';

let LIGA_ATUAL = '';

function _initSeletores() {
    const selCasa = document.getElementById('selCasa');
    const selLiga = document.getElementById('selLiga');

    Object.keys(LIGAS).forEach(casaKey => {
        const opt = document.createElement('option');
        opt.value = casaKey;
        opt.textContent = CASA_LABELS[casaKey] || casaKey;
        selCasa.appendChild(opt);
    });

    const savedCasa = localStorage.getItem(LS_CASA);
    const casaInicial = (savedCasa && LIGAS[savedCasa]) ? savedCasa : Object.keys(LIGAS)[0];
    selCasa.value = casaInicial;

    function popularLigas(casaKey) {
        selLiga.innerHTML = '';
        (LIGAS[casaKey] || []).forEach(l => {
            const opt = document.createElement('option');
            opt.value = l.res;
            opt.textContent = l.label;
            selLiga.appendChild(opt);
        });
    }

    popularLigas(casaInicial);

    const savedLiga = localStorage.getItem(LS_LIGA);
    const ligasDisponiveis = (LIGAS[casaInicial] || []).map(l => l.res);
    if (savedLiga && ligasDisponiveis.includes(savedLiga)) {
        selLiga.value = savedLiga;
    }

    LIGA_ATUAL = selLiga.value;

    selCasa.addEventListener('change', () => {
        popularLigas(selCasa.value);
        LIGA_ATUAL = selLiga.value;
        localStorage.setItem(LS_CASA, selCasa.value);
        localStorage.setItem(LS_LIGA, LIGA_ATUAL);
        _onLigaChange();
    });

    selLiga.addEventListener('change', () => {
        LIGA_ATUAL = selLiga.value;
        localStorage.setItem(LS_LIGA, LIGA_ATUAL);
        _onLigaChange();
    });
}

function _onLigaChange() {
    // Reseta instâncias de gráficos para refletir a nova liga
    Object.keys(chartInstances).forEach(k => {
        try { chartInstances[k]?.destroy(); } catch(_) {}
        delete chartInstances[k];
    });
    if (typeof updateCharts === 'function') updateCharts();

    _rkDestroyChart();
    _rkInicioVis = Infinity;
    if (typeof rkFetch === 'function') rkFetch();

    // (analítico Chart.js removido — Modo Trader usa grafico-trading.js)

    // Recarrega dados do Modo Trader (grafico-trading.js) na nova liga
    _traderFetch();
}

/* ── ADAPTADOR: API BetStat → window.LOADED_JSON (formato Caramelo) ── */
async function _traderFetch() {
    if (!LIGA_ATUAL) return;
    try {
        const res = await fetch(ROTAS_API.resultados(LIGA_ATUAL) + '?t=' + Date.now());
        if (!res.ok) return;
        const dados = await res.json();
        window.LOADED_JSON = _betstatToLoadedJson(dados);
        if (typeof window.renderGraficoPrincipalNovo === 'function') {
            window.renderGraficoPrincipalNovo();
        }
        // Notifica o grafico-trading.js para re-renderizar
        const panel = document.getElementById('graficoTradingPanel');
        if (panel && !panel.classList.contains('hidden') && typeof window.renderGraficoTrading === 'function') {
            window.renderGraficoTrading();
        }
    } catch(e) {
        console.warn('[Trader] fetch error:', e);
    }
}

function _betstatToLoadedJson(apiData) {
    // Agrupa jogos por hora → cada hora vira uma row, cada jogo vira uma cell
    const sorted = [...apiData].sort((a, b) => {
        const dA = new Date(a.data), dB = new Date(b.data);
        if (dA - dB !== 0) return dB - dA;
        if (a.hora !== b.hora) return b.hora - a.hora;
        return b.minuto - a.minuto;
    });

    // Agrupa por hora
    const porHora = {};
    for (const item of sorted) {
        const h = String(item.hora).padStart(2, '0');
        if (!porHora[h]) porHora[h] = [];
        porHora[h].push(item);
    }

    const rows = Object.entries(porHora).map(([hora, jogos]) => {
        const cells = [{ v: hora }];
        for (const j of jogos) {
            if (!j.ft || !j.ft.includes(' x ')) continue;
            const ft = j.ft.replace(' x ', '-');
            let htStr = '';
            if (j.ht && j.ht !== 'OUT' && j.ht.includes(' x ')) {
                htStr = '\n' + j.ht.replace(' x ', '-');
            } else if (j.ht === 'OUT') {
                htStr = '\nOUT';
            }
            const titulo = (j.time_a && j.time_b) ? `${j.time_a} x ${j.time_b}\n` : '';
            cells.push({ v: titulo + ft + htStr });
        }
        return { c: cells };
    });

    return { table: { rows } };
}

// Inicia fetch do trader quando a liga já está definida
document.addEventListener('DOMContentLoaded', () => {
    _traderFetch();
    setInterval(_traderFetch, 3000);
});

_initSeletores();

let _tabVisible = !document.hidden;
document.addEventListener('visibilitychange', () => {
    _tabVisible = !document.hidden;
    if (_tabVisible) {
        if (typeof updateCharts === 'function') updateCharts();
        if (typeof rkFetch === 'function') rkFetch();
    }
});
</script>

<script>
/* ═══════════════════════════════════════════════════════════════════
   GRÁFICO DE GOLS — FT / HT / Individual (simplificado, sem setups)
═══════════════════════════════════════════════════════════════════ */
let numPoints          = 160;
let averagePoints      = 19;
let showFibonacciLines = false;
let showMovingAverages = false;
let showLabels         = false;
const chartInstances   = {};
let chartData          = {};

// Chave dinâmica — usa LIGA_ATUAL em vez de 'Copa' fixo
function _golsLigaKey() { return LIGA_ATUAL || 'default'; }

const labelToKey = {
    'Gols FT':'golsFT','Gols HT':'golsHT','Gols Individual':'golsInd',
};

const DATASET_COLORS = {
    'Gols FT':'#FFFF00','Gols HT':'#26A69A','Gols Individual':'#FF5A36',
};

const statsChartVisibleDatasets = {
    'Gols FT': true, 'Gols HT': true, 'Gols Individual': true
};

function computeMA(dataArray, period) {
    return dataArray.map((_, i) => {
        let sum = 0, count = 0;
        for (let j = Math.max(0, i - period + 1); j <= i; j++) {
            if (dataArray[j] !== null) { sum += dataArray[j]; count++; }
        }
        return count > 0 ? sum / count : null;
    });
}
function parseHtScoreTotal(htStr) {
    if (!htStr) return 0;
    if (htStr === 'OUT') return 3;
    if (htStr.includes(' x ')) {
        const p = htStr.split(' x ').map(Number);
        if (p.length === 2 && !isNaN(p[0]) && !isNaN(p[1])) return p[0] + p[1];
    }
    return 0;
}
function getKeyFromLabel(label) {
    if (label.includes(' - ')) {
        const [mainLabel, maPart] = label.split(' - ');
        return labelToKey[mainLabel] + maPart.split(' ')[0];
    }
    return labelToKey[label];
}

/* ── PLUGIN: RÓTULOS ACIMA DOS PONTOS ── */
const rotulosPlugin = {
    id: 'rotulos',
    afterDatasetsDraw(chart) {
        if (!showLabels) return;
        const {ctx, chartArea, scales} = chart;
        if (!chartArea || !scales.y) return;

        chart.data.datasets.forEach((ds, dsIdx) => {
            if (ds.label.includes(' MA')) return;
            if (!chart.isDatasetVisible(dsIdx)) return;
            const meta = chart.getDatasetMeta(dsIdx);
            if (!meta || !meta.data) return;

            const color = ds.borderColor || '#fff';
            ctx.save();
            ctx.font = 'bold 9px Arial,sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillStyle = color;

            meta.data.forEach((point, i) => {
                const v = ds.data[i];
                if (v === null || v === undefined || !isFinite(v)) return;
                if (point.x < chartArea.left || point.x > chartArea.right) return;
                if (point.y < chartArea.top  || point.y > chartArea.bottom) return;
                ctx.fillText(String(Math.round(v)), point.x, point.y - 4);
            });
            ctx.restore();
        });
    }
};

/* ── PLUGIN: FIBONACCI ── */
const fibonacciLinesPlugin = {
    id: 'fibonacciLines',
    afterDraw(chart) {
        if (!showFibonacciLines) return;
        const ctx = chart.ctx, yAxis = chart.scales.y; if (!yAxis) return;
        const fibLevels = [0,23.6,38.2,50,61.8,100];
        const {left,right} = chart.chartArea, range = yAxis.max - yAxis.min;
        ctx.save();
        fibLevels.forEach((lvl,i) => {
            const y = yAxis.getPixelForValue(yAxis.min + (lvl/100)*range);
            ctx.beginPath(); ctx.setLineDash([5,5]); ctx.moveTo(left,y); ctx.lineTo(right,y);
            ctx.strokeStyle = 'rgba(31,204,89,0.5)'; ctx.lineWidth = 1;
            ctx.stroke(); ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(31,204,89,0.85)'; ctx.font = '10px Arial';
            ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
            ctx.fillText(`${fibLevels[i]}%`, right+8, y-(i===0?-8:0));
        });
        ctx.restore();
    }
};

/* ── PLUGIN: LINHA ATUAL ── */
const linhaAtualPlugin = {
    id: 'linhaAtual',
    afterDraw(chart, args, opts) {
        const cfg = (opts?.enabled !== undefined) ? opts : (chart.options?.plugins?.linhaAtual ?? {});
        if (cfg.enabled === false) return;
        const {ctx,chartArea,scales} = chart; if (!chartArea || !scales.y) return;
        const {left,right,top,bottom} = chartArea, padX = 5, BAD_H = 18;
        const entries = [];
        chart.data.datasets.forEach((d,i) => {
            if (!d.label || d.label.includes(' MA') || !chart.isDatasetVisible(i)) return;
            const arr = d.data; if (!arr?.length) return;
            let yVal = null;
            for (let j = arr.length-1; j >= 0; j--) {
                const v = arr[j];
                if (v !== null && v !== undefined && isFinite(v)) { yVal = v; break; }
            }
            if (yVal === null) return;
            const axisId = d.yAxisID || 'y';
            const yAxis = scales[axisId] || scales.y;
            const yPx = yAxis.getPixelForValue(yVal);
            if (!isFinite(yPx) || yPx < top || yPx > bottom) return;
            entries.push({yVal, yPx, label:d.label, color:d.borderColor||'#fff'});
        });
        if (!entries.length) return;
        entries.sort((a,b) => a.yPx - b.yPx);
        for (let i = 1; i < entries.length; i++) {
            const prev = entries[i-1], curr = entries[i];
            curr.badgeY = (curr.yPx - (prev.badgeY??prev.yPx) < BAD_H+2)
                ? (prev.badgeY??prev.yPx)+BAD_H+2 : curr.yPx;
            if (i===1) prev.badgeY = prev.badgeY??prev.yPx;
        }
        if (entries.length===1) entries[0].badgeY = entries[0].yPx;
        entries.forEach(({yVal,yPx,badgeY,label,color}) => {
            ctx.save();
            ctx.strokeStyle=color; ctx.lineWidth=1.2; ctx.setLineDash([6,4]);
            ctx.beginPath(); ctx.moveTo(left,yPx); ctx.lineTo(right,yPx);
            ctx.stroke(); ctx.setLineDash([]);
            const isGols = true; // todos os datasets são de gols neste gráfico
            const text = String(Math.round(yVal));
            ctx.font = 'bold 10px Arial,sans-serif';
            ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
            const bw = Math.ceil(ctx.measureText(text).width)+padX*2;
            const bx = right+4, by = badgeY-BAD_H/2;
            ctx.fillStyle = 'rgba(10,12,20,0.95)';
            ctx.strokeStyle = color; ctx.lineWidth = 1.2;
            ctx.fillRect(bx,by,bw,BAD_H); ctx.strokeRect(bx,by,bw,BAD_H);
            ctx.fillStyle = color;
            ctx.fillText(text, bx+padX, badgeY);
            ctx.restore();
        });
    }
};

/* ── CRIAÇÃO DO GRÁFICO ── */
Chart.defaults.animation.duration = 0;

function createStatsChart(ctx, labels, data, league) {
    const datasets = [];
    const shortColor = '#1fcc59', longColor = '#ef4444';

    Object.entries(labelToKey).forEach(([label]) => {
        const key   = labelToKey[label];
        const color = DATASET_COLORS[label];
        datasets.push({
            label, data:data[key],
            borderColor:color, backgroundColor:color,
            pointBackgroundColor:data[key+'Colors'],
            pointBorderColor:'rgba(0,0,0,0)', pointBorderWidth:0,
            borderWidth:2, pointRadius:3, pointHoverRadius:4,
            fill:false,
            hidden:!statsChartVisibleDatasets[label]
        });
        datasets.push({label:label+' - Short MA',data:data[key+'Short'],borderColor:shortColor,backgroundColor:'transparent',tension:0,borderWidth:2,pointRadius:0,fill:false,borderDash:[5,5],hidden:!showMovingAverages||!statsChartVisibleDatasets[label]});
        datasets.push({label:label+' - Long MA', data:data[key+'Long'], borderColor:longColor, backgroundColor:'transparent',tension:0,borderWidth:2,pointRadius:0,fill:false,borderDash:[5,5],hidden:!showMovingAverages||!statsChartVisibleDatasets[label]});
    });

    return new Chart(ctx, {
        type:'line', data:{labels,datasets},
        options:{
            responsive:true, maintainAspectRatio:false, animation:{duration:0},
            layout:{padding:{top:30,right:80}},
            plugins:{
                legend:{display:false},
                tooltip:{
                    enabled:true, backgroundColor:'rgba(15,15,15,0.95)',
                    titleColor:'#1fcc59', bodyColor:'#e0e0e0',
                    borderColor:'#1fcc59', borderWidth:1,
                    callbacks:{
                        title:items=>{const sd=chartData[league];const m=sd?.[Math.max(0,sd.length-numPoints)+items[0].dataIndex];return m?`${m.hora}:${m.minuto.toString().padStart(2,'0')}`:'';},
                        label:ctx=>{const v=ctx.parsed.y;if(v===null)return '';return `${ctx.dataset.label}: ${Math.round(v)} gols`;},
                        afterBody:items=>{const sd=chartData[league];const m=sd?.[Math.max(0,sd.length-numPoints)+items[0].dataIndex];return m?`FT: ${m.ft||'N/A'}  HT: ${m.ht||'N/A'}`:'';},
                    }
                },
                linhaAtual:{enabled:true}
            },
            scales:{
                x:{ticks:{display:false},grid:{display:false}},
                y:{beginAtZero:true,ticks:{color:'#b0b0b0',stepSize:1,precision:0},grid:{color:'rgba(255,255,255,0.06)',lineWidth:0.5},afterFit:s=>{s.paddingTop=20;}}
            }
        },
        plugins:[fibonacciLinesPlugin,linhaAtualPlugin,rotulosPlugin]
    });
}

function updateStatsChart(chart, newData) {
    if (!chart) return;
    chart.data.labels = newData.labels;
    chart.data.datasets.forEach(ds => {
        ds.data = newData[getKeyFromLabel(ds.label)];
        if (!ds.label.includes(' MA'))
            ds.pointBackgroundColor = newData[getKeyFromLabel(ds.label)+'Colors'];
    });
    chart.update();
    _renderGolsLegenda();
}

/* ── PROCESSAMENTO DE DADOS ── */
function processApiData(data, league) {
    const sortedData = [...data].sort((a,b)=>{
        const dA=new Date(a.data),dB=new Date(b.data);
        if(dA.getTime()!==dB.getTime())return dA-dB;
        if(a.hora!==b.hora)return a.hora-b.hora;
        return a.minuto-b.minuto;
    });
    // Precisa de amostras extras para a média móvel "aquecer"
    const slicedData=sortedData.slice(-numPoints - averagePoints * 2);
    chartData[league]=slicedData;

    // arrays brutos (todos os dados, inclusive os extras para MA)
    const rawFT=[], rawHT=[], rawInd=[];
    slicedData.forEach(m=>{
        let ft=[0,0]; if(m.ft?.includes(' x '))ft=m.ft.split(' x ').map(Number);
        const htTotal=parseHtScoreTotal(m.ht);
        rawFT.push(ft[0]+ft[1]);
        rawHT.push(htTotal);
        rawInd.push(ft[0]+ft[1]);
    });

    // Exportar apenas os últimos numPoints pontos
    const startExibir = Math.max(0, slicedData.length - numPoints);

    let labels=[],golsFT=[],golsHT=[],golsInd=[];
    let golsFTColors=[],golsHTColors=[],golsIndColors=[];

    for(let i=startExibir;i<slicedData.length;i++){
        const m=slicedData[i];
        labels.push(`${m.hora}:${m.minuto.toString().padStart(2,'0')}`);

        golsFT.push(rawFT[i]);
        golsFTColors.push('#FFFF00');

        golsHT.push(rawHT[i]);
        golsHTColors.push('#26A69A');

        const tg=rawInd[i];
        const golsIndColor=tg>=5?'#2ecc71':tg>=3?'#3498db':tg===2?'#f1c40f':tg===1?'#e67e22':'#e74c3c';
        golsInd.push(tg);
        golsIndColors.push(golsIndColor);
    }

    const result={
        labels,golsFT,golsHT,golsInd,
        golsFTColors,golsHTColors,golsIndColors,
    };
    const shortPeriod=5,longPeriod=20;
    Object.keys(labelToKey).forEach(label=>{
        const key=labelToKey[label];
        result[key+'Short']=computeMA(result[key],shortPeriod);
        result[key+'Long'] =computeMA(result[key],longPeriod);
    });
    return result;
}

function updateCharts() {
    if (!_tabVisible || !LIGA_ATUAL) return;
    const ts = new Date().getTime();
    const league = _golsLigaKey();
    fetch(ROTAS_API.resultados(LIGA_ATUAL)+`?timestamp=${ts}`)
        .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
        .then(data=>{
            const pd = processApiData(data, league);
            const canvas = document.getElementById('golsChart'); if (!canvas) return;
            if (!chartInstances[league]) {
                // Destroi instância anterior de outra liga se existir
                Object.keys(chartInstances).forEach(k=>{
                    try{chartInstances[k]?.destroy();}catch(_){}
                    delete chartInstances[k];
                });
                chartInstances[league] = createStatsChart(canvas.getContext('2d'), pd.labels, pd, league);
                _renderGolsLegenda();
            } else {
                updateStatsChart(chartInstances[league], pd);
            }
        })
        .catch(e=>console.error(`Erro gols ${league}:`,e));
}

/* ── LEGENDA SIMPLES (FT / HT / Individual com toggle) ── */
function _renderGolsLegenda() {
    const box = document.getElementById('golsLegenda');
    if (!box) return;
    box.innerHTML = '';

    const bloco = document.createElement('div');
    bloco.className = 'legenda-bloco';
    const titulo = document.createElement('div');
    titulo.className = 'legenda-titulo';
    titulo.textContent = 'Gols';
    bloco.appendChild(titulo);

    const itens = document.createElement('div');
    itens.className = 'legenda-itens';

    const ci = chartInstances[_golsLigaKey()];
    const sd = chartData[_golsLigaKey()];
    const lastIdx = sd ? sd.length - 1 : -1;

    Object.keys(labelToKey).forEach(label => {
        const key = labelToKey[label];
        const ativo = statsChartVisibleDatasets[label];
        const item = document.createElement('div');
        item.className = 'item-legenda' + (ativo ? ' ativo' : ' inativo');

        const circ = document.createElement('span');
        circ.className = 'circulo-legenda';
        circ.style.background = DATASET_COLORS[label];

        const txt = document.createElement('span');
        let valTxt = '';
        if (ci && lastIdx >= 0) {
            const arr = ci.data.datasets.find(d=>d.label===label)?.data;
            const v = arr ? arr[arr.length-1] : null;
            if (v !== null && v !== undefined) valTxt = ` (${Math.round(v)})`;
        }
        txt.innerHTML = label + (valTxt ? `<span class="val">${valTxt}</span>` : '');

        item.appendChild(circ);
        item.appendChild(txt);

        item.addEventListener('click', () => {
            statsChartVisibleDatasets[label] = !statsChartVisibleDatasets[label];
            item.classList.toggle('ativo', statsChartVisibleDatasets[label]);
            item.classList.toggle('inativo', !statsChartVisibleDatasets[label]);
            const c = chartInstances[_golsLigaKey()];
            if (c) {
                c.data.datasets.forEach((ds, idx) => {
                    const mainLabel = ds.label.includes(' - ') ? ds.label.split(' - ')[0] : ds.label;
                    if (mainLabel !== label) return;
                    const vis = statsChartVisibleDatasets[mainLabel];
                    c.getDatasetMeta(idx).hidden = ds.label.includes(' - ')
                        ? !showMovingAverages || !vis : !vis;
                });
                c.update();
            }
        });

        itens.appendChild(item);
    });

    bloco.appendChild(itens);
    box.appendChild(bloco);
}

/* ── EVENT LISTENERS ── */
function toggleFibonacciLines() {
    showFibonacciLines = document.getElementById('fibonacciToggle').checked;
    const ci = chartInstances[_golsLigaKey()]; if(ci) ci.update();
}
function toggleMovingAverages() {
    showMovingAverages = document.getElementById('movingAveragesToggle').checked;
    const ci = chartInstances[_golsLigaKey()]; if(!ci) return;
    ci.data.datasets.forEach((ds,idx)=>{
        if(ds.label.includes(' - ')){
            const main=ds.label.split(' - ')[0];
            ci.getDatasetMeta(idx).hidden=!showMovingAverages||!statsChartVisibleDatasets[main];
        }
    });
    ci.update();
}

document.getElementById('pointsSelector').addEventListener('change',e=>{
    numPoints=parseInt(e.target.value,10);
    updateCharts();
});
document.getElementById('averageSelector').addEventListener('change',e=>{
    averagePoints=parseInt(e.target.value,10);
    updateCharts();
});
document.getElementById('fibonacciToggle').addEventListener('change',toggleFibonacciLines);
document.getElementById('movingAveragesToggle').addEventListener('change',toggleMovingAverages);
document.getElementById('linhaAtualToggle').addEventListener('change',function(){
    const ci=chartInstances[_golsLigaKey()];if(!ci)return;
    ci.options.plugins.linhaAtual.enabled=this.checked;
    ci.update('active');
});
document.getElementById('labelsToggle').addEventListener('change',function(){
    showLabels=this.checked;
    const ci=chartInstances[_golsLigaKey()];if(ci)ci.update();
});

window.addEventListener('load',()=>{

});
setInterval(updateCharts,3000);

<script>
/* ════════════════════════════════════════════════════════
   RENKO DE MERCADOS
════════════════════════════════════════════════════════ */
const RK_MERCADOS = {
    over25:    { label: 'Over 2.5',    test: (tg,c,f) => tg >= 3,        cor: '#1fcc59', corN: '#ef4444' },
    over15:    { label: 'Over 1.5',    test: (tg,c,f) => tg >= 2,        cor: '#1fcc59', corN: '#ef4444' },
    over35:    { label: 'Over 3.5',    test: (tg,c,f) => tg >= 4,        cor: '#1fcc59', corN: '#ef4444' },
    over05:    { label: 'Over 0.5',    test: (tg,c,f) => tg >= 1,        cor: '#1fcc59', corN: '#ef4444' },
    ambas:     { label: 'Ambas Sim',   test: (tg,c,f) => c > 0 && f > 0, cor: '#1fcc59', corN: '#ef4444' },
    casaVence: { label: 'Casa Vence',  test: (tg,c,f) => c > f,          cor: '#1fcc59', corN: '#ef4444' },
    foraVence: { label: 'Fora Vence',  test: (tg,c,f) => f > c,          cor: '#1fcc59', corN: '#ef4444' },
    empate:    { label: 'Empate',      test: (tg,c,f) => c === f,        cor: '#1fcc59', corN: '#ef4444' },
    under25:   { label: 'Under 2.5',   test: (tg,c,f) => tg <= 2,        cor: '#1fcc59', corN: '#ef4444' },
};

const RK_LS_KEY = 'renko_prefs_v2';

function rkSavePrefs() {
    try {
        localStorage.setItem(RK_LS_KEY, JSON.stringify({
            mercado: rkMercado, janela: rkJanela, altura: rkAltura, linhaAtual: rkLinhaAtual,
        }));
    } catch(e) {}
}
function rkLoadPrefs() {
    try {
        const raw = localStorage.getItem(RK_LS_KEY);
        if (!raw) return;
        const p = JSON.parse(raw);
        if (p.mercado    !== undefined) rkMercado    = p.mercado;
        if (p.janela     !== undefined) rkJanela     = p.janela;
        if (p.altura     !== undefined) rkAltura     = p.altura;
        if (p.linhaAtual !== undefined) rkLinhaAtual = p.linhaAtual;
    } catch(e) {}
}

let rkMercado    = 'over25';
let rkJanela     = 80;
let rkAltura     = 240;
let rkLinhaAtual = true;

rkLoadPrefs();

let _rkChart         = null;
let _rkData          = null;
let _rkInicioVis     = Infinity;
let _rkLastMaxInicio = Infinity;
let _rkTabVis        = !document.hidden;

document.addEventListener('visibilitychange', () => { _rkTabVis = !document.hidden; });

/* ── PLUGIN: LINHA ATUAL ── */
const rkLinhaAtualPlugin = {
    id: 'rkLinhaAtual',
    afterDraw(chart, args, opts) {
        const cfg = (opts?.enabled !== undefined) ? opts : (chart.options?.plugins?.rkLinhaAtual ?? {});
        if (cfg.enabled === false) return;
        const {ctx, chartArea, scales} = chart;
        if (!chartArea || !scales.y) return;
        const {left, right, top, bottom} = chartArea;
        const padX = 5, BAD_H = 18;

        const entries = [];
        chart.data.datasets.forEach((d, i) => {
            if (!d.label || !chart.isDatasetVisible(i)) return;
            const arr = d.data;
            if (!arr?.length) return;
            let yVal = null;
            for (let j = arr.length - 1; j >= 0; j--) {
                const v = arr[j];
                if (v !== null && v !== undefined && isFinite(v)) { yVal = v; break; }
            }
            if (yVal === null) return;
            const yAxis = scales.y;
            const yPx = yAxis.getPixelForValue(yVal);
            if (!isFinite(yPx) || yPx < top || yPx > bottom) return;
            entries.push({ yVal, yPx, label: d.label, color: d.borderColor || '#fff' });
        });

        if (!entries.length) return;
        entries.sort((a, b) => a.yPx - b.yPx);

        for (let i = 1; i < entries.length; i++) {
            const prev = entries[i - 1], curr = entries[i];
            curr.badgeY = (curr.yPx - (prev.badgeY ?? prev.yPx) < BAD_H + 2)
                ? (prev.badgeY ?? prev.yPx) + BAD_H + 2 : curr.yPx;
            if (i === 1) prev.badgeY = prev.badgeY ?? prev.yPx;
        }
        if (entries.length === 1) entries[0].badgeY = entries[0].yPx;

        const mk = RK_MERCADOS[rkMercado] || RK_MERCADOS.over25;

        entries.forEach(({yVal, yPx, badgeY}) => {
            const lineColor = mk.cor;
            ctx.save();
            ctx.strokeStyle = lineColor;
            ctx.lineWidth   = 1.2;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(left, yPx);
            ctx.lineTo(right, yPx);
            ctx.stroke();
            ctx.setLineDash([]);

            const text = String(Math.round(yVal));
            ctx.font = 'bold 10px monospace';
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'left';
            const bw = Math.ceil(ctx.measureText(text).width) + padX * 2;
            const bx = right + 4, by = badgeY - BAD_H / 2;
            ctx.fillStyle = 'rgba(9,11,18,0.95)';
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = 1.2;
            ctx.fillRect(bx, by, bw, BAD_H);
            ctx.strokeRect(bx, by, bw, BAD_H);
            ctx.fillStyle = lineColor;
            ctx.fillText(text, bx + padX, badgeY);
            ctx.restore();
        });
    }
};

/* ── SYNC UI ── */
function rkSyncUI() {
    const selJ = document.getElementById('rkSelJanela');
    if (selJ) selJ.value = String(rkJanela);

    const inp = document.getElementById('rkAlturaInput');
    if (inp) inp.value = String(rkAltura);
    rkAplicarAltura();

    document.querySelectorAll('.rk-mkt-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mkt === rkMercado);
    });

    const togLA = document.getElementById('rkLinhaAtualToggle');
    if (togLA) togLA.checked = rkLinhaAtual;

    rkAtualizarIdentidade();
}

function rkAtualizarIdentidade() {
    const mk    = RK_MERCADOS[rkMercado] || RK_MERCADOS.over25;
    const badge = document.getElementById('rkBadgeMercado');
    const bar   = document.getElementById('rkChartBar');

    if (badge) {
        badge.textContent       = mk.label;
        badge.style.color       = mk.cor;
        badge.style.borderColor = mk.cor + '55';
        badge.style.background  = mk.cor + '18';
    }
    if (bar) bar.style.background = mk.cor + 'aa';
}

/* ── PROCESSAMENTO ── */
function rkProcessData(jogos) {
    const mk = RK_MERCADOS[rkMercado] || RK_MERCADOS.over25;

    const sorted = [...jogos].sort((a, b) => {
        const da = new Date(a.data), db = new Date(b.data);
        if (da - db !== 0) return da - db;
        if (a.hora !== b.hora) return a.hora - b.hora;
        return a.minuto - b.minuto;
    });

    const pontos = [], direcoes = [], placares = [], labels = [];
    let acumulado = 0, wins = 0, total = 0;

    sorted.forEach((jogo) => {
        let ft = [0, 0];
        if (jogo.ft?.includes(' x ')) ft = jogo.ft.split(' x ').map(Number);
        const casa = ft[0], fora = ft[1];
        const tg   = casa + fora;

        const hit     = mk.test(tg, casa, fora);
        const direcao = hit ? 1 : -1;
        acumulado    += direcao;
        if (hit) wins++;
        total++;

        pontos.push(acumulado);
        direcoes.push(direcao);
        placares.push(`${casa} x ${fora}`);
        labels.push(`${jogo.hora}:${String(jogo.minuto).padStart(2,'0')}`);
    });

    return { pontos, direcoes, placares, labels, wins, total };
}

/* ── RENDER ── */
function rkRender() {
    const canvas = document.getElementById('rkCanvas');
    const scroll = document.getElementById('rkScroll');
    const info   = document.getElementById('rkInfo');
    if (!canvas) return;

    if (!_rkData || !_rkData.length) {
        if (info) info.textContent = 'Aguardando dados...';
        return;
    }

    const { pontos, direcoes, placares, labels, wins, total } = rkProcessData(_rkData);
    if (!pontos.length) {
        if (info) info.textContent = 'Sem jogos para exibir.';
        return;
    }

    const mk        = RK_MERCADOS[rkMercado] || RK_MERCADOS.over25;
    const nTotal    = pontos.length;
    const maxInicio = Math.max(0, nTotal - rkJanela);
    if (_rkInicioVis === Infinity || _rkInicioVis >= _rkLastMaxInicio) {
        _rkInicioVis = maxInicio;
    }
    _rkInicioVis      = Math.min(Math.max(0, _rkInicioVis), maxInicio);
    _rkLastMaxInicio  = maxInicio;

    if (scroll) {
        scroll.min      = '0';
        scroll.max      = String(maxInicio);
        scroll.value    = String(_rkInicioVis);
        scroll.disabled = maxInicio <= 0;
    }

    const xMin = _rkInicioVis;
    const xMax = Math.min(nTotal - 1, xMin + rkJanela - 1);

    if (info) info.textContent = `Exibindo ${xMin + 1}–${xMax + 1} de ${nTotal} jogos`;

    const ptColors = direcoes.map(d => d > 0 ? mk.cor : mk.corN);
    const segColor = ctx => ctx.p1.parsed.y >= ctx.p0.parsed.y ? mk.cor : mk.corN;

    if (_rkChart) {
        const ds = _rkChart.data.datasets[0];
        _rkChart.data.labels    = labels;
        ds.data                 = pontos;
        ds._direcoes            = direcoes;
        ds._placares            = placares;
        ds.pointBackgroundColor = ptColors;
        ds.segment.borderColor  = segColor;
        _rkChart.options.scales.x.min = xMin;
        _rkChart.options.scales.x.max = xMax;
        _rkChart.options.plugins.rkLinhaAtual.enabled = rkLinhaAtual;
        _rkChart.update('none');
        _rkBuildSummary(wins, total, mk, pontos);
        _rkBuildAcumBadge(pontos, mk);
        return;
    }

    if (typeof Chart === 'undefined') {
        console.error('[Renko] Chart.js não encontrado.');
        return;
    }

    Chart.Tooltip.positioners.rkSmart = function(elements, eventPos) {
        if (!elements.length) return false;
        const chart = this.chart;
        const cw    = chart.width;
        const ch    = chart.height;
        const x     = eventPos.x;
        const y     = eventPos.y;
        const GAP   = 20;
        const goLeft = x > cw * 0.6;
        const tx = goLeft ? x - GAP : x + GAP;
        const goUp = y > ch * 0.55;
        const ty = goUp ? y - GAP : y + GAP;
        return {
            x: tx, y: ty,
            xAlign: goLeft ? 'right' : 'left',
            yAlign: goUp   ? 'bottom' : 'top',
        };
    };

    _rkChart = new Chart(canvas.getContext('2d'), {
        type: 'line',
        plugins: [rkLinhaAtualPlugin],
        data: {
            labels,
            datasets: [{
                label: mk.label,
                data: pontos,
                _direcoes: direcoes,
                _placares: placares,
                borderWidth: 2,
                pointRadius: 3,
                pointHoverRadius: 5,
                pointBorderWidth: 1,
                pointBorderColor: '#0c0c0d',
                pointBackgroundColor: ptColors,
                tension: 0,
                fill: false,
                segment: { borderColor: segColor }
            }]
        },
        options: {
            responsive: false,
            maintainAspectRatio: false,
            animation: false,
            layout: { padding: { left: 0, right: 36, top: 6, bottom: 0 } },
            plugins: {
                legend: { display: false },
                rkLinhaAtual: { enabled: rkLinhaAtual },
                tooltip: {
                    mode: 'nearest',
                    intersect: false,
                    position: 'rkSmart',
                    caretSize: 4,
                    caretPadding: 12,
                    backgroundColor: 'rgba(15,15,15,.97)',
                    borderColor: 'rgba(31,204,89,.35)',
                    borderWidth: 1,
                    titleColor: '#e0e8f0',
                    bodyColor: '#9ca3af',
                    titleFont: { family: 'monospace', size: 10 },
                    bodyFont:  { family: 'monospace', size: 10 },
                    padding: 10,
                    boxWidth: 10,
                    boxHeight: 10,
                    callbacks: {
                        label: ctx => {
                            const ds     = ctx.dataset;
                            const dir    = ds._direcoes?.[ctx.dataIndex];
                            const placar = ds._placares?.[ctx.dataIndex] || '';
                            const icon   = dir > 0 ? '✔' : '✖';
                            const nome   = dir > 0 ? mk.label : `Não ${mk.label}`;
                            const sinal  = ctx.parsed.y > 0 ? '+' : '';
                            return [
                                `${icon} ${nome}`,
                                `Acum ${sinal}${ctx.parsed.y}`,
                                `Placar ${placar}`,
                            ];
                        }
                    }
                }
            },
            scales: {
                x: {
                    min: xMin, max: xMax,
                    ticks: { color: '#4b5563', maxRotation: 0, autoSkip: true, font: { size: 8, family: 'monospace' } },
                    grid: { color: 'rgba(255,255,255,.06)' },
                    border: { color: 'transparent' }
                },
                y: {
                    ticks: { color: '#4b5563', stepSize: 1, font: { size: 8, family: 'monospace' } },
                    grid: { color: 'rgba(255,255,255,.06)' },
                    border: { color: 'transparent' }
                }
            }
        }
    });

    window._rkChart = _rkChart;
    _rkBuildSummary(wins, total, mk, pontos);
    _rkBuildAcumBadge(pontos, mk);
}

/* ── BADGE ACUMULADO ── */
function _rkBuildAcumBadge(pontos, mk) {
    const div = document.getElementById('rkAcumBadge');
    if (!div || !pontos.length) return;
    const acum  = pontos[pontos.length - 1];
    const cor   = acum >= 0 ? mk.cor : mk.corN;
    const sinal = acum > 0 ? '+' : '';
    div.innerHTML = `<span class="rk-acum-badge" style="color:${cor};border-color:${cor}44;background:${cor}14">${sinal}${acum}</span>`;
}

/* ── PILLS DE RESUMO ── */
function _rkBuildSummary(wins, total, mk, pontos) {
    const div = document.getElementById('rkSummary');
    if (!div) return;

    const losses = total - wins;
    const pct    = total ? ((wins / total) * 100).toFixed(1) : '0.0';
    const streak = _rkCalcStreak(pontos);

    div.innerHTML = `
        <span class="rk-pill" style="color:#1fcc59;border-color:#1fcc5935;background:#1fcc5912">✔ ${wins}</span>
        <span class="rk-pill" style="color:#ef4444;border-color:#ef444435;background:#ef444412">✖ ${losses}</span>
        <span class="rk-pill" style="color:#ffc83c;border-color:#ffc83c35;background:#ffc83c12">${pct}%</span>
        <span class="rk-pill" style="color:${mk.cor};border-color:${mk.cor}35;background:${mk.cor}0f">${total} jogos</span>
        ${streak.txt
            ? `<span class="rk-pill" style="color:${streak.cor};border-color:${streak.cor}35;background:${streak.cor}12">${streak.txt}</span>`
            : ''}
    `;
}

function _rkCalcStreak(pontos) {
    if (pontos.length < 2) return { txt: '', cor: '' };
    const last = pontos[pontos.length - 1] > pontos[pontos.length - 2] ? 1 : -1;
    let count = 1;
    for (let i = pontos.length - 2; i > 0; i--) {
        const dir = pontos[i] > pontos[i - 1] ? 1 : -1;
        if (dir === last) count++;
        else break;
    }
    if (count < 2) return { txt: '', cor: '' };
    const cor = last > 0 ? '#1fcc59' : '#ef4444';
    const txt = last > 0 ? `↑ Seq ${count}` : `↓ Seq ${count}`;
    return { txt, cor };
}

/* ── ALTURA ── */
function rkAplicarAltura() {
    const wrap = document.getElementById('rkCanvasWrap');
    const inp  = document.getElementById('rkAlturaInput');
    if (!wrap || !inp) return;
    const h = Math.min(600, Math.max(120, parseInt(inp.value || '240', 10)));
    inp.value         = String(h);
    rkAltura          = h;
    wrap.style.height = `${h}px`;
    rkSavePrefs();
    if (_rkChart?.resize) _rkChart.resize();
}

/* ── TROCA DE MERCADO ── */
function _rkDestroyChart() {
    if (_rkChart) {
        _rkChart.destroy();
        _rkChart = null;
        window._rkChart = null;
        _rkLastW = 0;
        _rkLastH = 0;
        const canvas = document.getElementById('rkCanvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }
}

function rkTrocarMercado(novoMkt) {
    if (!RK_MERCADOS[novoMkt]) return;
    rkMercado = novoMkt;
    _rkDestroyChart();
    document.querySelectorAll('.rk-mkt-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mkt === novoMkt);
    });
    rkAtualizarIdentidade();
    rkSavePrefs();
    rkRender();
}

/* ── FIT CANVAS ── */
let _rkLastW = 0, _rkLastH = 0;

function rkFitCanvas() {
    const wrap = document.getElementById('rkCanvasWrap');
    if (!wrap || !_rkChart) return;

    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    if (!w || !h) return;
    if (w === _rkLastW && h === _rkLastH) return;

    _rkLastW = w;
    _rkLastH = h;
    _rkChart.resize(w, h);
}

async function rkFetch() {
    if (!_rkTabVis || !LIGA_ATUAL) return;
    try {
        const res = await fetch(ROTAS_API.resultados(LIGA_ATUAL) + '?t=' + Date.now());
        if (!res.ok) throw new Error(res.status);
        _rkData = await res.json();
        rkRender();
    } catch(e) {
        console.error('[Renko]', e);
    }
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', () => {
    rkSyncUI();

    document.getElementById('rkMktGroup')?.addEventListener('click', e => {
        const btn = e.target.closest('.rk-mkt-btn');
        if (btn?.dataset.mkt) rkTrocarMercado(btn.dataset.mkt);
    });

    document.getElementById('rkSelJanela')?.addEventListener('change', e => {
        rkJanela = +e.target.value; rkSavePrefs(); rkRender();
    });

    document.getElementById('rkAlturaInput')?.addEventListener('change', rkAplicarAltura);
    document.getElementById('rkAlturaInput')?.addEventListener('input',  rkAplicarAltura);

    document.getElementById('rkAlturaMenos')?.addEventListener('click', () => {
        const inp = document.getElementById('rkAlturaInput');
        if (!inp) return;
        inp.value = String(Math.max(120, (parseInt(inp.value || '240', 10) || 240) - 10));
        rkAplicarAltura();
    });
    document.getElementById('rkAlturaMais')?.addEventListener('click', () => {
        const inp = document.getElementById('rkAlturaInput');
        if (!inp) return;
        inp.value = String(Math.min(600, (parseInt(inp.value || '240', 10) || 240) + 10));
        rkAplicarAltura();
    });

    document.getElementById('rkScroll')?.addEventListener('input', e => {
        _rkInicioVis = parseInt(e.target.value || '0', 10);
        rkRender();
    });

    document.getElementById('rkLinhaAtualToggle')?.addEventListener('change', e => {
        rkLinhaAtual = e.target.checked;
        if (_rkChart) {
            _rkChart.options.plugins.rkLinhaAtual.enabled = rkLinhaAtual;
            _rkChart.update('active');
        }
        rkSavePrefs();
    });

    window.addEventListener('resize', rkFitCanvas);

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden && _rkChart) {
            requestAnimationFrame(() => requestAnimationFrame(() => {
                rkFitCanvas();
                rkRender();
            }));
        }
    });

    setInterval(rkFitCanvas, 2000);

    rkFetch();
    setInterval(rkFetch, 3000);
});
</script>
