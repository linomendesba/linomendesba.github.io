    const STORAGE_PREFIX = "caramelo:grafico:tools:v2:";

    function core() {
        return window.GraficoTradingCore;
    }

    function chart() {
        return core()?.getChart?.() || null;
    }

    function activeMarket() {
        return core()?.getActiveMarket?.() || "over25";
    }

    function marketColor() {
        return core()?.getMarketColor?.(activeMarket()) || "#60a5fa";
    }

    function ligaKey() {
        return (
            sessionStorage.getItem("ligaAtual") ||
            String(sessionStorage.getItem("datasetPath") || "copa")
                .split("/")
                .pop()
                .replace(".json", "")
                .toLowerCase() ||
            "copa"
        );
    }

    function storageKey() {
        return STORAGE_PREFIX + ligaKey();
    }

    function loadObjects() {
        currentLigaKey = ligaKey();

        try {
            const raw = localStorage.getItem(storageKey());
            const arr = raw ? JSON.parse(raw) : [];
            objects = Array.isArray(arr) ? arr : [];
        } catch {
            objects = [];
        }

        selectedId = null;
        drawSoon();
    }

    function reloadIfLigaChanged() {
        if (currentLigaKey !== ligaKey()) loadObjects();
    }

    function saveObjects() {
        try {
            localStorage.setItem(storageKey(), JSON.stringify(objects));
        } catch { }
    }

    function ensureOverlay() {
        const container = document.getElementById("graficoTradingContainer");
        if (!container) return;

        if (!overlay) {
            host = container.parentElement || container;
            host.style.position = "relative";

            overlay = document.createElement("canvas");
            overlay.id = "gtOverlayCanvas";

            host.appendChild(overlay);
            ctx = overlay.getContext("2d", { alpha: true });

            overlay.addEventListener("pointerdown", onPointerDown);
            overlay.addEventListener("pointermove", onPointerMove);
            overlay.addEventListener("pointerup", onPointerUp);
            overlay.addEventListener("pointercancel", cancelAction);
            overlay.addEventListener("dblclick", onDoubleClick);

            window.addEventListener("keydown", onKeyDown);
            window.addEventListener("resize", resizeOverlay);
        }

        resizeOverlay();
        if (!currentLigaKey) loadObjects();
        setTool(activeTool);
    }

    function resizeOverlay() {
        if (!overlay) return;

        const container = document.getElementById("graficoTradingContainer");
        if (!container) return;

        const rect = container.getBoundingClientRect();
        dpr = window.devicePixelRatio || 1;

        overlay.width = Math.max(1, Math.floor(rect.width * dpr));
        overlay.height = Math.max(1, Math.floor(rect.height * dpr));
        overlay.style.width = rect.width + "px";
        overlay.style.height = rect.height + "px";

        ctx = overlay.getContext("2d", { alpha: true });
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        drawSoon();
    }

    function onOpen() {
        ensureOverlay();
        resizeOverlay();
        reloadIfLigaChanged();
        drawSoon();
    }

    function getPoint(e) {
        const rect = overlay.getBoundingClientRect();
        return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
        };
    }

    function xFromLogical(x) {
        const v = chart()?.timeScale()?.logicalToCoordinate?.(x);
        return Number.isFinite(v) ? v : null;
    }

    function logicalFromX(x) {
        const v = chart()?.timeScale()?.coordinateToLogical?.(x);
        return Number.isFinite(v) ? v : null;
    }

    function getPriceSeries() {
        const key = activeMarket();
        return core()?.getSeries?.()?.[key] || null;
    }

    function yFromPrice(y) {
        const s = getPriceSeries();
        const v = s?.priceToCoordinate?.(y);
        return Number.isFinite(v) ? v : null;
    }

    function priceFromY(y) {
        const s = getPriceSeries();
        const v = s?.coordinateToPrice?.(y);
        return Number.isFinite(v) ? v : null;
    }

    function addObject(obj) {
        const item = {
            id: "gt_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 7),
            market: activeMarket(),
            color: marketColor(),
            ...obj
        };

        objects.push(item);
        selectedId = item.id;

        saveObjects();
        drawSoon();
    }

    function addCurrentLine() {
        ensureOverlay();

        const value = core()?.getLastValue?.(activeMarket());
        if (!Number.isFinite(value)) return;

        addObject({
            type: "hline",
            y: value,
            color: marketColor()
        });
    }

    function deleteSelected() {
        if (!selectedId) return;

        objects = objects.filter((o) => o.id !== selectedId);
        selectedId = null;

        saveObjects();
        drawSoon();
    }

    function clearAll() {
        objects = [];
        selectedId = null;
        saveObjects();
        drawSoon();
    }

    function dispatchToolChange() {
        window.dispatchEvent(new CustomEvent("gt:toolchange", {
            detail: { tool: activeTool }
        }));
    }

   function setTool(tool) {
    activeTool = tool || "select";
    draft = null;
    pointerDown = false;

    if (!overlay) {
        dispatchToolChange();
        return;
    }

    const captureTools = ["line", "vertical", "trend", "zone", "text", "delete"];
    const shouldCapture = captureTools.includes(activeTool);

    overlay.style.pointerEvents = shouldCapture ? "auto" : "none";

    overlay.style.cursor =
        activeTool === "select" ? "default" :
        activeTool === "delete" ? "not-allowed" :
        activeTool === "text" ? "text" :
        "crosshair";

    dispatchToolChange();
    drawSoon();
}

    function onPointerDown(e) {
        if (!overlay) return;

        const p = getPoint(e);
        pointerDown = true;

        try {
            overlay.setPointerCapture(e.pointerId);
        } catch { }

        if (activeTool === "select") {
            const hit = hitTest(p);

            if (hit) {
                selectedId = hit.id;
            } else {
                selectedId = null;
            }

            drawSoon();
            return;
        }

        if (activeTool === "line") {
            const y = priceFromY(p.y);
            if (Number.isFinite(y)) addObject({ type: "hline", y });
            setTool("select");
            return;
        }

        if (activeTool === "vertical") {
            const x = logicalFromX(p.x);
            if (Number.isFinite(x)) addObject({ type: "vline", x });
            setTool("select");
            return;
        }

        if (activeTool === "trend") {
            draft = {
                type: "trend",
                x1: logicalFromX(p.x),
                y1: priceFromY(p.y),
                x2: logicalFromX(p.x),
                y2: priceFromY(p.y),
                color: marketColor()
            };
            drawSoon();
            return;
        }

        if (activeTool === "zone") {
            draft = {
                type: "zone",
                x1: logicalFromX(p.x),
                y1: priceFromY(p.y),
                x2: logicalFromX(p.x),
                y2: priceFromY(p.y),
                color: marketColor()
            };
            drawSoon();
            return;
        }

        if (activeTool === "text") {
            openTextEditor(p);
            return;
        }

        if (activeTool === "delete") {
            const hit = hitTest(p);
            if (hit) {
                selectedId = hit.id;
                deleteSelected();
            }
            setTool("select");
        }
    }

    function onPointerMove(e) {
        if (!pointerDown || !draft) return;

        const p = getPoint(e);

        if (draft.type === "trend" || draft.type === "zone") {
            draft.x2 = logicalFromX(p.x);
            draft.y2 = priceFromY(p.y);
            drawSoon();
        }
    }

    function onPointerUp(e) {
        pointerDown = false;

        try {
            overlay?.releasePointerCapture(e.pointerId);
        } catch { }

        if (draft?.type === "trend") {
            if (validDraft(draft)) {
                addObject({
                    type: "trend",
                    x1: draft.x1,
                    y1: draft.y1,
                    x2: draft.x2,
                    y2: draft.y2,
                    color: draft.color
                });
            }

            draft = null;
            setTool("select");
            return;
        }

        if (draft?.type === "zone") {
            if (validDraft(draft)) {
                addObject({
                    type: "zone",
                    x1: draft.x1,
                    y1: draft.y1,
                    x2: draft.x2,
                    y2: draft.y2,
                    color: draft.color
                });
            }

            draft = null;
            setTool("select");
        }
    }

    function cancelAction() {
        pointerDown = false;
        draft = null;
        drawSoon();
    }

    function onDoubleClick(e) {
        const hit = hitTest(getPoint(e));
        if (!hit || hit.type !== "text") return;
        openTextEditor(getPoint(e), hit);
    }

    function onKeyDown(e) {
        if ((e.key === "Delete" || e.key === "Backspace") && selectedId) {
            deleteSelected();
        }

        if (e.key === "Escape") {
            selectedId = null;
            draft = null;
            setTool("select");
            drawSoon();
        }
    }

    function openTextEditor(point, existing = null) {
        if (!host) return;

        const input = document.createElement("input");
        input.type = "text";
        input.value = existing?.text || "";
        input.placeholder = "Texto";
        input.className = "gt-text-editor";
        input.style.left = Math.max(8, point.x) + "px";
        input.style.top = Math.max(8, point.y) + "px";

        host.appendChild(input);
        input.focus();
        input.select();

        function commit() {
            const text = input.value.trim();
            input.remove();

            if (!text) {
                setTool("select");
                return;
            }

            if (existing) {
                existing.text = text;
                saveObjects();
                drawSoon();
            } else {
                const x = logicalFromX(point.x);
                const y = priceFromY(point.y);

                if (Number.isFinite(x) && Number.isFinite(y)) {
                    addObject({ type: "text", x, y, text });
                }
            }

            setTool("select");
        }

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") commit();

            if (e.key === "Escape") {
                input.remove();
                setTool("select");
            }
        });

        input.addEventListener("blur", commit, { once: true });
    }

    function validDraft(d) {
        return (
            [d.x1, d.y1, d.x2, d.y2].every(Number.isFinite) &&
            (Math.abs(d.x2 - d.x1) > 0.15 || Math.abs(d.y2 - d.y1) > 0.15)
        );
    }

    function drawSoon() {
        if (raf) return;

        raf = requestAnimationFrame(() => {
            raf = 0;
            draw();
        });
    }

    function draw() {
        if (!ctx || !overlay) return;

        const rect = overlay.getBoundingClientRect();
        ctx.clearRect(0, 0, rect.width, rect.height);

        objects.forEach((obj) => {
            drawObject(obj, obj.id === selectedId);
        });

        if (draft) drawObject(draft, true, true);
    }

    function drawObject(obj, selected = false, preview = false) {
        const color = obj.color || marketColor();

        ctx.save();
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = selected ? 2 : 1.15;
        ctx.setLineDash(preview ? [4, 4] : selected ? [5, 3] : []);

        if (obj.type === "hline") {
            const y = yFromPrice(obj.y);
            if (Number.isFinite(y)) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(overlay.width / dpr, y);
                ctx.stroke();
            }
        }

        if (obj.type === "vline") {
            const x = xFromLogical(obj.x);
            if (Number.isFinite(x)) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, overlay.height / dpr);
                ctx.stroke();
            }
        }

        if (obj.type === "trend") {
            const x1 = xFromLogical(obj.x1);
            const y1 = yFromPrice(obj.y1);
            const x2 = xFromLogical(obj.x2);
            const y2 = yFromPrice(obj.y2);

            if ([x1, y1, x2, y2].every(Number.isFinite)) {
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        if (obj.type === "zone") {
            const x1 = xFromLogical(obj.x1);
            const y1 = yFromPrice(obj.y1);
            const x2 = xFromLogical(obj.x2);
            const y2 = yFromPrice(obj.y2);

            if ([x1, y1, x2, y2].every(Number.isFinite)) {
                const left = Math.min(x1, x2);
                const top = Math.min(y1, y2);
                const w = Math.abs(x2 - x1);
                const h = Math.abs(y2 - y1);

                ctx.fillStyle = hexToRgba(color, 0.13);
                ctx.fillRect(left, top, w, h);
                ctx.strokeRect(left, top, w, h);
            }
        }

        if (obj.type === "text") {
            const x = xFromLogical(obj.x);
            const y = yFromPrice(obj.y);

            if ([x, y].every(Number.isFinite)) {
                ctx.setLineDash([]);
                ctx.font = selected
                    ? "900 13px system-ui, Segoe UI, sans-serif"
                    : "800 12px system-ui, Segoe UI, sans-serif";
                ctx.textBaseline = "middle";
                ctx.fillText(obj.text || "Texto", x, y);
            }
        }

        ctx.restore();
    }

    function hitTest(p) {
        for (let i = objects.length - 1; i >= 0; i--) {
            const obj = objects[i];

            if (obj.type === "hline") {
                const y = yFromPrice(obj.y);
                if (Number.isFinite(y) && Math.abs(p.y - y) <= 8) return obj;
            }

            if (obj.type === "vline") {
                const x = xFromLogical(obj.x);
                if (Number.isFinite(x) && Math.abs(p.x - x) <= 8) return obj;
            }

            if (obj.type === "trend") {
                if (pointNearSegment(p, obj)) return obj;
            }

            if (obj.type === "zone") {
                if (pointInZone(p, obj)) return obj;
            }

            if (obj.type === "text") {
                const x = xFromLogical(obj.x);
                const y = yFromPrice(obj.y);

                if (
                    Number.isFinite(x) &&
                    Number.isFinite(y) &&
                    Math.abs(p.x - x) <= 80 &&
                    Math.abs(p.y - y) <= 18
                ) {
                    return obj;
                }
            }
        }

        return null;
    }

    function pointNearSegment(p, obj) {
        const x1 = xFromLogical(obj.x1);
        const y1 = yFromPrice(obj.y1);
        const x2 = xFromLogical(obj.x2);
        const y2 = yFromPrice(obj.y2);

        if (![x1, y1, x2, y2].every(Number.isFinite)) return false;

        const dx = x2 - x1;
        const dy = y2 - y1;
        const len2 = dx * dx + dy * dy;

        if (!len2) return Math.hypot(p.x - x1, p.y - y1) <= 8;

        let t = ((p.x - x1) * dx + (p.y - y1) * dy) / len2;
        t = Math.max(0, Math.min(1, t));

        const px = x1 + t * dx;
        const py = y1 + t * dy;

        return Math.hypot(p.x - px, p.y - py) <= 8;
    }

    function pointInZone(p, obj) {
        const x1 = xFromLogical(obj.x1);
        const y1 = yFromPrice(obj.y1);
        const x2 = xFromLogical(obj.x2);
        const y2 = yFromPrice(obj.y2);

        if (![x1, y1, x2, y2].every(Number.isFinite)) return false;

        const left = Math.min(x1, x2);
        const right = Math.max(x1, x2);
        const top = Math.min(y1, y2);
        const bottom = Math.max(y1, y2);

        return p.x >= left && p.x <= right && p.y >= top && p.y <= bottom;
    }

    function hexToRgba(hex, alpha = 1) {
        const clean = String(hex || "#60a5fa").replace("#", "");
        const full = clean.length === 3
            ? clean.split("").map((c) => c + c).join("")
            : clean;

        const num = parseInt(full, 16);
        const r = (num >> 16) & 255;
        const g = (num >> 8) & 255;
        const b = num & 255;

        return `rgba(${r},${g},${b},${alpha})`;
    }

    document.addEventListener("DOMContentLoaded", () => {
        ensureOverlay();

        document.getElementById("btnGraficoDelete")?.addEventListener("click", (e) => {
            if (selectedId) {
                deleteSelected();
                return;
            }

            if (e.shiftKey) clearAll();
        });
    });

    window.GraficoTradingTools = {
        setTool,
        redraw: drawSoon,
        resize: resizeOverlay,
        reload: loadObjects,
        reloadIfLigaChanged,
        clearAll,
        onOpen,
        addCurrentLine
    };
})();
</script>

<script>
(function () {
    "use strict";

    let chart = null;
    let visibleRange = null;
    let dotsMode = false;
    let candleMode = false;

    const series = {};
    const candleSeries = {};

    const mercados = {
        over25: { nome: "Over 2.5", cor: "#1fcc59", dir: 1, ativo: true },
        under25: { nome: "Under 2.5", cor: "#ef4444", dir: -1, ativo: false },
        ambasS: { nome: "Ambas S", cor: "#38bdf8", dir: 1, ativo: false },
        ambasN: { nome: "Ambas N", cor: "#f59e0b", dir: -1, ativo: false },
        empateHT: { nome: "Empate HT", cor: "#a855f7", dir: 1, ativo: false }
    };

    let pontosAtuais = [];
    let dataPorMercado = {};
    let candlePorMercado = {};
    let ultimoValorPorMercado = {};

    const $ = (id) => document.getElementById(id);

    const GT_STATE_KEY = "caramelo:grafico:estado:v1";

    function saveGraficoState() {
        try {
            const range = chart?.timeScale?.().getVisibleLogicalRange?.() || visibleRange;

            localStorage.setItem(GT_STATE_KEY, JSON.stringify({
                open: !$("graficoTradingPanel")?.classList.contains("hidden"),
                range,
                dotsMode,
                candleMode,
                mercados: Object.fromEntries(
                    Object.entries(mercados).map(([k, v]) => [k, !!v.ativo])
                )
            }));
        } catch { }
    }

    function loadGraficoState() {
        try {
            const raw = localStorage.getItem(GT_STATE_KEY);
            return raw ? JSON.parse(raw) : null;
        } catch {
            return null;
        }
    }

    function applySavedGraficoState() {
        const st = loadGraficoState();
        if (!st) return;

        dotsMode = !!st.dotsMode;
        candleMode = !!st.candleMode;

        if (st.mercados && typeof st.mercados === "object") {
            Object.keys(mercados).forEach((key) => {
                if (key in st.mercados) mercados[key].ativo = !!st.mercados[key];
            });
        }

        if (st.range && Number.isFinite(st.range.from) && Number.isFinite(st.range.to)) {
            visibleRange = st.range;
        }

        $("btnGraficoDots")?.classList.toggle("active", dotsMode);
        $("btnGraficoCandle")?.classList.toggle("active", candleMode);
    }

    function getJson() {
        if (window.LOADED_JSON?.table?.rows) return window.LOADED_JSON;
        if (typeof LOADED_JSON !== "undefined" && LOADED_JSON?.table?.rows) return LOADED_JSON;
        return null;
    }

    function parseJogo(raw) {
        if (typeof window.parseRawCell === "function") {
            const p = window.parseRawCell(raw);
            if (p?.ft && Number.isFinite(p.ft.sum)) {
                return {
                    title: p.title || "",
                    ftRaw: p.ftRaw || "",
                    htRaw: p.htRaw || "",
                    ftHome: p.ft.home,
                    ftAway: p.ft.away,
                    ftSum: p.ft.sum,
                    htHome: p.ht?.home ?? null,
                    htAway: p.ht?.away ?? null,
                    htSum: p.ht?.sum ?? null,
                    htHasOut: !!p.ht?.hasOut
                };
            }
        }

        const text = String(raw || "");
        const m = text.match(/(\d+)\+?\s*-\s*(\d+)\+?/);
        if (!m) return null;

        const casa = parseInt(m[1], 10);
        const fora = parseInt(m[2], 10);
        if (!Number.isFinite(casa) || !Number.isFinite(fora)) return null;

        return {
            title: text.split("\n")[0] || "",
            ftRaw: `${casa}-${fora}`,
            htRaw: "",
            ftHome: casa,
            ftAway: fora,
            ftSum: casa + fora,
            htHome: null,
            htAway: null,
            htSum: null,
            htHasOut: false
        };
    }

    function bateMercado(jogo, key) {
        if (!jogo) return false;

        switch (key) {
            case "over25": return jogo.ftSum > 2.5;
            case "under25": return jogo.ftSum < 2.5;
            case "ambasS": return jogo.ftHome > 0 && jogo.ftAway > 0;
            case "ambasN": return !(jogo.ftHome > 0 && jogo.ftAway > 0);
            case "empateHT":
                return jogo.htHome !== null &&
                    jogo.htAway !== null &&
                    !jogo.htHasOut &&
                    jogo.htHome === jogo.htAway;
            default:
                return false;
        }
    }

    function direcaoMercado(jogo, key) {
        const hit = bateMercado(jogo, key);
        return hit ? 1 : -1;
    }

    function getMinuteSeqForDataset(path) {
        const p = String(path || "").toLowerCase();
        if (p.includes("copa") || p.includes("super")) return (i) => 1 + 3 * i;
        if (p.includes("euro")) return (i) => 2 + 3 * i;
        if (p.includes("premier")) return (i) => 0 + 3 * i;
        return null;
    }

    function getDatasetPath() {
        return sessionStorage.getItem("datasetPath") ||
            sessionStorage.getItem("ligaSelecionada") ||
            "./final/copa.json";
    }

    function buildLabelTempo(hora, colIndex) {
        const seqFn = getMinuteSeqForDataset(getDatasetPath());
        const h = String(hora || "").padStart(2, "0");
        if (!seqFn) return h;

        const minuto = seqFn(colIndex - 1);
        return `${h}:${String(minuto).padStart(2, "0")}`;
    }

    function parseOddsFromRaw(raw) {
        const text = String(raw || "");
        const odds = {};
        const re = /([a-z]{1,6}\d*)@(\d+(?:[.,]\d+)?)/gi;

        let m;
        while ((m = re.exec(text)) !== null) {
            odds[String(m[1]).toLowerCase()] = String(m[2]).replace(",", ".");
        }

        return odds;
    }

    function marketToOddKey(key) {
        const map = {
            over25: "o25",
            under25: "u25",
            ambasS: "ambs",
            ambasN: "ambn",
            empateHT: "hte"
        };

        return map[key] || "";
    }

    function buildSeriesData(json) {
        const rows = json?.table?.rows || [];
        const acumulado = {};
        const data = {};
        const candles = {};
        const basePontos = {};

        Object.keys(mercados).forEach((key) => {
            acumulado[key] = 0;
            data[key] = [];
            candles[key] = [];
            ultimoValorPorMercado[key] = 0;
        });

        let index = 1;
        const rowsCronologicas = rows.slice().reverse();

        for (const row of rowsCronologicas) {
            const cells = row?.c || [];
            const hora = String(cells[0]?.v || "").padStart(2, "0");

            for (let c = 1; c < cells.length; c++) {
                const raw = cells[c]?.v;
                if (!raw) continue;

                const jogo = parseJogo(raw);
                if (!jogo) continue;

                basePontos[index] = {
                    labelTempo: buildLabelTempo(hora, c),
                    jogo: jogo.title,
                    ft: jogo.ftRaw,
                    ht: jogo.htRaw,
                    odds: parseOddsFromRaw(raw)
                };

                Object.keys(mercados).forEach((key) => {
                    const dir = direcaoMercado(jogo, key);
                    const open = acumulado[key];
                    const close = open + dir;

                    acumulado[key] = close;
                    ultimoValorPorMercado[key] = close;

                    data[key].push({ time: index, value: close });

                    candles[key].push({
                        time: index,
                        open,
                        high: Math.max(open, close),
                        low: Math.min(open, close),
                        close
                    });
                });

                index++;
            }
        }

        pontosAtuais = basePontos;
        dataPorMercado = data;
        candlePorMercado = candles;
    }

    function addLineSeries(key, cfg) {
        const options = {
            color: cfg.cor,
            lineWidth: key === "over25" ? 2 : 1.8,
            priceLineVisible: false,
            lastValueVisible: false,
            crosshairMarkerVisible: true,
            crosshairMarkerRadius: 4,
            pointMarkersVisible: true
        };

        if (chart.addSeries && window.LightweightCharts.LineSeries) {
            return chart.addSeries(window.LightweightCharts.LineSeries, options);
        }

        return chart.addLineSeries(options);
    }

    function addCandleSeries(key, cfg) {
        const options = {
            upColor: cfg.cor,
            downColor: "#ef4444",
            borderUpColor: cfg.cor,
            borderDownColor: "#ef4444",
            wickUpColor: cfg.cor,
            wickDownColor: "#ef4444",
            priceLineVisible: false,
            lastValueVisible: false
        };

        if (chart.addSeries && window.LightweightCharts.CandlestickSeries) {
            return chart.addSeries(window.LightweightCharts.CandlestickSeries, options);
        }

        return chart.addCandlestickSeries(options);
    }

    function createChart() {
        const el = $("graficoTradingContainer");
        if (!el || !window.LightweightCharts) return false;
        if (chart) return true;

        chart = window.LightweightCharts.createChart(el, {
            layout: {
                background: { color: "#111318" },
                textColor: "#cbd5e1"
            },
            localization: {
                timeFormatter: (time) => pontosAtuais[time]?.labelTempo || String(time)
            },
            grid: {
                vertLines: { color: "rgba(255,255,255,.045)" },
                horzLines: { color: "rgba(255,255,255,.045)" }
            },
            rightPriceScale: { borderVisible: false },
            timeScale: {
                borderColor: "rgba(31,204,89,.25)",
                timeVisible: false,
                secondsVisible: false,
                rightOffset: 1,
                barSpacing: 22,
                rightBarStaysOnScroll: true,
                tickMarkFormatter: (time) => pontosAtuais[time]?.labelTempo || ""
            },
            crosshair: {
                mode: window.LightweightCharts.CrosshairMode.Normal
            },
            handleScroll: {
                mouseWheel: true,
                pressedMouseMove: true,
                horzTouchDrag: true,
                vertTouchDrag: false
            },
            handleScale: {
                axisPressedMouseMove: true,
                mouseWheel: true,
                pinch: true
            }
        });

        Object.entries(mercados).forEach(([key, cfg]) => {
            series[key] = addLineSeries(key, cfg);
            candleSeries[key] = addCandleSeries(key, cfg);
        });

        chart.timeScale().subscribeVisibleLogicalRangeChange((range) => {
            if (range) {
                visibleRange = range;
                saveGraficoState();
            }

            window.GraficoTradingTools?.redraw?.();
        });

        chart.subscribeCrosshairMove((param) => {
            renderGraficoTooltip(param);
        });

        return true;
    }

    function renderSeries() {
        Object.keys(mercados).forEach((key) => {
            const ativo = !!mercados[key].ativo;

            if (candleMode) {
                series[key]?.setData([]);
                candleSeries[key]?.setData(ativo ? candlePorMercado[key] || [] : []);
            } else {
                candleSeries[key]?.setData([]);
                series[key]?.setData(ativo ? dataPorMercado[key] || [] : []);
            }

            series[key]?.applyOptions({
                color: dotsMode && !candleMode ? "rgba(31,204,89,0.08)" : mercados[key].cor,
                lineWidth: dotsMode && !candleMode ? 1 : key === "over25" ? 2 : 1.8,
                crosshairMarkerVisible: true,
                crosshairMarkerRadius: dotsMode ? 5 : 4
            });
        });
    }

    function resizeChart() {
        const el = $("graficoTradingContainer");
        if (!chart || !el) return;

        const rect = el.getBoundingClientRect();
        chart.applyOptions({
            width: Math.floor(rect.width),
            height: Math.floor(rect.height)
        });

        window.GraficoTradingTools?.resize?.();
        window.GraficoTradingTools?.redraw?.();
    }

    function renderGraficoTrading() {
        const panel = $("graficoTradingPanel");
        if (!panel || panel.classList.contains("hidden")) return;

        const json = getJson();
        if (!json?.table?.rows) return;

        if (!createChart()) return;

        const beforeRange = chart.timeScale().getVisibleLogicalRange();

        buildSeriesData(json);
        renderSeries();

        if (beforeRange) chart.timeScale().setVisibleLogicalRange(beforeRange);
        else if (visibleRange) chart.timeScale().setVisibleLogicalRange(visibleRange);
        else chart.timeScale().scrollToRealTime();
        saveGraficoState();

        requestAnimationFrame(() => {
            resizeChart();
            window.GraficoTradingTools?.reloadIfLigaChanged?.();
            window.GraficoTradingTools?.redraw?.();
        });
    }

    function openGraficoTrading() {
        const panel = $("graficoTradingPanel");
        const btn = $("btnModoGrafico");
        if (!panel) return;

        panel.classList.remove("hidden");
        btn?.classList.add("grafico-ativo");
        saveGraficoState();

        requestAnimationFrame(() => {
            createChart();
            resizeChart();
            window.GraficoTradingTools?.onOpen?.();
            renderGraficoTrading();
        });
    }

    function closeGraficoTrading() {
        $("graficoTradingPanel")?.classList.add("hidden");
        $("btnModoGrafico")?.classList.remove("grafico-ativo");
        saveGraficoState();
    }

    function toggleGraficoTrading() {
        const panel = $("graficoTradingPanel");
        if (!panel) return;

        if (panel.classList.contains("hidden")) openGraficoTrading();
        else closeGraficoTrading();
    }

    function syncLegendUI() {
        document.querySelectorAll("[data-gt-market]").forEach((btn) => {
            const key = btn.dataset.gtMarket;
            btn.classList.toggle("selected", !!mercados[key]?.ativo);
        });
    }

    function syncToolUI(tool) {
        document.querySelectorAll("[data-gt-tool]").forEach((btn) => {
            btn.classList.toggle("active", btn.dataset.gtTool === tool);
        });
    }

    function setActiveTool(tool) {
        const next = tool || "select";
        syncToolUI(next);
        window.GraficoTradingTools?.setTool?.(next);
    }


    function zoomGrafico(factor) {
        if (!chart) return;

        const timeScale = chart.timeScale();
        const range = timeScale.getVisibleLogicalRange();

        if (!range) return;

        const center = (range.from + range.to) / 2;
        const width = (range.to - range.from) * factor;

        timeScale.setVisibleLogicalRange({
            from: center - width / 2,
            to: center + width / 2
        });

        window.GraficoTradingTools?.redraw?.();
    }
    function getTooltipEl() {
    let el = document.getElementById("gtTooltip");

    if (!el) {
        el = document.createElement("div");
        el.id = "gtTooltip";
        el.className = "gt-tooltip";
        document.getElementById("graficoTradingContainer")?.appendChild(el);
    }

    return el;
}

function renderGraficoTooltip(param) {
    const el = getTooltipEl();
    const container = $("graficoTradingContainer");

    if (!param || !param.point || !container || param.time == null) {
        el.style.display = "none";
        return;
    }

    const info = pontosAtuais[param.time];
    if (!info) {
        el.style.display = "none";
        return;
    }

    const active = window.GraficoTradingCore?.getActiveMarket?.() || "over25";
    const oddKey = marketToOddKey(active);
    const odd = info.odds?.[oddKey] || "-";

    const times = String(info.jogo || "").replace(/\s+x\s+/i, " x ");
    const ft = info.ft || "-";
    const ht = info.ht || "-";

    el.innerHTML = `
        <div class="gt-tooltip-title">${times.replace(" x ", ` ${ft.replace("-", " x ")} `)}</div>
        <div class="gt-tooltip-sub">HT: ${ht || "-"}</div>
        <div class="gt-tooltip-odd">Odd ${oddKey.toUpperCase() || "Mercado"}: ${odd}</div>
        <div class="gt-tooltip-time">${info.labelTempo || ""}</div>
    `;

    const rect = container.getBoundingClientRect();
    const tooltipW = 230;
    const tooltipH = 92;

    let left = param.point.x + 14;
    let top = param.point.y + 14;

    if (left + tooltipW > rect.width) left = param.point.x - tooltipW - 14;
    if (top + tooltipH > rect.height) top = param.point.y - tooltipH - 14;

    el.style.left = `${Math.max(8, left)}px`;
    el.style.top = `${Math.max(8, top)}px`;
    el.style.display = "block";
}
    function bindEvents() {
        $("btnModoGrafico")?.addEventListener("click", toggleGraficoTrading);
        $("btnGraficoClose")?.addEventListener("click", closeGraficoTrading);

        $("btnGraficoZoomIn")?.addEventListener("click", () => {
            zoomGrafico(0.78);
        });

        $("btnGraficoZoomOut")?.addEventListener("click", () => {
            zoomGrafico(1.28);
        });

        $("btnGraficoDots")?.addEventListener("click", () => {
            dotsMode = !dotsMode;
            if (dotsMode) candleMode = false;

            $("btnGraficoDots")?.classList.toggle("active", dotsMode);
            $("btnGraficoCandle")?.classList.toggle("active", candleMode);

            renderGraficoTrading();
        });

        $("btnGraficoCandle")?.addEventListener("click", () => {
            candleMode = !candleMode;
            if (candleMode) dotsMode = false;

            $("btnGraficoCandle")?.classList.toggle("active", candleMode);
            $("btnGraficoDots")?.classList.toggle("active", dotsMode);

            renderGraficoTrading();
        });

        $("btnGraficoCurrentLine")?.addEventListener("click", () => {
            window.GraficoTradingTools?.addCurrentLine?.();
        });

        document.querySelectorAll("[data-gt-market]").forEach((btn) => {
            btn.addEventListener("click", () => {
                const key = btn.dataset.gtMarket;
                if (!mercados[key]) return;

                mercados[key].ativo = !mercados[key].ativo;
                syncLegendUI();
                saveGraficoState();
                renderGraficoTrading();
            });
        });

        document.querySelectorAll("[data-gt-tool]").forEach((btn) => {
            btn.addEventListener("click", () => {
                setActiveTool(btn.dataset.gtTool || "select");
            });
        });

        window.addEventListener("resize", resizeChart);

        window.addEventListener("gt:toolchange", (ev) => {
            syncToolUI(ev.detail?.tool || "select");
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        applySavedGraficoState();
        bindEvents();
        syncLegendUI();

        const st = loadGraficoState();
        if (st?.open) {
            requestAnimationFrame(() => {
                openGraficoTrading();
            });
        }
    });

    window.renderGraficoTrading = renderGraficoTrading;
    window.openGraficoTrading = openGraficoTrading;
    window.closeGraficoTrading = closeGraficoTrading;

    window.GraficoTradingCore = {
        getChart: () => chart,
        getSeries: () => series,
        getCandleSeries: () => candleSeries,
        getActiveMarket: () => Object.keys(mercados).find((k) => mercados[k].ativo) || "over25",
        getMarketColor: (key) => mercados[key]?.cor || "#60a5fa",
        getLastValue: (key) => ultimoValorPorMercado[key || Object.keys(mercados).find((k) => mercados[k].ativo) || "over25"] ?? 0,
        redrawTools: () => window.GraficoTradingTools?.redraw?.()
    };
})();
</script>
