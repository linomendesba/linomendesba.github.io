  <style>
    :root {
      --bg:       #181b21;
      --panel:    #1e2129;
      --panel2:   #181b21;
      --line:     rgba(255,255,255,0.06);
      --line2:    rgba(255,255,255,0.10);
      --green:    #3ddc84;
      --green-bg: rgba(61,220,132,0.07);
      --green-bd: rgba(61,220,132,0.18);
      --red:      #ff6b6b;
      --red-bg:   rgba(255,107,107,0.07);
      --red-bd:   rgba(255,107,107,0.18);
      --blue:     #60a5fa;
      --gold:     #f0b429;
      --t1:       #f0f2f5;
      --t2:       #a0a8b4;
      --t3:       #5a6272;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
    }

    /* ════ TOOLBAR ════ */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--panel2);
      border-bottom: 1px solid var(--line2);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .house-seg { display: flex; gap: 2px; }

    .ht {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--t2); background: transparent;
      border: 1px solid transparent; border-radius: 5px;
      padding: 5px 13px; cursor: pointer; transition: all 0.13s;
    }
    .ht:hover { color: var(--t1); background: rgba(255,255,255,0.04); }
    .ht.on { color: #181b21; background: #767e95; }

    .toolbar-sep { width: 1px; height: 22px; background: var(--line2); margin: 0 4px; }

    .t-label { font-size: 11px; font-weight: 500; color: var(--t2); white-space: nowrap; }

    .t-select {
      font-family: 'Roboto', sans-serif; font-size: 12px;
      background: var(--panel); border: 1px solid var(--line2);
      border-radius: 5px; color: var(--t1); padding: 5px 8px;
      cursor: pointer; outline: none;
    }
    .t-select:focus { border-color: var(--green-bd); }

    .t-btn {
      font-family: 'Roboto', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      background: var(--panel); border: 1px solid var(--line2);
      border-radius: 5px; color: var(--t1); padding: 5px 14px;
      cursor: pointer; transition: all 0.13s;
    }
    .t-btn:hover { border-color: var(--green-bd); color: var(--green); }

    /* ════ LEAGUE BAR ════ */
    #leagueBar {
      display: flex; flex-wrap: wrap; gap: 4px;
      padding: 8px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel2);

      letter-spacing: 0.04em; text-transform: uppercase;

      padding: 16px 20px;

      gap: 16px;
      width: 100%;

    .ss-label {

      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;

    .pills { display: flex; flex-wrap: wrap; gap: 4px; }

    .pill-g { background: rgba(61,220,132,0.06); border: 1px solid rgba(61,220,132,0.15); color: #5ee8a0; }
    .pill-r { background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.15); color: #ff8585; }
    .pill-m { background: rgba(255,255,255,0.03); border: 1px solid var(--line); color: var(--t2); }

    /* ════ CHART ════ */
    .chart-label {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--t3); margin-bottom: 6px;

      background: var(--panel2);

    /* ════ PLACEHOLDER ════ */
    .placeholder {

    }
    .placeholder.err { border-color: var(--red-bd); background: var(--red-bg); color: var(--red); }
  </style>

<script>
    // ═══════════════════════════════════════════════════════════════════

// CONFIG
const STORE_KEY = "flat_simple_prefs";
const HOUSES = {

      { key: "italy",   title: "Italy League",   resultados: "https://betstat.site/resultados/kiron/Italy" },

    ]
  },

      { key: "copa-mundo",     title: "Copa do Mundo",      resultados: "https://betstat.site/resultados/estrela/Copa%20do%20Mundo" },
      { key: "ligas-campeoes", title: "Ligas dos Campeoes", resultados: "https://betstat.site/resultados/estrela/Ligas%20dos%20Campe%C3%B5es" },
      { key: "america-latina", title: "America Latina",     resultados: "https://betstat.site/resultados/estrela/Am%C3%A9rica%20Latina" },
    ]
  },
  bet365: {
    label: "Bet365",
    leagues: [
      { key: "b365-copa",    title: "Copa",    resultados: "https://betstat.site/resultados/bet365/Copa" },
      { key: "b365-euro",    title: "Euro",    resultados: "https://betstat.site/resultados/bet365/Euro" },
      { key: "b365-super",   title: "Super",   resultados: "https://betstat.site/resultados/bet365/Super" },
      { key: "b365-premier", title: "Premier", resultados: "https://betstat.site/resultados/bet365/Premier" },
    ]
  }
};

// STATE
const prefs = (() => {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
})();

let currentHouse = prefs.house || "betano";
let activeLeagueKey = prefs.league || null;
const charts = {};
const lastData = {};

// DOM
const houseTabs = document.getElementById("houseTabs");
const leagueBar = document.getElementById("leagueBar");

// Apply saved preferences
if (prefs.limit) {
  const opt = [...limitSelect.options].find(o => o.value === String(prefs.limit));
  if (opt) opt.selected = true;
}

houseTabs.querySelectorAll(".ht").forEach(b => {
  b.classList.toggle("on", b.dataset.house === currentHouse);

function setStatus(msg, show) {

  statusBar.classList.toggle("hidden", !show);

// ═══════════════════════════════════════════════════════════════════
//  PARSE RESULTADO
//  Suporta: "2 x 1" (grafico_de_mercados), "2-1", "2x1" (legado)
// ═══════════════════════════════════════════════════════════════════

function parseResult(gameData) {
  if (!gameData) return null;

  let ft = gameData.ft || gameData.score || gameData.resultado || gameData.result;
  if (!ft) return null;

  const raw = String(ft).trim();
  let h, a;

  if (raw.includes(" x ")) {
    // formato "2 x 1" (padrão do grafico_de_mercados)
    const parts = raw.split(" x ");
    h = parseInt(parts[0], 10);
    a = parseInt(parts[1], 10);
  } else {
    // formato "2-1" ou "2x1" (legado)
    const normalized = raw.replace(/\s/g, "").replace(/x/gi, "-");
    const m = normalized.match(/^(\d+)-(\d+)$/);
    if (!m) return null;
    h = parseInt(m[1], 10);
    a = parseInt(m[2], 10);
  }

  if (!isFinite(h) || !isFinite(a)) return null;

  const hora   = gameData.hora   != null ? String(gameData.hora).padStart(2, "0")   : "—";
  const minuto = gameData.minuto != null ? String(gameData.minuto).padStart(2, "0") : "—";

  return {
    total:   h + a,
    hora,
    minuto,
    isUnder: h + a < 3,  // Under 2.5: 0, 1 ou 2 gols
    isOver:  h + a > 2   // Over  2.5: 3+ gols
  };
}

// ═══════════════════════════════════════════════════════════════════
//  CALCULAR GRÁFICO
//
//  Regras Under 2.5:
//    prev Under + curr Under → sobe   ✅
//    prev Under + curr Over  → desce  ❌
//    prev Over  + curr Under → não mexe
//    prev Over  + curr Over  → não mexe
//
//  Regras Over 2.5:
//    prev Over  + curr Over  → sobe   ✅
//    prev Over  + curr Under → desce  ❌
//    prev Under + curr Over  → não mexe
//    prev Under + curr Under → não mexe
// ═══════════════════════════════════════════════════════════════════

function calcGraphData(games) {
  // Ordena cronologicamente: data → hora → minuto (igual ao grafico_de_mercados)
  const sorted = [...games].sort((a, b) => {
    const ha = parseInt(a.hora,   10) || 0;
    const hb = parseInt(b.hora,   10) || 0;
    const ma = parseInt(a.minuto, 10) || 0;
    const mb = parseInt(b.minuto, 10) || 0;
    return ha !== hb ? ha - hb : ma - mb;
  });

  const underPoints    = [50]; // começa no centro
  const overPoints     = [50];
  const underGamesMeta = [null];
  const overGamesMeta  = [null];

  for (let i = 1; i < sorted.length; i++) {
    const prev = sorted[i - 1];
    const curr = sorted[i];

    // ── UNDER 2.5 ──────────────────────────────────────────────────
    const uLast = underPoints[underPoints.length - 1];
    if      (prev.isUnder && curr.isUnder) underPoints.push(uLast + 1); // sobe
    else if (prev.isUnder && curr.isOver)  underPoints.push(uLast - 1); // desce
    else                                   underPoints.push(uLast);     // não mexe

    // ── OVER 2.5 ───────────────────────────────────────────────────
    const oLast = overPoints[overPoints.length - 1];
    if      (prev.isOver && curr.isOver)   overPoints.push(oLast + 1);  // sobe
    else if (prev.isOver && curr.isUnder)  overPoints.push(oLast - 1);  // desce
    else                                   overPoints.push(oLast);      // não mexe

    // ── METADATA para tooltip ──────────────────────────────────────
    const meta = {
      hora:       curr.hora,
      minuto:     curr.minuto,
      total:      curr.total,
      prev_total: prev.total,
      prev_hora:  prev.hora
    };
    underGamesMeta.push(meta);
    overGamesMeta.push(meta);
  }

  return { underPoints, overPoints, underGamesMeta, overGamesMeta };
}

// ═══════════════════════════════════════════════════════════════════
//  RENDERIZAR CHART
// ═══════════════════════════════════════════════════════════════════

function renderChart(id, points, gamesMeta, mode) {
  const canvas = document.getElementById(id);
  if (!canvas) return;

  if (charts[id]) charts[id].destroy();

  const color = mode === "under" ? "#3ddc84" : "#60a5fa";
  const ptSize = points.length > 60 ? 2 : 3;

  charts[id] = new Chart(canvas.getContext("2d"), {
    type: "line",
    data: {
      labels: points.map((_, i) => i),
      datasets: [
        {
          data: points,
          borderColor: color,
          borderWidth: 2,
          pointRadius: ptSize,
          pointHoverRadius: ptSize + 2,
          pointBackgroundColor: points.map((v, i) =>
            i === 0 ? "#5a6272" : v > points[i - 1] ? "#3ddc84" : v < points[i - 1] ? "#ff6b6b" : "#5a6272"
          ),
          pointBorderColor: points.map((v, i) =>
            i === 0 ? "#5a6272" : v > points[i - 1] ? "#3ddc84" : v < points[i - 1] ? "#ff6b6b" : "#5a6272"
          ),
          pointBorderWidth: 0,
          fill: false,
          tension: 0.2
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "rgba(0, 0, 0, 0.9)",
          padding: 12,
          cornerRadius: 8,
          titleFont: { size: 13, weight: "700" },
          bodyFont: { size: 12 },
          displayColors: false,
          callbacks: {
            title: (context) => {
              if (!context || !context.length) return "";
              const idx = context[0].dataIndex;
              const game = gamesMeta && gamesMeta[idx];
              if (game && game.hora && game.minuto && game.hora !== "—") {
                return `⏱️ ${game.hora}:${game.minuto}`;
              }
              return "";
            },
            label: (c) => {
              const idx = c.dataIndex;
              const game = gamesMeta && gamesMeta[idx];
              if (game) {
                return `${game.hora}:${game.minuto} → ${game.total} gols (era ${game.prev_hora}:${game.minuto} → ${game.prev_total} gols)`;
              }
              return `Valor: ${c.raw}`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: "#3d4352", maxTicksLimit: 10, font: { family: "Roboto", size: 10 } },
          grid: { color: "rgba(255,255,255,0.03)" }
        },
        y: {
          ticks: { color: "#3d4352", font: { family: "Roboto", size: 10 } },
          grid: { color: "rgba(255,255,255,0.04)" }
        }
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════════
//  HTML BUILDERS
// ═══════════════════════════════════════════════════════════════════

function modeHTML(key, mode, currentValue) {
  const id = `ch-${key}-${mode}`;
  const modeCls = mode === "under" ? "mode-under" : "mode-over";
  const modeText = mode === "under" ? "Under 2.5" : "Over 2.5";

  return `
    <div class="mode-col ${modeCls}">
      <div class="mode-label"><span class="mode-dot"></span>${modeText}</div>
      <div class="current-value">${currentValue}</div>
      <div class="chart-wrap"><canvas id="${id}"></canvas></div>
    </div>
  `;
}

function cardHTML(d, graphData) {
  const underValue = graphData.underPoints[graphData.underPoints.length - 1] ?? 50;
  const overValue = graphData.overPoints[graphData.overPoints.length - 1] ?? 50;

  return `
    <div class="lcard" data-league-key="${d.league.key}">
      <div class="lcard-head">
        <h2>${d.league.title}</h2>
        <span class="meta">${HOUSES[currentHouse].label} &mdash; ${d.totalGames} jogos</span>
      </div>
      <div class="lcard-cols">
        ${modeHTML(d.league.key, "under", underValue)}
        ${modeHTML(d.league.key, "over", overValue)}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════
//  FETCH
// ═══════════════════════════════════════════════════════════════════

async function fetchLeague(league, limit) {
  const res = await fetch(league.resultados, { cache: "no-store" });
  if (!res.ok) throw new Error(`HTTP ${res.status} — ${league.title}`);

  const json = await res.json();
  const raw = Array.isArray(json) ? json : json.data || json.resultados || [];
  const games = raw.map(i => parseResult(i)).filter(Boolean).slice(0, limit);
  const graphData = calcGraphData(games);

  return {
    league,
    totalGames: games.length,
    graphData
  };
}

// ═══════════════════════════════════════════════════════════════════
//  FINGERPRINT
// ═══════════════════════════════════════════════════════════════════

function fingerprint(d) {
  const under = d.graphData.underPoints;
  const over = d.graphData.overPoints;
  return [d.totalGames, under[under.length - 1], over[over.length - 1]].join("|");
}

// ═══════════════════════════════════════════════════════════════════
//  LEAGUE BAR
// ═══════════════════════════════════════════════════════════════════

function buildLeagueBar() {
  const leagues = HOUSES[currentHouse].leagues;
  const allBtn = `<button class="lt ${activeLeagueKey === null ? "on" : ""}" data-key="__all__">Todas</button>`;
  const tabs = leagues.map(l => `<button class="lt ${l.key === activeLeagueKey ? "on" : ""}" data-key="${l.key}">${l.title}</button>`).join("");
  leagueBar.innerHTML = allBtn + tabs;

  leagueBar.querySelectorAll(".lt").forEach(b => {
    b.addEventListener("click", () => {
      activeLeagueKey = b.dataset.key === "__all__" ? null : b.dataset.key;
      savePrefs({ ...prefs, league: activeLeagueKey });
      buildLeagueBar();
      Object.keys(lastData).forEach(k => delete lastData[k]);
      renderAll(true);
    });
  });
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER ALL
// ═══════════════════════════════════════════════════════════════════

let renderToken = 0;
let renderRunning = false;

async function renderAll(fullReset) {
  if (renderRunning) return;
  renderRunning = true;

  const token = ++renderToken;
  const limit = parseInt(limitSelect.value, 10) || 100;
  const leagues = HOUSES[currentHouse].leagues.filter(l => activeLeagueKey === null || l.key === activeLeagueKey);

  if (fullReset) {
    Object.keys(charts).forEach(k => {
      try {
        charts[k].destroy();
      } catch {}
      delete charts[k];
    });
    Object.keys(lastData).forEach(k => delete lastData[k]);
    leaguesGrid.innerHTML = `<div class="placeholder">Carregando...</div>`;
  }

  setStatus("", false);

  let results;
  try {
    results = await Promise.allSettled(leagues.map(l => fetchLeague(l, limit)));
  } catch (e) {
    renderRunning = false;
    setStatus("Erro na conexão", true);
    setTimeout(() => setStatus("", false), 3000);
    return;
  }

  if (token !== renderToken) {
    renderRunning = false;
    return;
  }

  const errs = [];
  const incoming = [];

  for (const r of results) {
    if (r.status === "fulfilled") {
      incoming.push(r.value);
    } else {
      errs.push(r.reason?.message || "Erro");
    }
  }

  if (fullReset || !leaguesGrid.querySelector(".lcard")) {
    leaguesGrid.innerHTML = incoming.length ? incoming.map(d => cardHTML(d, d.graphData)).join("") : `<div class="placeholder err">Nenhuma liga carregada.</div>`;

    incoming.forEach(d => {
      renderChart(`ch-${d.league.key}-under`, d.graphData.underPoints, d.graphData.underGamesMeta, "under");
      renderChart(`ch-${d.league.key}-over`, d.graphData.overPoints, d.graphData.overGamesMeta, "over");
      lastData[d.league.key] = fingerprint(d);
    });
  } else {
    incoming.forEach(d => {
      const fp = fingerprint(d);
      if (lastData[d.league.key] === fp) return;
      lastData[d.league.key] = fp;

      const existing = leaguesGrid.querySelector(`[data-league-key="${d.league.key}"]`);
      if (existing) {
        [`ch-${d.league.key}-under`, `ch-${d.league.key}-over`].forEach(id => {
          if (charts[id]) {
            try {
              charts[id].destroy();
            } catch {}
            delete charts[id];
          }
        });
        existing.outerHTML = cardHTML(d, d.graphData);
      } else {
        leaguesGrid.insertAdjacentHTML("beforeend", cardHTML(d, d.graphData));
      }

      renderChart(`ch-${d.league.key}-under`, d.graphData.underPoints, d.graphData.underGamesMeta, "under");
      renderChart(`ch-${d.league.key}-over`, d.graphData.overPoints, d.graphData.overGamesMeta, "over");
    });

    leaguesGrid.querySelectorAll("[data-league-key]").forEach(el => {
      const key = el.dataset.leagueKey;
      if (!incoming.find(d => d.league.key === key)) {
        [`ch-${key}-under`, `ch-${key}-over`].forEach(id => {
          if (charts[id]) {
            try {
              charts[id].destroy();
            } catch {}
            delete charts[id];
          }
        });
        el.remove();
      }
    });
  }

  if (errs.length) setStatus(errs.join(" · "), true);
  renderRunning = false;
}

// ═══════════════════════════════════════════════════════════════════
//  HOUSE TABS
// ═══════════════════════════════════════════════════════════════════

houseTabs.querySelectorAll(".ht").forEach(b => {
  b.addEventListener("click", () => {
    houseTabs.querySelectorAll(".ht").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    currentHouse = b.dataset.house;
    activeLeagueKey = null;
    savePrefs({ ...prefs, house: currentHouse, league: null });
    buildLeagueBar();
    renderAll(true);
  });
});

limitSelect.addEventListener("change", () => {
  savePrefs({ ...prefs, limit: limitSelect.value });
  Object.keys(lastData).forEach(k => delete lastData[k]);
  renderAll(true);
});

reloadBtn.addEventListener("click", () => renderAll(true));

// ═══════════════════════════════════════════════════════════════════
//  AUTO-REFRESH
// ═══════════════════════════════════════════════════════════════════

setInterval(() => renderAll(false), 3000);

const WS_URL = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`;
let ws, backoff = 1000, hbTimer = null, hbWait = null;

function startHB() {
  stopHB();
  hbTimer = setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    try {
      ws.send(JSON.stringify({ type: "ping", t0: Date.now() }));
      hbWait = setTimeout(() => {
        try {
          ws.close();
        } catch {}
      }, 12000);
    } catch {}
  }, 25000);
}

function stopHB() {
  if (hbTimer) clearInterval(hbTimer), (hbTimer = null);
  if (hbWait) clearTimeout(hbWait), (hbWait = null);
}

function connectWS() {
  try {
    if (ws) ws.close();
  } catch {}
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    backoff = 1000;
    startHB();
    setStatus("Conectado", true);
    setTimeout(() => setStatus("", false), 1200);
    try {
      ws.send(JSON.stringify({ type: "versions:get" }));
    } catch {}
  };
  ws.onmessage = ev => {
    let m;
    try {
      m = JSON.parse(ev.data);
    } catch {
      return;
    }
    if (m.type === "ping") {
      try {
        ws.send(JSON.stringify({ type: "pong" }));
      } catch {}
      return;
    }
    if (m.type === "pong") {
      if (hbWait) clearTimeout(hbWait);
      return;
    }
    if (["dados:update", "push:versions", "vers", "hint", "update"].includes(m.type)) {
      renderAll(false);
      return;
    }
    if (m.type === "all:reload") location.reload();
  };
  ws.onclose = () => {
    stopHB();
    setTimeout(connectWS, backoff);
    backoff = Math.min(backoff * 2, 10000);
  };
  ws.onerror = () => {
    try {
      ws.close();
    } catch {}
  };
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════

buildLeagueBar();
renderAll(true);
connectWS();
</script>
