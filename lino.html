<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODDS MAXIMA - Análise de Máximas</title>
    <style>
        :root {
            --primary-color: #2a2e35;
            --secondary-color: #3a3f47;
            --accent-color: #00ff88;
            --text-color: #e0e0e0;
            --table-header: #3a3f47;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(45deg, #1a1e23, #2a2e35);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1, h2 {
            color: var(--accent-color);
            margin: 1rem 0 0.5rem 0;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filters {
            background: var(--primary-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--accent-color);
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--secondary-color);
            border-radius: 8px;
            background: var(--primary-color);
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.3s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e0e0e0' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 1.2em;
            padding-right: 36px;
        }

        input[type="number"] {
            background-image: none;
            padding-right: 10px;
        }

        select:hover, input:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--primary-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--secondary-color);
        }

        th {
            background-color: var(--table-header);
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background-color: var(--secondary-color);
        }

        tr:hover {
            background: var(--secondary-color);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--accent-color);
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 255, 136, 0.2);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-text {
            color: var(--accent-color);
            font-size: 12px;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-color);
        }

        .high-value {
            color: #ff6b6b;
            font-weight: bold;
        }

        .medium-value {
            color: #ffa500;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .filters {
                grid-template-columns: 1fr;
            }

            th, td {
                padding: 8px;
                font-size: 0.85rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Máximas de Odds</h1>

        <div class="filters">
            <div class="filter-group">
                <label for="houseSelect">Casa de Apostas:</label>
                <select id="houseSelect" required></select>
            </div>

            <div class="filter-group">
                <label for="leagueSelect">Liga:</label>
                <select id="leagueSelect" required></select>
            </div>

            <div class="filter-group">
                <label for="marketSelect">Mercado:</label>
                <select id="marketSelect">
                    <option value="over25">Over 2.5</option>
                    <option value="over35">Over 3.5</option>
                    <option value="ambas">Ambas Marcam</option>
                    <option value="ambas_nao">Ambas Não Marcam</option>
                    <option value="under25">Under 2.5</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="minMaxInput">Mín. Máxima:</label>
                <input type="number" id="minMaxInput" min="0" placeholder="0">
            </div>

            <div class="filter-group">
                <label for="maxMaxInput">Máx. Máxima:</label>
                <input type="number" id="maxMaxInput" min="0" placeholder="∞">
            </div>
        </div>

        <h2>Análise de Máximas por Odd</h2>
        <div id="oddsContainer" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px;">Carregando dados...</p>
        </div>

        <table id="oddsTable" style="display:none;">
            <thead>
                <tr>
                    <th>Odd</th>
                    <th>Jogos sem Sair / Máx</th>
                    <th>Total Jogos</th>
                    <th>Soma Gols</th>
                    <th>Média Gols</th>
                    <th>Vezes Entrou</th>
                    <th>% Acerto</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const ROUTES = {
            'Bet365': {
                'Copa': { resultados: 'https://betstat.site/resultados/bet365/Copa', odds: 'https://betstat.site/odds/bet365/Copa', proximos: 'https://betstat.site/proximos/bet365/Copa' },
                'Euro': { resultados: 'https://betstat.site/resultados/bet365/Euro', odds: 'https://betstat.site/odds/bet365/Euro', proximos: 'https://betstat.site/proximos/bet365/Euro' },
                'Super': { resultados: 'https://betstat.site/resultados/bet365/Super', odds: 'https://betstat.site/odds/bet365/Super', proximos: 'https://betstat.site/proximos/bet365/Super' },
                'Premier': { resultados: 'https://betstat.site/resultados/bet365/Premier', odds: 'https://betstat.site/odds/bet365/Premier', proximos: 'https://betstat.site/proximos/bet365/Premier' }
            },
            'Betano': {
                'Copa América': { resultados: 'https://betstat.site/resultados/Copa%20Am%C3%A9rica', odds: 'https://betstat.site/odds/Copa%20Am%C3%A9rica', proximos: 'https://betstat.site/proximos/Copa%20Am%C3%A9rica' },
                'Clássicos': { resultados: 'https://betstat.site/resultados/Ta%C3%A7a%20Gl%C3%B3ria%20eterna', odds: 'https://betstat.site/odds/Ta%C3%A7a%20Gl%C3%B3ria%20eterna', proximos: 'https://betstat.site/proximos/Ta%C3%A7a%20Gl%C3%B3ria%20eterna' },
                'Euro': { resultados: 'https://betstat.site/resultados/Euro', odds: 'https://betstat.site/odds/Euro', proximos: 'https://betstat.site/proximos/Euro' },
                'Italiano': { resultados: 'https://betstat.site/resultados/Campeonato%20Italiano', odds: 'https://betstat.site/odds/Campeonato%20Italiano', proximos: 'https://betstat.site/proximos/Campeonato%20Italiano' },
                'Copa Estrelas': { resultados: 'https://betstat.site/resultados/Copa%20das%20estrelas', odds: 'https://betstat.site/odds/Copa%20das%20estrelas', proximos: 'https://betstat.site/proximos/Copa%20das%20estrelas' },
                'Brasileirão': { resultados: 'https://betstat.site/resultados/Brasileir%C3%A3o%20Betano', odds: 'https://betstat.site/odds/Brasileir%C3%A3o%20Betano', proximos: 'https://betstat.site/proximos/Brasileir%C3%A3o%20Betano' }
            },
            'Kiron': {
                'England': { resultados: 'https://betstat.site/resultados/kiron/England', odds: 'https://betstat.site/odds/kiron/England', proximos: 'https://betstat.site/proximos/kiron/England' },
                'Italy': { resultados: 'https://betstat.site/resultados/kiron/Italy', odds: 'https://betstat.site/odds/kiron/Italy', proximos: 'https://betstat.site/proximos/kiron/Italy' },
                'Spain': { resultados: 'https://betstat.site/resultados/kiron/Spain', odds: 'https://betstat.site/odds/kiron/Spain', proximos: 'https://betstat.site/proximos/kiron/Spain' }
            },
            'Estrelabet': {
                'Copa Mundo': { resultados: 'https://betstat.site/resultados/estrela/Copa%20do%20Mundo', odds: 'https://betstat.site/odds/estrela/Copa%20do%20Mundo', proximos: 'https://betstat.site/proximos/estrela/Copa%20do%20Mundo' },
                'Champions': { resultados: 'https://betstat.site/resultados/estrela/Ligas%20dos%20Campe%C3%B5es', odds: 'https://betstat.site/odds/estrela/Ligas%20dos%20Campe%C3%B5es', proximos: 'https://betstat.site/proximos/estrela/Ligas%20dos%20Campe%C3%B5es' },
                'América Latina': { resultados: 'https://betstat.site/resultados/estrela/Am%C3%A9rica%20Latina', odds: 'https://betstat.site/odds/estrela/Am%C3%A9rica%20Latina', proximos: 'https://betstat.site/proximos/estrela/Am%C3%A9rica%20Latina' }
            },
            'Betsson': {
                'Espanha': { resultados: 'https://betstat.site/resultados/betsson/Espanha', odds: 'https://betstat.site/odds/betsson/Espanha', proximos: 'https://betstat.site/proximos/betsson/Espanha' },
                'Inglaterra': { resultados: 'https://betstat.site/resultados/betsson/Inglaterra', odds: 'https://betstat.site/odds/betsson/Inglaterra', proximos: 'https://betstat.site/proximos/betsson/Inglaterra' },
                'Brasil': { resultados: 'https://betstat.site/resultados/betsson/Brasil', odds: 'https://betstat.site/odds/betsson/Brasil', proximos: 'https://betstat.site/proximos/betsson/Brasil' }
            },
            'Sportingbet': {
                'Champions': { resultados: 'https://betstat.site/resultados/sportingbet/champions', odds: 'https://betstat.site/odds/sportingbet/champions', proximos: 'https://betstat.site/proximos/sportingbet/champions' },
                'Eurocup': { resultados: 'https://betstat.site/resultados/sportingbet/eurocup', odds: 'https://betstat.site/odds/sportingbet/eurocup', proximos: 'https://betstat.site/proximos/sportingbet/eurocup' },
                'Copa': { resultados: 'https://betstat.site/resultados/sportingbet/copa', odds: 'https://betstat.site/odds/sportingbet/copa', proximos: 'https://betstat.site/proximos/sportingbet/copa' },
                'Super': { resultados: 'https://betstat.site/resultados/sportingbet/super', odds: 'https://betstat.site/odds/sportingbet/super', proximos: 'https://betstat.site/proximos/sportingbet/super' }
            }
        };

        let allResults = [];
        let allOdds = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllData();
            populateSelects();
            setupListeners();
        });

        async function loadAllData() {
            const promises = [];

            for (const [house, leagues] of Object.entries(ROUTES)) {
                for (const [league, urls] of Object.entries(leagues)) {
                    promises.push(
                        fetch(urls.resultados)
                            .then(r => r.json())
                            .then(data => {
                                if (Array.isArray(data)) {
                                    allResults.push(...data.map(d => ({...d, house, league})));
                                }
                            })
                            .catch(e => console.log(`Erro resultados ${house}/${league}`))
                    );

                    promises.push(
                        fetch(urls.odds)
                            .then(r => r.json())
                            .then(data => {
                                if (Array.isArray(data)) {
                                    allOdds.push(...data.map(d => ({...d, house, league})));
                                }
                            })
                            .catch(e => console.log(`Erro odds ${house}/${league}`))
                    );
                }
            }

            await Promise.all(promises);
        }

        function populateSelects() {
            const houseSelect = document.getElementById('houseSelect');
            const houses = Object.keys(ROUTES);
            
            houseSelect.innerHTML = '';
            houses.forEach(house => {
                const opt = document.createElement('option');
                opt.value = house;
                opt.textContent = house;
                houseSelect.appendChild(opt);
            });

            if (houses.length > 0) {
                houseSelect.value = houses[0];
                updateLeagueSelect(houses[0]);
            }
        }

        function updateLeagueSelect(house) {
            const leagueSelect = document.getElementById('leagueSelect');
            leagueSelect.innerHTML = '';

            if (house && ROUTES[house]) {
                const leagues = Object.keys(ROUTES[house]);
                leagues.forEach(league => {
                    const opt = document.createElement('option');
                    opt.value = league;
                    opt.textContent = league;
                    leagueSelect.appendChild(opt);
                });

                if (leagues.length > 0) {
                    leagueSelect.value = leagues[0];
                    applyFilters();
                }
            }
        }

        function setupListeners() {
            document.getElementById('houseSelect').addEventListener('change', (e) => updateLeagueSelect(e.target.value));
            document.getElementById('leagueSelect').addEventListener('change', applyFilters);
            document.getElementById('marketSelect').addEventListener('change', applyFilters);
            document.getElementById('minMaxInput').addEventListener('input', applyFilters);
            document.getElementById('maxMaxInput').addEventListener('input', applyFilters);
        }

        function applyFilters() {
            const house = document.getElementById('houseSelect').value;
            const league = document.getElementById('leagueSelect').value;
            const market = document.getElementById('marketSelect').value;

            const filtered = {
                results: allResults.filter(r => r.house === house && r.league === league),
                odds: allOdds.filter(o => o.house === house && o.league === league)
            };

            analyzeOdds(filtered, market);
        }

        function analyzeOdds(data, market) {
            const results = data.results || [];
            const odds = data.odds || [];

            if (results.length === 0 || odds.length === 0) {
                document.getElementById('oddsContainer').innerHTML = '<div class="empty-state">Nenhum dado disponível para análise</div>';
                document.getElementById('oddsTable').style.display = 'none';
                return;
            }

            // Mapear mercado para campo de odd
            const oddFieldMap = {
                'over25': 'odds_mais_2_5',
                'over35': 'odds_mais_3_5',
                'ambas': 'odds_ambas_marcam_sim',
                'ambas_nao': 'odds_ambas_marcam_nao',
                'under25': 'odds_menos_2_5'
            };

            const oddField = oddFieldMap[market];
            const oddsAnalysis = {};
            let streakCounter = {};

            // Ordenar resultados por data
            const sortedResults = results.sort((a, b) => {
                const dateA = new Date(a.data || a.start_time || 0);
                const dateB = new Date(b.data || b.start_time || 0);
                return dateA - dateB;
            });

            // Processar cada resultado
            sortedResults.forEach(result => {
                // Encontrar odd correspondente
                const matchOdd = odds.find(o => 
                    o.match_id === result.event_id || 
                    o.match_id === result.id ||
                    (o.time_casa === (result.team_home || result.time_a) &&
                     o.time_visitante === (result.team_visit || result.time_b))
                );

                if (!matchOdd || !matchOdd[oddField]) return;

                const oddValue = matchOdd[oddField];
                const totalGoals = parseFloat(result.ft?.split(' x ')[0] || 0) + parseFloat(result.ft?.split(' x ')[1] || 0);
                
                // Determinar se entrou
                let entered = false;
                if (market === 'over25' && totalGoals > 2.5) entered = true;
                if (market === 'over35' && totalGoals > 3.5) entered = true;
                if (market === 'ambas' && result.ft?.split(' x ').some(g => g > 0)) entered = true;
                if (market === 'ambas_nao' && !(result.ft?.split(' x ').some(g => g === '0'))) entered = true;
                if (market === 'under25' && totalGoals < 2.5) entered = true;

                if (!oddsAnalysis[oddValue]) {
                    oddsAnalysis[oddValue] = {
                        odd: oddValue,
                        totalGames: 0,
                        somaGoals: 0,
                        numGreens: 0,
                        maxStreak: 0,
                        currentStreak: 0
                    };
                    streakCounter[oddValue] = 0;
                }

                oddsAnalysis[oddValue].totalGames++;
                oddsAnalysis[oddValue].somaGoals += totalGoals;

                if (entered) {
                    oddsAnalysis[oddValue].numGreens++;
                    oddsAnalysis[oddValue].maxStreak = Math.max(oddsAnalysis[oddValue].maxStreak, streakCounter[oddValue]);
                    streakCounter[oddValue] = 0;
                } else {
                    streakCounter[oddValue]++;
                    oddsAnalysis[oddValue].currentStreak = streakCounter[oddValue];
                }
            });

            // Atualizar maxStreak com currentStreak final
            Object.keys(oddsAnalysis).forEach(odd => {
                oddsAnalysis[odd].maxStreak = Math.max(oddsAnalysis[odd].maxStreak, oddsAnalysis[odd].currentStreak);
            });

            renderTable(oddsAnalysis);
        }

        function renderTable(oddsAnalysis) {
            const tbody = document.querySelector('#oddsTable tbody');
            const table = document.getElementById('oddsTable');
            const minMax = parseInt(document.getElementById('minMaxInput').value) || 0;
            const maxMax = parseInt(document.getElementById('maxMaxInput').value) || Infinity;

            tbody.innerHTML = '';
            
            const sorted = Object.values(oddsAnalysis)
                .filter(o => o.maxStreak >= minMax && o.maxStreak <= maxMax)
                .sort((a, b) => b.maxStreak - a.maxStreak);

            sorted.forEach(o => {
                const avgGoals = (o.somaGoals / o.totalGames).toFixed(2);
                const percentage = ((o.numGreens / o.totalGames) * 100).toFixed(0);
                const streakClass = o.currentStreak > 20 ? 'high-value' : (o.currentStreak > 10 ? 'medium-value' : '');

                tbody.innerHTML += `
                    <tr>
                        <td>${parseFloat(o.odd).toFixed(2)}</td>
                        <td><span class="${streakClass}">${o.currentStreak}</span> / ${o.maxStreak}</td>
                        <td>${o.totalGames}</td>
                        <td>${o.somaGoals.toFixed(1)}</td>
                        <td>${avgGoals}</td>
                        <td>${o.numGreens}</td>
                        <td>${percentage}%</td>
                    </tr>
                `;
            });

            document.getElementById('oddsContainer').innerHTML = '';
            table.style.display = 'table';

            enableTableSorting('oddsTable');
        }

        function enableTableSorting(tableId) {
            const table = document.getElementById(tableId);
            const headers = table.querySelectorAll('thead th');
            headers.forEach((header, index) => {
                header.addEventListener('click', () => {
                    const tbody = table.querySelector('tbody');
                    const rows = Array.from(tbody.querySelectorAll('tr'));
                    const isAsc = header.dataset.sort === 'asc';
                    header.dataset.sort = isAsc ? 'desc' : 'asc';
                    
                    rows.sort((a, b) => {
                        let aVal = a.children[index].textContent.trim();
                        let bVal = b.children[index].textContent.trim();
                        let aNum = parseFloat(aVal);
                        let bNum = parseFloat(bVal);
                        
                        if (!isNaN(aNum) && !isNaN(bNum)) {
                            return isAsc ? bNum - aNum : aNum - bNum;
                        }
                        return isAsc ? bVal.localeCompare(aVal) : aVal.localeCompare(bVal);
                    });
                    
                    rows.forEach(row => tbody.appendChild(row));
                });
            });
        }
    </script>
</body>
</html>
