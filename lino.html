<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Roboto,Arial,sans-serif;background:#1c1f26;color:#fff;padding:20px}
h1,h2,label{color:#1fad8b}

/* ── seletores ── */
.control-panel{display:flex;justify-content:center;gap:14px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
select{padding:6px 10px;background:#292d36;color:#e0e0e0;border:1px solid #1fad8b;border-radius:4px;font-size:13px;cursor:pointer}
select:focus{outline:0;border-color:#34d8ab}
.checkbox-container{display:flex;align-items:center;gap:6px;color:#e0e0e0;font-size:13px}
input[type=checkbox]{cursor:pointer}

/* ── barra casa/liga ── */
.house-league-bar{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.house-league-bar label{color:#1fad8b;font-size:13px;margin-right:4px}

/* ── gráfico ── */
.chart-container{background:#292d36;border-radius:8px;padding:15px;margin-bottom:30px;box-shadow:0 4px 6px rgba(0,0,0,.3);position:relative}
.chart-container h2{font-size:16px;margin-bottom:10px;text-align:center;color:#1fad8b}
canvas{border-radius:4px;cursor:pointer}

/* ── add linha ── */
.linha-tools-wrapper{position:relative;display:inline-block}
#linhaToolsPanel{display:none;position:absolute;z-index:999;background:#1c1f26;border:1px solid #2a2f3a;border-radius:6px;padding:10px;min-width:180px;top:110%;left:0}
.btn-linha{display:block;width:100%;margin:3px 0;padding:5px 8px;border:1px solid #2a2f3a;border-radius:4px;background:#11141c;color:#e0e0e0;font-size:12px;cursor:pointer;text-align:left}
.btn-linha:hover{background:#1c1f26}
.separador-panel{border-top:1px solid #2a2f3a;margin:6px 0}
.contador-linhas{color:#aaa;font-size:11px;margin-bottom:6px}
button#btnLinhaTools{padding:6px 10px;background:#292d36;color:#e0e0e0;border:1px solid #1fad8b;border-radius:4px;font-size:13px;cursor:pointer}

/* ── toggles de mercado ── */
.setup-lines-panel{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding:8px 0}
.market-toggle{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:#e0e0e0;border:1px solid var(--mcolor,#888);background:rgba(0,0,0,0.3);transition:opacity .2s;user-select:none}
.market-toggle.inactive{opacity:0.3}
.market-toggle-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.market-toggle-val{font-weight:bold;font-size:11px;margin-left:3px}

<script>
/* ═══════════════════════════════════════════════════════════════
   GRÁFICO DE GOLS — página standalone
   Mercados: Gols FT/HT/Individual + Gols Exatos FT + Gols 2T
═══════════════════════════════════════════════════════════════ */

const VISIBLE_DS_KEY  = 'mgolsgraf:visibleDatasets_v2';
const DRAG_LINES_KEY  = 'mgolsgraf:draglines_v2';
const LINE_TOGGLE_KEY = 'mgolsgraf:lineToggles_v2';
const HOUSE_LEAGUE_KEY= 'mgolsgraf:houseLeague_v2';
const CONTROLS_KEY    = 'mgolsgraf:controls_v2';
const MAX_DRAG_LINES  = 6;

/* ── mapa de casas e ligas ── */
const HOUSE_LEAGUE_MAP = {
    'bet365':     { label:'Bet365',      leagues:{'Copa':'/resultados/bet365/Copa','Euro':'/resultados/bet365/Euro','Super':'/resultados/bet365/Super','Premier':'/resultados/bet365/Premier'} },
    'betano':     { label:'Betano',      leagues:{'Copa América':'/resultados/Copa%20Am%C3%A9rica','Clássicos (Taça Glória Eterna)':'/resultados/Ta%C3%A7a%20Gl%C3%B3ria%20eterna','Euro':'/resultados/Euro','Campeonato Italiano':'/resultados/Campeonato%20Italiano','Copa das Estrelas':'/resultados/Copa%20das%20estrelas','Brasileirão Betano':'/resultados/Brasileir%C3%A3o%20Betano'} },
    'kiron':      { label:'Kiron',       leagues:{'England League':'/resultados/kiron/England','Italy League':'/resultados/kiron/Italy','Spain League':'/resultados/kiron/Spain'} },
    'estrela':    { label:'EstrelaBet',  leagues:{'Copa do Mundo':'/resultados/estrela/Copa%20do%20Mundo','Ligas dos Campeões':'/resultados/estrela/Ligas%20dos%20Campe%C3%B5es','América Latina':'/resultados/estrela/Am%C3%A9rica%20Latina'} },
    'betsson':    { label:'Betsson',     leagues:{'Espanha':'/resultados/betsson/Espanha','Inglaterra':'/resultados/betsson/Inglaterra','Brasil':'/resultados/betsson/Brasil'} },
    'sportingbet':{ label:'Sportingbet', leagues:{'Champions':'/resultados/sportingbet/champions','Eurocup':'/resultados/sportingbet/eurocup','Copa':'/resultados/sportingbet/copa','Super':'/resultados/sportingbet/super'} }
};

/* ── mapa de mercados ── */
const labelToKey = {
    'Gols FT':'golsFT','Gols HT':'golsHT','Gols Individual':'golsInd',
    '0 Gol Exato':'gol0','1 Gol Exato':'gol1','2 Gols Exatos':'gol2',
    '3 Gols Exatos':'gol3','4 Gols Exatos':'gol4','5 Gols Exatos':'gol5',
    '0 Gol 2T':'gol2t0','1 Gol 2T':'gol2t1','2 Gols 2T':'gol2t2',
    '3 Gols 2T':'gol2t3','4 Gols 2T':'gol2t4'
};
const DATASET_COLORS = {
    'Gols FT':'#FFFF00','Gols HT':'#26A69A','Gols Individual':'#FF5A36',
    '0 Gol Exato':'#D81B60','1 Gol Exato':'#8E24AA','2 Gols Exatos':'#A0522D',
    '3 Gols Exatos':'#546E7A','4 Gols Exatos':'#FFB300','5 Gols Exatos':'#00897B',
    '0 Gol 2T':'#CE93D8','1 Gol 2T':'#BA68C8','2 Gols 2T':'#9C27B0',
    '3 Gols 2T':'#7B1FA2','4 Gols 2T':'#4A148C'
};
const FIXED_MARKETS = Object.keys(labelToKey);

/* ── estado ── */
let numPoints = 160, averagePoints = 19;
let showFibonacciLines = false, showMovingAverages = false, showLabels = false;
let chartInstance = null;
let chartData = {};
let _tabVisible = !document.hidden;

/* ── storage ── */
function _ls(k,fb){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch{return fb;}}
function _lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function _getLineToggles(){return _ls(LINE_TOGGLE_KEY,{});}
function _isLineActive(label){const t=_getLineToggles();return t[label]!==undefined?t[label]:true;}
function _setLineActive(label,active){const t=_getLineToggles();t[label]=active;_lsSet(LINE_TOGGLE_KEY,t);}
function _marketColor(label){return DATASET_COLORS[label]||'#888';}

const _defaultDS=(()=>{const d={};FIXED_MARKETS.forEach(k=>d[k]=true);return d;})();
function _loadVDS(){const r=_ls(VISIBLE_DS_KEY,null);return r?Object.assign({},_defaultDS,r):{..._defaultDS};}
function _saveVDS(o){_lsSet(VISIBLE_DS_KEY,o);}
let statsChartVisibleDatasets = _loadVDS();

function _loadDragLines(){try{const a=JSON.parse(localStorage.getItem(DRAG_LINES_KEY)||'[]');return Array.isArray(a)?a.map(l=>({y:Number(l.y),color:l.color||'#1fcc59',dragging:false})):[];}catch{return[];}}
function _saveDragLines(l){try{localStorage.setItem(DRAG_LINES_KEY,JSON.stringify(l.map(x=>({y:x.y,color:x.color||'#1fcc59'}))));}catch{}}
function _atualizarContador(l){const el=document.getElementById('contadorLinhas');if(el)el.textContent=`${(l||[]).length} / ${MAX_DRAG_LINES} linhas`;}

function _loadControls(){return _ls(CONTROLS_KEY,{horas:160,base:19,fibonacci:false,mediasMoveis:false,linhaAtual:true,labels:false});}
function _saveControls(){
    _lsSet(CONTROLS_KEY,{
        horas:    parseInt(document.getElementById('pointsSelector')?.value||numPoints,10),
        base:     parseInt(document.getElementById('averageSelector')?.value||averagePoints,10),
        fibonacci:    document.getElementById('fibonacciToggle')?.checked??false,
        mediasMoveis: document.getElementById('movingAveragesToggle')?.checked??false,
        linhaAtual:   document.getElementById('linhaAtualToggle')?.checked??true,
        labels:       document.getElementById('labelsToggle')?.checked??false
    });
}

/* ── utilitários ── */
function getKeyFromLabel(label){
    if(label.includes(' - ')){const[ml,mp]=label.split(' - ');return labelToKey[ml]+mp.split(' ')[0];}
    return labelToKey[label];
}
function computeMA(arr,period){return arr.map((_,i)=>{let s=0,c=0;for(let j=Math.max(0,i-period+1);j<=i;j++){if(arr[j]!==null){s+=arr[j];c++;}}return c>0?s/c:null;});}
function parseHtScoreTotal(htStr){if(!htStr)return 0;if(htStr==='OUT')return 3;if(htStr.includes(' x ')){const p=htStr.split(' x ').map(Number);if(p.length===2&&!isNaN(p[0])&&!isNaN(p[1]))return p[0]+p[1];}return 0;}

/* ═══════════════════════════════
   PLUGINS
═══════════════════════════════ */
const rotulosPlugin = {
    id:'rotulos',
    afterDatasetsDraw(chart){
        if(!showLabels)return;
        const{ctx,chartArea,scales}=chart;if(!chartArea||!scales.y)return;
        chart.data.datasets.forEach((ds,di)=>{
            if(ds.label.includes(' MA')||!chart.isDatasetVisible(di))return;
            const meta=chart.getDatasetMeta(di);if(!meta?.data)return;
            ctx.save();ctx.font='bold 9px Arial,sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillStyle=ds.borderColor||'#fff';
            meta.data.forEach((pt,i)=>{const v=ds.data[i];if(v===null||!isFinite(v))return;if(pt.x<chartArea.left||pt.x>chartArea.right)return;ctx.fillText(String(Math.round(v)),pt.x,pt.y-4);});
            ctx.restore();
        });
    }
};

const fibonacciLinesPlugin = {
    id:'fibonacciLines',
    afterDraw(chart){
        if(!showFibonacciLines)return;
        const ctx=chart.ctx,yA=chart.scales.y;if(!yA)return;
        const{left,right}=chart.chartArea,range=yA.max-yA.min;
        [0,23.6,38.2,50,61.8,100].forEach((lvl,i)=>{
            const y=yA.getPixelForValue(yA.min+(lvl/100)*range);
            ctx.save();ctx.beginPath();ctx.setLineDash([5,5]);ctx.moveTo(left,y);ctx.lineTo(right,y);
            ctx.strokeStyle='rgba(0,255,0,0.5)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
            ctx.fillStyle='rgba(0,255,0,0.85)';ctx.font='10px Arial';ctx.textAlign='left';ctx.textBaseline='middle';
            ctx.fillText(`${lvl}%`,right+52,y-(i===0?-8:0));ctx.restore();
        });
    }
};

const linhaAtualPlugin = {
    id:'linhaAtual',
    afterDraw(chart,args,opts){
        const cfg=(opts?.enabled!==undefined)?opts:(chart.options?.plugins?.linhaAtual??{});
        if(cfg.enabled===false)return;
        const{ctx,chartArea,scales}=chart;if(!chartArea||!scales.y)return;
        const{left,right,top,bottom}=chartArea,PAD=5,BH=18;
        const entries=[];
        chart.data.datasets.forEach((d,i)=>{
            if(!d.label||d.label.includes(' MA')||!chart.isDatasetVisible(i))return;
            const arr=d.data;if(!arr?.length)return;
            let yVal=null;for(let j=arr.length-1;j>=0;j--){const v=arr[j];if(v!==null&&isFinite(v)){yVal=v;break;}}
            if(yVal===null)return;
            const yA=scales[d.yAxisID||'y']||scales.y,yPx=yA.getPixelForValue(yVal);
            if(!isFinite(yPx)||yPx<top||yPx>bottom)return;
            entries.push({yVal,yPx,label:d.label,color:d.borderColor||'#fff'});
        });
        if(!entries.length)return;
        entries.sort((a,b)=>a.yPx-b.yPx);
        for(let i=1;i<entries.length;i++){const p=entries[i-1],c=entries[i];c.badgeY=(c.yPx-(p.badgeY??p.yPx)<BH+2)?(p.badgeY??p.yPx)+BH+2:c.yPx;if(i===1)p.badgeY=p.badgeY??p.yPx;}
        if(entries.length===1)entries[0].badgeY=entries[0].yPx;
        entries.forEach(({yVal,yPx,badgeY,label,color})=>{
            ctx.save();
            ctx.strokeStyle=color;ctx.lineWidth=1.2;ctx.setLineDash([6,4]);
            ctx.beginPath();ctx.moveTo(left,yPx);ctx.lineTo(right,yPx);ctx.stroke();ctx.setLineDash([]);
            const isGols=label==='Gols FT'||label==='Gols HT'||label==='Gols Individual';
            const text=isGols?String(Math.round(yVal)):yVal.toFixed(1);
            ctx.font='bold 10px Arial,sans-serif';ctx.textBaseline='middle';ctx.textAlign='left';
            const bw=Math.ceil(ctx.measureText(text).width)+PAD*2,bx=right+4,by=badgeY-BH/2;
            ctx.fillStyle='rgba(10,12,20,0.95)';ctx.strokeStyle=color;ctx.lineWidth=1.2;
            ctx.fillRect(bx,by,bw,BH);ctx.strokeRect(bx,by,bw,BH);
            ctx.fillStyle=color;ctx.fillText(text,bx+PAD,badgeY);ctx.restore();
        });
    }
};

const linhaDraggablePlugin = {
    id:'linhaDraggable',
    afterInit(chart){
        const canvas=chart.canvas;
        chart.dragLines=_loadDragLines();chart._selectedDragLine=-1;
        const HIT=8;let dragIdx=-1;
        const getYS=()=>chart.scales.y;
        const getEvtY=evt=>{const r=canvas.getBoundingClientRect();return((evt.touches&&evt.touches[0]?.clientY)??evt.clientY??0)-r.top;};
        const nearest=pxY=>{const yS=getYS();if(!yS||!chart.chartArea)return -1;const{top,bottom}=chart.chartArea;let best=-1,bd=Infinity;(chart.dragLines||[]).forEach((l,i)=>{const ly=yS.getPixelForValue(l.y);if(ly<top||ly>bottom)return;const d=Math.abs(ly-pxY);if(d<bd&&d<=HIT){bd=d;best=i;}});return best;};
        chart.addDragLine=(color='#1fcc59')=>{if((chart.dragLines||[]).length>=MAX_DRAG_LINES){alert(`Máximo de ${MAX_DRAG_LINES} linhas!`);return;}const yS=getYS();if(!yS)return;chart.dragLines.push({y:Math.round((yS.min+yS.max)/2),color,dragging:false});chart._selectedDragLine=chart.dragLines.length-1;_saveDragLines(chart.dragLines);_atualizarContador(chart.dragLines);chart.update();};
        chart.deleteDragLine=()=>{const idx=chart._selectedDragLine;if(idx>=0&&idx<(chart.dragLines||[]).length){chart.dragLines.splice(idx,1);chart._selectedDragLine=-1;_saveDragLines(chart.dragLines);_atualizarContador(chart.dragLines);chart.update();}};
        chart.clearDragLines=()=>{chart.dragLines=[];chart._selectedDragLine=-1;_saveDragLines([]);_atualizarContador([]);chart.update();};
        const startDrag=evt=>{const pxY=getEvtY(evt);const idx=nearest(pxY);if(idx<0)return;if(evt.cancelable)evt.preventDefault();dragIdx=idx;chart._selectedDragLine=idx;chart.dragLines[idx].dragging=true;chart.update('none');};
        const moveDrag=evt=>{if(dragIdx<0)return;if(evt.cancelable)evt.preventDefault();const yS=getYS();if(!yS)return;let v=yS.getValueForPixel(getEvtY(evt));v=Math.max(yS.min,Math.min(yS.max,Math.round(v*10)/10));chart.dragLines[dragIdx].y=v;chart.update('none');};
        const stopDrag=()=>{if(dragIdx>=0){if(chart.dragLines[dragIdx])chart.dragLines[dragIdx].dragging=false;_saveDragLines(chart.dragLines);}dragIdx=-1;};
        canvas.addEventListener('mousedown',startDrag);canvas.addEventListener('mousemove',moveDrag);canvas.addEventListener('mouseleave',stopDrag);window.addEventListener('mouseup',stopDrag);
        canvas.addEventListener('touchstart',startDrag,{passive:false});canvas.addEventListener('touchmove',moveDrag,{passive:false});canvas.addEventListener('touchend',stopDrag,{passive:true});canvas.addEventListener('touchcancel',stopDrag,{passive:true});
        window.addEventListener('keydown',e=>{if(e.key==='Delete'||e.key==='Backspace'){if(chartInstance)chartInstance.deleteDragLine();}});
        _atualizarContador(chart.dragLines);
    },
    afterDatasetsDraw(chart){
        const yS=chart.scales.y,lines=chart.dragLines||[];
        if(!lines.length||!chart.chartArea)return;
        const ctx=chart.ctx,{left,right,top,bottom}=chart.chartArea,PAD=5,BH=16;
        lines.forEach((l,i)=>{
            const yPx=yS.getPixelForValue(l.y);
            if(!isFinite(yPx)||yPx<top||yPx>bottom)return;
            const isSel=i===chart._selectedDragLine;
            ctx.save();ctx.strokeStyle=l.color||'#1fcc59';ctx.lineWidth=isSel?2:1.5;
            if(!isSel)ctx.setLineDash([8,4]);
            ctx.beginPath();ctx.moveTo(left,yPx);ctx.lineTo(right,yPx);ctx.stroke();ctx.setLineDash([]);
            const text=l.y.toFixed(1);ctx.font='bold 10px Arial,sans-serif';ctx.textBaseline='middle';ctx.textAlign='left';
            const bw=Math.ceil(ctx.measureText(text).width)+PAD*2,bx=right+4,by=yPx-BH/2;
            ctx.fillStyle='rgba(10,12,20,0.95)';ctx.fillRect(bx,by,bw,BH);
            ctx.strokeStyle=l.color||'#1fcc59';ctx.lineWidth=isSel?1.5:1;ctx.strokeRect(bx,by,bw,BH);
            ctx.fillStyle=l.color||'#1fcc59';ctx.fillText(text,bx+PAD,yPx);ctx.restore();
        });
    }
};

/* ═══════════════════════════════
   CRIAÇÃO DO GRÁFICO
═══════════════════════════════ */
Chart.defaults.animation.duration = 0;

function createStatsChart() {
    const canvas = document.getElementById('CopaGols');
    const ctx2d = canvas.getContext('2d');
    const datasets = [], sc = '#00FF00', lc = '#FF0000';
    const c = _loadControls();

    FIXED_MARKETS.forEach(label => {
        const key = labelToKey[label], color = _marketColor(label), isInd = label === 'Gols Individual';
        datasets.push({label,data:[],borderColor:color,backgroundColor:color,pointBackgroundColor:[],pointBorderColor:'rgba(0,0,0,0)',pointBorderWidth:0,borderWidth:2,pointRadius:3,pointHoverRadius:4,fill:false,yAxisID:isInd?'y2':'y',hidden:!statsChartVisibleDatasets[label]});
        datasets.push({label:label+' - Short MA',data:[],borderColor:sc,backgroundColor:'transparent',tension:0,borderWidth:2,pointRadius:0,fill:false,borderDash:[5,5],yAxisID:isInd?'y2':'y',hidden:!showMovingAverages||!statsChartVisibleDatasets[label]});
        datasets.push({label:label+' - Long MA', data:[],borderColor:lc,backgroundColor:'transparent',tension:0,borderWidth:2,pointRadius:0,fill:false,borderDash:[5,5],yAxisID:isInd?'y2':'y',hidden:!showMovingAverages||!statsChartVisibleDatasets[label]});
    });

    chartInstance = new Chart(ctx2d, {
        type:'line', data:{labels:[],datasets},
        options:{
            responsive:true, maintainAspectRatio:false, animation:{duration:0},
            layout:{padding:{top:30,right:80}},
            plugins:{
                legend:{display:false},
                tooltip:{enabled:true,backgroundColor:'rgba(0,0,0,0.8)',titleColor:'#1fad8b',bodyColor:'#e0e0e0',borderColor:'#1fad8b',borderWidth:1,
                    callbacks:{
                        title:items=>{const sd=chartData;const m=sd[Math.max(0,sd.length-numPoints)+items[0].dataIndex];return m?`${m.hora}:${m.minuto.toString().padStart(2,'0')}`:'';},
                        label:c2=>{const v=c2.parsed.y;if(v===null)return'';const isG=c2.dataset.label==='Gols FT'||c2.dataset.label==='Gols HT'||c2.dataset.label==='Gols Individual';return isG?`${c2.dataset.label}: ${v} gols`:`${c2.dataset.label}: ${v.toFixed(2)}%`;},
                        afterBody:items=>{const sd=chartData;const m=sd[Math.max(0,sd.length-numPoints)+items[0].dataIndex];return m?`FT: ${m.ft||'N/A'}  HT: ${m.ht||'N/A'}`:'';},
                    }
                },
                linhaAtual:{enabled:c.linhaAtual??true}
            },
            scales:{
                x:{ticks:{display:false},grid:{display:false}},
                y:{beginAtZero:false,ticks:{color:'#b0b0b0',stepSize:5},grid:{color:'rgba(255,255,255,0.3)',lineWidth:0.5},afterFit:s=>{s.paddingTop=20;}},
                y2:{position:'right',beginAtZero:true,min:0,max:10,ticks:{color:'rgba(255,255,255,0.35)',stepSize:1,precision:0},grid:{display:false},afterFit:s=>{s.width=0;}}
            }
        },
        plugins:[fibonacciLinesPlugin,linhaAtualPlugin,linhaDraggablePlugin,rotulosPlugin]
    });
}

/* ═══════════════════════════════
   PROCESSAMENTO DE DADOS
═══════════════════════════════ */
function processApiData(data) {
    const sorted = [...data].sort((a,b)=>{const dA=new Date(a.data),dB=new Date(b.data);if(dA-dB!==0)return dA-dB;if(a.hora!==b.hora)return a.hora-b.hora;return a.minuto-b.minuto;});
    const sliced = sorted.slice(-numPoints - Math.ceil(averagePoints*3.5));
    chartData = sliced;

    function toAbsMin(m){const d=new Date(m.data);return Math.floor(d.getTime()/86400000)*1440+m.hora*60+m.minuto;}

    let labels=[],golsFT=[],golsHT=[],golsInd=[];
    let gol0=[],gol1=[],gol2=[],gol3=[],gol4=[],gol5=[];
    let gol2t0=[],gol2t1=[],gol2t2=[],gol2t3=[],gol2t4=[];
    let golsFTColors=[],golsHTColors=[],golsIndColors=[];
    let gol0Colors=[],gol1Colors=[],gol2Colors=[],gol3Colors=[],gol4Colors=[],gol5Colors=[];
    let gol2t0Colors=[],gol2t1Colors=[],gol2t2Colors=[],gol2t3Colors=[],gol2t4Colors=[];
    const green='#00FF00',red='#FF0000',janelaMin=averagePoints*3,startExibir=Math.max(0,sliced.length-numPoints);

    for(let i=0;i<sliced.length;i++){
        const mAtual=sliced[i],tsAtual=toAbsMin(mAtual);
        let s={golsFT:0,golsHT:0,gol0:0,gol1:0,gol2:0,gol3:0,gol4:0,gol5:0,gol2t0:0,gol2t1:0,gol2t2:0,gol2t3:0,gol2t4:0,valid:0};
        for(let j=i;j>=0;j--){const mj=sliced[j];if(tsAtual-toAbsMin(mj)>janelaMin)break;let ft=[0,0];if(mj.ft?.includes(' x '))ft=mj.ft.split(' x ').map(Number);const htT=parseHtScoreTotal(mj.ht),tg=ft[0]+ft[1],tg2t=Math.max(0,tg-htT);s.golsFT+=tg;s.golsHT+=htT;s.gol0+=tg===0?1:0;s.gol1+=tg===1?1:0;s.gol2+=tg===2?1:0;s.gol3+=tg===3?1:0;s.gol4+=tg===4?1:0;s.gol5+=tg===5?1:0;s.gol2t0+=tg2t===0?1:0;s.gol2t1+=tg2t===1?1:0;s.gol2t2+=tg2t===2?1:0;s.gol2t3+=tg2t===3?1:0;s.gol2t4+=tg2t===4?1:0;s.valid++;}
        if(i<startExibir)continue;
        const m=sliced[i];
        labels.push(`${m.hora}:${m.minuto.toString().padStart(2,'0')}`);
        let ft=[0,0];if(m.ft?.includes(' x '))ft=m.ft.split(' x ').map(Number);
        const htT=parseHtScoreTotal(m.ht),tg=ft[0]+ft[1],tg2t=Math.max(0,tg-htT),avg=s.valid||1;
        golsFT.push(s.golsFT);golsFTColors.push('#FFFF00');
        golsHT.push(s.golsHT);golsHTColors.push('#26A69A');
        const giv=tg,gic=giv>=5?'#2ecc71':giv>=3?'#3498db':giv===2?'#f1c40f':giv===1?'#e67e22':'#e74c3c';
        golsInd.push(giv);golsIndColors.push(gic);
        gol0.push(s.gol0/avg*100);gol0Colors.push(tg===0?green:red);
        gol1.push(s.gol1/avg*100);gol1Colors.push(tg===1?green:red);
        gol2.push(s.gol2/avg*100);gol2Colors.push(tg===2?green:red);
        gol3.push(s.gol3/avg*100);gol3Colors.push(tg===3?green:red);
        gol4.push(s.gol4/avg*100);gol4Colors.push(tg===4?green:red);
        gol5.push(s.gol5/avg*100);gol5Colors.push(tg===5?green:red);
        gol2t0.push(s.gol2t0/avg*100);gol2t0Colors.push(tg2t===0?green:red);
        gol2t1.push(s.gol2t1/avg*100);gol2t1Colors.push(tg2t===1?green:red);
        gol2t2.push(s.gol2t2/avg*100);gol2t2Colors.push(tg2t===2?green:red);
        gol2t3.push(s.gol2t3/avg*100);gol2t3Colors.push(tg2t===3?green:red);
        gol2t4.push(s.gol2t4/avg*100);gol2t4Colors.push(tg2t===4?green:red);
    }

    const result={labels,golsFT,golsHT,golsInd,gol0,gol1,gol2,gol3,gol4,gol5,gol2t0,gol2t1,gol2t2,gol2t3,gol2t4,golsFTColors,golsHTColors,golsIndColors,gol0Colors,gol1Colors,gol2Colors,gol3Colors,gol4Colors,gol5Colors,gol2t0Colors,gol2t1Colors,gol2t2Colors,gol2t3Colors,gol2t4Colors};
    const sp=5,lp=20;
    Object.keys(labelToKey).forEach(label=>{const key=labelToKey[label];result[key+'Short']=computeMA(result[key],sp);result[key+'Long']=computeMA(result[key],lp);});
    return result;
}

/* ═══════════════════════════════
   UPDATE DO GRÁFICO
═══════════════════════════════ */
function updateStatsChart(pd) {
    if(!chartInstance)return;
    chartInstance.data.labels = pd.labels;
    chartInstance.data.datasets.forEach(ds => {
        const key = getKeyFromLabel(ds.label);
        if(!key)return;
        ds.data = pd[key] || [];
        if(!ds.label.includes(' MA')) ds.pointBackgroundColor = pd[key+'Colors'] || [];
    });
    chartInstance.update();
    _renderLinesPanel();
}

/* ── seletores casa/liga ── */
function _currentApiPath(){
    const h=document.getElementById('houseSelector')?.value;
    const l=document.getElementById('leagueSelector')?.value;
    const house=HOUSE_LEAGUE_MAP[h];
    if(!house)return null;
    return house.leagues[l]||null;
}
function _populateLeagues(houseKey, selectedLeague){
    const sel=document.getElementById('leagueSelector');
    const house=HOUSE_LEAGUE_MAP[houseKey];
    if(!house||!sel)return;
    sel.innerHTML='';
    Object.keys(house.leagues).forEach(lname=>{
        const opt=document.createElement('option');opt.value=lname;opt.textContent=lname;sel.appendChild(opt);
    });
    const keys=Object.keys(house.leagues);
    sel.value=(selectedLeague&&keys.includes(selectedLeague))?selectedLeague:keys[0];
}
function _initHouseLeagueSelectors(){
    const hSel=document.getElementById('houseSelector');
    const lSel=document.getElementById('leagueSelector');
    if(!hSel||!lSel)return;
    hSel.innerHTML='';
    Object.entries(HOUSE_LEAGUE_MAP).forEach(([key,house])=>{
        const opt=document.createElement('option');opt.value=key;opt.textContent=house.label;hSel.appendChild(opt);
    });
    const saved=_ls(HOUSE_LEAGUE_KEY,null);
    const hKeys=Object.keys(HOUSE_LEAGUE_MAP);
    const initHouse=(saved&&hKeys.includes(saved.house))?saved.house:hKeys[0];
    hSel.value=initHouse;
    _populateLeagues(initHouse,saved?.league);
    hSel.addEventListener('change',()=>{_populateLeagues(hSel.value,null);_lsSet(HOUSE_LEAGUE_KEY,{house:hSel.value,league:lSel.value});chartData={};updateCharts();});
    lSel.addEventListener('change',()=>{_lsSet(HOUSE_LEAGUE_KEY,{house:hSel.value,league:lSel.value});updateCharts();});
    _lsSet(HOUSE_LEAGUE_KEY,{house:hSel.value,league:lSel.value});
}

/* ── painel de mercados ── */
function _renderLinesPanel(){
    const panel=document.getElementById('setupLinesPanel');if(!panel)return;
    panel.innerHTML='';
    FIXED_MARKETS.forEach(label=>{
        const active=_isLineActive(label),color=_marketColor(label);
        let val=null;
        if(chartInstance){const ds=chartInstance.data.datasets.find(d=>d.label===label);if(ds?.data){for(let j=ds.data.length-1;j>=0;j--){const v=ds.data[j];if(v!==null&&isFinite(v)){val=v;break;}}}}
        const toggle=document.createElement('div');
        toggle.className='market-toggle'+(active?'':' inactive');
        toggle.style.setProperty('--mcolor',color);
        const dot=document.createElement('span');dot.className='market-toggle-dot';dot.style.background=color;
        const txt=document.createElement('span');txt.textContent=label;
        toggle.appendChild(dot);toggle.appendChild(txt);
        if(val!==null){const vs=document.createElement('span');vs.className='market-toggle-val';const isG=label==='Gols FT'||label==='Gols HT'||label==='Gols Individual';vs.textContent=isG?Math.round(val):val.toFixed(1);vs.style.color=color;toggle.appendChild(vs);}
        toggle.addEventListener('click',()=>{
            const nowActive=!_isLineActive(label);_setLineActive(label,nowActive);
            statsChartVisibleDatasets[label]=nowActive;_saveVDS(statsChartVisibleDatasets);
            if(chartInstance){chartInstance.data.datasets.forEach((ds,idx)=>{const ml=ds.label.includes(' - ')?ds.label.split(' - ')[0]:ds.label;if(ml!==label)return;const vis=statsChartVisibleDatasets[ml];chartInstance.getDatasetMeta(idx).hidden=ds.label.includes(' - ')?!showMovingAverages||!vis:!vis;});chartInstance.update();}
            _renderLinesPanel();
        });
        panel.appendChild(toggle);
    });
}

/* ── fetch e update ── */
function updateCharts(){
    if(!_tabVisible)return;
    const path=_currentApiPath();if(!path)return;
    const hSel=document.getElementById('houseSelector');
    const lSel=document.getElementById('leagueSelector');
    const houseName=HOUSE_LEAGUE_MAP[hSel?.value]?.label||'';
    const leagueName=lSel?.value||'';
    document.getElementById('chartTitle').textContent=`Gols — ${houseName} / ${leagueName}`;
    fetch(`https://betstat.site${path}?timestamp=${Date.now()}`)
        .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
        .then(data=>{ updateStatsChart(processApiData(data)); })
        .catch(e=>console.error('[GolsGraf]',e));
}

/* ── toggles ── */
function toggleFibonacciLines(){showFibonacciLines=document.getElementById('fibonacciToggle').checked;if(chartInstance)chartInstance.update();_saveControls();}
function toggleMovingAverages(){
    showMovingAverages=document.getElementById('movingAveragesToggle').checked;
    if(chartInstance){chartInstance.data.datasets.forEach((ds,idx)=>{if(ds.label.includes(' - ')){const main=ds.label.split(' - ')[0];chartInstance.getDatasetMeta(idx).hidden=!showMovingAverages||!statsChartVisibleDatasets[main];}});chartInstance.update();}
    _saveControls();
}

/* ── funções globais de linha ── */
function adicionarLinhaDraggable(){if(chartInstance)chartInstance.addDragLine(document.getElementById('lineColorPicker')?.value||'#1fcc59');}
function deletarLinhaSelecionada(){if(chartInstance)chartInstance.deleteDragLine();}
function limparTodasLinhas(){if(chartInstance)chartInstance.clearDragLines();}

/* ── aplicar controles salvos ── */
function _applyStoredControls(){
    const c=_loadControls();
    const g=id=>document.getElementById(id);
    if(g('pointsSelector'))g('pointsSelector').value=String(c.horas??160);
    if(g('averageSelector'))g('averageSelector').value=String(c.base??19);
    if(g('fibonacciToggle'))g('fibonacciToggle').checked=c.fibonacci??false;
    if(g('movingAveragesToggle'))g('movingAveragesToggle').checked=c.mediasMoveis??false;
    if(g('linhaAtualToggle'))g('linhaAtualToggle').checked=c.linhaAtual??true;
    if(g('labelsToggle'))g('labelsToggle').checked=c.labels??false;
    numPoints=c.horas??160; averagePoints=c.base??19;
    showFibonacciLines=c.fibonacci??false; showMovingAverages=c.mediasMoveis??false; showLabels=c.labels??false;
    FIXED_MARKETS.forEach(label=>{statsChartVisibleDatasets[label]=_isLineActive(label);});
    _saveVDS(statsChartVisibleDatasets);
}

/* ── event listeners ── */
document.getElementById('pointsSelector').addEventListener('change',e=>{numPoints=parseInt(e.target.value,10);updateCharts();_saveControls();});
document.getElementById('averageSelector').addEventListener('change',e=>{averagePoints=parseInt(e.target.value,10);updateCharts();_saveControls();});
document.getElementById('fibonacciToggle').addEventListener('change',toggleFibonacciLines);
document.getElementById('movingAveragesToggle').addEventListener('change',toggleMovingAverages);
document.getElementById('linhaAtualToggle').addEventListener('change',function(){if(chartInstance){chartInstance.options.plugins.linhaAtual.enabled=this.checked;chartInstance.update('active');}  _saveControls();});
document.getElementById('labelsToggle').addEventListener('change',function(){showLabels=this.checked;if(chartInstance)chartInstance.update();_saveControls();});
document.getElementById('btnLinhaTools').addEventListener('click',e=>{e.stopPropagation();const p=document.getElementById('linhaToolsPanel');p.style.display=p.style.display==='none'?'block':'none';});
document.addEventListener('click',()=>{const p=document.getElementById('linhaToolsPanel');if(p)p.style.display='none';});
document.getElementById('linhaToolsPanel').addEventListener('click',e=>e.stopPropagation());
document.addEventListener('visibilitychange',()=>{_tabVisible=!document.hidden;if(_tabVisible)updateCharts();});

/* ── boot ── */
window.onload = function(){
    _initHouseLeagueSelectors();
    _applyStoredControls();
    createStatsChart();
    updateCharts();
    _renderLinesPanel();
};
setInterval(updateCharts, 3000);
</script>
</body>
