<style>
:root {
  --primary:        #1fac89;
  --primary-hover:  #189976;
  --primary-dim:    rgba(31,172,137,0.12);
  --primary-border: rgba(31,172,137,0.28);
  --bg:             #1c1f26;
  --surface:        #23272f;
  --surface-2:      #2a2f3a;
  --border:         rgba(255,255,255,0.08);
  --text:           #f0f2f5;
  --text-muted:     #8b93a1;
  --text-dim:       #5d6572;
  --red:            #e05252;
  --yellow:         #e0b352;
  --tr:             all 0.15s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Roboto',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; -webkit-font-smoothing:antialiased; }
.container { max-width:1400px; margin:0 auto; padding:1.75rem 1.5rem; }

/* CARD */
.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:1.25rem; }

/* CONFIG GRID */
.config-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.125rem 2rem; }
.config-grid .full { grid-column:1/-1; }

.field-label { font-size:0.68rem; font-weight:700; letter-spacing:1.1px; text-transform:uppercase; color:var(--text-dim); margin-bottom:0.45rem; }
.multi-hint { font-size:0.71rem; color:var(--text-dim); margin-bottom:0.4rem; }

/* BOTÕES */
.btn-grid { display:flex; flex-wrap:wrap; gap:0.35rem; }
.btn { background:var(--surface-2); color:var(--text-muted); border:1px solid var(--border); padding:0.375rem 0.825rem; border-radius:6px; font-size:0.82rem; font-weight:500; cursor:pointer; transition:var(--tr); font-family:'Roboto',sans-serif; white-space:nowrap; }
.btn:hover { color:var(--text); border-color:var(--primary-border); background:var(--primary-dim); }
.btn.active { background:var(--primary-dim); color:var(--primary); border-color:var(--primary); font-weight:700; }

/* DIVIDER */
.divider { border:none; border-top:1px solid var(--border); margin:1.125rem 0; }

/* AÇÕES */
.actions { display:flex; gap:0.5rem; }
.action-btn { flex:1; padding:0.75rem 1.25rem; border:none; border-radius:8px; font-size:0.875rem; font-weight:700; cursor:pointer; transition:var(--tr); font-family:'Roboto',sans-serif; display:flex; align-items:center; justify-content:center; gap:0.375rem; }
.btn-clear { background:transparent; color:var(--text-muted); border:1px solid var(--border); flex:0 0 auto; }
.btn-clear:hover { background:var(--surface-2); color:var(--text); border-color:rgba(255,255,255,0.2); }
.btn-generate { background:var(--primary); color:#fff; flex:1; }
.btn-generate:hover { background:var(--primary-hover); }
.btn-generate:disabled { opacity:0.45; cursor:not-allowed; }
.btn-nova { background:var(--surface-2); color:var(--primary); border:1px solid var(--primary-border); flex:1; }
.btn-nova:hover { background:var(--primary-dim); }

/* SPINNER */
.spinner { width:13px; height:13px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; flex-shrink:0; }
.spinner-g { border-color:rgba(31,172,137,0.3); border-top-color:var(--primary); }
@keyframes spin { to { transform:rotate(360deg); } }

/* RESULT */
.result-card { background:var(--surface); border:1px solid var(--primary-border); border-radius:12px; overflow:hidden; margin-bottom:1.25rem; }
.result-header { background:var(--primary-dim); border-bottom:1px solid var(--primary-border); padding:0.8rem 1.25rem; display:flex; align-items:center; gap:0.5rem; }
.result-dot { width:8px; height:8px; border-radius:50%; background:var(--primary); flex-shrink:0; }
.result-title-text { font-size:0.88rem; font-weight:700; color:var(--primary); }

/* LIGA TABS */
.liga-tabs { display:flex; flex-wrap:wrap; gap:0.35rem; padding:0.75rem 1.25rem; border-bottom:1px solid var(--border); }
.liga-tab { padding:0.3rem 0.7rem; border-radius:5px; font-size:0.78rem; font-weight:500; cursor:pointer; transition:var(--tr); border:1px solid var(--border); background:var(--surface-2); color:var(--text-muted); font-family:'Roboto',sans-serif; }
.liga-tab:hover { color:var(--text); border-color:var(--primary-border); }
.liga-tab.active { background:var(--primary-dim); color:var(--primary); border-color:var(--primary); font-weight:700; }
.liga-panel { display:none; }
.liga-panel.active { display:block; }

/* RESULT BODY */
.result-body { padding:1.25rem; }

/* BLOCKS */
.analysis-block { margin-bottom:1.125rem; padding-bottom:1.125rem; border-bottom:1px solid var(--border); }
.analysis-block:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
.block-title { font-size:0.67rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); margin-bottom:0.55rem; }

.analysis-meta { display:flex; flex-wrap:wrap; gap:0.3rem 1.25rem; font-size:0.79rem; color:var(--text-muted); }
.analysis-meta strong { color:var(--text); font-weight:500; }

.score-row { display:flex; align-items:center; gap:0.875rem; flex-wrap:wrap; }
.score-badge { font-size:1.55rem; font-weight:700; color:var(--primary); line-height:1; }
.score-label { font-size:0.77rem; font-weight:700; color:var(--primary); text-transform:uppercase; letter-spacing:0.5px; }
.score-detail { font-size:0.74rem; color:var(--text-muted); margin-top:0.2rem; }
.score-bar-track { flex:1; min-width:90px; height:5px; background:var(--surface-2); border-radius:3px; overflow:hidden; }
.score-bar-fill { height:100%; background:var(--primary); border-radius:3px; }

.streak-row { display:flex; align-items:center; gap:0.5rem; font-size:0.84rem; }
.streak-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.s-green { background:var(--primary); }
.s-red { background:var(--red); }
.streak-alert { font-size:0.74rem; color:var(--yellow); margin-top:0.2rem; }

.times-grid { display:flex; flex-wrap:wrap; gap:0.3rem; }
.time-chip { background:var(--surface-2); border:1px solid var(--border); border-radius:4px; padding:0.18rem 0.45rem; font-size:0.75rem; color:var(--text-muted); }
.time-chip strong { color:var(--text); font-weight:500; }
.stat-line { font-size:0.79rem; color:var(--text-muted); margin-top:0.4rem; }
.stat-line strong { color:var(--text); }

.pattern-list { display:flex; flex-direction:column; gap:0.45rem; }
.pattern-item { background:var(--surface-2); border:1px solid var(--border); border-radius:7px; padding:0.575rem 0.825rem; }
.pattern-name { font-size:0.79rem; font-weight:500; color:var(--text); margin-bottom:0.28rem; word-break:break-word; }
.pattern-stats { display:flex; flex-wrap:wrap; gap:0.28rem 0.825rem; font-size:0.71rem; color:var(--text-muted); }
.pct-ex { color:var(--primary); font-weight:700; }
.pct-fo { color:#7dcfb0; font-weight:700; }
.pct-mo { color:var(--yellow); font-weight:700; }
.badge-n { display:inline-flex; align-items:center; padding:0.07rem 0.32rem; border-radius:3px; font-size:0.66rem; font-weight:700; letter-spacing:0.3px; }
.b-ex { background:rgba(31,172,137,0.15); color:var(--primary); }
.b-fo { background:rgba(125,207,176,0.15); color:#7dcfb0; }
.b-mo { background:rgba(224,179,82,0.12); color:var(--yellow); }

.odds-table-wrap { overflow-x:auto; }
.odds-table,.next-table { width:100%; border-collapse:collapse; font-size:0.77rem; }
.odds-table th,.next-table th { text-align:left; font-size:0.64rem; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-dim); padding:0.28rem 0.45rem; border-bottom:1px solid var(--border); }
.odds-table td,.next-table td { padding:0.32rem 0.45rem; border-bottom:1px solid rgba(255,255,255,0.04); color:var(--text-muted); }
.odds-table tr:last-child td,.next-table tr:last-child td { border-bottom:none; }
.star { color:var(--primary); font-size:0.71rem; }
.pct-bar { display:flex; align-items:center; gap:0.375rem; }
.pct-track { width:40px; height:3px; background:var(--surface-2); border-radius:2px; overflow:hidden; flex-shrink:0; }
.pct-fill { height:100%; background:var(--primary); border-radius:2px; }
.match-name { color:var(--text); }

.temp-row { display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap; margin-bottom:0.55rem; }
.temp-pct { font-size:1.35rem; font-weight:700; }
.temp-desc { font-size:0.79rem; color:var(--text-muted); }
.temp5-list { display:flex; flex-direction:column; gap:0.28rem; }
.temp5-item { display:flex; align-items:center; gap:0.45rem; font-size:0.74rem; color:var(--text-muted); }
.temp5-item .rank { color:var(--text-dim); width:14px; text-align:right; flex-shrink:0; }
.temp5-item .grp { color:var(--text); min-width:80px; }
.temp5-item .pct { font-weight:700; color:var(--primary); }

.opp-header { font-size:0.77rem; color:var(--text-muted); margin-bottom:0.55rem; }
.opp-list { display:flex; flex-direction:column; gap:0.375rem; }
.opp-item { display:flex; align-items:center; gap:0.55rem; background:var(--surface-2); border:1px solid var(--border); border-radius:7px; padding:0.55rem 0.825rem; flex-wrap:wrap; }
.opp-item.principal { border-color:var(--primary-border); }
.opp-role { font-size:0.64rem; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--text-dim); min-width:56px; }
.opp-role.pr { color:var(--primary); }
.opp-time { font-size:0.72rem; color:var(--text-dim); }
.opp-match { font-size:0.84rem; color:var(--text); font-weight:500; }
.opp-odd { font-size:0.77rem; color:var(--text-muted); margin-left:auto; }
.opp-tag { font-size:0.66rem; padding:0.1rem 0.375rem; border-radius:3px; font-weight:700; background:rgba(31,172,137,0.15); color:var(--primary); }
.opp-just { font-size:0.73rem; color:var(--text-dim); margin-top:0.28rem; }

.mart-text { font-size:0.81rem; color:var(--text-muted); }

.rec-box { border-radius:7px; padding:0.825rem 1rem; font-size:0.84rem; font-weight:500; line-height:1.65; }
.rec-forte    { background:rgba(31,172,137,0.1);  border:1px solid rgba(31,172,137,0.3);  color:var(--primary); }
.rec-normal   { background:rgba(224,179,82,0.08); border:1px solid rgba(224,179,82,0.3);  color:var(--yellow); }
.rec-cautela  { background:rgba(224,140,50,0.08); border:1px solid rgba(224,140,50,0.3);  color:#e08c32; }
.rec-aguardar { background:rgba(224,82,82,0.08);  border:1px solid rgba(224,82,82,0.3);   color:var(--red); }

.error-box { background:rgba(224,82,82,0.08); border:1px solid rgba(224,82,82,0.3); border-radius:8px; padding:0.825rem 1rem; color:var(--red); font-size:0.81rem; }
.loading-box { display:flex; align-items:center; gap:0.45rem; font-size:0.84rem; color:var(--primary); padding:0.375rem 0; }

@media (max-width:700px) {
  .container { padding:1rem; }
  .card { padding:1rem; }
  .config-grid { grid-template-columns:1fr; }
  .config-grid .full { grid-column:1; }
}
</style>

  <body>
    <div id="header"></div>
    <br>
    <br>
    <div class="container">

      <!-- CONFIG CARD -->
      <div class="card">
        <div class="config-grid">

          <div>
            <div class="field-label">Casa de Aposta</div>
            <div class="btn-grid" id="casas-group">
              <button class="btn" data-value="betano">Betano</button>
              <button class="btn" data-value="kiron">Kiron</button>
              <button class="btn" data-value="estrela">Estrelabet</button>
              <button class="btn" data-value="bet365">Bet365</button>
            </div>
          </div>

          <div>
            <div class="field-label">Período de Análise</div>
            <div class="btn-grid" id="periodo-group">
              <button class="btn" data-value="120">6h</button>
              <button class="btn" data-value="240">12h</button>
              <button class="btn" data-value="480">24h</button>
              <button class="btn" data-value="960">48h</button>
              <button class="btn" data-value="1440">72h</button>
            </div>
          </div>

          <div class="full" id="liga-section" style="display:none;">
            <div class="field-label">Liga</div>
            <p class="multi-hint">Selecione uma ou mais ligas — ou clique em "Todas"</p>
            <div class="btn-grid" id="ligas-group"></div>
          </div>

          <div class="full">
            <div class="field-label">Mercado da Análise</div>
            <div class="btn-grid" id="mercados-group">
              <button class="btn" data-value="casaVence">Casa Vence</button>
              <button class="btn" data-value="foraVence">Fora Vence</button>
              <button class="btn" data-value="empate">Empate</button>
              <button class="btn" data-value="ambasMarcam">Ambas Sim</button>
              <button class="btn" data-value="ambasNaoMarcam">Ambas Não</button>
              <button class="btn" data-value="over1.5">Over 1.5</button>
              <button class="btn" data-value="over2.5">Over 2.5</button>
              <button class="btn" data-value="over3.5">Over 3.5</button>
              <button class="btn" data-value="under1.5">Under 1.5</button>
              <button class="btn" data-value="under2.5">Under 2.5</button>
              <button class="btn" data-value="under3.5">Under 3.5</button>
              <button class="btn" data-value="over5">5+ Gols</button>
              <button class="btn" data-value="exact1">1 Gol Exato</button>
              <button class="btn" data-value="exact2">2 Gols Exatos</button>
              <button class="btn" data-value="exact3">3 Gols Exatos</button>
              <button class="btn" data-value="exact4">4 Gols Exatos</button>
            </div>
          </div>

          <div>
            <div class="field-label">Estratégia Martingale</div>
            <div class="btn-grid" id="martingale-group">
              <button class="btn" data-value="0">Nenhum</button>
              <button class="btn" data-value="1">1 Cobertura</button>
              <button class="btn" data-value="2">2 Coberturas</button>
              <button class="btn" data-value="3">3 Coberturas</button>
            </div>
          </div>

        </div>

        <hr class="divider">

        <div class="actions">
          <button class="action-btn btn-clear" onclick="limparAnalise()">Limpar</button>
          <button class="action-btn btn-generate" id="btn-gerar" onclick="gerarAnalise()">Gerar Análise</button>
        </div>
      </div>

      <!-- RESULTADO -->
      <div id="result-container" style="display:none;"></div>

    </div>

    <script>
/* === CASAS CONFIG === */
const casasConfig = {
  'betano': { name:'Betano', ligas:[{name:'Clássicos da América',value:'Taça Glória Eterna'},'Copa América','Euro','Campeonato Italiano','Copa das Estrelas','Brasileirão Betano'] },
  'kiron':   { name:'Kiron',      ligas:['England','Italy','Spain'], path:'kiron' },
  'estrela': { name:'Estrelabet', ligas:['Copa do Mundo','Ligas dos Campeões','América Latina'], path:'estrela' },
  'bet365':  { name:'Bet365',     ligas:['Copa','Euro','Super','Premier'], path:'bet365' }
};

/* === CACHE API === */
const _apiCache = new Map();
const CACHE_TTL_MS = 3*60*1000;
async function fetchComCache(url) {
  const c = _apiCache.get(url);
  if (c && Date.now()-c.ts < CACHE_TTL_MS) return c.data;
  const data = await fetch(url).then(r=>r.json());
  _apiCache.set(url, {ts:Date.now(), data});
  return data;
}

/* === LOCALSTORAGE === */
const LS_KEY = 'betstat_config';
function salvarConfig() {
  const cfg = {
    casa: getSelectedValue('casas-group'),
    mercado: getSelectedValue('mercados-group'),
    martingale: getSelectedValue('martingale-group'),
    periodo: getSelectedValue('periodo-group'),
    ligas: getSelectedLigas()
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(cfg)); } catch(e){}
}
function restaurarConfig() {
  let cfg; try { cfg = JSON.parse(localStorage.getItem(LS_KEY)); } catch(e){ return; }
  if (!cfg) return;
  if (cfg.casa) {
    const b = document.querySelector(`#casas-group .btn[data-value="${cfg.casa}"]`);
    if (b) { b.classList.add('active'); mostrarLigas(cfg.casa); }
  }
  ['mercado','martingale','periodo'].forEach(k => {
    const id = k==='mercado'?'mercados-group':k==='martingale'?'martingale-group':'periodo-group';
    if (cfg[k]) { const b = document.querySelector(`#${id} .btn[data-value="${cfg[k]}"]`); if (b) b.classList.add('active'); }
  });
  if (cfg.ligas && cfg.ligas.length > 0) {
    setTimeout(() => {
      cfg.ligas.forEach(v => { const b = document.querySelector(`#ligas-group .btn[data-value="${v}"]`); if (b) b.classList.add('active'); });
      const allBtns = document.querySelectorAll('#ligas-group .btn:not([data-value="__todas__"])');
      const actBtns = document.querySelectorAll('#ligas-group .btn.active:not([data-value="__todas__"])');
      if (allBtns.length > 0 && allBtns.length === actBtns.length) {
        const tb = document.querySelector('#ligas-group .btn[data-value="__todas__"]');
        if (tb) { document.querySelectorAll('#ligas-group .btn.active').forEach(b=>b.classList.remove('active')); tb.classList.add('active'); }
      }
    }, 50);
  }
}

/* === BOTÕES SINGLE-SELECT === */
['casas-group','mercados-group','martingale-group','periodo-group'].forEach(id => {
  const g = document.getElementById(id);
  if (!g) return;
  g.addEventListener('click', e => {
    if (!e.target.classList.contains('btn')) return;
    g.querySelectorAll('.btn.active').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
    if (id==='casas-group') mostrarLigas(e.target.dataset.value);
    salvarConfig();
  });
});

/* LIGA MULTI-SELECT */
document.getElementById('ligas-group').addEventListener('click', e => {
  if (!e.target.classList.contains('btn')) return;
  const btn = e.target;
  if (btn.dataset.value==='__todas__') {
    const isActive = btn.classList.contains('active');
    document.querySelectorAll('#ligas-group .btn').forEach(b=>b.classList.remove('active'));
    if (!isActive) btn.classList.add('active');
  } else {
    const tb = document.querySelector('#ligas-group .btn[data-value="__todas__"]');
    if (tb) tb.classList.remove('active');
    btn.classList.toggle('active');
  }
  salvarConfig();
});

function mostrarLigas(casa) {
  const section = document.getElementById('liga-section');
  const group   = document.getElementById('ligas-group');
  if (!casasConfig[casa]) { section.style.display='none'; return; }
  group.innerHTML = '';
  const all = document.createElement('button');
  all.className='btn'; all.dataset.value='__todas__'; all.textContent='Todas';
  group.appendChild(all);
  casasConfig[casa].ligas.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    if (typeof item==='object') { btn.dataset.value=item.value; btn.textContent=item.name; }
    else { btn.dataset.value=item; btn.textContent=item; }
    group.appendChild(btn);
  });
  section.style.display = 'block';
}

function getSelectedValue(groupId) { const g=document.getElementById(groupId),b=g?g.querySelector('.btn.active'):null; return b?b.dataset.value:null; }
function getSelectedText(groupId)  { const g=document.getElementById(groupId),b=g?g.querySelector('.btn.active'):null; return b?b.innerText:null; }
function getSelectedLigas() {
  const tb = document.querySelector('#ligas-group .btn[data-value="__todas__"]');
  if (tb && tb.classList.contains('active')) return Array.from(document.querySelectorAll('#ligas-group .btn:not([data-value="__todas__"])')).map(b=>b.dataset.value);
  return Array.from(document.querySelectorAll('#ligas-group .btn.active:not([data-value="__todas__"])')).map(b=>b.dataset.value);
}

function limparAnalise() {
  document.querySelectorAll('.btn.active').forEach(b=>b.classList.remove('active'));
  document.getElementById('result-container').style.display='none';
  document.getElementById('liga-section').style.display='none';
  try { localStorage.removeItem(LS_KEY); } catch(e){}
  const btn=document.getElementById('btn-gerar');
  btn.className='action-btn btn-generate'; btn.innerHTML='Gerar Análise'; btn.onclick=gerarAnalise; btn.disabled=false;
}

/* === API === */
async function buscarDadosAPI(casa, liga, numJogos) {
  const config = casasConfig[casa];
  if (!config) throw new Error(`Casa ${casa} não encontrada`);
  const d = { casa:config.name, liga, totalJogos:0, dadosCru:[] };
  try {
    const le=encodeURIComponent(liga), base='https://betstat.site', prefix=config.path?`/${config.path}`:'';
    const [res, prox, oddsRaw] = await Promise.all([
      fetchComCache(`${base}/resultados${prefix}/${le}`),
      fetchComCache(`${base}/proximos${prefix}/${le}`),
      fetchComCache(`${base}/odds${prefix}/${le}`).catch(()=>[])
    ]);
    res.slice(-numJogos).forEach(j=>{

/* === ESTATÍSTICAS === */
function calcularRankingTimes(games,mercado){
  const s={};
  games.forEach(({time_a,time_b,ft})=>{
    if(!ft||!ft.includes(' x '))return;
    const[gA,gB]=ft.split(' x ').map(Number),total=gA+gB;
    [time_a,time_b].forEach(t=>{if(!s[t])s[t]={name:t,totalGames:0,marketCount:0};});
    s[time_a].totalGames++;s[time_b].totalGames++;
    if(isGreen(mercado,gA,gB,total)){s[time_a].marketCount++;s[time_b].marketCount++;}
  });
  return Object.values(s).map(t=>({...t,percentage:t.totalGames>0?((t.marketCount/t.totalGames)*100).toFixed(1):'0.0'})).sort((a,b)=>b.marketCount-a.marketCount||parseFloat(b.percentage)-parseFloat(a.percentage));
}

function calcularStreak(dadosCru,mercado){
  if(!dadosCru||dadosCru.length===0)return{tipo:'neutro',contagem:0};
  const ul=dadosCru[dadosCru.length-1];
  const tipoUl=isGreen(mercado,ul[0],ul[1],ul[2])?'green':'red';
  let c=1;
  for(let i=dadosCru.length-2;i>=0;i--){const[a,b,t]=dadosCru[i];if((isGreen(mercado,a,b,t)?'green':'red')===tipoUl)c++;else break;}
  return{tipo:tipoUl,contagem:c};
}

function calcularScore(maiorAcerto,pctMercado,temOdd,qtdBons,totalP){
  const p1=Math.min(maiorAcerto,100)*0.40,p2=Math.min(pctMercado,100)*0.25,p3=temOdd?20:0;
  const vp=totalP>0?(qtdBons/totalP)*100:0,p4=Math.min(vp,100)*0.15;
  const score=Math.round(p1+p2+p3+p4);
  let label,cls;
  if(score>=80){label='ALTÍSSIMA';cls='forte';}else if(score>=65){label='ALTA';cls='forte';}
  else if(score>=50){label='MODERADA';cls='normal';}else if(score>=35){label='BAIXA';cls='cautela';}
  else{label='MUITO BAIXA';cls='aguardar';}
  return{score,label,cls};
}

  switch(m){case'ambasMarcam':return a>0&&b>0;case'ambasNaoMarcam':return a===0||b===0;case'casaVence':return a>b;case'foraVence':return b>a;case'empate':return a===b;

function calcularRankingOdds(dados,mv){

    const ok=odd.toFixed(2),ta=(o.time_casa||'').trim().toLowerCase(),tb=(o.time_visitante||'').trim().toLowerCase();
    const r=dadosCru.find(j=>{const jA=(j[3]||'').toLowerCase().trim(),jB=(j[4]||'').toLowerCase().trim();return(jA===ta&&jB===tb)||(jA===tb&&jB===ta);});

  const fs={};FAIXAS.forEach(f=>{fs[f.l]={label:f.l,jogos:0,greens:0};});
  oddsRaw.forEach(o=>{
    const odd=parseFloat(o[rk]||0);if(!odd||odd<=0)return;const faixa=getFaixa(odd);if(!faixa)return;
    const ta=(o.time_casa||'').trim().toLowerCase(),tb=(o.time_visitante||'').trim().toLowerCase();
    const r=dadosCru.find(j=>{const jA=(j[3]||'').toLowerCase().trim(),jB=(j[4]||'').toLowerCase().trim();return(jA===ta&&jB===tb)||(jA===tb&&jB===ta);});
    fs[faixa.l].jogos++;if(r&&isGreen(mv,r[0],r[1],r[2]))fs[faixa.l].greens++;
  });
  const rf=Object.values(fs).filter(f=>f.jogos>=1).map(f=>({...f,pct:((f.greens/f.jogos)*100).toFixed(0)})).sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct)||b.greens-a.greens);

}

function mapMercado(v){return({ambasMarcam:'ambasSim',ambasNaoMarcam:'ambasNao',casaVence:'casaVence',foraVence:'foraVence',empate:'empate','over1.5':'over1.5','over2.5':'over2.5','over3.5':'over3.5','under1.5':'under1.5','under2.5':'under2.5','under3.5':'under3.5',exact1:'umGolExato',exact2:'doisGolsExatos',exact3:'tresGolsExatos',exact4:'quatroGolsExatos',over5:'cincoOuMaisGols'})[v]||v;}
function checkM(m,hg,ag,tg){switch(m){case'ambasSim':return hg>0&&ag>0?1:0;case'ambasNao':return hg===0||ag===0?1:0;case'casaVence':return hg>ag?1:0;case'foraVence':return ag>hg?1:0;case'empate':return hg===ag?1:0;case'over1.5':return tg>1.5?1:0;case'over2.5':return tg>2.5?1:0;case'over3.5':return tg>3.5?1:0;case'under1.5':return tg<1.5?1:0;case'under2.5':return tg<2.5?1:0;case'under3.5':return tg<3.5?1:0;case'umGolExato':return tg===1?1:0;case'doisGolsExatos':return tg===2?1:0;case'tresGolsExatos':return tg===3?1:0;case'quatroGolsExatos':return tg===4?1:0;case'cincoOuMaisGols':return tg>=5?1:0;default:return 0;}}
function calculateMarketAnalysis(dados,sm,numJogos,linesToSum,vl){
  const cd=dados.dadosCru.map(i=>[`${String(i[5]).padStart(2,'0')}:${String(i[6]).padStart(2,'0')}`,i[0],i[1],i[3],i[4],i[2],dados.liga.toLowerCase()]).slice(-numJogos);
  if(!cd.length)return{currentPercentage:0,top5:[]};
  const rc=cd.slice(-linesToSum),cc=rc.reduce((s,r)=>s+checkM(sm,r[1],r[2],r[5]),0);
  const cp=(cc/linesToSum*100).toFixed(0),groups={};
  cd.forEach((row,i)=>{
    if(i<linesToSum-1)return;
    const sum=cd.slice(i-linesToSum+1,i+1).reduce((s,r)=>s+checkM(sm,r[1],r[2],r[5]),0);
    const pct=Math.round(sum/linesToSum*100);let result='red';
    if(i+vl<=cd.length){const next=cd.slice(i+1,i+1+vl);if(next.some(r=>checkM(sm,r[1],r[2],r[5])===1))result='green';}
    const key=`${sm} ${pct}%`;if(!groups[key])groups[key]={occurrences:0,greens:0,reds:0};result==='green'?groups[key].greens++:groups[key].reds++;groups[key].occurrences++;
  });
  const sorted=Object.keys(groups).map(key=>{const g=groups[key];const gp=(g.greens/g.occurrences*100).toFixed(2);const pn=parseFloat(gp);return{marketGroup:key,marketPercentage:parseFloat(key.split(' ')[1]),occurrences:g.occurrences,greens:g.greens,reds:g.reds,greenPercentage:gp,analysis:pn>75?'Alta chance de acerto':pn>50?'Moderada chance':pn>25?'Risco elevado':'Alta chance de falha'};}).sort((a,b)=>b.greenPercentage-a.greenPercentage||b.greens-a.greens);
  return{currentPercentage:cp,top5:sorted.slice(0,5)};
}

  let pH='';
  if(padroesEncontrados.length===0){pH=`<span style="font-size:0.78rem;color:var(--text-muted)">Nenhum padrão encontrado.</span>`;}
  else{pH=`<div class="pattern-list">`+padroesEncontrados.slice(0,3).map(p=>{const pf=parseFloat(p.percentual);let nc,bc,nl;if(pf>=90){nc='pct-ex';bc='b-ex';nl='EXCELENTE';}else if(pf>=70){nc='pct-fo';bc='b-fo';nl='FORTE';}else{nc='pct-mo';bc='b-mo';nl='MODERADO';}const conf=p.ocorrencias>=10?'alta confiabilidade':p.ocorrencias>=5?'conf. razoável':'baixo volume';return`<div class="pattern-item"><div class="pattern-name">${p.padrao}</div><div class="pattern-stats"><span><span class="${nc}">${p.percentual}%</span> acerto</span><span>${p.greens}/${p.ocorrencias} ocorrências</span><span class="badge-n ${bc}">${nl}</span><span>${conf}</span><span>Saltos: ${p.pular_jogos}j</span></div></div>`;}).join('')+`</div>`;}
  html+=`<div class="analysis-block"><div class="block-title">Padrões Relevantes</div>${pH}</div>`;

  // ODDS
  if(oddsDisponiveis&&rankingFaixas&&rankingFaixas.filter(f=>f.jogos>0).length>0){
    const fR=rankingFaixas.filter(f=>f.jogos>0).map(f=>{const iT=top3Faixas&&top3Faixas.has(f.label),w=Math.min(parseInt(f.pct),100);return`<tr><td>${iT?'<span class="star">⭐</span> ':''}${f.label}</td><td>${f.jogos}</td><td>${f.greens}</td><td><div class="pct-bar">${f.pct}%<div class="pct-track"><div class="pct-fill" style="width:${w}%"></div></div></div></td></tr>`;}).join('');
    let eH='';
    if(rankingExato&&rankingExato.length>0){const eR=rankingExato.slice(0,10).map(r=>{const iS=top5Odds&&top5Odds.has(r.odd.toFixed(2)),w=Math.min(parseInt(r.pct),100);return`<tr><td>${iS?'<span class="star">⭐</span> ':''}${r.odd.toFixed(2)}</td><td>${r.jogos}</td><td>${r.greens}</td><td><div class="pct-bar">${r.pct}%<div class="pct-track"><div class="pct-fill" style="width:${w}%"></div></div></div></td></tr>`;}).join('');eH=`<div style="margin-top:0.75rem"><div class="block-title" style="margin-bottom:0.375rem">Top 10 Odds — Valor Exato</div><div class="odds-table-wrap"><table class="odds-table"><thead><tr><th>Odd</th><th>Jogos</th><th>Greens</th><th>%</th></tr></thead><tbody>${eR}</tbody></table></div></div>`;}
    html+=`<div class="analysis-block"><div class="block-title">Ranking de Odds — "${mercado}"</div><div style="font-size:0.68rem;color:var(--text-dim);margin-bottom:0.375rem">⭐ = faixa no top 3 de greens</div><div class="odds-table-wrap"><table class="odds-table"><thead><tr><th>Faixa</th><th>Jogos</th><th>Greens</th><th>%</th></tr></thead><tbody>${fR}</tbody></table></div>${eH}</div>`;
  }

  // TEMPERATURA
  let tc='var(--primary)',td='';
  if(pct>=70)td='Mercado aquecido — alta frequência de greens.';
  else if(pct>=50){tc='var(--yellow)';td='Frequência moderada. Avalie antes de entrar.';}
  else if(pct>=30){tc='#e08c32';td='Momento desfavorável — frequência baixa.';}
  else{tc='var(--red)';td='Mercado frio — risco elevado.';}
  let t5H=marketAnalysis.top5.length>0?`<div class="temp5-list">${marketAnalysis.top5.map((item,i)=>`<div class="temp5-item"><span class="rank">${i+1}.</span><span class="grp">${item.marketGroup}</span><span class="pct">${item.greenPercentage}%</span><span style="color:var(--text-dim)">✅${item.greens} ❌${item.reds} · ${item.analysis}</span></div>`).join('')}</div>`:'' ;
  html+=`<div class="analysis-block"><div class="block-title">Temperatura do Mercado</div><div class="temp-row"><div class="temp-pct" style="color:${tc}">${pct}%</div><div class="temp-desc">${td}</div></div>${t5H}</div>`;

  // OPORTUNIDADES
  const tT=new Set(ranking.slice(0,8).map(t=>t.name.toLowerCase().trim()));
  const jB=(proximos||[]).filter(j=>tT.has((j.time_a||'').toLowerCase().trim())||tT.has((j.time_b||'').toLowerCase().trim()));
  let oH='';
  if(!mp||ma<55){oH=`<div style="font-size:0.78rem;color:var(--text-muted)">Nenhuma oportunidade clara. Acerto (${ma}%) abaixo de 55%.</div>`;}
  else{
    const cands=(jB.length>0?jB:(proximos||[])).slice(0,qtd);
    if(cands.length===0){oH=`<div style="font-size:0.78rem;color:var(--text-muted)">Não há confrontos próximos disponíveis.</div>`;}
    else{
      const just=jB.length>0?'Times com bom histórico detectados.':'Seleção cronológica.';
      oH=`<div class="opp-header">Liga: <strong>${ligaDisplay}</strong> · Mercado: <strong>${mercado}</strong> · Martingale: <strong>${martingale}</strong></div>`;
      oH+=`<div class="opp-list">`+cands.map((j,i)=>{
        const iP=i===0,ta=j.time_a||'—',tb=j.time_b||'—';
        const oj=buscarOddsJogo(oddsIndex,ta,tb),odd=getOddDoMercado(oj,mercadoValue);
        const oStr=odd?`Odd ${odd.toFixed(2)} <em style="color:var(--text-dim);font-style:normal">(${avaliarOdd(odd)})</em>`:'';
        const ok=odd?odd.toFixed(2):null,iE=ok&&top5Odds&&top5Odds.has(ok),iF=odd&&top3Faixas&&getOddNaFaixaTop(odd,top3Faixas);
        const tag=iE?'⭐ TOP 5':iF?'✅ Faixa Top':'';
        return`<div class="opp-item${iP?' principal':''}"><span class="opp-role${iP?' pr':''}">${iP?'Principal':`Cobertura ${i}`}</span><span class="opp-time">${j.horario}</span><span class="opp-match">${ta} × ${tb}</span><span class="opp-odd">${oStr}</span>${tag?`<span class="opp-tag">${tag}</span>`:''}</div>`;
      }).join('')+`</div>`;
      oH+=`<div class="opp-just">${just} Padrão "${mp.padrao}" → ${mp.percentual}% em ${mp.ocorrencias} ocorrências.</div>`;
    }
  }
  html+=`<div class="analysis-block"><div class="block-title">Próximas Oportunidades</div>${oH}</div>`;

  // PRÓXIMOS COM ODD
  if(oddsDisponiveis&&proximos&&proximos.length>0){
    const rows=proximos.map(j=>{
      const ta=j.time_a||'—',tb=j.time_b||'—',oj=buscarOddsJogo(oddsIndex,ta,tb),odd=getOddDoMercado(oj,mercadoValue);
      if(!odd)return`<tr><td class="match-name">${ta} × ${tb}</td><td>${j.horario}</td><td colspan="2" style="color:var(--text-dim)">—</td></tr>`;
      const ok=odd.toFixed(2),iE=top5Odds&&top5Odds.has(ok),iF=top3Faixas&&getOddNaFaixaTop(odd,top3Faixas);
      return`<tr><td class="match-name">${ta} × ${tb}</td><td>${j.horario}</td><td>${ok}</td><td>${iE?'⭐':iF?'✅':''}</td></tr>`;
    }).join('');
    html+=`<div class="analysis-block"><div class="block-title">Próximos Jogos — Odd "${mercado}"</div><div style="font-size:0.68rem;color:var(--text-dim);margin-bottom:0.375rem">⭐ top 5 exato · ✅ faixa top 3</div><div class="odds-table-wrap"><table class="next-table"><thead><tr><th>Partida</th><th>Horário</th><th>Odd</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }

  // MARTINGALE
  const cob=qtd-1;
  const mT=martingale==='Nenhum'?(ma>=70?`Entrada simples. Com ${ma}% de acerto, risco controlado.`:`Entrada simples. Acerto: ${ma}% — proceda com cautela.`):(ma>=80?`${cob} cobertura(s) bem embasada(s) (${ma}%). Bom suporte estatístico.`:ma>=60?`${cob} cobertura(s) razoável (${ma}%). Gerencie o tamanho.`:`${cob} cobertura(s) com risco elevado (${ma}%). Aguarde padrões mais fortes.`);
  html+=`<div class="analysis-block"><div class="block-title">Estratégia Martingale</div><div class="mart-text">${mT}</div></div>`;

  // RECOMENDAÇÃO
  const mg=marketAnalysis.top5[0];let rec='',rCls='';
  if(score>=80){rec=`✅ ENTRADA FORTE (Score ${score}/100). Confluência tripla detectada.`;if(mg)rec+=` Faixa "${mg.marketGroup}" → ${mg.greenPercentage}% de acerto pós-entrada.`;rCls='rec-forte';}
  else if(score>=65){rec=`🟡 ENTRADA (Score ${score}/100). Sinais positivos, sem confluência total. Gerencie a banca.`;if(temOdd)rec+=' Odd nos próximos jogos no top 5 histórico.';rCls='rec-normal';}
  else if(score>=50){rec=`🟠 ENTRADA COM CAUTELA (Score ${score}/100). Padrões: ${ma}%, mercado: ${pct}%. Risco existe.`;rCls='rec-cautela';}
  else{rec=`🔴 AGUARDAR (Score ${score}/100). Indicadores abaixo do mínimo de segurança.`;rCls='rec-aguardar';}
  if(streak&&streak.tipo==='red'&&streak.contagem>=4)rec+=` ⚠️ Streak de ${streak.contagem}× red — alto risco acumulado.`;
  html+=`<div class="analysis-block"><div class="block-title">Recomendação Final</div><div class="rec-box ${rCls}">${rec}</div></div>`;

  return html;
}

/* === PROCESSAR LIGA === */
async function processarLiga(casa,liga,mv,martCob) {
  const dados=await buscarDadosAPI(casa,liga,parseInt(getSelectedValue('periodo-group')));
  dados.ranking=calcularRankingTimes(dados.dadosCru.map(j=>({time_a:j[3],time_b:j[4],ft:`${j[0]} x ${j[1]}`})),mv);
  dados.streak=calcularStreak(dados.dadosCru,mv);
  const wr=await analyzeInWorker(dados.dadosCru,{tiros:martCob+1,market:mv,combinado:true});
  dados.padroesEncontrados=wr.resultados;
  const{rankingExato,rankingFaixas,top5Odds,top3Faixas}=calcularRankingOdds(dados,mv);
  dados.rankingExato=rankingExato;dados.rankingFaixas=rankingFaixas;dados.top5Odds=top5Odds;dados.top3Faixas=top3Faixas;
  const sm=mapMercado(mv),ls=casa==='kiron'?30:20;
  dados.marketAnalysis=calculateMarketAnalysis(dados,sm,dados.totalJogos,ls,martCob+1);
  return dados;
}

/* === FUNÇÃO PRINCIPAL === */
async function gerarAnalise() {
  const casa=getSelectedValue('casas-group');
  const ligas=getSelectedLigas();
  const mv=getSelectedValue('mercados-group');
  const mt=getSelectedText('mercados-group');
  const martCob=parseInt(getSelectedValue('martingale-group')||'0',10);
  const martText=getSelectedText('martingale-group');
  const periodo=getSelectedValue('periodo-group');

  if(!casa||ligas.length===0||!mv||!periodo){alert('Por favor, selecione Casa, Liga, Mercado e Período de Análise.');return;}

  const btn=document.getElementById('btn-gerar');
  const rc=document.getElementById('result-container');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Processando...';
  rc.style.display='block';
  rc.innerHTML=`<div class="result-card"><div class="result-header"><div class="result-dot"></div><div class="result-title-text" id="rtt">Processando…</div></div><div class="result-body"><div class="loading-box"><span class="spinner spinner-g"></span> Coletando dados de ${ligas.length} liga(s)…</div></div></div>`;

  function setS(msg){const el=document.getElementById('rtt');if(el)el.textContent=msg;}

  try {
    setS(`Processando ${ligas.length} liga(s)…`);
    const resultados=await Promise.all(ligas.map(liga=>processarLiga(casa,liga,mv,martCob)));

    const casaNome=casasConfig[casa].name;
    const agora=new Date(),hora=`${String(agora.getHours()).padStart(2,'0')}:${String(agora.getMinutes()).padStart(2,'0')}`;

    let tabsHtml='',panelsHtml='';
    ligas.forEach((liga,idx)=>{
      const isFirst=idx===0;
      const cfg=casasConfig[casa];
      const found=cfg.ligas.find(l=>(typeof l==='object'?l.value:l)===liga);
      const ligaDisplay=typeof found==='object'?found.name:(found||liga);
      tabsHtml+=`<button class="liga-tab${isFirst?' active':''}" onclick="switchTab(${idx})" id="tab-${idx}">${ligaDisplay}</button>`;
      const html=renderAnalise(resultados[idx],{mercado:mt,mercadoValue:mv,ligaDisplay,casa:casaNome,martingale:martText||'Nenhum',periodo:periodo+' jogos'});
      panelsHtml+=`<div class="liga-panel${isFirst?' active':''}" id="panel-${idx}"><div class="result-body">${html}</div></div>`;
    });

    const tabsSec=ligas.length>1?`<div class="liga-tabs">${tabsHtml}</div>`:'';
    const titleLiga=ligas.length>1?ligas.join(', '):ligas[0];
    rc.innerHTML=`<div class="result-card"><div class="result-header"><div class="result-dot"></div><div class="result-title-text">✓ Análise Concluída — ${casaNome} · ${titleLiga} · ${hora}</div></div>${tabsSec}${panelsHtml}</div>`;

    btn.disabled=false;
    btn.className='action-btn btn-nova';
    btn.innerHTML='↺ Nova Análise';
    btn.onclick=novaAnalise;

  } catch(error){
    rc.innerHTML=`<div class="result-card"><div class="result-header"><div class="result-dot" style="background:var(--red)"></div><div class="result-title-text" style="color:var(--red)">✖ Erro na Análise</div></div><div class="result-body"><div class="error-box"><strong>Erro:</strong> ${error.message}<br><br>Atualize a página e tente novamente.</div></div></div>`;
    btn.disabled=false;btn.className='action-btn btn-generate';btn.innerHTML='Gerar Análise';btn.onclick=gerarAnalise;
  }
}

function switchTab(idx){
  document.querySelectorAll('.liga-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.liga-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
}

function novaAnalise(){
  document.getElementById('result-container').style.display='none';
  const btn=document.getElementById('btn-gerar');
  btn.className='action-btn btn-generate';btn.innerHTML='Gerar Análise';btn.onclick=gerarAnalise;btn.disabled=false;
}
